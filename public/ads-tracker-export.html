function RecentEntries({extra, includeFallback=false, onManualSubmit, onToast}){
  const [open, setOpen] = useState(false);
  const [manualOpen, setManualOpen] = useState(false);
  const [entries, setEntries] = useState(null); // null → derive from extra+RECENT
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({kw:"", value:"", bucket:"msgs", camp:"tyson"});
  const [confirmDel, setConfirmDel] = useState(null);

  // Build a stable list with ids the first time (so state mutations are consistent)
  const seedAll = useMemo(() => {
    const source = extra?.length ? extra : (includeFallback ? RECENT : []);
    return source.map((e, i) => ({id: "e-"+i, ...e}));
  }, [extra, includeFallback]);
  const list = entries ?? seedAll;

  const startEdit = (e) => {
    setEditingId(e.id);
    setDraft({kw: e.kw, value: String(e.value), bucket: e.bucket, camp: e.camp});
    setConfirmDel(null);
  };
  const cancelEdit = () => { setEditingId(null); setConfirmDel(null); };
  const saveEdit = () => {
    if(!draft.kw || !draft.value) return;
    const next = (entries ?? seedAll).map(e =>
      e.id === editingId
        ? {...e, kw: draft.kw.toUpperCase(), value: parseFloat(draft.value), bucket: draft.bucket, camp: draft.camp, edited: true}
        : e
    );
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry updated");
  };
  const deleteEntry = (id) => {
    const next = (entries ?? seedAll).filter(e => e.id !== id);
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry deleted");
  };
  const submitManualEntry = (entry) => {
    onManualSubmit && onManualSubmit(entry);
    setManualOpen(false);
  };

  return (
    <div className="recent">
      <div className="recent-head" onClick={()=>setOpen(!open)}>
        <div className="recent-title">
          <span className={"recent-caret "+(open?"open":"")}>▸</span>
          Recent keyword entries
          <span className="recent-count">{list.length} logs · last 48h</span>
        </div>
        <span style={{color:'var(--text-4)',fontSize:11}}></span>
      </div>
      <div className={"recent-body "+(open?"open":"")}>
        <div className="manual-log-toggle">
          <button className={"manual-log-btn "+(manualOpen?"active":"")} onClick={()=>setManualOpen(v=>!v)}>
            <span style={{color:'var(--gold)',fontSize:13,lineHeight:1}}>+</span>
            {manualOpen ? "Hide manual logger" : "Log keyword manually"}
          </button>
        </div>
        {manualOpen && (
          <div className="manual-log-area">
            <KeywordEntry onSubmit={submitManualEntry} />
          </div>
        )}
        <table className="recent-tbl">
          <thead>
            <tr>
              <th style={{width:130}}>Time</th>
              <th style={{width:90}}>Setter</th>
              <th style={{width:110}}>Campaign</th>
              <th style={{width:150}}>Keyword</th>
              <th style={{width:180}}>Bucket</th>
              <th className="r" style={{width:110}}>Value</th>
              <th className="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody>
            {list.length === 0 && (
              <tr>
                <td colSpan="7" style={{color:"var(--text-3)",padding:"16px 24px"}}>
                  No recent keyword entries for this range.
                </td>
              </tr>
            )}
            {list.map((e)=>{
              const isEditing = editingId === e.id;
              const isDollar = e.bucket === "collected";
              const bucketLabel = BUCKETS.find(b=>b.id===e.bucket)?.label || e.bucket;
              return (
                <tr key={e.id} className={isEditing ? "editing-row" : ""}>
                  <td className="mono" style={{color:'var(--text-3)',fontSize:11,verticalAlign:'middle'}}>
                    {e.ts}{e.edited && <span className="edited-tag" title="Edited">·edited</span>}
                  </td>
                  <td style={{verticalAlign:'middle'}}>{e.setter}</td>
                  <td style={{color:'var(--text-3)',verticalAlign:'middle'}}>
                    {isEditing ? (
                      <select className="rec-edit-input" style={{width:90}} value={draft.camp} onChange={ev=>setDraft(d=>({...d, camp:ev.target.value}))}>
                        <option value="tyson">Tyson</option>
                        <option value="keith">Keith</option>
                      </select>
                    ) : (e.camp==="tyson" ? "Tyson" : "Keith")}
                  </td>
                  <td style={{verticalAlign:'middle'}}>
                    {isEditing ? (
                      <input
                        className="rec-edit-input kw"
                        value={draft.kw}
                        onChange={ev=>setDraft(d=>({...d, kw:ev.target.value.toUpperCase()}))}
                        autoFocus
                        onKeyDown={ev=>{ if(ev.key==="Enter") saveEdit(); if(ev.key==="Escape") cancelEdit(); }}
                      />
                    ) : <span className="kw-tag">{e.kw}</span>}
                  </td>
                  <td style={{verticalAlign:'middle',fontSize:11,color:'var(--text-3)'}}>
                    {isEditing ? (
                      <select className="rec-edit-input" style={{width:150}} value={draft.bucket} onChange={ev=>setDraft(d=>({...d, bucket:ev.target.value}))}>
                        {BUCKETS.map(b=><option key={b.id} value={b.id}>{b.label}</option>)}
                      </select>
                    ) : bucketLabel}
                  </td>
                  <td className="r mono" style={{color:'var(--text-2)',verticalAlign:'middle'}}>
                    {isEditing ? (
                      <input
                        className="rec-edit-input"
                        style={{textAlign:'right'}}
                        value={draft.value}
                        onChange={ev=>setDraft(d=>({...d, value: ev.target.value.replace(/[^\d.]/g,"")}))}
                        placeholder={draft.bucket==="collected"?"$":""}
                        onKeyDown={ev=>{ if(ev.key==="Enter") saveEdit(); if(ev.key==="Escape") cancelEdit(); }}
                      />
                    ) : (isDollar ? fmtUsd(e.value) : e.value)}
                  </td>
                  <td className="actions-col" style={{verticalAlign:'middle'}}>
                    {isEditing ? (
                      <>
                        <button className="rec-save" onClick={saveEdit} disabled={!draft.kw || !draft.value}>Save</button>
                        <button className="rec-cancel" onClick={cancelEdit}>Cancel</button>
                      </>
                    ) : (
                      <>
                        <button className="rec-edit-btn" onClick={()=>startEdit(e)}>Edit</button>
                        <button className="rec-delete-btn" style={{marginLeft:4}} onClick={()=>setConfirmDel(e.id)}>Delete</button>
                      </>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {confirmDel!==null && (() => {
        const victim = (entries ?? seedAll).find(x=>x.id===confirmDel);
        if(!victim) return null;
        return (
          <Modal title="Delete entry?" subtitle="This cannot be undone." onClose={()=>setConfirmDel(null)}
            footer={<>
              <button className="btn-secondary" onClick={()=>setConfirmDel(null)}>No</button>
              <button className="btn-danger-solid" onClick={()=>deleteEntry(victim.id)}>Yes, delete</button>
            </>}>
            <div style={{padding:'12px 14px',background:'#0a0a0a',border:'1px solid var(--border)',borderRadius:5,fontSize:12,lineHeight:1.6}}>
              <div style={{color:'var(--text-4)',fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Entry</div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <span className="kw-tag">{victim.kw}</span>
                <span style={{color:'var(--text-3)'}}>{victim.setter}</span>
                <span style={{color:'var(--text-4)'}}>·</span>
                <span style={{color:'var(--text-3)'}}>{BUCKETS.find(b=>b.id===victim.bucket)?.label || victim.bucket}</span>
                <span style={{color:'var(--text-4)'}}>·</span>
                <span className="mono" style={{color:'var(--text-2)'}}>
                  {victim.bucket==="collected" ? fmtUsd(victim.value) : victim.value}
                </span>
                <span style={{color:'var(--text-4)',marginLeft:'auto',fontSize:11}}>{victim.ts}</span>
              </div>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

function recentEntriesFromDashboard(dashboard){
  if(!dashboard?.recentEvents) return [];
  return dashboard.recentEvents.map((event, i) => {
    const dt = event.eventAt ? new Date(event.eventAt) : null;
    const ts = dt && !Number.isNaN(dt.getTime())
      ? dt.toLocaleString("en-US", {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"})
      : "Recent";
    const bucket = event.source === "ghl" ? "calls" : "msgs";
    return {
      ts,
      setter: event.setter || "Auto",
      camp: event.clientKey || "tyson",
      kw: event.keyword || "UNKNOWN",
      bucket,
      value: 1,
      id: "live-"+i,
    };
  });
}

// ------- App
function App(){
  const [account, setAccount] = useState("all");
  const [status, setStatus] = useState("active");
  const [search, setSearch] = useState("");
  const [dateRange, setDateRange] = useState(()=>rangeForPreset("last7", shiftIso(todayEt(), -1)));
  const [dashboard, setDashboard] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [newEntries, setNewEntries] = useState([]);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>setToast(null), 2400);
  };

  const onLogEntry = (e) => {
    const entry = {
      ts:"Just now", setter:e.setter, camp:e.campaign, kw:e.keyword, bucket:e.bucket, value:e.value
    };
    setNewEntries(x=>[entry, ...x]);
  };

  const loadDashboard = async ({silent=false}={}) => {
    if(!silent) setLoading(true);
    setLoadError(null);
    const params = new URLSearchParams({
      account,
      status,
      level:"ad",
      dateFrom:dateRange.dateFrom,
      dateTo:dateRange.dateTo,
    });
    try{
      const res = await fetch("/api/ads-tracker?"+params.toString(), {cache:"no-store"});
      const json = await res.json();
      if(!res.ok) throw new Error(json.error || "Ads Tracker API failed");
      setDashboard(json);
    }catch(err){
      console.error(err);
      setDashboard({error:true, rows:[], dailyRows:[], recentEvents:[]});
      setLoadError(err?.message || "Live data unavailable");
      showToast("Live data unavailable");
    }finally{
      setLoading(false);
    }
  };

  useEffect(()=>{
    loadDashboard();
  }, [account, status, dateRange.dateFrom, dateRange.dateTo]);

  const apiCampaigns = useMemo(
    () => campaignsFromDashboard(dashboard, dateRange),
    [dashboard, dateRange.dateFrom, dateRange.dateTo]
  );
  const liveCampaigns = useMemo(
    () => filterCampaignsBySearch(applyLocalEntriesToCampaigns(apiCampaigns, newEntries), search),
    [apiCampaigns, newEntries, search]
  );
  const liveRecent = useMemo(
    () => recentEntriesFromDashboard(dashboard),
    [dashboard]
  );
  const fetchedLabel = loadError
    ? "Live data unavailable"
    : (dashboard ? `Live · ${rangeLabel(dateRange)}` : "Loading live data");

  const syncNow = async () => {
    if(syncing) return;
    setSyncing(true);
    showToast("Syncing ads + sales rows…");
    const body = JSON.stringify({dateFrom:dateRange.dateFrom, dateTo:dateRange.dateTo});
    try{
      const [sales, ads] = await Promise.all([
        fetch("/api/sync/sales-tracker-rows", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
        fetch("/api/sync/ads-tracker", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
      ]);
      const salesOk = sales.ok;
      const adsOk = ads.ok;
      if(!salesOk && !adsOk) throw new Error("Sync failed");
      await loadDashboard({silent:true});
      if(salesOk && adsOk) showToast("Synced · live data refreshed");
      else if(adsOk) showToast("Meta synced · sales sync needs setup");
      else showToast("Sales synced · Meta sync needs logs");
    }catch(err){
      console.error(err);
      showToast("Sync failed · check auth/logs");
    }finally{
      setSyncing(false);
    }
  };

  return (
    <div className="app">
        <div className="page">
          {/* Header */}
          <div className="page-head">
            <div>
              <h1 className="page-title">Ads Tracker</h1>
            </div>
            <button className="sync-pill" onClick={syncNow} disabled={syncing}>
              <svg className="sync-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/></svg>
              <span>{syncing ? "Syncing…" : "Sync now"}</span>
            </button>
          </div>

          {/* Filter bar */}
          <div className="filter-bar">
            <SelectFilter
              label="Account"
              value={account}
              onChange={setAccount}
              options={[
                {id:"all",label:"All accounts"},
                {id:"tyson",label:"Tyson"},
                {id:"keith",label:"Keith"},
              ]}
            />
            <Segmented
              value={status}
              onChange={setStatus}
              options={[
                {id:"active",label:"Active"},
                {id:"finished",label:"Finished"},
                {id:"all",label:"All"},
              ]}
            />
            <div className="filter-divider"></div>
            <DateDropdown value={dateRange} onChange={setDateRange} />
            <div style={{flex:1}}></div>
            <label className="search-control">
              <IcSearch/>
              <input
                className="search-input"
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Search"
              />
            </label>
          </div>

          {/* Campaign table */}
          <div className="section" style={{marginTop:0}}>
            <div className="section-head">
              <div className="section-label">Campaign performance</div>
              <div className="section-meta">{loading ? "Loading…" : fetchedLabel}</div>
            </div>
            <CampaignTable account={account} status={status} campaigns={liveCampaigns} />
          </div>

          {/* Charts */}
          <div className="grid-charts">
            <ROASChart campaigns={liveCampaigns}/>
            <AdROASChart campaigns={liveCampaigns}/>
            <CostPerDMChart campaigns={liveCampaigns}/>
            <CACChart campaigns={liveCampaigns}/>
            <div className="chart-actions-cell">
              <div>
                <div className="section-head">
                  <div className="section-label">Actions</div>
                  <div className="section-meta">Export</div>
                </div>
                <Actions campaigns={liveCampaigns} onToast={showToast}/>
              </div>
            </div>
          </div>

          {/* Recent entries (collapsed) */}
          <RecentEntries extra={[...newEntries, ...liveRecent]} includeFallback={dashboard?.mock} onManualSubmit={onLogEntry} onToast={showToast} />

          <div style={{marginTop:40,color:'var(--text-4)',fontSize:11,display:'flex',justifyContent:'space-between'}}>
            <span>Ads Tracker v1.4 · Client Conversion OS</span>
            <span className="mono">{fetchedLabel}</span>
          </div>
        </div>
        {toast && (
          <div className="toast">
            <span className="toast-dot"></span>
            {toast}
          </div>
        )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
