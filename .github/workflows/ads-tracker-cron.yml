name: Ads Tracker sync cron

# GitHub Actions is the reliable scheduler for this repo. It hits the app's
# cron endpoint with CRON_SECRET, which then syncs Sales Tracker rows and Meta
# spend/impressions/link clicks for the last few days.

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/ads-tracker-sync
        run: |
          response=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://client-conversion-os.vercel.app/api/cron/ads-tracker-sync?lookbackDays=3")
          echo "HTTP $response"
          cat /tmp/body.txt
          if [ "$response" != "200" ]; then
            echo "::error::ads tracker cron returned non-200"
            exit 1
          fi
