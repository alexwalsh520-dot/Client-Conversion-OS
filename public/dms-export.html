<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DMs — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>(function(){try{var t=localStorage.getItem("ccos-theme:last");if(t!=="light"&&t!=="dark")t="dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(t);}catch(e){}try{window.addEventListener("storage",function(e){if(e.key==="ccos-theme:last"){var n=e.newValue==="light"?"light":"dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(n);}});}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Theme tokens — copied verbatim from ads-tracker-export.html so the DMs tab
     matches the Ads tab pixel-for-pixel (deep black/charcoal + gold accent). */
  :root{
    --bg: #0a0a0a;
    --bg-1: #0d0d0d;
    --panel: #111111;
    --panel-2: #141414;
    --row-hover: #141414;
    --border: #1f1f1f;
    --border-2: #262626;
    --text: #e8e8e8;
    --text-2: #a8a8a8;
    --text-3: #6b6b6b;
    --text-4: #4a4a4a;
    --green: #7dd3a8;
    --green-dim: #4f9b76;
    --red: #e89a94;
    --red-dim: #a36560;
    --gold: #d4b27a;
    --gold-dim: #8a7348;
    --blue: #7aa7d4;
    --focus: #2a2a2a;
    --mono: 'JetBrains Mono',ui-monospace,monospace;
  }
  html.light{
    --bg:#f6f6f4;
    --bg-1:#fbfbfa;
    --panel:#ffffff;
    --panel-2:#f0f0ee;
    --row-hover:#f3f3f1;
    --border:rgba(0,0,0,.10);
    --border-2:rgba(0,0,0,.16);
    --focus:rgba(0,0,0,.26);
    --text:#18181b;
    --text-2:#3f3f46;
    --text-3:#71717a;
    --text-4:#9a9aa3;
    --green:#3f9e6b;
    --green-dim:#6fae90;
    --red:#c0504a;
    --red-dim:#cf8b86;
    --gold:#a9823f;
    --gold-dim:#b89a6a;
    --blue:#4f7fb0;
    color-scheme:light;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{min-height:100vh}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input, select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* Shell */
  .app{min-height:100vh}
  .page{padding:26px 28px 60px;max-width:1400px;width:100%;margin:0 auto}

  /* Header */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin:0 0 4px}
  .page-sub{font-size:12px;color:var(--text-3)}
  .sync-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-2);border-radius:99px;font-size:11px;color:var(--text-3);background:var(--bg-1);letter-spacing:0.01em}

  /* Filter bar */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:22px;padding-bottom:0;flex-wrap:wrap}
  .filter{position:relative}
  .filter-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);color:var(--text);font-size:12px;min-height:30px}
  .filter-btn:hover{background:var(--panel-2)}
  .filter-btn.open{background:var(--panel-2);border-color:var(--focus)}
  .filter-btn .lbl{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-right:2px}
  .filter-btn .val{color:var(--text);font-size:12px}
  .filter-btn .dim{color:var(--text-3)}
  .filter-btn .caret{color:var(--text-3);font-size:9px;margin-left:2px}
  .filter-divider{width:1px;height:16px;background:var(--border-2);margin:0 4px}
  .search-control{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);color:var(--text-3);font-size:12px;min-height:30px;min-width:200px}
  .search-control:focus-within{background:var(--panel-2);border-color:var(--focus);color:var(--text-2)}
  .search-input{width:160px;color:var(--text);font-size:12px;flex:1}
  .search-input::placeholder{color:var(--text-4)}

  /* Dropdown panel */
  .pop{position:absolute;top:calc(100% + 6px);left:0;background:var(--panel);border:1px solid var(--border-2);border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6);z-index:50;min-width:220px;max-width:340px;padding:6px;color:var(--text-2);max-height:360px;overflow:auto}
  .pop-item{padding:7px 10px;border-radius:5px;font-size:12px;color:var(--text-2);display:flex;justify-content:space-between;cursor:pointer;align-items:center;gap:10px}
  .pop-item:hover{background:var(--panel-2);color:var(--text)}
  .pop-item.selected{color:var(--text)}
  .pop-item .lbl-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pop-item .check{color:var(--gold);font-size:10px;opacity:0;flex:0 0 auto}
  .pop-item.selected .check{opacity:1}

  /* Date panel — same widget as the Ads tab */
  .date-pop{width:520px;display:grid;grid-template-columns:170px 1fr;padding:0;max-width:none}
  .date-presets{border-right:1px solid var(--border);padding:6px}
  .date-cal{padding:12px 14px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-2);margin-bottom:10px}
  .cal-nav{color:var(--text-3);padding:3px 6px;border-radius:4px}
  .cal-nav:hover{color:var(--text);background:var(--panel-2)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
  .cal-dow{color:var(--text-4);text-align:center;padding:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
  .cal-day{text-align:center;padding:5px 0;color:var(--text-2);border-radius:4px;cursor:pointer}
  .cal-day:hover{background:var(--panel-2);color:var(--text)}
  .cal-day.muted{color:var(--text-4)}
  .cal-day.in-range{background:var(--panel-2);color:var(--text)}
  .cal-day.endpoint{background:var(--gold);color:var(--bg);font-weight:600}
  .cal-day.today:not(.endpoint){box-shadow:inset 0 0 0 1px var(--gold-dim);color:var(--gold)}
  .cal-day.trail{visibility:hidden}
  .date-foot{border-top:1px solid var(--border);padding:10px 14px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
  .apply-btn{padding:5px 12px;border-radius:5px;background:var(--gold);color:var(--bg);font-weight:600;font-size:11px}
  .apply-btn:hover{filter:brightness(1.08)}

  /* Inbox */
  .inbox-wrap{border:1px solid var(--border);border-radius:10px;background:var(--panel);overflow:hidden}
  .inbox-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .inbox-head .count{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em}
  .thread{border-bottom:1px solid var(--border);transition:background .12s}
  .thread:last-child{border-bottom:none}
  .thread-row{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;cursor:pointer}
  .thread-row:hover{background:var(--row-hover)}
  .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:var(--panel-2);color:var(--gold);border:1px solid var(--border-2);text-transform:uppercase}
  .thread-main{flex:1;min-width:0}
  .thread-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .thread-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  .thread-handle{font-size:11px;color:var(--text-4)}
  .thread-time{margin-left:auto;font-size:11px;color:var(--text-4);white-space:nowrap;flex:0 0 auto}
  .thread-preview{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thread-preview .dir{color:var(--text-4)}
  .thread-tags{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;padding:2px 8px;border-radius:99px;border:1px solid var(--border-2);color:var(--text-3);background:var(--bg-1);white-space:nowrap}
  .tag.kw{border-color:rgba(212,178,122,.32);background:rgba(212,178,122,.08);color:var(--gold)}
  .tag .dot{width:5px;height:5px;border-radius:99px;background:currentColor;flex:0 0 auto}
  .chev{color:var(--text-4);flex:0 0 auto;margin-top:4px;transition:transform .15s}
  .chev.open{transform:rotate(90deg);color:var(--gold)}

  /* Expanded thread */
  .thread-body{padding:6px 16px 18px 63px;border-top:1px solid var(--border);background:var(--bg-1)}
  .bubble-row{display:flex;margin:8px 0}
  .bubble-row.out{justify-content:flex-end}
  .bubble{max-width:78%;padding:9px 12px;border-radius:13px;font-size:12.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .bubble.in{background:var(--panel-2);color:var(--text);border:1px solid var(--border-2);border-bottom-left-radius:4px}
  .bubble.out{background:var(--gold);color:#1a1407;border-bottom-right-radius:4px}
  .bubble-time{font-size:10px;color:var(--text-4);margin-top:4px}
  .bubble-row.out .bubble-time{text-align:right}
  .thread-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-3);padding:10px 0 2px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .thread-meta b{color:var(--text-2);font-weight:500}

  /* States */
  .empty{padding:60px 20px;text-align:center;color:var(--text-3);font-size:13px}
  .empty .big{font-size:15px;color:var(--text-2);margin-bottom:6px;font-weight:600}
  .skel{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:13px;align-items:center}
  .skel .sk-av{width:34px;height:34px;border-radius:50%;background:var(--panel-2)}
  .skel .sk-lines{flex:1}
  .skel .sk-line{height:9px;border-radius:4px;background:var(--panel-2);margin-bottom:7px}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .skel{animation:pulse 1.4s ease-in-out infinite}
  .pager{display:flex;justify-content:center;align-items:center;gap:12px;padding:16px;color:var(--text-3);font-size:12px}
  .pager button{padding:6px 14px;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);color:var(--text-2);font-size:12px}
  .pager button:hover:not(:disabled){background:var(--panel-2);color:var(--text)}
  .pager button:disabled{opacity:.35;cursor:default}

  /* room reserved below the list for the future scorecards / lead-score feature */
  .future-room{height:48px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ------- Icons (minimal, stroke) — same set/style as the Ads tab
const Icon = ({ d, size=14, stroke=1.4 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IcCheck = () => <Icon d={<path d="M20 6L9 17l-5-5"/>} />;
const IcCal = () => <Icon d={<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>} />;
const IcCaret = () => (
  <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"><path d="M1 1l4 4 4-4"/></svg>
);
const IcSearch = () => <Icon d={<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>} />;
const IcChev = () => <Icon size={15} d={<path d="M9 6l6 6-6 6"/>} />;

// ------- Date helpers — copied verbatim from ads-tracker-export.html
function isoDate(d){ return d.toISOString().slice(0,10); }
function todayEt(){
  return new Intl.DateTimeFormat("en-CA", { timeZone:"America/New_York", year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
}
function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z"); d.setUTCDate(d.getUTCDate()+days); return isoDate(d);
}
function monthStartIso(date){ return (date || todayEt()).slice(0,7)+"-01"; }
function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00"); d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}
function monthTitle(monthIso){ const d = new Date(monthIso+"T00:00:00"); return d.toLocaleDateString("en-US", {month:"long", year:"numeric"}); }
function daysInMonth(monthIso){ const d = new Date(monthIso+"T00:00:00"); return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); }
function isoForMonthDay(monthIso, day){ return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`; }
function dateLabelFromIso(value){
  if(!value) return ""; const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}
function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom), to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}
const PRESETS = [
  {id:"today",label:"Today"},
  {id:"yesterday",label:"Yesterday"},
  {id:"last3",label:"Last 3 days"},
  {id:"last7",label:"Last 7 days"},
  {id:"last14",label:"Last 14 days"},
  {id:"last30",label:"Last 30 days"},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];
function labelForPreset(id){ return PRESETS.find(p=>p.id===id)?.label || "Custom"; }
function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){ const y = shiftIso(anchor, -1); return {preset:id, dateFrom:y, dateTo:y}; }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){ const start = shiftMonth(monthStartIso(anchor), -1); return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))}; }
  return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
}

function relTime(iso){
  if(!iso) return "";
  const d = new Date(iso); const now = new Date();
  const mins = Math.round((now - d)/60000);
  if(mins < 1) return "now";
  if(mins < 60) return mins+"m";
  const hrs = Math.round(mins/60);
  if(hrs < 24) return hrs+"h";
  const days = Math.round(hrs/24);
  if(days < 7) return days+"d";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function fullTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
}

// ------- Calendar widget — copied verbatim from ads-tracker-export.html
function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button key={i} className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")} onClick={()=>onPick(x.iso)}>{x.d}</button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const current = value || rangeForPreset("last3");
  const [draft, setDraft] = useState(current);
  const [monthIso, setMonthIso] = useState(monthStartIso(current.dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  useEffect(()=>{
    if(open){ setDraft(current); setMonthIso(monthStartIso(current.dateTo)); setSelectingEnd(false); }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){ setSelectingEnd(true); return {preset:"custom", dateFrom:iso, dateTo:iso}; }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="dim" style={{fontSize:11}}>· {rangeLabel(current)}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop" style={{minWidth:520}}>
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div key={p.id} className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom"){ onChange && onChange(rangeForPreset(p.id)); setOpen(false); }
                  else { setDraft({...draft, preset:"custom"}); setSelectingEnd(false); }
                }}>
                <span className="lbl-txt">{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar monthIso={monthIso} rangeStart={draft.dateFrom} rangeEnd={draft.dateTo}
              onPick={pickDate} onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))} />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ------- Custom in-app dropdown — same styling as the Ads tab's SelectFilter
function SelectFilter({label, options, value, onChange, minWidth}){
  const [open,setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const cur = options.find(o=>o.id===value) || options[0];
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)} style={minWidth?{minWidth}:null}>
        {label && <span className="lbl">{label}</span>}
        <span className="val" style={{maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cur ? cur.label : "—"}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop">
          {options.map(o=>(
            <div key={o.id} className={"pop-item "+(value===o.id?"selected":"")} onClick={()=>{onChange(o.id);setOpen(false);}}>
              <span className="lbl-txt">{o.label}</span>
              <span className="check"><IcCheck/></span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function initials(name, handle){
  const src = (name || handle || "").replace(/^@/,"").trim();
  if(!src) return "?";
  const parts = src.split(/[\s_.]+/).filter(Boolean);
  if(parts.length >= 2) return (parts[0][0]+parts[1][0]);
  return src.slice(0,2);
}

function Thread({t}){
  const [open, setOpen] = useState(false);
  const name = t.leadName || (t.handle ? "@"+t.handle.replace(/^@/,"") : "Instagram lead");
  return (
    <div className="thread">
      <div className="thread-row" onClick={()=>setOpen(o=>!o)}>
        <div className="avatar">{initials(t.leadName, t.handle)}</div>
        <div className="thread-main">
          <div className="thread-top">
            <span className="thread-name">{name}</span>
            {t.handle && t.leadName && <span className="thread-handle">@{t.handle.replace(/^@/,"")}</span>}
            <span className="thread-time">{relTime(t.lastAt)}</span>
          </div>
          <div className="thread-preview">
            <span className="dir">{t.lastDirection==="outbound"?"You: ":""}</span>{t.lastMessage}
          </div>
          {(t.keyword || t.campaignName || t.adName) && (
            <div className="thread-tags">
              {t.keyword && <span className="tag kw"><span className="dot"></span>{t.keyword}</span>}
              {t.adName && <span className="tag">{t.adName}</span>}
              {t.campaignName && <span className="tag" style={{maxWidth:260,overflow:"hidden",textOverflow:"ellipsis"}}>{t.campaignName}</span>}
            </div>
          )}
        </div>
        <span className={"chev "+(open?"open":"")}><IcChev/></span>
      </div>
      {open && (
        <div className="thread-body">
          <div className="thread-meta">
            {t.handle && <span><b>@{t.handle.replace(/^@/,"")}</b></span>}
            {t.keyword && <span>keyword <b>{t.keyword}</b></span>}
            {t.adsetName && <span>ad set <b>{t.adsetName}</b></span>}
            {t.campaignName && <span>campaign <b>{t.campaignName}</b></span>}
            {t.setterName && <span>setter <b>{t.setterName}</b></span>}
            <span><b>{t.messageCount}</b> messages</span>
          </div>
          {t.messages.map((m,i)=>{
            const out = m.direction === "outbound";
            return (
              <div key={i} className={"bubble-row "+(out?"out":"in")}>
                <div>
                  <div className={"bubble "+(out?"out":"in")}>{m.body}</div>
                  <div className="bubble-time">{fullTime(m.sentAt)}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const CLIENT_LABELS = {
  tyson_sonnek:"Tyson", tyson:"Tyson",
  antwan_rarcus:"Antwan", antwan:"Antwan",
  keith_holland:"Keith", keith:"Keith",
  lucy_hubbard:"Lucy", lucy:"Lucy",
  matthew_conder:"Matthew",
};
function clientLabel(c){ return CLIENT_LABELS[c] || (c ? c.replace(/_/g," ") : c); }

function App(){
  const [range, setRange] = useState(rangeForPreset("last3"));
  const [client, setClient] = useState("");      // "" = all
  const [campaign, setCampaign] = useState("");   // campaign_id
  const [keyword, setKeyword] = useState("");
  const [adset, setAdset] = useState("");
  const [ad, setAd] = useState("");
  const [search, setSearch] = useState("");
  const [debouncedSearch, setDebouncedSearch] = useState("");
  const [page, setPage] = useState(1);
  const [data, setData] = useState(null);
  const [filterOpts, setFilterOpts] = useState({clients:[],campaigns:[],keywords:[],adsets:[],ads:[]});
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(()=>{ const id=setTimeout(()=>setDebouncedSearch(search), 350); return ()=>clearTimeout(id); },[search]);
  // reset to page 1 when filters change
  useEffect(()=>{ setPage(1); },[range.dateFrom, range.dateTo, client, campaign, keyword, adset, ad, debouncedSearch]);

  useEffect(()=>{
    let off = false;
    setLoading(true); setErr(null);
    const qs = new URLSearchParams();
    qs.set("dateFrom", range.dateFrom); qs.set("dateTo", range.dateTo);
    if(client) qs.set("client", client);
    if(campaign) qs.set("campaign", campaign);
    if(keyword) qs.set("keyword", keyword);
    if(adset) qs.set("adset", adset);
    if(ad) qs.set("ad", ad);
    if(debouncedSearch) qs.set("search", debouncedSearch);
    qs.set("page", String(page));
    fetch("/api/dms/conversations?"+qs.toString())
      .then(r=>r.json())
      .then(d=>{
        if(off) return;
        if(d.error){ setErr(d.error); setData(null); }
        else { setData(d); if(d.filters) setFilterOpts(d.filters); }
      })
      .catch(e=>{ if(!off) setErr(String(e)); })
      .finally(()=>{ if(!off) setLoading(false); });
    return ()=>{ off = true; };
  },[range.dateFrom, range.dateTo, client, campaign, keyword, adset, ad, debouncedSearch, page]);

  const clientOpts = useMemo(()=>[
    {id:"", label:"All active campaigns"},
    ...filterOpts.clients.map(c=>({id:c, label:clientLabel(c)})),
  ],[filterOpts.clients]);
  const campaignOpts = useMemo(()=>[
    {id:"", label:"All campaigns"},
    ...filterOpts.campaigns.map(c=>({id:c.id, label:c.label})),
  ],[filterOpts.campaigns]);
  const keywordOpts = useMemo(()=>[
    {id:"", label:"All keywords"},
    ...filterOpts.keywords.map(k=>({id:k, label:k})),
  ],[filterOpts.keywords]);
  const adsetOpts = useMemo(()=>[
    {id:"", label:"All ad sets"},
    ...filterOpts.adsets.map(a=>({id:a.id, label:a.label})),
  ],[filterOpts.adsets]);
  const adOpts = useMemo(()=>[
    {id:"", label:"All ads"},
    ...filterOpts.ads.map(a=>({id:a.id, label:a.label})),
  ],[filterOpts.ads]);

  const total = data?.total || 0;
  const pageSize = data?.pageSize || 30;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const threads = data?.threads || [];

  return (
    <div className="app">
      <div className="page">
        <div className="page-head">
          <div>
            <h1 className="page-title">DMs</h1>
            <div className="page-sub">A search engine for our Instagram conversations — browsable by day, keyword, and campaign.</div>
          </div>
          <span className="sync-pill">Read-only · live</span>
        </div>

        {/* Filter bar — custom in-app dropdowns + the Ads-tab calendar */}
        <div className="filter-bar">
          <SelectFilter options={clientOpts} value={client} onChange={setClient} minWidth={170} />
          <SelectFilter label="Campaign" options={campaignOpts} value={campaign} onChange={setCampaign} />
          <div className="filter-divider" />
          <SelectFilter label="Keyword" options={keywordOpts} value={keyword} onChange={setKeyword} />
          <SelectFilter label="Ad" options={adOpts} value={ad} onChange={setAd} />
          <SelectFilter label="Ad set" options={adsetOpts} value={adset} onChange={setAdset} />
          <div className="filter-divider" />
          <DateDropdown value={range} onChange={setRange} />
          <div style={{flex:1}} />
          <div className="search-control">
            <span style={{color:"var(--text-3)",display:"inline-flex"}}><IcSearch/></span>
            <input className="search-input" placeholder="Search leads & messages…" value={search} onChange={e=>setSearch(e.target.value)} />
          </div>
        </div>

        {/* Inbox */}
        <div className="inbox-wrap">
          <div className="inbox-head">
            <span className="count">{loading ? "Loading…" : total.toLocaleString()+" conversation"+(total===1?"":"s")}</span>
            {!loading && data && <span className="count" style={{textTransform:"none",letterSpacing:0}}>{rangeLabel(range)}</span>}
          </div>

          {loading && [0,1,2,3,4].map(i=>(
            <div className="skel" key={i}>
              <div className="sk-av" />
              <div className="sk-lines">
                <div className="sk-line" style={{width:"30%"}} />
                <div className="sk-line" style={{width:"70%",marginBottom:0}} />
              </div>
            </div>
          ))}

          {!loading && err && (
            <div className="empty"><div className="big">Couldn’t load conversations</div><div>{err}</div></div>
          )}

          {!loading && !err && threads.length===0 && (
            <div className="empty">
              <div className="big">No conversations in this window</div>
              <div>Try widening the date range or clearing a filter.</div>
            </div>
          )}

          {!loading && !err && threads.map(t=>(<Thread key={t.conversationId} t={t} />))}

          {!loading && !err && totalPages > 1 && (
            <div className="pager">
              <button disabled={page<=1} onClick={()=>setPage(p=>Math.max(1,p-1))}>‹ Prev</button>
              <span className="mono">Page {page} / {totalPages}</span>
              <button disabled={page>=totalPages} onClick={()=>setPage(p=>Math.min(totalPages,p+1))}>Next ›</button>
            </div>
          )}
        </div>

        {/* Room reserved below for the future scorecards / lead-score over the window. */}
        <div className="future-room" />
      </div>
    </div>
  );
}

class AppErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={error:null}; }
  static getDerivedStateFromError(error){ return {error}; }
  render(){
    if(this.state.error){
      return (
        <div style={{padding:"48px 32px",fontFamily:"system-ui,-apple-system,sans-serif",color:"#e5e5e7",background:"#0f0f12",minHeight:"100vh"}}>
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <div style={{color:"#c9a96e",fontSize:18,fontWeight:700,marginBottom:8}}>The DMs view hit a display error.</div>
            <div style={{color:"#a1a1aa",fontSize:14,marginBottom:20}}>This is a rendering problem, not lost data. Screenshot the details below for the team, then reload.</div>
            <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",background:"#18181b",border:"1px solid #27272a",borderRadius:8,padding:16,fontSize:12,color:"#fca5a5",maxHeight:320,overflow:"auto"}}>{String((this.state.error && (this.state.error.stack || this.state.error.message)) || this.state.error)}</pre>
            <button onClick={()=>location.reload()} style={{marginTop:20,padding:"10px 20px",background:"#c9a96e",color:"#0f0f12",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
