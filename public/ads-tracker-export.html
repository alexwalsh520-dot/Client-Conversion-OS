<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ads Tracker — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --bg-1: #0d0d0d;
    --panel: #111111;
    --panel-2: #141414;
    --row-hover: #141414;
    --border: #1f1f1f;
    --border-2: #262626;
    --text: #e8e8e8;
    --text-2: #a8a8a8;
    --text-3: #6b6b6b;
    --text-4: #4a4a4a;
    --green: #7dd3a8;
    --green-dim: #4f9b76;
    --red: #e89a94;
    --red-dim: #a36560;
    --gold: #d4b27a;
    --gold-dim: #8a7348;
    --blue: #7aa7d4;
    --focus: #2a2a2a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{min-height:100vh}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input, select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* Shell */
  .app{min-height:100vh}
  .page{padding:26px 28px 60px;max-width:1400px;width:100%;margin:0 auto}

  /* Header */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin:0 0 4px}
  .page-sub{font-size:12px;color:var(--text-3)}
  .sync-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-2);border-radius:99px;font-size:11px;color:var(--text-3);background:#0c0c0c;letter-spacing:0.01em}
  .sync-pill:hover{background:#141414;color:var(--text-2)}
  .sync-pill:hover .sync-ic{color:var(--gold)}
  .sync-ic{color:var(--text-4);transition:color .2s}
  .sync-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;font-size:12px;color:var(--text-2);background:#0f0f0f}
  .sync-btn:hover{background:#141414;color:var(--text)}

  /* Filter bar */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:22px;padding-bottom:0;flex-wrap:wrap}
  .filter{position:relative}
  .filter-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;color:var(--text);font-size:12px;min-height:30px}
  .filter-btn:hover{background:#141414}
  .filter-btn.open{background:#141414;border-color:#333}
  .filter-btn .lbl{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-right:2px}
  .filter-btn .val{color:var(--text);font-size:12px}
  .filter-btn .caret{color:var(--text-3);font-size:9px;margin-left:2px}
  .filter-divider{width:1px;height:16px;background:var(--border-2);margin:0 4px}
  .search-control{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;color:var(--text-3);font-size:12px;min-height:30px;min-width:150px}
  .search-control:focus-within{background:#141414;border-color:#333;color:var(--text-2)}
  .search-input{width:100px;color:var(--text);font-size:12px}
  .search-input::placeholder{color:var(--text-4)}
  .segmented{display:inline-flex;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;padding:2px;height:30px}
  .seg{padding:4px 10px;font-size:12px;color:var(--text-3);border-radius:4px;display:flex;align-items:center}
  .seg:hover{color:var(--text-2)}
  .seg.active{background:#1e1e1e;color:var(--text)}

  /* Dropdown panel */
  .pop{position:absolute;top:calc(100% + 6px);left:0;background:#111;border:1px solid var(--border-2);border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6);z-index:50;min-width:220px;padding:6px;color:var(--text-2)}
  .pop-item{padding:7px 10px;border-radius:5px;font-size:12px;color:var(--text-2);display:flex;justify-content:space-between;cursor:pointer;align-items:center}
  .pop-item:hover{background:#1a1a1a;color:var(--text)}
  .pop-item.selected{color:var(--text)}
  .pop-item .check{color:var(--gold);font-size:10px;opacity:0}
  .pop-item.selected .check{opacity:1}

  /* Date panel */
  .date-pop{width:520px;display:grid;grid-template-columns:170px 1fr;padding:0}
  .date-presets{border-right:1px solid var(--border);padding:6px}
  .date-cal{padding:12px 14px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-2);margin-bottom:10px}
  .cal-nav{color:var(--text-3);padding:3px 6px;border-radius:4px}
  .cal-nav:hover{color:var(--text);background:#1a1a1a}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
  .cal-dow{color:var(--text-4);text-align:center;padding:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
  .cal-day{text-align:center;padding:5px 0;color:var(--text-2);border-radius:4px;cursor:pointer}
  .cal-day:hover{background:#1a1a1a;color:var(--text)}
  .cal-day.muted{color:var(--text-4)}
  .cal-day.in-range{background:#1a1a1a;color:var(--text)}
  .cal-day.endpoint{background:var(--gold);color:#0a0a0a;font-weight:600}
  .cal-day.today:not(.endpoint){box-shadow:inset 0 0 0 1px var(--gold-dim);color:var(--gold)}
  .cal-day.trail{visibility:hidden}
  .date-foot{border-top:1px solid var(--border);padding:10px 14px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
  .apply-btn{padding:5px 12px;border-radius:5px;background:var(--gold);color:#0a0a0a;font-weight:600;font-size:11px}
  .apply-btn:hover{filter:brightness(1.08)}

  /* Sections */
  .section{margin-top:32px}
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500}
  .section-meta{font-size:11px;color:var(--text-4)}
	  /* Attribution alerts */
	  .alerts-panel{border-radius:8px;background:var(--panel);border:1px solid var(--border);overflow:hidden}
	  .alerts-head{min-height:92px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
	  .alerts-title{font-size:11px;line-height:1.15;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3)}
	  .alerts-sub{font-size:11px;line-height:1.25;color:var(--text-4);margin-top:6px;font-weight:400;letter-spacing:0}
	  .alerts-summary-shell{padding:12px 20px;border-bottom:1px solid var(--border);background:#0d0d0d}
	  .alerts-summary-scope{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
	  .alerts-summary-scope-label{font-size:9px;line-height:1;text-transform:uppercase;letter-spacing:.13em;color:var(--text-4);font-weight:500}
	  .alerts-summary-scope-pill{height:20px;padding:0 8px;border:1px solid #2b2b2b;border-radius:999px;background:#101010;color:var(--text-3);display:inline-flex;align-items:center;font-size:10px;font-weight:500}
	  .alerts-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
	  .alerts-summary-card{min-height:68px;border:1px solid var(--border);border-radius:7px;background:#101010;padding:11px 12px}
	  .alerts-summary-card.good{border-color:rgba(125,211,168,.22);background:linear-gradient(180deg,rgba(125,211,168,.055),#101010 70%)}
	  .alerts-summary-card.warn{border-color:rgba(232,154,148,.25);background:linear-gradient(180deg,rgba(232,154,148,.06),#101010 72%)}
	  .alerts-summary-label{font-size:9px;line-height:1;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500;margin-bottom:8px}
	  .alerts-summary-value{font-size:20px;line-height:1.05;font-weight:500;letter-spacing:-0.03em;color:var(--text)}
	  .alerts-summary-value.good{color:var(--green)}
	  .alerts-summary-value.warn{color:var(--red)}
	  .alerts-summary-note{font-size:10px;color:var(--text-4);margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
	  .potential-roas-card{min-height:270px}
	  .potential-roas-breakdown{display:grid;gap:10px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
	  .potential-roas-row{display:flex;align-items:center;justify-content:space-between;gap:14px;color:var(--text-3);font-size:12px}
	  .potential-roas-row strong{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
	  .potential-roas-row.warn strong{color:var(--red)}
	  .potential-roas-row.gold strong{color:var(--gold)}
	  .potential-roas-row.total{color:var(--text);font-size:13px}
	  .potential-roas-row.total strong{font-size:14px}
	  .potential-roas-divider{height:1px;background:var(--border);margin:1px 0}
	  .potential-roas-spacer{height:8px}
	  .alerts-tabs{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--border-2);border-radius:999px;background:#090909}
	  .alerts-tab{height:30px;padding:0 11px;border-radius:999px;color:var(--text-3);font-size:12px;display:inline-flex;align-items:center;gap:7px}
	  .alerts-tab.active{background:#1b1b1b;color:#f1f1f1;box-shadow:inset 0 0 0 1px #303030}
	  .alerts-tab-count{min-width:22px;height:18px;padding:0 6px;border-radius:999px;border:1px solid #282828;background:#171717;color:#555;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;line-height:1}
	  .alerts-tab.active .alerts-tab-count{border-color:#3c331f;color:var(--gold)}
	  .alerts-grid{display:grid;grid-template-columns:48px minmax(0,1.4fr) minmax(120px,.8fr) 90px 118px;align-items:center}
	  .alerts-table-head{height:44px;border-bottom:1px solid var(--border);color:var(--text-4);font-size:10px;text-transform:uppercase;letter-spacing:0.13em;font-weight:500}
	  .alert-row{min-height:68px;border-bottom:1px solid var(--border)}
	  .alert-row:last-child{border-bottom:none}
	  .alert-check{width:18px;height:18px;border:1px solid #2d2d2d;border-radius:4px;margin-left:20px}
	  .alert-name{font-size:13px;line-height:1.1;font-weight:600;color:var(--text);letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .alert-meta{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.25;color:var(--text-3);margin-top:5px;letter-spacing:0}
	  .alert-campaign{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:13px;letter-spacing:-0.01em;min-width:0}
	  .alert-campaign-dot{width:6px;height:6px;border-radius:99px;background:var(--gold);flex:0 0 auto}
	  .alert-campaign-dot.keith{background:var(--blue)}
	  .alert-amount{font-family:'Inter',system-ui,sans-serif;color:var(--text);font-size:13px;font-weight:500;letter-spacing:-0.01em;text-align:left;font-variant-numeric:tabular-nums}
	  .alert-actions{display:flex;justify-content:flex-start;align-items:center;gap:6px;padding-right:14px}
	  .alert-open-link{width:30px;height:30px;border:1px solid #303030;border-radius:7px;background:#141414;color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
	  .alert-open-link:hover{background:#202020;border-color:#3a3a3a;color:#fff}
	  .alert-resolve{height:30px;min-width:84px;padding:0 12px;border:1px solid #303030;border-radius:999px;background:#1b1b1b;color:#f1f1f1;font-size:12px;font-weight:500;letter-spacing:0}
	  .alert-resolve:hover{background:#242424;border-color:#3a3a3a;color:#fff}
	  .alert-empty{padding:22px 20px;color:var(--text-4);font-size:12px}
	  .alerts-head-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
	  .alert-workspace-btn{height:30px;padding:0 12px;border:1px solid rgba(211,180,119,.35);border-radius:999px;background:rgba(211,180,119,.08);color:var(--gold);font-size:12px;font-weight:500;white-space:nowrap}
	  .alert-workspace-btn:hover{background:rgba(211,180,119,.14);border-color:rgba(211,180,119,.5);color:#e8ca91}
	  .attribution-workspace{position:fixed;inset:0;z-index:150;background:#090909;display:flex;flex-direction:column;overflow:hidden}
	  .workspace-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:24px 28px 18px;border-bottom:1px solid var(--border);background:#0b0b0b}
	  .workspace-kicker{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.14em;color:var(--text-4);font-weight:500;margin-bottom:8px}
	  .workspace-title{font-size:24px;line-height:1.08;font-weight:650;letter-spacing:-.035em;color:var(--text)}
	  .workspace-sub{font-size:12px;color:var(--text-3);margin-top:7px}
	  .workspace-close{height:34px;padding:0 14px;border:1px solid var(--border-2);border-radius:7px;background:#111;color:var(--text-2);font-size:12px;font-weight:500}
	  .workspace-close:hover{background:#191919;color:var(--text)}
	  .workspace-body{padding:18px 28px 28px;overflow:auto;display:grid;gap:14px}
	  .workspace-toolbar{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
	  .workspace-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
	  .workspace-search{height:34px;min-width:280px;border:1px solid var(--border-2);border-radius:7px;background:#0f0f0f;color:var(--text);font-size:12px;padding:0 12px}
	  .workspace-search:focus{border-color:#373737;background:#121212}
	  .workspace-type-tabs{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--border-2);border-radius:999px;background:#070707}
	  .workspace-type-tab{height:28px;padding:0 11px;border-radius:999px;color:var(--text-3);font-size:12px;display:inline-flex;align-items:center;gap:6px}
	  .workspace-type-tab.active{background:#202020;color:var(--text)}
	  .workspace-type-tab.active .alerts-tab-count{border-color:#3c331f;color:var(--gold)}
	  .workspace-table{border:1px solid var(--border);border-radius:9px;background:var(--panel);overflow:hidden}
	  .workspace-grid{display:grid;grid-template-columns:minmax(180px,1.25fr) 128px 120px 118px 104px minmax(190px,1.1fr) 154px;align-items:center;gap:12px}
	  .workspace-grid>*{min-width:0}
	  .workspace-table-head{min-height:44px;padding:0 20px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--text-4);font-weight:500}
	  .workspace-row{min-height:68px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer}
	  .workspace-row:last-child{border-bottom:none}
	  .workspace-row:hover{background:#141414}
	  .workspace-name{font-size:13px;line-height:1.15;font-weight:650;color:var(--text);letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-meta{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.25;color:var(--text-3);margin-top:5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-type-pill{height:24px;padding:0 9px;border:1px solid #2a2a2a;border-radius:999px;background:#111;color:var(--text-2);font-size:11px;display:inline-flex;align-items:center;width:max-content}
	  .workspace-type-pill.revenue{border-color:rgba(211,180,119,.28);color:var(--gold);background:rgba(211,180,119,.06)}
	  .workspace-type-pill.booking{border-color:rgba(122,167,212,.28);color:var(--blue);background:rgba(122,167,212,.06)}
	  .workspace-type-pill.keyword{border-color:rgba(125,211,168,.24);color:var(--green);background:rgba(125,211,168,.055)}
	  .workspace-issue{color:var(--text-3);font-size:12px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px}
	  .workspace-empty{padding:28px 20px;color:var(--text-4);font-size:12px}
	  @media(max-width:1100px){.workspace-grid{grid-template-columns:minmax(180px,1fr) 108px 96px 88px 132px}.workspace-table-head .hide-mid,.workspace-row .hide-mid{display:none}.workspace-search{min-width:220px}}
	  .resolved-strip{border-top:1px solid var(--border);background:#0c0c0c;padding:12px 20px}
	  .resolved-head{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-4);margin-bottom:8px}
	  .resolved-row{display:grid;grid-template-columns:minmax(0,1fr) 96px 80px;gap:12px;align-items:center;padding:9px 0;border-top:1px solid #171717}
	  .resolved-row:first-of-type{border-top:none}
	  .resolved-main{font-size:13px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .resolved-pill{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#555}
	  .alert-option-meta{display:block;color:var(--text-4);font-size:10px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

		  .alert-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:7vh 18px 28px;z-index:180;overflow:auto}
		  .alert-modal{width:880px;max-width:calc(100vw - 36px);max-height:90vh;background:#0f0f0f;border:1px solid var(--border-2);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,0.7);overflow:hidden;display:flex;flex-direction:column}
	  .alert-modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px 10px;border-bottom:1px solid var(--border)}
	  .alert-modal-title{font-size:14px;line-height:1.2;font-weight:600;color:var(--text);letter-spacing:-0.01em}
	  .alert-modal-sub{font-size:11px;color:var(--text-3);margin-top:3px;letter-spacing:0}
	  .alert-modal-close{font-size:16px;line-height:1;color:var(--text-3);padding:4px 8px;border-radius:4px}
	  .alert-modal-close:hover{background:#181818;color:var(--text)}
		  .alert-modal-body{padding:16px 20px 18px;overflow:auto}
	  .alert-modal-info{border:1px solid var(--border);border-radius:6px;background:#0a0a0a;padding:12px 14px;margin-bottom:16px;display:grid;gap:10px}
	  .alert-info-row{display:grid;grid-template-columns:92px 1fr;align-items:center;gap:12px}
	  .alert-info-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-4)}
	  .alert-info-value{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:13px;letter-spacing:0}
	  .alert-info-pill{width:20px;height:6px;border-radius:999px;background:var(--gold)}
	  .alert-info-pill.keith{background:var(--blue)}
	  .alert-field-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500;margin-bottom:8px}
			  .alert-mode-tabs{display:inline-flex;border:1px solid var(--border-2);border-radius:999px;background:#080808;padding:3px;margin:2px 0 14px}
		  .alert-mode-tab{height:28px;padding:0 13px;border-radius:999px;color:var(--text-3);font-size:12px}
		  .alert-mode-tab.active{background:#202020;color:var(--text)}
		  .alert-search{width:100%;height:38px;border:1px solid var(--border-2);border-radius:6px;background:#080808;color:var(--text);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;padding:0 12px;margin-bottom:10px}
			  .alert-option-list{border:1px solid var(--border);border-radius:8px;background:#090909;max-height:42vh;overflow:auto}
		  .alert-option-list::-webkit-scrollbar{width:7px}.alert-option-list::-webkit-scrollbar-thumb{background:#252525;border-radius:99px}
		  .alert-option-group{border-top:1px solid #171717}.alert-option-group:first-child{border-top:none}
			  .alert-option-group-head{display:flex;align-items:center;justify-content:space-between;gap:12px;height:28px;padding:0 12px;background:#0f0f0f;color:var(--text-4);font-size:10px;text-transform:uppercase;letter-spacing:.12em}

  .calendar-call:hover{background:linear-gradient(180deg,#1c1c1c,#131313);border-color:#343434;box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 12px 24px rgba(0,0,0,.22);transform:translateY(-1px)}
  .calendar-call:focus-visible{outline:1px solid rgba(212,178,122,.75);outline-offset:2px}
  .calendar-call.status-upcoming{border-color:rgba(212,178,122,.18);background:radial-gradient(circle at 86% -20%,rgba(212,178,122,.13),transparent 42%),linear-gradient(180deg,#181714,#111)}
  .calendar-call.status-show{border-color:rgba(125,211,168,.16);background:radial-gradient(circle at 86% -20%,rgba(125,211,168,.11),transparent 42%),linear-gradient(180deg,#151817,#111)}
  .calendar-call.status-no_show{border-color:rgba(232,154,148,.17);background:radial-gradient(circle at 86% -20%,rgba(232,154,148,.12),transparent 42%),linear-gradient(180deg,#181514,#111)}
  .calendar-call.status-needs_review,.calendar-call.status-missing_keyword{border-color:rgba(122,167,212,.18);background:radial-gradient(circle at 86% -20%,rgba(122,167,212,.13),transparent 42%),linear-gradient(180deg,#14171a,#111)}
  .calendar-call-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .calendar-dot{width:7px;height:7px;border-radius:99px;margin-top:4px;background:var(--text-4)}
  .calendar-dot.upcoming{background:var(--gold)}
  .calendar-dot.show{background:var(--green)}
  .calendar-dot.no_show{background:var(--red)}
  .calendar-dot.needs_review,.calendar-dot.missing_keyword{background:var(--blue)}
  .calendar-call-name{font-size:11px;color:var(--text);font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .calendar-status-pill{height:18px;display:inline-flex;align-items:center;border-radius:999px;border:1px solid #292929;background:#101010;color:var(--text-3);font-size:9px;font-weight:600;padding:0 6px;white-space:nowrap}
  .calendar-status-pill.upcoming{border-color:rgba(212,178,122,.28);color:var(--gold);background:rgba(212,178,122,.06)}
  .calendar-status-pill.show{border-color:rgba(125,211,168,.24);color:var(--green);background:rgba(125,211,168,.055)}
  .calendar-status-pill.no_show{border-color:rgba(232,154,148,.24);color:var(--red);background:rgba(232,154,148,.055)}
  .calendar-status-pill.needs_review,.calendar-status-pill.missing_keyword{border-color:rgba(122,167,212,.26);color:var(--blue);background:rgba(122,167,212,.06)}
  .calendar-call-time{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--text-3);margin-top:5px}
  .calendar-call-meta{font-size:10px;color:var(--text-4);line-height:1.28;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calendar-empty{padding:28px;text-align:center;color:var(--text-4);font-size:12px}
  .calendar-modal-grid{display:grid;gap:10px}
  .calendar-modal-card{border:1px solid var(--border);border-radius:8px;background:#0b0b0b;padding:13px 14px}
  .calendar-modal-row{display:grid;grid-template-columns:128px minmax(0,1fr);gap:14px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.045);align-items:center}
  .calendar-modal-row:last-child{border-bottom:0}
  .calendar-modal-label{font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:var(--text-4)}
  .calendar-modal-value{font-size:12px;color:var(--text-2);min-width:0;overflow:hidden;text-overflow:ellipsis}
  .calendar-modal-value.strong{font-size:14px;color:var(--text);font-weight:650}
  .calendar-review-note{border:1px solid rgba(122,167,212,.25);border-radius:8px;background:rgba(122,167,212,.055);padding:12px 14px;color:var(--blue);font-size:12px;line-height:1.35}
  @media(max-width:900px){.calendar-board{display:block}.calendar-dow{display:none}.calendar-cell{min-height:auto}.calendar-cell.muted{display:none}}
  .metric-card-shell{position:relative;min-width:0}
  .metric-card-shell.editing .panel{cursor:grab;transition:border-color .14s,box-shadow .14s,transform .32s cubic-bezier(.22,.72,.2,1),opacity .14s,background-color .14s}
  .metric-card-shell.editing:hover .panel{border-color:#333;box-shadow:0 0 0 1px rgba(255,255,255,.035),0 12px 30px rgba(0,0,0,.28)}
  .metric-card-shell.dragging{pointer-events:auto}
  .metric-drag-placeholder{height:100%;min-height:240px;border:1px dashed #3a3a3a;border-radius:8px;background:#090909;box-shadow:inset 0 0 0 1px rgba(255,255,255,.018)}
  .metric-card-shell.drop-target .panel{border-color:var(--gold-dim);box-shadow:0 0 0 1px rgba(212,178,122,.18)}
  .metric-floating-card{position:fixed;z-index:220;pointer-events:none;filter:drop-shadow(0 22px 40px rgba(0,0,0,.55));transform:scale(1.01);transform-origin:top left}
  .metric-floating-card .panel{border-color:#333;box-shadow:0 0 0 1px rgba(255,255,255,.05),0 24px 60px rgba(0,0,0,.58)}
  body.metric-dragging{cursor:grabbing;user-select:none}
  .metric-delete{position:absolute;top:9px;right:10px;z-index:4;width:26px;height:26px;border:1px solid var(--border-2);border-radius:999px;background:#121212;color:var(--text-3);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
  .metric-delete:hover{background:#1a1a1a;color:var(--text)}
  .metric-add-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:58vh;overflow:auto;padding-right:2px}
  .metric-pick-card{min-height:78px;padding:12px;border:1px solid var(--border-2);border-radius:7px;background:#0b0b0b;text-align:left;color:var(--text-2);display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
  .metric-pick-card:hover{background:#111;border-color:#333;color:var(--text)}
  .metric-pick-card.selected{border-color:#3a301d;background:#141108;color:var(--text)}
  .metric-pick-label{font-size:12px;font-weight:600;color:var(--text);line-height:1.2}
  .metric-pick-meta{font-size:10px;color:var(--text-4);margin-top:5px;line-height:1.35}
  .metric-pick-icon{width:22px;height:22px;border:1px solid var(--border-2);border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--text-3);flex:0 0 auto}
  .metric-pick-card.selected .metric-pick-icon{border-color:#3a301d;color:var(--gold)}
  @media(max-width:700px){.metric-add-grid{grid-template-columns:1fr}.metric-board-head{align-items:flex-start;flex-direction:column}}

  /* Chart cards (ROAS + Cost per DM + Ad ROAS) */
  .chart-card{padding:18px 20px 14px;display:flex;flex-direction:column}
  .chart-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .chart-title{font-size:11px;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
  .chart-subtitle{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .chart-big{font-size:26px;font-weight:500;color:var(--text);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .chart-delta{font-size:11px;font-weight:500;letter-spacing:0.01em}
  .chart-delta.pos{color:var(--green)}
  .chart-delta.neg{color:var(--red)}
  .chart-sub-label{font-size:11px;color:var(--text-4)}
  .chart-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .chart-select{font-size:11px;padding:5px 8px;max-width:210px}
  .chart-legend{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
  .chart-legend-item{display:flex;align-items:center;gap:6px}
  .chart-sw{width:10px;height:2px;border-radius:2px;display:inline-block}
  .cpm-kw-legend{display:flex;flex-wrap:wrap;gap:10px 14px;flex:1}
  .single-number-card{min-height:170px;justify-content:space-between}
  .single-number-note{font-size:11px;color:var(--text-4);line-height:1.45;max-width:360px}

  /* Line chart */
  .lc-wrap{position:relative;width:100%}
  .lc-svg{width:100%;height:auto;display:block;cursor:crosshair}
  .lc-tooltip{position:absolute;top:0;transform:translate(-50%, -6px);background:#0f0f0f;border:1px solid var(--border-2);border-radius:6px;padding:7px 10px;font-size:11px;min-width:150px;max-width:240px;pointer-events:none;z-index:3;box-shadow:0 6px 20px rgba(0,0,0,0.6)}
  .lc-tt-date{font-size:10px;color:var(--text-4);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
  .lc-tt-row{display:flex;align-items:center;gap:7px;padding:2px 0}
  .lc-tt-sw{width:7px;height:7px;border-radius:99px;flex-shrink:0}
  .lc-tt-name{color:var(--text-3);font-size:10.5px;flex:1}
  .lc-tt-val{color:var(--text);font-size:11px;font-variant-numeric:tabular-nums}

  /* Ad ROAS vertical bar chart */
  .ads-roas{min-height:360px}
  .cac-card{min-height:260px}
  .ar-chart-wrap{overflow:hidden;padding-bottom:4px}
  .ar-chart-wrap.scroll-x{overflow-x:auto;overflow-y:hidden}
  .ar-chart-wrap::-webkit-scrollbar{height:6px}
  .ar-chart-wrap::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
  .ar-chart-wrap::-webkit-scrollbar-thumb:hover{background:#333}
  .ar-chart{display:flex;align-items:flex-end;gap:14px;padding:4px 2px 0;min-height:230px}
  .ar-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:50px}
  .ar-val{text-align:center;min-height:36px;display:flex;flex-direction:column;justify-content:flex-end;gap:1px}
  .ar-val-rev{font-size:14px;color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .ar-val-roas{font-size:9.5px;color:var(--text-4);font-variant-numeric:tabular-nums}
  .ar-bar-v-wrap{display:flex;align-items:flex-end;width:100%;min-height:150px;justify-content:center}
  .ar-bar-v{width:100%;max-width:34px;border-radius:2px 2px 0 0;opacity:0.9;transition:opacity .15s, height .35s cubic-bezier(.4,0,.2,1)}
  .ar-bar-v-wrap.has-preview{cursor:zoom-in}
  .ar-col:hover .ar-bar-v{opacity:1}
  .ar-col-label{text-align:center;margin-top:2px}
  .ar-col-kw{font-size:10.5px;color:var(--text-2);font-weight:500;letter-spacing:0.02em}
  .ar-col-camp{font-size:9px;color:var(--text-4);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;opacity:0.8}
  .ad-preview-popover{position:fixed;z-index:80;width:min(340px,calc(100vw - 28px));max-height:calc(100vh - 28px);padding:8px;background:#0d0d0d;border:1px solid var(--border-2);border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,0.72);pointer-events:none}
  .ad-preview-image{display:block;width:100%;max-height:calc(100vh - 44px);object-fit:contain;border-radius:5px;background:#050505}

  /* Keyword chart */
  .kw-panel{padding:18px 20px}
  .kw-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .kw-title{font-size:13px;font-weight:500;color:var(--text)}
  .kw-tabs{display:flex;gap:2px}
  .kw-tab{font-size:11px;color:var(--text-3);padding:3px 9px;border-radius:4px;cursor:pointer}
  .kw-tab:hover{color:var(--text-2)}
  .kw-tab.active{background:#1c1c1c;color:var(--text)}
  .kw-chart{margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-items:end;height:200px;padding:0 10px}
  .kw-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:8px}
  .kw-bar-val{display:flex;flex-direction:column;align-items:center;gap:1px;min-height:32px;justify-content:flex-end}
  .kw-roas{font-size:14px;color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .kw-dollars{font-size:10px;color:var(--text-3);font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
  .kw-bar{width:48px;border-radius:3px 3px 0 0;position:relative;transition:all .2s}
  .kw-bar:hover{filter:brightness(1.15)}
  .kw-bar .val{position:absolute;top:-22px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-2);font-variant-numeric:tabular-nums}
  .kw-label{font-size:11px;color:var(--text-2);letter-spacing:0.04em;font-family:'JetBrains Mono',monospace}
  .kw-sub{font-size:10px;color:var(--text-4);margin-top:-4px}
  .kw-legend{display:flex;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
  .kw-legend-item{display:flex;align-items:center;gap:6px}
  .kw-sw{width:8px;height:8px;border-radius:2px}

  /* Right column: entry form + actions */
  .right-col{display:flex;flex-direction:column;gap:18px}
  .entry-panel{padding:16px 18px}
  .entry-head{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-bottom:14px;font-weight:500}
  .entry-row{display:flex;gap:8px;margin-bottom:8px}
  .entry-select, .entry-input{
    flex:1;padding:7px 10px;background:#0d0d0d;border:1px solid var(--border-2);
    border-radius:5px;font-size:12px;color:var(--text);min-width:0;
  }
  .entry-select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236b6b6b' stroke-width='1.2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:24px}
  .entry-select:focus, .entry-input:focus{border-color:var(--focus);background:#111}
  .entry-input::placeholder{color:var(--text-4)}
  .bucket-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .bucket-chip{font-size:11px;padding:5px 9px;border:1px solid var(--border-2);border-radius:99px;color:var(--text-3);cursor:pointer;background:#0d0d0d;white-space:nowrap}
  .bucket-chip:hover{color:var(--text-2);border-color:#333}
  .bucket-chip.active{background:#1c1c1c;color:var(--text);border-color:#333}
  .entry-submit-row{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .entry-submit{padding:7px 14px;background:var(--gold);color:#0a0a0a;border-radius:5px;font-size:12px;font-weight:600;flex:0 0 auto}
  .entry-submit:hover{filter:brightness(1.08)}
  .entry-submit:disabled{background:#2a2a2a;color:var(--text-4);cursor:not-allowed;filter:none}
  .entry-hint{font-size:11px;color:var(--text-4);flex:1;text-align:right}

  /* Multi-row entry */
  .bucket-group{margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#0c0c0c}
  .bucket-group-head{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#101010;border-bottom:1px solid var(--border)}
  .bucket-group-label{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:8px}
  .bucket-group-count{color:var(--text-4);font-size:11px;letter-spacing:0;text-transform:none;font-weight:400}
  .bucket-group-rem{color:var(--text-4);font-size:14px;padding:2px 6px;border-radius:4px;line-height:1}
  .bucket-group-rem:hover{color:var(--red);background:#181818}
  .br-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border)}
  .br-row:last-child{border-bottom:none}
  .br-row:hover{background:#0e0e0e}
  .br-num{width:16px;text-align:right;color:var(--text-4);font-size:10px;font-family:'JetBrains Mono',monospace}
  .br-input{flex:1;padding:5px 8px;background:#0a0a0a;border:1px solid transparent;border-radius:4px;font-size:12px;color:var(--text);min-width:0}
  .br-input:hover{border-color:var(--border-2)}
  .br-input:focus{border-color:var(--focus);background:#111;outline:none}
  .br-input.mono{font-family:'JetBrains Mono',monospace;text-transform:uppercase;max-width:130px}
  .br-input.val{max-width:100px;font-family:'JetBrains Mono',monospace;text-align:right}
  .br-remove{color:var(--text-4);font-size:14px;padding:2px 6px;border-radius:4px;line-height:1;opacity:0;transition:opacity .15s}
  .br-row:hover .br-remove{opacity:1}
  .br-remove:hover{color:var(--red);background:#181818}
  .br-addrow{display:flex;align-items:center;gap:6px;padding:7px 11px;font-size:11px;color:var(--text-3);background:#0a0a0a;width:100%;border-top:1px dashed var(--border-2)}
  .br-addrow:hover{color:var(--gold);background:#101010}
  .bucket-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:8px 10px;background:#0c0c0c;border:1px dashed var(--border-2);border-radius:6px}
  .bucket-picker-label{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--text-4);margin-right:4px;align-self:center}
  .bp-chip{font-size:11px;padding:5px 10px;border:1px solid var(--border-2);border-radius:99px;color:var(--text-2);cursor:pointer;background:#0d0d0d;display:inline-flex;align-items:center;gap:5px}
  .bp-chip:hover{color:var(--text);border-color:#333;background:#141414}
  .bp-chip .pl{color:var(--text-4);font-size:11px;line-height:1}

  /* Actions */
  .actions-panel{padding:14px 18px;display:flex;gap:0;align-items:center;justify-content:space-between}
  .actions-left{display:flex;gap:4px}
  .action-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;font-size:12px;color:var(--text-2);border-radius:5px}
  .action-btn:hover{background:#181818;color:var(--text)}
  .action-btn .ic{color:var(--text-3);font-size:11px;width:12px;display:inline-flex;justify-content:center}
  .action-sep{width:1px;height:14px;background:var(--border-2);margin:0 2px;align-self:center}

  /* Recent entries */
  .recent{margin-top:22px;border:1px solid var(--border);border-radius:8px;background:var(--panel);overflow:hidden}
  .recent-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;cursor:pointer;user-select:none}
  .recent-head:hover{background:#121212}
  .recent-title{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500;display:flex;align-items:center;gap:10px}
  .recent-count{color:var(--text-4);font-size:11px;letter-spacing:0}
  .recent-caret{color:var(--text-3);font-size:10px;transition:transform .18s}
  .recent-caret.open{transform:rotate(90deg)}
  .recent-body{border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease}
  .recent-body.open{max-height:980px}
  .manual-log-toggle{display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);background:#0c0c0c}
  .manual-log-btn{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border:1px solid var(--border-2);border-radius:5px;background:#0f0f0f;color:var(--text-3);font-size:11px}
  .manual-log-btn:hover{background:#171717;color:var(--text-2)}
  .manual-log-btn.active{color:var(--gold);border-color:#3a301d;background:#151108}
  .history-pager{display:inline-flex;align-items:center;gap:6px;margin-right:auto}
  .history-page-btn{padding:5px 8px;border:1px solid var(--border-2);border-radius:5px;background:#0f0f0f;color:var(--text-3);font-size:10.5px}
  .history-page-btn:hover:not(:disabled){background:#171717;color:var(--text-2)}
  .history-page-btn:disabled{opacity:.35;cursor:not-allowed}
  .history-page-label{font-family:'JetBrains Mono',monospace;color:var(--text-4);font-size:10.5px}
  .manual-log-area{padding:0 18px 14px;background:#0c0c0c;border-bottom:1px solid var(--border)}
  .manual-log-area .entry-panel{background:#101010}
  table.recent-tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.recent-tbl th{padding:9px 18px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-4);font-weight:500;border-bottom:1px solid var(--border)}
  table.recent-tbl th.r{text-align:right}
  table.recent-tbl td{padding:9px 18px;border-bottom:1px solid var(--border);color:var(--text-2)}
  table.recent-tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
  table.recent-tbl tr:last-child td{border-bottom:none}
  table.recent-tbl tr:hover td{background:var(--row-hover);color:var(--text)}
  .kw-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:0.04em}

// ------- Helpers
const fmtUsd = (n, d=0) => {
  if(n==null || isNaN(n)) return "—";

};

const fmtPct = (n, d=2) => (n==null||isNaN(n))? "—" : n.toFixed(d)+"%";

// ------- Data
// Ad roster per campaign (used to synthesize ad-level rows deterministically)

// Deterministic pseudo-random so ad rows are stable between renders
function seededRand(seed){
  let s = 0;
  for(let i=0;i<seed.length;i++) s = ((s<<5)-s + seed.charCodeAt(i))|0;
  s = Math.abs(s);
  return () => {
    s = (s*9301 + 49297) % 233280;
    return s/233280;
  };
}

// Split a daily total across ads by weight, with small jitter
function splitByWeight(total, ads, seedStr, rounding=0){
  total = Number(total || 0);
  const rand = seededRand(seedStr);
  // apply jitter to weights
  const jittered = ads.map(a => ({...a, jw: a.weight * (0.82 + rand()*0.36)}));
  const jSum = jittered.reduce((a,b)=>a+b.jw,0);
  let acc = 0;
  const out = jittered.map((a,i) => {
    let v;
    if(i === jittered.length-1) v = total - acc;
    else {
      v = total * (a.jw/jSum);
      if(rounding === 0) v = Math.round(v);
      else v = Math.round(v*Math.pow(10,rounding))/Math.pow(10,rounding);
      acc += v;
    }
    return {id:a.id, name:a.name, v};
  });
  return out;
}

function buildAdRows(campaignId, dayRow, adRoster){
  if(Array.isArray(dayRow.adRows) && dayRow.adRows.length){
    return dayRow.adRows.map(ad => ({
      adId: ad.adId,
      adName: ad.adName,
      previewImageUrl: ad.previewImageUrl || ad.previewThumbnailUrl || null,
      previewThumbnailUrl: ad.previewThumbnailUrl || null,
      spend: ad.spend || 0,
      imp: ad.imp || 0,
      clicks: ad.clicks || 0,
      msgs: ad.msgs || 0,
      calls: ad.calls || 0,
      taken: ad.taken || 0,
      clients: ad.clients || 0,
      mainClients: ad.mainClients ?? ad.clients ?? 0,
      subClients: ad.subClients || 0,
      collected: ad.collected || 0,
    }));
  }
  // Never invent ad-level metrics. If Meta did not return rows for the ads on
  // this date, show an explicit empty state instead of splitting campaign totals.
  return [];
}

function aggregateAdRowsForCampaign(campaign){
  const adsById = new Map();

  (campaign.rows || []).forEach(row => {
    buildAdRows(campaign.id, row, campaign.ads || []).forEach(ad => {
      const id = ad.adId || ad.adName;
      const current = adsById.get(id) || {
        ...ad,
        spend:0, imp:0, clicks:0, msgs:0, calls:0, taken:0,
        clients:0, mainClients:0, subClients:0, collected:0,
      };
      current.spend += ad.spend || 0;
      current.imp += ad.imp || 0;
      current.clicks += ad.clicks || 0;
      current.msgs += ad.msgs || 0;
      current.calls += ad.calls || 0;
      current.taken += ad.taken || 0;
      current.clients += ad.clients || 0;
      current.mainClients += ad.mainClients ?? ad.clients ?? 0;
      current.subClients += ad.subClients || 0;
      current.collected += ad.collected || 0;
      current.previewImageUrl = current.previewImageUrl || ad.previewImageUrl || ad.previewThumbnailUrl || null;
      current.previewThumbnailUrl = current.previewThumbnailUrl || ad.previewThumbnailUrl || null;
      adsById.set(id, current);
    });
  });

  return Array.from(adsById.values())
    .sort((a,b)=>b.collected-a.collected || b.spend-a.spend || a.adName.localeCompare(b.adName));
}

const CAMPAIGNS = [

// Derive per-row metrics
function deriveRow(r){
  const cpm = r.imp>0 ? (r.spend / r.imp) * 1000 : 0;  // cost per 1000 impressions
  const ctr = r.imp>0 ? (r.clicks/r.imp)*100 : 0;
  const cpc = r.clicks>0 ? r.spend / r.clicks : 0;
  const cpMsg = r.msgs>0 ? r.spend / r.msgs : 0;  // cost per message (DM)
  const cpCall = r.calls>0 ? r.spend/r.calls : null;
  const cpTaken = r.taken>0 ? r.spend/r.taken : null;
  const cpClient = r.clients>0 ? r.spend/r.clients : null;
  const closingBase = r.taken || r.calls;
  const closing = closingBase>0 ? (r.clients/closingBase)*100 : 0;
  const msgConv = r.msgs>0 ? (r.calls/r.msgs)*100 : 0;
  const collectedRoi = r.spend>0 ? (r.collected/r.spend) : 0;
  return {...r,cpm,ctr,cpc,cpMsg,cpCall,cpTaken,cpClient,closing,msgConv,collectedRoi};
}

function aggregate(rows){
  const sum = (k) => rows.reduce((a,r)=>a+(r[k]||0),0);
  const spend = sum("spend"), imp=sum("imp"), clicks=sum("clicks"), msgs=sum("msgs"),
    calls=sum("calls"), taken=sum("taken"), clients=sum("clients"),
    collected=sum("collected");
  return deriveRow({date:"Total", spend, imp, clicks, msgs, calls, taken, clients, collected});
}

function isoDate(d){
  return d.toISOString().slice(0,10);
}

function todayEt(){
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(new Date());
}

function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z");
  d.setUTCDate(d.getUTCDate()+days);
  return isoDate(d);
}

function monthStartIso(date){
  return (date || todayEt()).slice(0,7)+"-01";
}

function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00");
  d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}

function monthTitle(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return d.toLocaleDateString("en-US", {month:"long", year:"numeric"});
}

function daysInMonth(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

function isoForMonthDay(monthIso, day){
  return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`;
}

function isoFromAnyDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return String(value).slice(0,10);
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(d);
}

function timeFromAnyDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleTimeString("en-US", {
    timeZone:"America/New_York",
    hour:"numeric",
    minute:"2-digit",
  }).replace(" AM","a").replace(" PM","p");
}

function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){
    const y = shiftIso(anchor, -1);
    return {preset:id, dateFrom:y, dateTo:y};
  }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){
    const start = shiftMonth(monthStartIso(anchor), -1);
    return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))};
  }
  return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
}

function dateLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}

function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom);
  const to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}

function labelForPreset(id){
  return PRESETS.find(p=>p.id===id)?.label || "Custom";
}

function metricRowFromApi(row, dateLabel){
  return {
    date: dateLabel || row.dateLabel || row.keyword || "Total",
    spend: Number(row.adSpend || 0),
    imp: Number(row.impressions || 0),
    clicks: Number(row.linkClicks || 0),
    msgs: Number(row.messages || 0),
    calls: Number(row.bookedCalls || 0),
    taken: Number(row.callsTaken || 0),
    clients: Number(row.newClients || 0),
    mainClients: Number(row.mainOfferClients ?? row.newClients ?? 0),
    subClients: Number(row.subscriptionClients || 0),
    collected: Number(row.collectedRevenue || 0),
  };
}

function addMetric(target, row){
  target.spend += row.spend || 0;
  target.imp += row.imp || 0;
  target.clicks += row.clicks || 0;
  target.msgs += row.msgs || 0;
  target.calls += row.calls || 0;
  target.taken += row.taken || 0;
  target.clients += row.clients || 0;
  target.mainClients += row.mainClients ?? row.clients ?? 0;
  target.subClients += row.subClients || 0;
  target.collected += row.collected || 0;
}

function emptyMetric(date){
  return {date, spend:0, imp:0, clicks:0, msgs:0, calls:0, taken:0, clients:0, mainClients:0, subClients:0, collected:0};
}

function campaignsFromDashboard(dashboard, range){
  if(!dashboard || dashboard.error || !Array.isArray(dashboard.rows) || dashboard.rows.length===0) {
    return [];
  }

  const sourceRows = Array.isArray(dashboard.dailyRows) && dashboard.dailyRows.length
    ? dashboard.dailyRows
    : dashboard.rows.map(row => ({...row, dateLabel: rangeLabel(range)}));
  const campaignMap = new Map();

  for(const apiRow of sourceRows){
    const client = apiRow.clientKey || "unknown";
    if(client!=="tyson" && client!=="keith") continue;
    const keyword = (apiRow.keyword || "UNKNOWN").toUpperCase();
    const clientLabel = client==="tyson" ? "Tyson" : "Keith";
    const attributionOnly = Boolean(apiRow.attributionOnly) || (!apiRow.campaignId && !apiRow.adId && !Number(apiRow.adSpend || 0));
    const campaignId = apiRow.campaignId || `${client}:keyword-attribution`;
    const campaignKey = `${client}:${campaignId}`;
    const campaignName = apiRow.campaignName || `${clientLabel} — Keyword Attribution`;
    const adId = apiRow.adId || `${campaignKey}:${keyword.toLowerCase()}`;
    const adName = (apiRow.adName || keyword || apiRow.name).toUpperCase();
    const previewImageUrl = apiRow.previewImageUrl || apiRow.previewThumbnailUrl || null;
    const previewThumbnailUrl = apiRow.previewThumbnailUrl || null;
    const rowStatus = apiRow.status === "finished" ? "finished" : "active";
    const dateKey = /^\d{4}-\d{2}-\d{2}$/.test(apiRow.dateLabel || "")
      ? apiRow.dateLabel
      : (apiRow.date || apiRow.dateLabel || range.dateTo);
    const dateLabel = /^\d{4}-\d{2}-\d{2}$/.test(dateKey) ? dateLabelFromIso(dateKey) : dateKey;
    const row = metricRowFromApi(apiRow, dateLabel);

    if(!campaignMap.has(campaignKey)){
      campaignMap.set(campaignKey, {
        id: campaignKey,
        clientKey: client,
        name: campaignName,
        short: `${clientLabel} · ${campaignName.replace(/^.*?—\s*/, "")}`,
        attributionOnly,
        status: rowStatus,
        latestIso: dateKey,
        hasSpend: false,
        dot: client,
        adsByName: new Map(),
        rowsByDate: new Map(),
      });
    }

    const campaign = campaignMap.get(campaignKey);
    campaign.attributionOnly = campaign.attributionOnly && attributionOnly;
    if(rowStatus==="active") campaign.status = "active";
    if(String(dateKey).localeCompare(String(campaign.latestIso || "")) > 0) campaign.latestIso = dateKey;
    if(Number(row.spend || 0) > 0) campaign.hasSpend = true;
    if(!campaign.adsByName.has(adId)){
      campaign.adsByName.set(adId, {id:adId, name:adName, keyword, previewImageUrl, previewThumbnailUrl, status:rowStatus, weight:1});
    }else{
      const existingAd = campaign.adsByName.get(adId);
      if(existingAd){
        existingAd.previewImageUrl = existingAd.previewImageUrl || previewImageUrl;
        existingAd.previewThumbnailUrl = existingAd.previewThumbnailUrl || previewThumbnailUrl;
        if(rowStatus==="active") existingAd.status = "active";
      }
    }

    if(!campaign.rowsByDate.has(dateKey)){
      campaign.rowsByDate.set(dateKey, {...emptyMetric(dateLabel), iso:dateKey, status:rowStatus, adRows:[]});
    }

    const day = campaign.rowsByDate.get(dateKey);
    addMetric(day, row);
    if(rowStatus==="active") day.status = "active";
    day.adRows.push({
      ...row,
      adId,
      adName,
      keyword,
      previewImageUrl,
      previewThumbnailUrl,
      status: rowStatus,
    });
  }

  const campaigns = Array.from(campaignMap.values()).map(c => {
    const ads = Array.from(c.adsByName.values()).sort((a,b)=>a.name.localeCompare(b.name));
    const rows = Array.from(c.rowsByDate.values())
      .sort((a,b)=>String(b.iso).localeCompare(String(a.iso)))
      .map(row => ({
        ...row,
        adRows: row.adRows.sort((a,b)=>b.collected-a.collected || b.spend-a.spend),
      }));
    const hasRangeSpend = rows.some(row => Number(row.spend || 0) > 0);
    return {...c, ads, adCount:ads.length, rows, hasSpend:hasRangeSpend || c.hasSpend};
  });

  return campaigns.sort((a,b)=>String(b.latestIso || "").localeCompare(String(a.latestIso || "")));
}

function labelsFromCampaigns(campaigns){
  const labels = Array.from(new Set(campaigns.flatMap(c => c.rows.map(r => r.date))));
  return labels.length ? labels.sort((a,b)=>{
    const ai = campaigns.flatMap(c=>c.rows).find(r=>r.date===a)?.iso || a;
    const bi = campaigns.flatMap(c=>c.rows).find(r=>r.date===b)?.iso || b;
    return String(ai).localeCompare(String(bi));
  }) : DAY_LABELS;
}

function rowSortKey(row){
  return row?.iso || row?.date || "";
}

function filterCampaignsBySearch(campaigns, search){
  const term = (search || "").trim().toLowerCase();
  if(!term) return campaigns;

  return campaigns.map(c => {
    const campaignMatches = [c.name, c.short, c.id, c.clientKey].some(v => String(v || "").toLowerCase().includes(term));
    if(campaignMatches) return c;

    const rows = c.rows.map(row => {
      const adRows = (row.adRows || []).filter(ad =>
        [ad.adName, ad.adId].some(v => String(v || "").toLowerCase().includes(term))
      );
      if(!adRows.length) return null;

      const next = {...emptyMetric(row.date), iso:row.iso, adRows};
      adRows.forEach(ad => addMetric(next, metricRowFromApi({
        adSpend:ad.spend,
        impressions:ad.imp,
        linkClicks:ad.clicks,
        messages:ad.msgs,
        bookedCalls:ad.calls,
        callsTaken:ad.taken,
        newClients:ad.clients,
        mainOfferClients:ad.mainClients,
        subscriptionClients:ad.subClients,
        collectedRevenue:ad.collected,
      }, row.date)));
      return next;
    }).filter(Boolean);

    if(!rows.length) return null;
    const adsById = new Map();
    rows.forEach(row => row.adRows.forEach(ad => {
      if(!adsById.has(ad.adId)) adsById.set(ad.adId, {id:ad.adId, name:ad.adName, weight:1});
    }));
    const ads = Array.from(adsById.values()).sort((a,b)=>a.name.localeCompare(b.name));
    return {...c, rows, ads, adCount:ads.length};
  }).filter(Boolean);
}

function scopeCampaigns(campaigns, account, status){
  return campaigns.filter(c => {
    if(account !== "all" && account !== (c.clientKey || c.id)) return false;
    if(status !== "all" && status !== c.status) return false;
    return true;
  });
}

function applyLocalEntriesToCampaigns(campaigns, entries){
  if(!entries?.length) return campaigns;
  const bucketToMetric = {msgs:"msgs", calls:"calls", taken:"taken", clients:"clients", collected:"collected"};
  return campaigns.map(c => {
    const matching = entries.filter(e => e.camp === c.id && bucketToMetric[e.bucket]);
    if(!matching.length) return c;
    const rows = c.rows.map((row, idx) => {
      if(idx !== 0) return row;
      const next = {...row, adRows: row.adRows ? row.adRows.map(ad => ({...ad})) : row.adRows};
      matching.forEach(e => {
        const metric = bucketToMetric[e.bucket];
        const value = Number(e.value || 0);
        const previousMainClients = next.mainClients ?? next.clients ?? 0;
        next[metric] = (next[metric] || 0) + value;
        if(metric === "clients") next.mainClients = previousMainClients + value;
        if(Array.isArray(next.adRows)){
          const keyword = String(e.kw || "").toUpperCase();
          const ad = next.adRows.find(a => String(a.adName || "").toUpperCase() === keyword);
          if(ad) {
            const previousAdMainClients = ad.mainClients ?? ad.clients ?? 0;
            ad[metric] = (ad[metric] || 0) + value;
            if(metric === "clients") ad.mainClients = previousAdMainClients + value;
          }
        }
      });
      return next;
    });
    return {...c, rows};
  });
}

const PRESETS = [
  {id:"today",label:"Today",days:0},
  {id:"yesterday",label:"Yesterday",days:-1},
  {id:"last3",label:"Last 3 days",days:3},
  {id:"last7",label:"Last 7 days",days:7},
  {id:"last14",label:"Last 14 days",days:14},
  {id:"last30",label:"Last 30 days",days:30},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];

function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button
              key={i}
              className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")}
              onClick={()=>onPick(x.iso)}
            >
              {x.d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || rangeForPreset("last7"));
  const [monthIso, setMonthIso] = useState(monthStartIso((value || rangeForPreset("last7")).dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const current = value || rangeForPreset("last7");
  useEffect(()=>{
    if(open){
      setDraft(current);
      setMonthIso(monthStartIso(current.dateTo));
      setSelectingEnd(false);
    }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){
        setSelectingEnd(true);
        return {preset:"custom", dateFrom:iso, dateTo:iso};
      }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="dim" style={{fontSize:11}}>· {rangeLabel(current)}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop" style={{minWidth:520}}>
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div
                key={p.id}
                className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom") {
                    onChange && onChange(rangeForPreset(p.id));
                    setOpen(false);
                  } else {
                    setDraft({...draft, preset:"custom"});
                    setSelectingEnd(false);
                  }
                }}
              >
                <span>{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar
              monthIso={monthIso}
              rangeStart={draft.dateFrom}
              rangeEnd={draft.dateTo}
              onPick={pickDate}
              onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))}
            />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ------- Campaign table
const DEFAULT_COL_WIDTHS = {
  date: 150, spend: 110, imp: 120, cpm: 90, clicks: 110, ctr: 90, cpc: 90,
  msgs: 110, calls: 120, cpCall: 145, taken: 110, cpTaken: 145, clients: 110, collected: 140,
  cpMsg: 110, closing: 130, msgConv: 120, cpClient: 130, collectedRoi: 140,
};

// Keys that are calculated (vs logged/imported)
const CALC_KEYS = new Set(["cpm","ctr","cpc","cpMsg","cpCall","cpTaken","cpClient","closing","msgConv","collectedRoi"]);
const LOGGED_KEYS = new Set(["msgs","calls","taken","clients","collected"]);

function CampaignTable({account, status, loggedTotals, campaigns=CAMPAIGNS}){
  const [view, setView] = useState("campaign"); // 'campaign' | 'ad'
  const [expanded, setExpanded] = useState({tyson:false, keith:false});
  const [expandedDays, setExpandedDays] = useState({});
  const [sort, setSort] = useState({key:"date", dir:"desc"});
  const [widths, setWidths] = useState(DEFAULT_COL_WIDTHS);
  const [resizingKey, setResizingKey] = useState(null);

  const startResize = (k, e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = widths[k];
    setResizingKey(k);
    const onMove = (ev) => {
      const newW = Math.max(60, startW + (ev.clientX - startX));
      setWidths(w => ({...w, [k]: newW}));
    };
    const onUp = () => {
      setResizingKey(null);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const toggleSort = (key) => {
    setSort(current => ({
      key,
      dir: current.key === key && current.dir === "desc" ? "asc" : "desc",
    }));
  };

  const valueForSort = (row, key) => {
    if(key === "date") return row.latestIso || row.iso || row.date || "";
    const derived = deriveRow(row);
    const value = derived[key];
    return Number.isFinite(Number(value)) ? Number(value) : 0;
  };

  const compareBySort = (a, b, key=sort.key, dir=sort.dir) => {
    const av = valueForSort(a, key);
    const bv = valueForSort(b, key);
    const mult = dir === "asc" ? 1 : -1;
    if(typeof av === "string" || typeof bv === "string"){
      return String(av).localeCompare(String(bv)) * mult;
    }
    return (av - bv) * mult;
  };

  const statusLabelForCampaign = (campaign) => {
    if(campaign.status === "active") return "Active";
    if(!campaign.hasSpend) return "No spend";
    return "Off";
  };

  // Apply loggedTotals onto campaign rows (add to latest date)
  const augmentedCampaigns = campaigns.map(c => {
    const bump = loggedTotals?.[c.id] || {};
    const rows = c.rows.map((r, idx) => {
      if(idx !== 0) return r; // apply to newest (first in desc array)
      return {
        ...r,
        msgs: r.msgs + (bump.msgs||0),
        calls: r.calls + (bump.calls||0),
        taken: (r.taken||0) + (bump.taken||0),
        clients: r.clients + (bump.clients||0),
        mainClients: (r.mainClients ?? r.clients ?? 0) + (bump.clients||0),
        subClients: r.subClients || 0,
        collected: r.collected + (bump.collected||0),
      };
    });
    return {...c, rows};
  });

  const totalCampaigns = augmentedCampaigns.filter(c=>{
    if(account!=="all" && account!==(c.clientKey || c.id)) return false;
    if(status!=="all" && status!==c.status) return false;
    return true;
  });
  const visibleCampaigns = totalCampaigns
    .filter(c => !c.attributionOnly)
    .sort((a,b) => compareBySort({...aggregate(a.rows), latestIso:a.latestIso}, {...aggregate(b.rows), latestIso:b.latestIso}));
  const tableCampaigns = augmentedCampaigns.filter(c => !c.attributionOnly);

  const setTableView = (next) => {
    setView(next);
  };

  const cols = [
    {k:"date", label:"Campaign / Date"},
    {k:"spend", label:"Ad spend", fmt:(r)=>fmtUsd(r.spend,0), cls:()=>""},
    {k:"imp", label:"Impressions", fmt:(r)=>fmtNum(r.imp)},
    {k:"cpm", label:"CPM", fmt:(r)=>"$"+r.cpm.toFixed(2), cls:(r)=> r.cpm<=7?"pos":(r.cpm>=10?"neg":"dim"), calc:true},
    {k:"clicks", label:"Link clicks", fmt:(r)=>fmtNum(r.clicks)},
    {k:"ctr", label:"CTR", fmt:(r)=>fmtPct(r.ctr,2), cls:(r)=> r.ctr>=2.0?"pos":(r.ctr<1.7?"neg":""), calc:true},
    {k:"cpc", label:"CPC", fmt:(r)=>"$"+r.cpc.toFixed(2), cls:(r)=> r.cpc<=0.35?"pos":(r.cpc>=0.45?"neg":""), calc:true},
    {k:"msgs", label:"Messages", fmt:(r)=>fmtNum(r.msgs), logged:true},
    {k:"cpMsg", label:"Cost / msg", fmt:(r)=>"$"+r.cpMsg.toFixed(2), cls:(r)=> r.cpMsg<=5?"pos":(r.cpMsg>=6.5?"neg":""), calc:true},
    {k:"calls", label:"45-min calls booked", fmt:(r)=>fmtNum(r.calls), logged:true},
    {k:"cpCall", label:"Cost / 45-min booked", fmt:(r)=> r.cpCall?"$"+r.cpCall.toFixed(0):"—", cls:(r)=> r.cpCall && r.cpCall<=30?"pos":(r.cpCall && r.cpCall>=40?"neg":""), calc:true},
    {k:"taken", label:"45-min calls taken", fmt:(r)=>fmtNum(r.taken), logged:true},
    {k:"cpTaken", label:"Cost / call taken", fmt:(r)=> r.cpTaken?"$"+r.cpTaken.toFixed(0):"—", cls:(r)=> r.cpTaken && r.cpTaken<=45?"pos":(r.cpTaken && r.cpTaken>=70?"neg":""), calc:true},
    {k:"clients", label:"New clients", fmt:(r)=>fmtNum(r.clients), cls:(r)=> r.clients>=5?"pos":(r.clients<=2?"neg":""), logged:true},
    {k:"closing", label:"Call close rate", fmt:(r)=>fmtPct(r.closing,0), cls:(r)=> r.closing>=40?"pos":(r.closing<=25?"neg":""), calc:true},
    {k:"msgConv", label:"Msg → call", fmt:(r)=>fmtPct(r.msgConv,1), cls:(r)=> r.msgConv>=15?"pos":(r.msgConv<=12?"neg":""), calc:true},
    {k:"collected", label:"Collected rev", fmt:(r)=>fmtUsd(r.collected), cls:()=>"pos", logged:true},
    {k:"cpClient", label:"Cost / client", fmt:(r)=> r.cpClient?"$"+r.cpClient.toFixed(0):"—", cls:(r)=> r.cpClient && r.cpClient<=80?"pos":(r.cpClient && r.cpClient>=120?"neg":""), calc:true},
    {k:"collectedRoi", label:"Collected ROI", fmt:(r)=>r.collectedRoi.toFixed(1)+"×", cls:(r)=> r.collectedRoi>=20?"pos":(r.collectedRoi<=10?"neg":""), calc:true},
  ];

  const totalMin = cols.reduce((s,c)=>s+widths[c.k], 0);

  const overall = useMemo(()=>{
    const allRows = visibleCampaigns.flatMap(c=>c.rows);
    return aggregate(allRows);
  },[visibleCampaigns]);

  return (
    <div className="panel">
      <div className="tbl-toolbar">
        <div className="tbl-view-toggle">
          <button className={"tvt-btn "+(view==="campaign"?"active":"")} onClick={()=>setView("campaign")}>
            Campaign level
          </button>
          <button className={"tvt-btn "+(view==="ad"?"active":"")} onClick={()=>setTableView("ad")}>
            Ad level
            <span className="tvt-count">{tableCampaigns.reduce((sum,c)=>sum+(c.ads?.length||0),0)}</span>
          </button>
        </div>
        <div className="tbl-toolbar-meta"></div>
      </div>
      <div className="tbl-scroll" style={{cursor: resizingKey?"col-resize":"auto"}}>
        <table className="ads" style={{minWidth: totalMin}}>
          <colgroup>
            {cols.map(c => <col key={c.k} style={{width: widths[c.k]}} />)}
          </colgroup>
          <thead>
            <tr>
              {cols.map((c,i)=>(
                <th
                  key={c.k}
                  className={(i===0?"":"num ")+(c.calc?"calc ":"")+(c.logged?"logged ":"")+"sortable-th "+(sort.key===c.k?"sorted":"")}
                  style={{position:"relative"}}
                  onClick={()=>toggleSort(c.k)}
                >
                  <span className="th-inner">
                    {i===0 && view==="ad" ? "Campaign / Date / Ad" : c.label}
                    <span className="sort-arrow">{sort.key===c.k ? (sort.dir==="desc" ? "↓" : "↑") : "↕"}</span>
                  </span>
                  <span
                    className={"col-resize "+(resizingKey===c.k?"active":"")}
                    onMouseDown={(e)=>startResize(c.k, e)}
                  ></span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {visibleCampaigns.length === 0 && (
              <tr>
                <td colSpan={cols.length} style={{textAlign:"left",color:"var(--text-3)",padding:"18px 20px"}}>
                  No ads match these filters.
                </td>
              </tr>
            )}
            {visibleCampaigns.map(c => {
              const agg = aggregate(c.rows);
              const isOpen = expanded[c.id];
              const orderedRows = [...c.rows].sort((a,b)=>compareBySort(a,b));
              const shortName = widths.date < 200 ? c.short : c.name;
              const statusLabel = statusLabelForCampaign(c);
              return (
                <React.Fragment key={c.id}>
                  <tr className="campaign-row" onClick={()=>setExpanded(s=>({...s,[c.id]:!s[c.id]}))} style={{cursor:'pointer'}}>
                    <td>
                      <div className="campaign-cell">
                        <span className="chevron">{isOpen?"▾":"▸"}</span>
                        <span className={"camp-dot "+c.dot}></span>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{shortName}</span>
                        {view==="ad" && (
                          <span className="ad-count-chip">{c.ads.length} ads</span>

                        <span className={"status-pill "+(c.status==="active"?"active":"finished")+" "+(!c.hasSpend?"empty":"")}>{statusLabel}</span>
                      </div>
                    </td>
                    {cols.slice(1).map(col=>{
                      const cls = (col.cls? col.cls(agg):"")+(col.calc?" calc":"");
                      return <td key={col.k} className={cls}>{col.fmt(agg)}</td>;

                    const dayAdRows = isAdView

                      : [];
                    return (
                      <React.Fragment key={c.id+r.date}>
                        <tr
                          className={isAdView?"day-row":""}

                        >
                          <td>
                            <span style={{paddingLeft:30,color:'var(--text-3)',display:'inline-flex',alignItems:'center',gap:8}} className="mono">
	                              {isAdView && <span className="day-chevron">{dayOpen?"▾":"▸"}</span>}

	                            </span>
	                          </td>

                            return <td key={col.k} className={cls}>{col.fmt(r)}</td>;
                          })}
                        </tr>
	                        {isAdView && dayOpen && dayAdRows.length === 0 && (
	                          <tr className="ad-row">
	                            <td colSpan={cols.length}>
	                              <span style={{paddingLeft:56,color:'var(--text-4)',fontSize:11}}>No individual ad rows for this date.</span>
	                            </td>
	                          </tr>
	                        )}
	                        {isAdView && dayOpen && dayAdRows.map(ad => {
	                            const adMetrics = deriveRow({
	                              date: ad.adName,
	                              spend: ad.spend, imp: ad.imp, clicks: ad.clicks,
                              msgs: ad.msgs, calls: ad.calls, clients: ad.clients,
                              taken: ad.taken,
                              collected: ad.collected,
                            });
                            return (
                              <tr key={c.id+r.date+ad.adId} className="ad-row">
                                <td>
                                  <span style={{paddingLeft:56,color:'var(--text-2)',display:'inline-flex',alignItems:'center',gap:8,fontSize:12}}>
                                    <span className="ad-id mono">{ad.adId}</span>
                                    <span style={{color:'var(--text-3)'}}>·</span>
                                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ad.adName}</span>
                                  </span>
                                </td>
                                {cols.slice(1).map(col=>{
                                  const cls = (col.cls? col.cls(adMetrics):"")+(col.calc?" calc":"");
                                  let val;
                                  try { val = col.fmt(adMetrics); } catch(e){ val = "—"; }
                                  return <td key={col.k} className={cls} style={{fontSize:11.5}}>{val}</td>;
                                })}

                            );

                      </React.Fragment>

                  })}
                </React.Fragment>

            })}
            <tr className="total-row">
              <td>Total</td>
              {cols.slice(1).map(col=>{
