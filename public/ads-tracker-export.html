// Friendly creator name from a client key, with a title-case fallback so new
// creators read correctly without a code change.
function creatorName(key){
  const known = {tyson:"Tyson", keith:"Keith", lucy:"Lucy", lucy_hubbard:"Lucy", antwan:"Antwan", antwan_rarcus:"Antwan"};
  if(known[key]) return known[key];
  return String(key||"").split(/[_\s]+/).map(s=> s ? s.charAt(0).toUpperCase()+s.slice(1) : s).join(" ") || "Unknown";
}

// Data-health tripwire. The ad feed is synced from Meta once a day; if a
// creator's connection silently breaks (e.g. a password change kills the token)
// their spend just stops arriving and every ROAS below quietly understates
// reality. This reads the freshness signals the server already sends and shouts
// the moment a creator who WAS spending stops reporting — while staying calm and
// green when everything is current, and never crying wolf over a brand-new
// account that simply isn't live yet.
function DataHealth({dashboard}){
  if(!dashboard || dashboard.mock) return null;
  const meta = dashboard.sourceStatus && dashboard.sourceStatus.meta;
  if(!meta) return null;

  // How much spend each creator actually produced this range → tells a real
  // outage (had spend, now blank) apart from a not-live account (never any).
  const adRoas = Array.isArray(dashboard.adRoas) ? dashboard.adRoas : [];
  const spendByCreator = {};
  adRoas.forEach(r => { const k = r.clientKey || "unknown"; spendByCreator[k] = (spendByCreator[k]||0) + Number(r.adSpend||0); });

  // Group the days with no ad data by creator.
  const missing = Array.isArray(meta.missingDateAccounts) ? meta.missingDateAccounts : [];
  const datesByCreator = {};
  missing.forEach(m => { const k = m.clientKey || "unknown"; (datesByCreator[k] = datesByCreator[k] || []).push(m.date); });

  const broken = [];   // was spending, now has a run of missing days → real break
  const notLive = [];  // no spend at all this range → just not running yet
  Object.keys(datesByCreator).forEach(k => {
    const dates = datesByCreator[k].slice().sort();
    const entry = { key:k, name:creatorName(k), days:dates.length, from:dates[0], to:dates[dates.length-1] };
    // 2+ missing days for an active spender = concerning (1 day is normal sync lag).
    if((spendByCreator[k]||0) > 0 && dates.length >= 2) broken.push(entry);
    else if((spendByCreator[k]||0) <= 0) notLive.push(entry);
  });
  broken.sort((a,b)=> b.days - a.days);

  // Secondary signal: nothing synced in a long while.
  const last = meta.latestSyncedAt ? new Date(meta.latestSyncedAt) : null;
  const hrsSince = last && !Number.isNaN(last.getTime()) ? (Date.now() - last.getTime())/36e5 : null;
  const stale = hrsSince != null && hrsSince > 48;
  const freshText = hrsSince == null ? null
    : hrsSince < 1.5 ? "just now"
    : hrsSince < 36 ? Math.round(hrsSince) + "h ago"
    : Math.round(hrsSince/24) + " days ago";

  const alarm = broken.length > 0 || stale;

  // Everything current → say nothing.
  if(!alarm) return null;

  // A problem → one terse line per issue, monochrome with a small red dot.
  return (
    <div style={{padding:"11px 14px",marginBottom:16,borderRadius:10,
      background:"var(--panel-2)",border:"1px solid var(--border-2)",display:"flex",flexDirection:"column",gap:6}}>
      {broken.map(b => (
        <div key={b.key} style={{display:"flex",alignItems:"center",gap:9,fontSize:13,color:"var(--text-2)"}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"var(--red)",flexShrink:0}}></span>
          <span><b style={{color:"var(--text)"}}>{b.name}</b> not reporting — {b.days}d missing. Totals below exclude {b.name}.</span>
        </div>
      ))}
      {stale && broken.length===0 && (
        <div style={{display:"flex",alignItems:"center",gap:9,fontSize:13,color:"var(--text-2)"}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"var(--gold)",flexShrink:0}}></span>
          <span>Ad data may be stale — last update {freshText}.</span>
        </div>
      )}
    </div>
  );
}

// ------- Copy brief: a paste-anywhere copywriting prompt built ONLY from real numbers.
// Splits by offer type so free-challenge and paid (direct-CTA) messaging never bleed
// into each other — a free ad must never over-promise a paid feature. No AI tokens:
// the winning/losing copy IS the evidence, quoted verbatim with the dollars attached.
function isFreeOffer(words){ return /\bfree\b/i.test(String(words||"")); }

// --- Copy clustering: one MESSAGE, one verdict ----------------------------
// A copywriting brief reasons about WORDS, not ad rows. The same copy often
// runs more than once — a straight relaunch, or a near-twin like "Spring
// Shredding" vs "Summer Shredding". If we treat each run as its own ad, the
// SAME words can land in "winning" once and "losing" another time (different
// targeting, audience, timing — none of which is a copy matter). That reads as
// a self-contradiction. So we collapse essentially-identical copy into ONE
// entry and blend its real spend/revenue: the words' true return, stated once.
function copyFingerprint(words){
  return String(words||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
}
function copyTokenSet(words){
  return new Set(copyFingerprint(words).split(" ").filter(Boolean));
}
function copyJaccard(a, b){
  if(!a.size && !b.size) return 1;
  let inter = 0; a.forEach(t=>{ if(b.has(t)) inter++; });
  const uni = a.size + b.size - inter;
  return uni>0 ? inter/uni : 0;
}
// Two messages are "the same copy" when ≥85% of their words overlap.
const SAME_COPY_THRESHOLD = 0.85;
function isSameCopy(wordsA, wordsB){
  return copyJaccard(copyTokenSet(wordsA), copyTokenSet(wordsB)) >= SAME_COPY_THRESHOLD;
}
// Collapse reliable ads into unique messages, blending real dollars. Greedy
// single-link clustering anchored on the first member (conservative — it never
// over-merges by drifting the anchor).
function clusterReliableCopy(analyzed){
  const ads = (analyzed||[]).filter(a=> a.reliable && copyFingerprint(a.words));
  const clusters = [];
  for(const a of ads){
    const toks = copyTokenSet(a.words);
    let host = null;
    for(const c of clusters){ if(copyJaccard(toks, c.toks) >= SAME_COPY_THRESHOLD){ host=c; break; } }
    if(!host){ host = {toks, items:[]}; clusters.push(host); }
    host.items.push(a);
  }
  return clusters.map(c=>{
    const items = c.items;
    const spend   = items.reduce((s,a)=>s+(Number(a.spend)||0),0);
    const revenue = items.reduce((s,a)=>s+(Number(a.revenue)||0),0);
    const clients = items.reduce((s,a)=>s+(Number(a.clients)||0),0);
    const lead = [...items].sort((a,b)=>(Number(b.spend)||0)-(Number(a.spend)||0))[0];
    const longest = items.reduce((m,a)=> String(a.words||"").length>String(m||"").length ? a.words : m, "");
    const names = Array.from(new Set(items.map(a=>a.adName).filter(Boolean)));
    return {
      adId: lead.adId, clientKey: lead.clientKey,
      words: longest || lead.words,
      adName: items.length>1 ? `${names.length||items.length} ads · same copy` : (lead.adName||""),
      spend, revenue, clients,
      roas: spend>0 ? revenue/spend : 0,
      reliable: true,
      instances: items.length,
    };
  });
}

function legacyCopy(text){
  try{
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.left="-9999px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(_e){ return false; }
}
function copyText(text){
  return new Promise((resolve, reject)=>{
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(resolve).catch(()=>{ legacyCopy(text) ? resolve() : reject(); });
        return;
      }
    }catch(_e){}
    legacyCopy(text) ? resolve() : reject();
  });
}

// Honest, data-only signals: only surfaced when winners and losers actually differ.
function copySignals(winners, losers){
  const wc = (s)=> String(s||"").trim().split(/\s+/).filter(Boolean).length;
  const share = (arr, test)=> arr.length ? arr.filter(a=>test(String(a.words||""))).length/arr.length : 0;
  const avg = (arr, f)=> arr.length ? arr.reduce((s,a)=>s+f(a),0)/arr.length : 0;
  const out = [];
  if(winners.length && losers.length){
    const wAvg = avg(winners, a=>wc(a.words)), lAvg = avg(losers, a=>wc(a.words));
    if(Math.abs(wAvg-lAvg) >= 4){
      out.push(wAvg < lAvg
        ? `Keep it tight — your winners run ~${Math.round(wAvg)} words vs ~${Math.round(lAvg)} on the draggers.`
        : `Give the offer room — winners run ~${Math.round(wAvg)} words vs ~${Math.round(lAvg)} on the draggers.`);
    }
    const wQ = share(winners, w=>/\?/.test(w)), lQ = share(losers, w=>/\?/.test(w));
    if(Math.abs(wQ-lQ) >= 0.3){
      out.push(wQ>lQ ? "Open with a question — your winning hooks ask, they don't tell."
                     : "Lead with the claim, not a question — your winners make a statement.");
    }
    const wN = share(winners, w=>/\d/.test(w)), lN = share(losers, w=>/\d/.test(w));
    if((wN-lN) >= 0.3){
      out.push("Use specific numbers — a count, a price, a timeframe. Your winners are concrete, the draggers vague.");
    }
  }
  return out;
}

// Structured brief model — computed ONCE from the real numbers, then rendered two
// ways: a beautiful in-app preview AND plain text for pasting. No AI tokens.
function computeBriefModel(analyzed){
  // One row per unique MESSAGE (relaunches/near-twins blended), so the same
  // words can never appear as both a winner and a loser.
  const messages = clusterReliableCopy(analyzed);
  const rawReliable = (analyzed||[]).filter(a=>a.reliable).length;
  const blendRoas = (arr)=>{ const sp=arr.reduce((s,a)=>s+a.spend,0); const rv=arr.reduce((s,a)=>s+a.revenue,0); return sp>0 ? Math.round((rv/sp)*10)/10 : 0; };
  const mk = (isFree, pool)=>{
    const winners = pool.filter(a=>a.revenue>0 && a.roas>=3).sort((a,b)=>b.roas-a.roas);
    const losers  = pool.filter(a=>a.roas<1).sort((a,b)=>a.roas-b.roas);
    return {
      isFree, winners, losers,
      winSpend: winners.reduce((s,a)=>s+a.spend,0),
      winRev:   winners.reduce((s,a)=>s+a.revenue,0),
      loseSpend:losers.reduce((s,a)=>s+a.spend,0),
      loseRev:  losers.reduce((s,a)=>s+a.revenue,0),
      loseClients: losers.reduce((s,a)=>s+Math.round(Number(a.clients)||0),0),
      blend: blendRoas(winners),
      signals: copySignals(winners, losers),
      has: winners.length>0 || losers.length>0,
    };
  };
  return {
    reliableCount: rawReliable,
    messageCount: messages.length,
    free: mk(true,  messages.filter(a=> isFreeOffer(a.words))),
    paid: mk(false, messages.filter(a=> !isFreeOffer(a.words))),
  };
}

// Which offer sections the chosen filter should include.
function briefSections(model, offer){
  const out = [];
  if((offer==="all"||offer==="free") && model.free.has) out.push(model.free);
  if((offer==="all"||offer==="paid") && model.paid.has) out.push(model.paid);
  return out;
}

// Plain-English DO / DON'T lines for a section, shared by the preview and the text.
function briefDos(s){
  const arr = [];
  if(s.winners.length) arr.push(`Echo the winning angle — it returned ${s.blend}× on real spend.`);
  s.signals.forEach(x=>arr.push(x));
  arr.push(s.isFree ? "Keep the whole promise free; end on joining the free challenge." : "Make the paid offer and the buy ask explicit.");
  return arr;
}
function briefDonts(s){
  const arr = [];
  if(s.losers.length) arr.push(`Don't reuse the losing angles — they burned ${fmtUsd(s.loseSpend)} for ${s.loseClients} client${s.loseClients===1?"":"s"}.`);
  arr.push(s.isFree ? "Never mention price, payment, or a paid-only feature in a free-challenge ad." : "Don't water the ask down to sound like a free offer.");
  return arr;
}

// The paste-ready text, honoring the offer filter + style preset.
function briefToText(model, opts){
  const offer = opts.offer||"all", style = opts.style||"prompt", rangeText = opts.rangeText||"";
  const r1 = (n)=> (Math.round((Number(n)||0)*10)/10);
  const usd = (n)=> "$"+Math.round(Number(n)||0).toLocaleString();
  const clean = (s)=> String(s||"").replace(/\s+/g," ").trim();
  const clientsOf = (a)=> Math.round(Number(a.clients)||0);
  const sep = "============================================================";
  const out = [];
  const sections = briefSections(model, offer);
  const offerName = (s)=> s.isFree ? "FREE CHALLENGE ADS  (copy contains the word \"free\")" : "DIRECT CTA ADS  (no \"free\" -- paid offer)";
  const adBlock = (a)=>{
    const roas = a.revenue>0 ? r1(a.roas)+"x" : "n/a";
    const c = clientsOf(a); const nm = a.adName ? `  -- ${a.adName}` : "";
    return `  - ${roas} ROAS | ${usd(a.spend)} spent -> ${usd(a.revenue)} collected | ${c} client${c===1?"":"s"}${nm}\n    "${clean(a.words)}"`;
  };

  if(style==="swipe"){
    out.push("SWIPE FILE -- winning ad copy that actually made money" + (rangeText?` (${rangeText})`:""));
    out.push("Every line below is a real ad with $100+ spent; the ROAS is its true return. Steal the angles, keep the two offers separate.");
  } else if(style==="lessons"){
    out.push("WHAT'S WORKING & WHAT'S NOT -- copy lessons from real spend" + (rangeText?` (${rangeText})`:""));
    out.push(`Based on ${model.reliableCount} ad${model.reliableCount===1?"":"s"} with enough spend to trust. Every number is real.`);
  } else {
    out.push("COPYWRITING BRIEF -- built only from real ad performance" + (rangeText?` (${rangeText})`:""));
    out.push(`Based on ${model.reliableCount} ad${model.reliableCount===1?"":"s"} with $100+ spent, enough to trust the ROAS. Every number below is real -- quote them, never invent new ones.`);
  }

  if(offer==="all" && model.free.has && model.paid.has && style!=="swipe"){
    out.push(""); out.push(sep); out.push("RULE #1 -- TWO OFFERS, NEVER MIX THEM"); out.push(sep);
    out.push("This account runs two different offers. Copy for one must NEVER promise the other:");
    out.push("  * FREE CHALLENGE ads = the offer is free. Never mention price, payment, or paid-only features. The only ask is to join the free challenge.");
    out.push("  * DIRECT CTA ads = the paid program. The full offer stack / price / direct buy-now ask lives HERE only.");
    out.push("Write for ONE of these at a time. Never borrow a paid promise into a free ad, or a free angle into a paid ad.");
  }

  sections.forEach(s=>{
    out.push(""); out.push(sep); out.push(offerName(s)); out.push(sep);
    if(style!=="swipe"){
      out.push(s.isFree ? "OFFER TYPE: a FREE challenge. Keep every promise free."
                        : "OFFER TYPE: the paid program (direct CTA). Offer stack and price allowed.");
    }
    if(s.winners.length){
      out.push("");
      out.push(`>>> WINNING COPY -- DO MORE OF THIS (${s.winners.length} ad${s.winners.length===1?"":"s"}, ${usd(s.winSpend)} spent -> ${usd(s.winRev)} collected, ${s.blend}x blended):`);
      s.winners.forEach(a=> out.push(adBlock(a)));
    }
    if(style!=="swipe" && s.losers.length){
      out.push("");
      out.push(`>>> LOSING COPY -- DO NOT REPEAT THIS (${s.losers.length} ad${s.losers.length===1?"":"s"}, ${usd(s.loseSpend)} spent -> only ${usd(s.loseRev)} back):`);
      s.losers.forEach(a=> out.push(adBlock(a)));
    }
    if(style!=="swipe"){
      out.push(""); out.push("DO:");
      briefDos(s).forEach(x=> out.push("  - "+x));
      out.push("DON'T:");
      briefDonts(s).forEach(x=> out.push("  - "+x));
    }
  });

  if(style==="prompt"){
    out.push(""); out.push(sep); out.push("HOW TO USE THIS"); out.push(sep);
    out.push("Pick ONE offer above. Write new ad copy that matches its winning patterns and avoids its losing ones. Keep free-challenge and direct-CTA messaging completely separate so a free ad never over-promises a paid feature.");
  }
  if(!sections.length){
    out.push(""); out.push("Not enough ads in this filter with $100+ spent yet. Widen the date range or switch the offer filter.");
  }
  return out.join("\n");
}

// ★ The showpiece. An expandable studio that renders the brief as a living,

function CopyBriefStudio({analyzed, range}){
  const model = useMemo(()=>computeBriefModel(analyzed), [analyzed]);

    left:(4 + (i*53)%92)+"%", top:(6 + (i*37)%86)+"%",

  if(!model.free.has && !model.paid.has) return null;

  const clean = (s)=> String(s||"").replace(/\s+/g," ").trim();
  const clientsOf = (a)=> Math.round(Number(a.clients)||0);
  const rangeText = range ? rangeLabel(range) : "";

  const offerChoices = [];
  if(model.free.has && model.paid.has) offerChoices.push(["all","Both offers"]);

  const sections = briefSections(model, effOffer);

  const winTotal = (model.free.winners.length)+(model.paid.winners.length);
  const loseTotal = (model.free.losers.length)+(model.paid.losers.length);

  const doCopy = ()=>{
    copyText(text).then(()=>{ setCopied(true); setBurst(b=>b+1); setTimeout(()=>setCopied(false), 2600); }).catch(()=>{});
  };

  const styleNote = style==="swipe" ? "Just the winning copy, verbatim, with its ROAS — a clean swipe file."
    : style==="lessons" ? "The do's, don'ts and the headline numbers — the lessons, less the raw copy."
    : "Full prompt: the rules, the winning + losing copy, and do's/don'ts to paste into any AI.";

  return (
    <div className={"cbs"+(open?" open":"")}>
      <div className="cbs-stars" aria-hidden="true">
        {stars.map((st,i)=><span key={i} className="cbs-star" style={{left:st.left, top:st.top, width:st.size, height:st.size, animationDelay:st.delay, animationDuration:st.dur}}></span>)}
      </div>

      <button type="button" className="cbs-trigger" onClick={()=>setOpen(o=>!o)}>
        <span className="cbs-orb"><span className="cbs-orb-core">★</span></span>
        <span className="cbs-trig-txt">
          <span className="t">Copywriting Brief Generator</span>
          <span className="s">{winTotal} winning &amp; {loseTotal} losing ads → a paste-ready brief, built from your real numbers</span>
        </span>
        <span className="cbs-chev">{open?"Collapse ▲":"Open it ▾"}</span>
      </button>

      {open && (
        <div className="cbs-body">
          <div className="cbs-controls">
            <div className="cbs-seg-group">
              <span className="cbs-seg-lbl">Offer</span>
              <div className="cbs-seg">
                {offerChoices.map(([k,l])=>(
                  <button key={k} type="button" className={"cbs-seg-b"+(effOffer===k?" on":"")} onClick={()=>setOffer(k)}>{l}</button>
                ))}
              </div>
            </div>
            <div className="cbs-seg-group">
              <span className="cbs-seg-lbl">Style</span>
              <div className="cbs-seg">
                {styleChoices.map(([k,l])=>(
                  <button key={k} type="button" className={"cbs-seg-b"+(style===k?" on":"")} onClick={()=>setStyle(k)}>{l}</button>
                ))}
              </div>
            </div>
          </div>
          <div className="cbs-stylenote">{styleNote}</div>

          <div className="cbs-preview">
            {effOffer==="all" && model.free.has && model.paid.has && style!=="swipe" && (
              <div className="cbs-rule"><span className="k">⚠ Never mix the two offers</span> Free-challenge copy must never promise a paid feature — and a paid ad must never sound free.</div>
            )}
            {sections.map((s,si)=>(
              <div className="cbs-offer" key={si}>
                <div className={"cbs-offer-h "+(s.isFree?"free":"paid")}>
                  <span className="badge">{s.isFree?"FREE CHALLENGE":"DIRECT CTA · PAID"}</span>
                  <span className="meta">{s.winners.length} winning · {s.losers.length} losing</span>
                </div>

                {s.winners.length>0 && (
                  <div className="cbs-grp">
                    <div className="cbs-grp-h win">▲ Winning copy — do more of this · <b>{s.blend}× blended</b> on {fmtUsd(s.winSpend)}</div>
                    {s.winners.map((a,i)=>(
                      <div className="cbs-quote win" key={i}>
                        <div className="cbs-q-roas win">{a.roas.toFixed(1)}×</div>
                        <div className="cbs-q-body">
                          <div className="cbs-q-words">“{clean(a.words)}”</div>
                          <div className="cbs-q-meta">{fmtUsd(a.spend)} spent → {fmtUsd(a.revenue)} collected · {fmtNum(clientsOf(a))} client{clientsOf(a)===1?"":"s"}{a.adName?` · ${a.adName}`:""}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {style!=="swipe" && s.losers.length>0 && (
                  <div className="cbs-grp">
                    <div className="cbs-grp-h lose">▼ Losing copy — don't repeat this · {fmtUsd(s.loseSpend)} spent → only {fmtUsd(s.loseRev)} back</div>
                    {s.losers.map((a,i)=>(
                      <div className="cbs-quote lose" key={i}>
                        <div className="cbs-q-roas lose">{a.roas.toFixed(1)}×</div>
                        <div className="cbs-q-body">
                          <div className="cbs-q-words">“{clean(a.words)}”</div>
                          <div className="cbs-q-meta">{fmtUsd(a.spend)} spent → {fmtUsd(a.revenue)} back · {fmtNum(clientsOf(a))} client{clientsOf(a)===1?"":"s"}{a.adName?` · ${a.adName}`:""}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {style!=="swipe" && (
                  <div className="cbs-dd">
                    <div className="cbs-dd-col do">
                      <div className="h">DO</div>
                      {briefDos(s).map((x,i)=><div className="cbs-dd-item" key={i}>{x}</div>)}
                    </div>
                    <div className="cbs-dd-col dont">
                      <div className="h">DON'T</div>

                    </div>
                  </div>
                )}
              </div>
            ))}
            {!sections.length && <div className="cbs-empty">No ads in this filter with $100+ spent yet. Widen the dates or switch the offer.</div>}
          </div>

          <div className="cbs-actions">
            <span className="cbs-count">{lineCount} lines · paste into ChatGPT, Claude, a doc — anywhere</span>
            <button type="button" className={"cbs-copy"+(copied?" done":"")} onClick={doCopy} disabled={!sections.length}>
              <span className="cbs-copy-sheen" aria-hidden="true"></span>
              <span className="cbs-copy-lbl">{copied ? "✓ Copied — go make money" : "⧉ Copy this brief"}</span>
              {burst>0 && <span className="cbs-burst" key={burst} aria-hidden="true"></span>}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ------- What your messaging is telling us
// Closes the loop between what an ad SAYS and what it MAKES. The proof comes
// FIRST: a table of the actual words read off each ad next to its real spend,
// ROAS, revenue and clients — built straight from the payload (which already
// carries the stored copy as onImageText), so it renders instantly and a CMO can
// audit every figure. The AI's plain-English read is layered ON TOP and is
// best-effort: if it isn't ready, the hard numbers still stand (no blank panel —
// that was the old bug, where a missing live image URL hid the whole section).
function MessagingInsights({dashboard, range}){
  const adRoas = useMemo(()=> Array.isArray(dashboard?.adRoas) ? dashboard.adRoas : [], [dashboard]);
  const scope = (dashboard && dashboard.query && dashboard.query.account) || "all";
  const copyStatus = (dashboard && dashboard.creativeCopyStatus) || null;

  // Every ad whose words we've actually read. This is the evidence base — it does
  // NOT depend on a live preview image (those expire), only on the stored copy.
  const analyzed = useMemo(()=> adRoas
    .map(a => ({
      adId: a.adId || a.id || null,
      adName: a.adName || a.label || "",
      clientKey: a.clientKey || "",
      imageUrl: a.previewImageUrl || a.previewThumbnailUrl || null,
      words: String(a.onImageText || "").trim(),
      spend: Number(a.adSpend||0),
      revenue: Number(a.collectedRevenue||0),
      roas: Number(a.collectedRoi||0),
      clients: Number(a.newClients||0),
      reliable: typeof a.roasReliable === "boolean" ? a.roasReliable : Number(a.adSpend||0) >= 100,
    }))
    .filter(a => a.adId && a.words)
    .sort((a,b)=>b.spend-a.spend), [adRoas]);

  // Ads we still haven't read but COULD (we hold a live image). Only these get
  // sent to the slow vision backfill; if none, we skip it and stay fast.
  const unreadWithImage = useMemo(()=> adRoas
    .map(a => ({adId:a.adId||a.id||null, imageUrl:a.previewImageUrl||a.previewThumbnailUrl||null, clientKey:a.clientKey||"", words:String(a.onImageText||"").trim(), spend:Number(a.adSpend||0)}))
    .filter(a => a.adId && a.imageUrl && !a.words)
    .sort((a,b)=>b.spend-a.spend), [adRoas]);

  // Focus the AI on ads with enough spend to trust; fall back to the top few by
  // spend so it always has something defensible to say.
  const focusAds = useMemo(()=>{
    const reliable = analyzed.filter(a => a.reliable);
    return (reliable.length ? reliable : analyzed.slice(0,8)).map(a => ({
      adId:a.adId, adName:a.adName, clientKey:a.clientKey,
      adSpend:a.spend, collectedRevenue:a.revenue, collectedRoi:a.roas,
      newClients:a.clients, roasReliable:a.reliable,
    }));
  }, [analyzed]);

  const [insight, setInsight] = useState(null);
  const [aiPhase, setAiPhase] = useState("idle"); // idle | working | ready | none
  const [progress, setProgress] = useState({read:0, total:0});
  const [exploreOpen, setExploreOpen] = useState(false);
  const [sortBy, setSortBy] = useState("roas"); // roas | spend | clients

  useEffect(()=>{
    let cancelled = false;
    if(!dashboard || dashboard.mock){ return; }

    const fetchInsight = async () => {
      if(focusAds.length === 0) return false;
      try{
        const res = await fetch("/api/ads/messaging-insights", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({scope, ads: focusAds}),
        });
        const json = await res.json().catch(()=>({}));
        if(cancelled) return false;
        if(json && json.status === "ok" && json.insight){ setInsight(json.insight); setAiPhase("ready"); return true; }
        return false;
      }catch(_e){ return false; }
    };

    const run = async () => {
      setAiPhase("working");
      // 1) Show any cached read instantly.
      const had = await fetchInsight();
      if(cancelled) return;

      // 2) Read still-unread ads (only those with a live image), in small batches.
      if(unreadWithImage.length){
        const batch = unreadWithImage.map(a => ({adId:a.adId, imageUrl:a.imageUrl, clientKey:a.clientKey}));
        let guard = 0;
        while(!cancelled && guard < 40){
          guard++;
          let data = null;
          try{
            const res = await fetch("/api/ads/creative-copy/backfill", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ads: batch}),
            });
            data = await res.json().catch(()=>null);
          }catch(_e){ break; }
          if(cancelled || !data) break;
          setProgress({read: Math.max(0, unreadWithImage.length - (data.remaining||0)), total: unreadWithImage.length});
          if(!data.remaining || data.remaining <= 0) break;
        }
        if(cancelled) return;
        // 3) Refresh the read now that more copy exists.
        const ok = await fetchInsight();
        if(!cancelled && !ok && !had) setAiPhase("none");
      }else if(!had){
        setAiPhase("none");
      }
    };

    run();
    return ()=>{ cancelled = true; };
  }, [focusAds, unreadWithImage, scope, dashboard]);

  // Nothing to show only if we've read no copy AND there's nothing left to read.
  const pending = copyStatus ? Number(copyStatus.pending||0) : unreadWithImage.length;
  if(!dashboard || dashboard.mock) return null;
  if(analyzed.length === 0 && pending === 0) return null;

  const reliableCount = analyzed.filter(a=>a.reliable).length;
  const cap = (s)=> s ? s.charAt(0)+s.slice(1).toLowerCase() : s;
  const quote = (s, n)=> { const t=String(s||"").trim(); return t.length>n ? t.slice(0,n).trim()+"…" : t; };

  // Head-to-head, computed from REAL numbers — no AI needed, never wrong.
  // Best vs worst by ROAS, compared across unique MESSAGES (relaunches/near-twins
  // blended into one) so we never show the same copy as both winning and losing —
  // when the same words win and lose, the words weren't the cause.
  const messages = clusterReliableCopy(analyzed);
  const ranked = messages.filter(a=> a.revenue>0).sort((a,b)=>b.roas-a.roas);
  const best = ranked.length ? ranked[0] : null;
  const worst = ranked.length>1 ? ranked[ranked.length-1] : null;
  const haveVs = best && worst && best.adId!==worst.adId && !isSameCopy(best.words, worst.words);

  // One scale for every ROAS bar + the breakeven (1×) marker, so they line up.
  const maxRoas = Math.max(4, ...analyzed.filter(a=>a.reliable&&a.revenue>0).map(a=>a.roas));
  const scale = (v)=> Math.max(0, Math.min(100, (v/maxRoas)*100));
  const bePos = scale(1);
  const roasCls = (a)=> !(a.reliable && a.revenue>0) ? "na" : a.roas>=2 ? "good" : a.roas<1 ? "bad" : "mid";
  const roasTxt = (a)=> (a.reliable && a.revenue>0) ? a.roas.toFixed(1)+"×" : "—";

  // The depth layer: reliable ads sorted the way Alex asks, then the "too early" ones quietly after.
  const sortKey = sortBy==="spend" ? (a=>a.spend) : sortBy==="clients" ? (a=>a.clients) : (a=> a.revenue>0?a.roas:-1);
  const reliableAds = [...analyzed.filter(a=>a.reliable)].sort((a,b)=>sortKey(b)-sortKey(a));
  const earlyAds = [...analyzed.filter(a=>!a.reliable)].sort((a,b)=>b.spend-a.spend);

  const conf = insight && insight.confidence ? String(insight.confidence) : null;
  const confColor = conf==="high" ? "var(--green)" : conf==="medium" ? "var(--gold)" : "var(--text-4)";
  const takeaways = insight && Array.isArray(insight.takeaways) ? insight.takeaways.filter(Boolean) : [];

  // The headline: AI's if we have it; otherwise a plain, defensible read of the gap.
  const headline = (insight && insight.headline) ? insight.headline
    : haveVs ? `Your best-performing words returned ${best.roas.toFixed(1)}× — your worst, ${worst.roas.toFixed(1)}×. Same budget, different message.`
    : best ? `Your top ad is returning ${best.roas.toFixed(1)}× on ${fmtUsd(best.spend)}. Keep feeding what's working.`
    : "Reading the words on your ads and tying them to the money.";

  const card = (a, dim)=> (
    <div className={"mi-c"+(dim?" dim":"")} key={a.adId}>
      <div className="mi-c-words">
        {a.adName ? <span className="nm">{cap(a.adName)}{a.clientKey?" · "+creatorName(a.clientKey):""}</span> : null}
        “{quote(a.words, 220)}”
      </div>
      <div className="mi-c-right">
        {dim ? (
          <>
            <span className="mi-c-early">too early</span>
            <div className="mi-c-meta">
              <div className="s"><span className="v">{fmtUsd(a.spend)}</span><span className="l">spend</span></div>
              <div className="s"><span className="v">{fmtNum(a.clients)}</span><span className="l">clients</span></div>
            </div>
          </>
        ) : (
          <>
            <div className="mi-roasrow">
              <span className={"rv "+roasCls(a)}>{roasTxt(a)}</span>
              <span className="rl">ROAS</span>
            </div>
            <div className="mi-bar">
              <div className={"fill "+(a.roas>=1?"good":"bad")} style={{width:scale(a.revenue>0?a.roas:0)+"%"}}></div>
              <div className="be" style={{left:bePos+"%"}}></div>
            </div>
            <div className="mi-c-meta">
              <div className="s"><span className="v">{fmtUsd(a.spend)}</span><span className="l">spend</span></div>
              <div className="s"><span className="v">{a.revenue>0?fmtUsd(a.revenue):"—"}</span><span className="l">revenue</span></div>
              <div className="s"><span className="v">{fmtNum(a.clients)}</span><span className="l">clients</span></div>
            </div>
          </>
        )}
      </div>
    </div>
  );

  return (
    <div className="ddr-block msg-insights">
      <div className="ddr-blabel">
        <span className="l">What your words are earning</span>
        <span className="m">the actual copy on your ads, tied to the money{range?" · "+rangeLabel(range):""}</span>
      </div>

      <div className="mi">
        {/* Verdict hero — the one-line read, certain and calm */}
        <div className="mi-verdict">
          <div className="ey"><span className="pulse"></span>The read</div>
          <div className="hl">{headline}</div>
          {takeaways.length>0 && (
            <div className="mi-take">
              {takeaways.slice(0,4).map((t,i)=>(<span className="tk" key={i}>{t}</span>))}
            </div>
          )}

// ---- Trend explorer -------------------------------------------------------
// A flat, dimension-preserving view of the daily ad feed. metricRowFromApi strips
// campaign/ad/ad-set so it can't be grouped; this keeps every dimension, so one
// metric can be split by creator, campaign, ad set, ad, or ad word — all from the
// single level:"ad" fetch the page already makes.
function explorerRows(dashboard){
  const src = Array.isArray(dashboard && dashboard.dailyRows) ? dashboard.dailyRows : [];
  const out = [];
  for(const r of src){
    const raw = String(r.dateLabel || r.date || "");
    const iso = /^\d{4}-\d{2}-\d{2}$/.test(raw) ? raw
      : (/^\d{4}-\d{2}-\d{2}$/.test(String(r.date||"")) ? r.date : "");
    if(!iso) continue; // the explorer needs a real calendar day to plot a point
    const lbl = dateLabelFromIso(iso);
    out.push({
      iso, label: lbl,
      clientKey: r.clientKey || "unknown",
      campaignId: r.campaignId || null,
      campaignName: r.campaignName || null,
      adsetId: r.adsetId || null,
      adsetName: r.adsetName || null,
      adId: r.adId || null,
      adName: r.adName || null,
      keyword: String(r.keyword || "").toUpperCase(),
      ...metricRowFromApi(r, lbl),
    });
  }
  return out;
}

// What each line represents. "Everything combined" = one aggregate line.
const EXPLORER_DIMS = [
  {id:"none",     label:"Everything combined", group:()=>({key:"all", name:"All ads combined"})},
  {id:"creator",  label:"Creator",             group:r=>({key:r.clientKey||"unknown", name:creatorName(r.clientKey)})},
  {id:"campaign", label:"Campaign",            group:r=>({key:r.campaignId||r.campaignName||"—", name:r.campaignName||"Unnamed campaign"})},
  {id:"adset",    label:"Ad set",              group:r=>({key:r.adsetId||r.adsetName||"—", name:r.adsetName||r.adsetId||"Unnamed ad set"})},
  {id:"ad",       label:"Ad",                  group:r=>({key:r.adId||r.adName||"—", name:r.adName||r.adId||"Unnamed ad"})},
  {id:"keyword",  label:"Ad word / audience",  group:r=>({key:r.keyword||"—", name:r.keyword||"—"})},
];

// What we plot on the Y axis. Collected ROAS leads (it's the number Alex asked for);
// the rest reuse the same value/format/axis maths as the standalone metric cards, so
// ratios (CTR, CPM, ROAS) are computed from summed components per day, never averaged.
const EXPLORER_METRICS = [
  {id:"collected_roas", label:"Collected ROAS", color:"var(--green)",
   value:r=>safeRatio(r.collected, r.spend), format:v=>v.toFixed(2)+"×", axis:v=>v.toFixed(1)+"×"},
  ...GENERIC_METRIC_DEFS,
];

const TX_PALETTE = ["var(--gold)","var(--blue)","var(--green)","var(--red)","#b48ead","#d8a657","#83c0c1","#e07a5f","#9a8cce","#6fae90"];

// Group the metrics so the picker reads like plain questions, not a flat wall of
// 16 options. Less to scan, sorted by how often Alex actually reaches for them.
const EXPLORER_METRIC_GROUPS = [
  {label:"Money", ids:["collected_roas","collected_revenue","spend"]},
  {label:"Getting clients", ids:["new_clients","calls_booked","calls_taken","messages","call_close_rate","message_to_call_rate"]},
  {label:"Cost & efficiency", ids:["cpc","cpm","cost_per_call_booked","cost_per_call_taken","ctr","link_clicks","impressions"]},
];
function buildMetricPickerGroups(){
  const byId = Object.fromEntries(EXPLORER_METRICS.map(m=>[m.id,m]));
  const used = new Set();
  const groups = EXPLORER_METRIC_GROUPS.map(g=>({
    label:g.label,
    options:g.ids.filter(id=>byId[id]).map(id=>{ used.add(id); return {value:id, label:byId[id].label}; }),
  })).filter(g=>g.options.length);
  const leftover = EXPLORER_METRICS.filter(m=>!used.has(m.id));
  if(leftover.length) groups.push({label:"More", options:leftover.map(m=>({value:m.id, label:m.label}))});
  return groups;
}

// In-app dropdown that replaces the native OS <select> — same keyboard/click feel,
// but it inherits the app's theme and never pops a macOS chrome menu. `groups` is
// [{label, options:[{value,label,meta}]}]; a group with no label renders flat.
function Picker({value, groups, onChange, ariaLabel}){
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const flat = useMemo(()=> groups.flatMap(g=>g.options), [groups]);
  const current = flat.find(o=>o.value===value) || flat[0];
  useEffect(()=>{
    if(!open) return;
    const onDoc = e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = e=>{ if(e.key==="Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    window.addEventListener("keydown", onKey);
    return ()=>{ document.removeEventListener("mousedown", onDoc); window.removeEventListener("keydown", onKey); };
  }, [open]);
  return (
    <div className={"pk"+(open?" open":"")} ref={ref}>
      <button type="button" className="pk-btn" aria-haspopup="listbox" aria-expanded={open} aria-label={ariaLabel} onClick={()=>setOpen(o=>!o)}>
        <span className="pk-val">{current ? current.label : "—"}</span>
        <svg className="pk-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      {open && (
        <div className="pk-menu" role="listbox">
          {groups.map((g,gi)=>(
            <React.Fragment key={gi}>
              {g.label ? <div className="pk-grp">{g.label}</div> : null}
              {g.options.map(o=>{
                const on = o.value===value;
                return (
                  <button key={o.value} type="button" role="option" aria-selected={on} className={"pk-opt"+(on?" on":"")}
                    onClick={()=>{ onChange(o.value); setOpen(false); }}>
                    <span className="pk-check">{on?"✓":""}</span>
                    <span className="pk-opt-l">{o.label}</span>
                    {o.meta ? <span className="pk-opt-m">{o.meta}</span> : null}
                  </button>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      )}
    </div>
  );
}

function TrendExplorer({dashboard, range}){
  const allRows = useMemo(()=>explorerRows(dashboard), [dashboard]);
  const [metricId, setMetricId] = useState("collected_roas");
  const [dimId, setDimId] = useState("keyword");
  const [sel, setSel] = useState({}); // { [dimId]: { [groupKey]: visible? } }

  const metric = EXPLORER_METRICS.find(m=>m.id===metricId) || EXPLORER_METRICS[0];
  const dim = EXPLORER_DIMS.find(d=>d.id===dimId) || EXPLORER_DIMS[0];
  const metricGroups = useMemo(()=> buildMetricPickerGroups(), []);
  const dimGroups = useMemo(()=> [{label:null, options:EXPLORER_DIMS.map(d=>({value:d.id, label:d.label}))}], []);

  // X axis: every calendar day with data, in chronological order.
  const labels = useMemo(()=>{
    const seen = new Map();
    allRows.forEach(r=> seen.set(r.iso, r.label));
    return Array.from(seen.keys()).sort().map(iso=>({iso, label:seen.get(iso)}));
  }, [allRows]);

  // Group by the chosen dimension; aggregate each group's days and a range total.
  const groups = useMemo(()=>{
    const m = new Map();
    allRows.forEach(r=>{
      const g = dim.group(r);
      if(!m.has(g.key)) m.set(g.key, {key:g.key, name:g.name, byIso:new Map()});
      const grp = m.get(g.key);
      if(!grp.byIso.has(r.iso)) grp.byIso.set(r.iso, emptyMetric(r.label));
      addMetric(grp.byIso.get(r.iso), r);
    });
    const arr = Array.from(m.values());
    arr.forEach(g=>{ g.total = aggregateTotal(Array.from(g.byIso.values())); g.spend = g.total.spend; });
    return arr.sort((a,b)=>b.spend-a.spend);
  }, [allRows, dimId]);

  const defaultCount = dimId==="none" ? 1 : Math.min(6, groups.length);
  const visibleKeys = useMemo(()=>{
    const cur = sel[dimId];
    if(cur) return new Set(Object.keys(cur).filter(k=>cur[k]));
    return new Set(groups.slice(0, defaultCount).map(g=>g.key));
  }, [sel, dimId, groups, defaultCount]);

  const baseSel = ()=> Object.fromEntries(groups.slice(0, defaultCount).map(g=>[g.key,true]));
  const toggle = (key)=> setSel(prev=>{
    const base = prev[dimId] || baseSel();
    return {...prev, [dimId]: {...base, [key]: !base[key]}};
  });
  const setAll = (on)=> setSel(prev=>({...prev, [dimId]: Object.fromEntries(groups.map(g=>[g.key,on]))}));

  const visGroups = groups.filter(g=>visibleKeys.has(g.key));
  const series = visGroups.map(g=>{
    const ci = groups.indexOf(g);
    return {
      name: g.name,
      color: TX_PALETTE[ci % TX_PALETTE.length],
      values: labels.map(l=> metric.value(g.byIso.get(l.iso) || emptyMetric(l.label))),
      fmt: metric.format,
      isPrimary: visGroups.length===1,
    };
  });
  const chipGroups = groups.slice(0, 14);

  return (
    <div className="ddr-block">
      <div className="ddr-blabel"><span className="l">Trend explorer</span><span className="m">pick a metric, split it any way · {rangeLabel(range)}</span></div>
      <div className="tx">
        <div className="tx-controls">
          <div className="tx-field">
            <span className="lab">Show me</span>
            <Picker ariaLabel="Metric to plot" value={metricId} groups={metricGroups} onChange={setMetricId}/>
          </div>
          <div className="tx-field">
            <span className="lab">Broken out by</span>
            <Picker ariaLabel="How to split it" value={dimId} groups={dimGroups} onChange={setDimId}/>
          </div>
        </div>

        {groups.length===0 || labels.length===0 ? (
          <div className="tx-empty">No day-by-day ad data in this range to chart yet. Widen the dates above.</div>
        ) : (
          <>
            <LineChart series={series.length?series:[{name:metric.label,values:labels.map(()=>0),color:metric.color}]}
              labels={labels.map(l=>l.label)} fmt={metric.axis} height={236} width={700}/>
            {dimId!=="none" && (
              <>
                <div className="tx-legend">
                  {chipGroups.map(g=>{
                    const on = visibleKeys.has(g.key);
                    const ci = groups.indexOf(g);
                    return (
                      <button key={g.key} className={"tx-chip "+(on?"on":"off")} onClick={()=>toggle(g.key)} style={on?{color:TX_PALETTE[ci%TX_PALETTE.length]}:null}>
                        <span className="tx-dot" style={{background:TX_PALETTE[ci%TX_PALETTE.length]}}></span>
                        <span>{g.name}</span>
                        <span className="tx-sv">{metric.format(metric.value(g.total))}</span>
                      </button>
                    );
                  })}
                  <span className="tx-actions">
                    <button className="tx-mini" onClick={()=>setAll(true)}>Show all</button>
                    <button className="tx-mini" onClick={()=>setAll(false)}>Clear</button>
                  </span>
                </div>
                <div className="tx-foot">
                  Plotting <b>{series.length}</b> of {groups.length} {dim.label.toLowerCase()}{groups.length===1?"":"s"} · click a chip to add or drop a line · ranked by spend.
                  {chipGroups.length<groups.length ? " Only the top "+chipGroups.length+" by spend are listed." : ""}
                </div>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// A per-day time series for any slice of the ad feed (filter by adId, keyword,
// creator, or everything). Reuses explorerRows so every metric is preserved and
// ratios are computed from summed components per day, never averaged.
function dailySeriesFor(dashboard, predicate){
  const src = explorerRows(dashboard).filter(predicate || (()=>true));
  const byIso = new Map();
  src.forEach(r=>{
    if(!byIso.has(r.iso)) byIso.set(r.iso, emptyMetric(r.label));
    addMetric(byIso.get(r.iso), r);
  });
  return Array.from(byIso.keys()).sort().map(iso=>({iso, label:dateLabelFromIso(iso), m:byIso.get(iso)}));
}

// Tiny inline trend line — proof at a glance, no axes, no chrome.
function Sparkline({values, color="var(--gold)", width=110, height=30}){
  const vals = (values||[]).filter(v=>v!=null && !isNaN(v));
  if(vals.length<2) return <svg className="spark" width={width} height={height}/>;
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  const stepX = width/(vals.length-1);
  const pts = vals.map((v,i)=>({x:i*stepX, y:height-((v-min)/span)*(height-5)-2.5}));
  const line = pts.map((p,i)=>(i?"L":"M")+p.x.toFixed(1)+" "+p.y.toFixed(1)).join(" ");
  const area = line+` L ${width} ${height} L 0 ${height} Z`;
  const gid = "sg"+Math.abs((width*31+height*7+vals.length*13+Math.round(vals[0]||0))).toString(36);
  return (
    <svg className="spark" width={width} height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor={color} stopOpacity="0.20"/><stop offset="1" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// Direction of travel: average of the last third vs the first third. Honest and
// cheap — no second fetch, just reads the shape of the series we already have.
function trendDir(values){
  const v = (values||[]).filter(x=>x!=null && !isNaN(x));
  if(v.length<4) return null;
  const k = Math.max(1, Math.floor(v.length/3));
  const avg = a=> a.reduce((s,x)=>s+x,0)/a.length;
  const first = avg(v.slice(0,k)), last = avg(v.slice(-k));
  if(first===0 && last===0) return null;
  const pct = first===0 ? 1 : (last-first)/Math.abs(first);
  if(Math.abs(pct) < 0.05) return {dir:"flat", pct:0};
  return {dir: pct>0?"up":"down", pct};
}

// Color the trend chip by whether the move is GOOD, not just up/down.
function trendChip(td, better){
  if(!td) return null;
  if(td.dir==="flat") return {arrow:"→", cls:"flat", txt:"holding steady"};
  const goodDir = better==="up" ? "up" : better==="down" ? "down" : null;
  const good = goodDir ? td.dir===goodDir : null;
  const arrow = td.dir==="up" ? "▲" : "▼";
  const pct = Math.round(Math.abs(td.pct)*100);
  const cls = good===null ? "neutral" : good ? "good" : "bad";
  return {arrow, cls, txt:(td.dir==="up"?"up ":"down ")+pct+"%"};
}

// Pearson correlation over [x,y] pairs. Returns null if it can't be computed.
function pearson(pairs){
  const n = pairs.length;
  if(n<3) return null;
  let sx=0,sy=0,sxx=0,syy=0,sxy=0;
  pairs.forEach(([x,y])=>{ sx+=x; sy+=y; sxx+=x*x; syy+=y*y; sxy+=x*y; });
  const dx = Math.sqrt(n*sxx - sx*sx), dy = Math.sqrt(n*syy - sy*sy);
  if(dx===0 || dy===0) return null;
  return (n*sxy - sx*sy)/(dx*dy);
}
function corrWord(r){
  const a = Math.abs(r);
  return a>=0.6 ? "strong" : a>=0.35 ? "a clear" : a>=0.18 ? "a mild" : "little to no";
}
function median(arr){
  if(!arr || !arr.length) return null;
  const s = [...arr].sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function quantile(arr,q){
  if(!arr || !arr.length) return null;
  const s = [...arr].sort((a,b)=>a-b);
  const pos = (s.length-1)*q;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  return lo===hi ? s[lo] : s[lo] + (s[hi]-s[lo])*(pos-lo);
}

// Turn one raw adRoas row into the flat numeric record the explorer correlates.
function corrAdRecord(a){
  const copy = String(a.onImageText||"").trim();
  const wc = copy ? (copy.match(/\S+/g)||[]).length : null;
  const spend = Number(a.adSpend||0);
  const leads = Number(a.messages||0);
  const booked = Number(a.bookedCalls||0);
  const fin = (v)=> (v!=null && Number.isFinite(Number(v))) ? Number(v) : null;
  return {
    adId: a.adId || a.id || null,
    adName: a.adName || a.label || "",
    copy, wordCount: wc, charCount: copy ? copy.length : null,
    spend, revenue: Number(a.collectedRevenue||0),
    roas: Number(a.collectedRoi||0),
    gpRoas: Number(a.grossProfitRoi||0),
    clients: Number(a.newClients||0),
    leads,
    cpl: fin(a.costPerMessage) ?? (leads>0 ? spend/leads : null),
    booked,
    cpcall: fin(a.costPerBookedCall) ?? (booked>0 ? spend/booked : null),
    callRate: Number(a.messagesConversionRate||0),
    closeRate: Number(a.callClosingRate||0),
    ctr: Number(a.ctr||0),
    cpc: Number(a.cpc||0),
    cpm: Number(a.cpm||0),
    // Targeting (filled in by the Meta sync; null until then so it's never faked)
    tAgeMin: fin(a.targetAgeMin),
    tAgeWidth: fin(a.targetAgeWidth),
    tInterests: fin(a.targetInterestCount),
    tPlacements: fin(a.targetPlacementCount),
    tGeo: fin(a.targetGeoCount),
    audienceType: a.audienceType || null,
    reliable: typeof a.roasReliable === "boolean" ? a.roasReliable : spend>=100,
  };
}

// "What actually drives the money" — an honest correlation explorer.
// Pick the OUTCOME you care about (ROAS, booked calls, clients…), then every
// lever we have — including your ad copy's length — is ranked by how tightly it
// moves with that outcome (Pearson r, −1…+1). Pure arithmetic, no AI. We only
// trust ads with enough spend ($100+), show the sample size on every line, and
// never claim cause — only that two numbers move together.
function CorrelationPanel({rows, dashboard}){
  const [yId, setYId] = useState("roas");   // which outcome sits on the Y axis
  const [selId, setSelId] = useState(null); // which lever is plotted on X
  const [hover, setHover] = useState(null);

  const adRoas = (dashboard && Array.isArray(dashboard.adRoas)) ? dashboard.adRoas : [];
  const pool = adRoas.map(corrAdRecord).filter(a=> a.adId && a.reliable && a.spend>0);
  if(pool.length<4) return null;

  const cap=(s)=>s?s.charAt(0)+s.slice(1).toLowerCase():s;
  const yVar = CORR_VARS.find(v=>v.id===yId) || CORR_VARS[0];
  const copyReadCount = pool.filter(a=>a.wordCount!=null).length;

  // Build pairs for one (X,Y): only ads where BOTH numbers genuinely exist.
  const pairsFor = (xVar)=> pool.reduce((acc,a)=>{
    const x = xVar.get(a), y = yVar.get(a);
    if(x!=null && Number.isFinite(x) && y!=null && Number.isFinite(y)) acc.push({x,y,a});
    return acc;
  }, []);

  // Rank every other variable against the chosen outcome. r=null when there
  // aren't enough ads (need 4+) or the column doesn't vary — shown, but parked
  // at the bottom and clearly labelled, because "no signal" is itself an answer.
  const findings = CORR_VARS.filter(v=>v.id!==yVar.id).map(v=>{
    const pts = pairsFor(v);
    const r = pts.length>=4 ? pearson(pts.map(p=>[p.x,p.y])) : null;
    return {v, r, n:pts.length};
  }).sort((a,b)=>{
    if((a.r==null)!==(b.r==null)) return a.r==null?1:-1;
    if(a.r==null) return b.n-a.n;
    return Math.abs(b.r)-Math.abs(a.r);
  });

  const usable = findings.filter(f=>f.r!=null);
  if(!usable.length) return null;
  const lead = findings.find(f=>f.v.id===selId && f.r!=null) || usable[0];
  const xVar = lead.v;

  // Does pushing this lever UP move the outcome the desirable way?
  const improves = (r)=> r==null?null : (yVar.dir==="low" ? r<0 : r>0);
  const barColor = (f)=>{
    if(f.r==null || corrWord(f.r)==="little to no") return "var(--text-4)";
    return improves(f.r) ? "var(--green)" : "var(--red)";
  };
  const plain = (f)=>{
    if(f.r==null) return <span><b>{f.v.label}</b> — not enough ads with this number yet to measure.</span>;
    const s = corrWord(f.r);
    if(s==="little to no") return <span><b>{f.v.label}</b> shows little to no link to {yVar.short}.</span>;
    const up = f.r>0;
    return <span>More <b>{f.v.short}</b> goes with {up?"more":"less"} {yVar.short} — {s} link.</span>;
  };

  // ---- scatter for the selected lever vs the chosen outcome ----
  const pts = pairsFor(xVar).map(p=>({x:p.x, y:p.y, nm:p.a.adName, spend:p.a.spend}));
  const W=660, H=270, padL=58, padB=52, padT=16, padR=16;
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const xMin=Math.min(...xs), xMax=Math.max(...xs), yMin=0, yMax=Math.max(...ys, yVar.roasLike?2:0.0001);
  const sx=v=> padL + ((v-xMin)/((xMax-xMin)||1))*(W-padL-padR);
  const sy=v=> (H-padB) - ((v-yMin)/((yMax-yMin)||1))*(H-padB-padT);
  const rOf = (spend)=> Math.max(4, Math.min(13, Math.sqrt(spend)/5));
  const beY = sy(1); // break-even, only drawn for ROAS-like outcomes

  // Least-squares trend line.
  const n=pts.length;
  let Sx=0,Sy=0,Sxx=0,Sxy=0;
  pts.forEach(p=>{ Sx+=p.x; Sy+=p.y; Sxx+=p.x*p.x; Sxy+=p.x*p.y; });
  const denom = n*Sxx - Sx*Sx;
  const slope = denom!==0 ? (n*Sxy - Sx*Sy)/denom : 0;
  const intercept = (Sy - slope*Sx)/(n||1);
  const clampY=(v)=> Math.max(yMin, Math.min(yMax, v));
  const tA = clampY(intercept + slope*xMin), tB = clampY(intercept + slope*xMax);

  const fr=[0,1/3,2/3,1];
  const xTicks = fr.map(t=> xMin + t*((xMax-xMin)||1));
  const yTicks = fr.map(t=> yMin + t*((yMax-yMin)||1));

  const strength = corrWord(lead.r);
  const dotColor = (y)=> yVar.roasLike ? (y>=1?"var(--green)":"var(--red)") : "var(--gold)";
  const leftPct=(v)=> (sx(v)/W)*100, topPct=(v)=> (sy(v)/H)*100;
  const hp = hover!=null && pts[hover] ? pts[hover] : null;

  const readout = strength==="little to no"
    ? <span><b>{xVar.label}</b> barely moves {yVar.short} — across these ads, choosing by this number won't reliably change the result.</span>
    : <span>Reading left → right: as <b>{xVar.short}</b> rises, {yVar.short} tends to {slope>=0?"rise":"fall"} ({strength} link, {lead.n} ads). {yVar.roasLike?"Green dots cleared break-even; red didn't.":"Bigger dots = more spend."}</span>;

  return (
    <div className="ddr-block">
      <div className="ddr-blabel">
        <span className="l">What actually drives the money</span>
        <span className="m">pick an outcome, then see how every lever — including your copy and who you targeted — links to it. r = how tightly they move together (−1 to 1)</span>
      </div>

      <div className="corr-ybar">
        <span className="lab">Outcome:</span>
        {CORR_VARS.filter(v=>v.outcome).map(v=>(
          <button type="button" key={v.id} className={"corr-ychip"+(v.id===yVar.id?" on":"")}
            onClick={()=>{ setYId(v.id); setSelId(null); setHover(null); }}>{v.label}</button>
        ))}
      </div>

      <div className="corr">
        <div className="corr-list">
          {findings.map(f=>{
            const on = f.v.id===lead.v.id;
            const weak = f.r!=null && corrWord(f.r)==="little to no";
            return (
              <button type="button" className={"corr-row"+(on?" on":"")+(f.r==null?" thin":weak?" weak":"")} key={f.v.id}

                  <span><i>{xVar.short}</i><b>{xVar.fmt(hp.x)}</b></span>

            Correlation shows what moves <i>together</i> — not proof one causes the other. Same words but a different result? Something off the page (who saw it, when it ran) drove that, not the copy.

        </div>
      </div>

  );
}

// ---- The sweet spot: what your best ads share that the rest don't ----
// Splits the reliable ads into the top third by ROAS (winners) and bottom third
// (laggards), then lays EVERY lever on one 0→1 scale so you can SEE where the
// greens cluster apart from the reds. A lever only earns a place in the "recipe"
// when it BOTH moves with ROAS (|r|≥0.35) AND the two groups' medians sit clearly
// apart — otherwise it's parked as "overlap". If nothing separates them it says
// so plainly rather than inventing a pattern. Pure arithmetic, no AI, no causation.
const SWEET_LEVERS = ["booked","leads","callRate","cpl","closeRate","cpcall","spend","ctr","cpc","cpm","words","chars","tAgeMin","tAgeWidth","tInterests","tPlacements","tGeo"];

function SweetSpotCard({dashboard}){
  const adRoas = (dashboard && Array.isArray(dashboard.adRoas)) ? dashboard.adRoas : [];
  const pool = adRoas.map(corrAdRecord).filter(a=> a.adId && a.reliable && a.spend>0 && Number.isFinite(a.roas));
  if(pool.length<6) return null;

  const cap=(s)=>s?s.charAt(0)+s.slice(1).toLowerCase():s;

  const ranked = [...pool].sort((a,b)=> b.roas - a.roas);
  const k = Math.max(2, Math.floor(ranked.length/3));
  const winners = ranked.slice(0,k);
  const laggards = ranked.slice(ranked.length-k);
  const winIds = new Set(winners.map(a=>a.adId));
  const lagIds = new Set(laggards.map(a=>a.adId));
  const winRoasMed = median(winners.map(a=>a.roas));
  const lagRoasMed = median(laggards.map(a=>a.roas));

  const vars = SWEET_LEVERS.map(id=>CORR_VARS.find(v=>v.id===id)).filter(Boolean);

  const rows = vars.map(v=>{
    const all = pool.map(a=>({val:v.get(a), ad:a})).filter(p=>p.val!=null && Number.isFinite(p.val));
    if(all.length<4) return null;
    const vals = all.map(p=>p.val);
    const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
    const winVals = all.filter(p=>winIds.has(p.ad.adId)).map(p=>p.val);
    const lagVals = all.filter(p=>lagIds.has(p.ad.adId)).map(p=>p.val);
    const winMed = median(winVals), lagMed = median(lagVals);
    const bandLo = quantile(winVals,0.25), bandHi = quantile(winVals,0.75);
    const pairs = pool.reduce((acc,a)=>{ const x=v.get(a); if(x!=null&&Number.isFinite(x)) acc.push([x,a.roas]); return acc; }, []);
    const r = pairs.length>=4 ? pearson(pairs) : null;
    const gapNorm = (winMed!=null&&lagMed!=null) ? Math.abs(winMed-lagMed)/range : 0;
    const signal = r!=null && Math.abs(r)>=0.35 && winVals.length>=2 && lagVals.length>=2 && gapNorm>=0.15;
    return {v, all, min, max, range, winMed, lagMed, bandLo, bandHi, r, gapNorm, signal, n:all.length};
  }).filter(Boolean);

  rows.sort((a,b)=>{
    if(a.signal!==b.signal) return a.signal?-1:1;
    return (b.r==null?0:Math.abs(b.r)) - (a.r==null?0:Math.abs(a.r));
  });
  const signals = rows.filter(r=>r.signal);

  const recipeLine = (row)=>{
    const v=row.v, wf=v.fmt(row.winMed), lf=v.fmt(row.lagMed);
    if(v.copy)          return <span>Match your winners' <b>{v.short}</b> — around <b>{wf}</b> (your weakest ads ran {lf}).</span>;
    if(v.dir==="high")  return <span>Push <b>{v.short}</b> up — winners sat near <b>{wf}</b>, laggards down at {lf}.</span>;
    if(v.dir==="low")   return <span>Keep <b>{v.short}</b> low — winners ran <b>{wf}</b> vs {lf} on the laggards.</span>;
    return <span>Winners landed around <b>{wf}</b> on <b>{v.short}</b> (laggards {lf}).</span>;
  };

  const pct=(val,row)=> ((val-row.min)/row.range)*100;
  const grp=(p)=> winIds.has(p.ad.adId)?2 : lagIds.has(p.ad.adId)?1 : 0;

  return (
    <div className="ddr-block">
      <div className="ddr-blabel">
        <span className="l">The sweet spot — what your winners share</span>
        <span className="m">your top {k} ads by ROAS vs your bottom {k}, every lever on one scale. where green clusters apart from red = your recipe</span>
      </div>

      <div className="sweet-legend">
        <span><i className="sweet-dotleg" style={{background:"var(--green)"}}></i>Top {k} ads{winRoasMed!=null?" · "+winRoasMed.toFixed(1)+"× median":""}</span>
        <span><i className="sweet-dotleg" style={{background:"var(--red)"}}></i>Bottom {k} ads{lagRoasMed!=null?" · "+lagRoasMed.toFixed(1)+"× median":""}</span>
        <span><i className="sweet-dotleg" style={{background:"var(--text-4)",opacity:.45}}></i>The middle</span>
        <span><i className="sweet-dotleg" style={{background:"color-mix(in srgb,var(--green) 35%,transparent)"}}></i>Winners' sweet-spot band</span>
      </div>

      <div className="sweet-rows">
        {rows.map(row=>{
          const v=row.v;
          const bLo = row.bandLo!=null?pct(row.bandLo,row):null;
          const bHi = row.bandHi!=null?pct(row.bandHi,row):null;
          const ordered = [...row.all].sort((a,b)=>grp(a)-grp(b));
          return (
            <div className={"sweet-row"+(row.signal?" sig":" dim")} key={v.id}>
              <div className="sweet-rlabel">{v.label}<span className="u">{v.short}</span></div>
              <div className="sweet-track">
                {bLo!=null && bHi!=null && <div className="sweet-band" style={{left:bLo+"%", width:Math.max(2,bHi-bLo)+"%"}}></div>}
                {ordered.map((p,i)=>{
                  const cls = winIds.has(p.ad.adId)?"win" : lagIds.has(p.ad.adId)?"lag" : "mid";
                  return <i key={i} className={"sweet-dot "+cls} style={{left:pct(p.val,row)+"%"}}
                    title={(cap(p.ad.adName)||"ad")+" · "+v.fmt(p.val)}></i>;
                })}
                {row.winMed!=null && <div className="sweet-med" style={{left:pct(row.winMed,row)+"%"}}></div>}
              </div>
              <div className="sweet-rright">
                <span className={"sweet-chip "+(row.signal?"sig":"ov")}>{row.signal?"signal":"overlap"}</span>
                <div><b>{row.winMed!=null?v.fmt(row.winMed):"—"}</b> <span className="vs">vs</span> {row.lagMed!=null?v.fmt(row.lagMed):"—"}</div>
                <div>{row.r!=null?("r="+row.r.toFixed(2)):"r —"} · {row.n} ads</div>
              </div>
            </div>
          );
        })}
      </div>

      {signals.length ? (
        <div className="sweet-recipe">
          <h4>Your ad-building recipe — from {signals.length} lever{signals.length===1?"":"s"} that genuinely separate your winners from the rest</h4>
          <ol>{signals.map(row=> <li key={row.v.id}>{recipeLine(row)}</li>)}</ol>
        </div>
      ) : (
        <div className="sweet-none">
          No single number cleanly separates your best ads from the rest yet — your top and bottom ads <b>overlap on every lever above</b>. That usually means the difference is in the words themselves (what the ad says, not how many) or something off the page — who saw it, when it ran. Keep ads running and this sharpens as more land.
        </div>
      )}

      <div className="sweet-foot">
        Built from {pool.length} ads with $100+ spend, split into the top {k} and bottom {k} by ROAS. A lever earns a place in the recipe only when it moves with ROAS (r ≥ 0.35) AND the two groups' medians sit clearly apart. This shows what your winners <i>share</i> — not proof any one number caused the result.
      </div>
    </div>
  );
}

function todayIso(){ return new Date().toISOString().slice(0,10); }

// ---- Close the loop: trace a logged decision forward to a real result ----
// Pure data, no AI. Takes a decision (with the baseline snapshot stored the
// moment Alex acted) and the daily series for that ad word, splits it on the
// decision date, and measures what actually happened after. A kill is proven by
// spend stopping; a scale by ROAS holding as the budget grew.
function traceDecision(decision, dashboard){
  const key = String(decision.decision_key||"").toLowerCase();
  const base = decision.baseline || {};
  const decidedIso = base.decidedIso || (decision.decided_at ? String(decision.decided_at).slice(0,10) : "");
  const series = dailySeriesFor(dashboard, r=> String(r.keyword||"").toLowerCase()===key);
  const before = series.filter(s=> decidedIso && s.iso <  decidedIso);
  const after  = series.filter(s=> decidedIso && s.iso >= decidedIso);
  const sum = (arr,f)=> arr.reduce((s,x)=>s+(f(x)||0),0);
  const afterSpend = sum(after, s=>s.m.spend);
  const afterRev   = sum(after, s=>s.m.collected);
  const afterDays  = after.length;
  const beforeDays = before.length;
  const beforeDailySpend = beforeDays ? sum(before,s=>s.m.spend)/beforeDays : null;
  const afterDailySpend  = afterDays ? afterSpend/afterDays : 0;
  const afterRoas = afterSpend>0 ? afterRev/afterSpend : null;
  const spendVals = series.map(s=>s.m.spend||0);

  // Verdict in plain English.
  let tone = "watch", text = "";
  if(decision.action==="kill"){
    if(afterDays===0){
      tone="watch"; text="Watching — no fresh data since you turned it off. The trace fills in as new days sync.";
    } else if(afterDailySpend <= (beforeDailySpend!=null ? beforeDailySpend*0.25 : 1)){
      tone="good";
      const wasRate = beforeDailySpend!=null ? fmtUsd(beforeDailySpend)+"/day" : "what it was burning";
      text="Confirmed off — spend dropped from "+wasRate+" to "+fmtUsd(afterDailySpend)+"/day. The bleed stopped.";
    } else {
      tone="bad"; text="Still spending — "+fmtUsd(afterDailySpend)+"/day since you marked it killed. Did the ad actually get turned off?";
    }
  } else { // scale
    if(afterDays===0){
      tone="watch"; text="Watching — no fresh data since you scaled it. Check back as new days roll in.";
    } else if(afterRoas==null){
      tone="watch"; text="Spent "+fmtUsd(afterSpend)+" since you scaled, no traced revenue back yet — watching.";
    } else if(base.roas!=null && afterRoas >= base.roas*0.8){
      tone="good"; text="Holding — "+afterRoas.toFixed(1)+"× since you scaled, vs "+base.roas.toFixed(1)+"× before. Keep pushing.";
    } else if(base.roas==null && afterRoas >= 2){
      tone="good"; text="Strong — "+afterRoas.toFixed(1)+"× on the spend since you scaled it.";
    } else {
      tone="mid"; text="Slipped — "+afterRoas.toFixed(1)+"× since scaling"+(base.roas!=null?", down from "+base.roas.toFixed(1)+"×":"")+". Watch before adding more budget.";
    }
  }
  return {key, base, decidedIso, before, after, afterSpend, afterRev, afterDays, beforeDailySpend, afterDailySpend, afterRoas, spendVals, tone, text};
}

// The tracker panel: every move Alex has logged, with its before→after trace.
// This is the half that closes the loop — the page proves whether the decision
// actually worked instead of just telling him what to do and forgetting.
function DecisionTracker({decisions, dashboard, onUndo}){
  const list = Array.isArray(decisions) ? decisions : [];
  if(list.length===0) return null;
  const cap = (s)=> s ? s.charAt(0)+s.slice(1).toLowerCase() : s;
  const daysAgo = (iso)=>{
    if(!iso) return "";
    const d = Math.round((Date.now() - new Date(iso+"T00:00:00").getTime())/86400000);
    return d<=0 ? "today" : d===1 ? "yesterday" : d+" days ago";
  };
  const toneColor = {good:"var(--green)", bad:"var(--red)", mid:"var(--gold)", watch:"var(--text-4)"};

  return (
    <div className="ddt">
      <div className="ddt-head">
        <div className="ddt-k">Decisions you've made — are they working?</div>
        <div className="ddt-h">Every move you marked done, traced forward to what actually happened. This is the loop closing.</div>
      </div>
      <div className="ddt-list">
        {list.map((d)=>{
          const t = traceDecision(d, dashboard);
          const col = toneColor[t.tone] || "var(--text-4)";
          return (
            <div className={"ddt-card "+d.action} key={d.decision_key}>
              <div className="ddt-top">
                <span className={"ddt-badge "+d.action}>{d.action==="kill" ? "TURNED OFF" : "SCALED"}</span>
                <span className="ddt-word">{cap(d.label||d.decision_key)}</span>
                <span className="ddt-when">marked {daysAgo(t.decidedIso)}</span>
                <button type="button" className="ddt-undo" onClick={()=>onUndo&&onUndo(d.decision_key)} title="Undo — put this move back on the action list">undo</button>
              </div>

              <div className="ddt-base">
                <span>When you acted:</span>
                <b>{fmtUsd(t.base.spend||0)}</b> spent · <b>{t.base.roas!=null?t.base.roas.toFixed(1)+"×":"—"}</b> ROAS · <b>{fmtNum(t.base.clients||0)}</b> client{(t.base.clients||0)===1?"":"s"}
              </div>

              <div className="ddt-result" style={{borderColor:"color-mix(in srgb,"+col+" 38%,var(--border-2))"}}>
                <span className="ddt-dot" style={{background:col, boxShadow:"0 0 8px "+col}}></span>
                <span className="ddt-verdict" style={{color:col}}>{t.text}</span>
              </div>

              <div className="ddt-spark">
                <Sparkline values={t.spendVals} color={col} width={220} height={34}/>
                <span className="ddt-sparklbl">daily spend{t.afterDays>0?` · ${t.afterDays} day${t.afterDays===1?"":"s"} since`:""}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function flowEdgePath(a, b){
  const c = Math.max(70, Math.abs(b.x - a.x) * 0.5);
  return `M ${a.x} ${a.y} C ${a.x + c} ${a.y}, ${b.x - c} ${b.y}, ${b.x} ${b.y}`;
}
