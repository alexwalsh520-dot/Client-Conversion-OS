function CalendarSection({dashboard, dateRange, onOpenWorkspace}){
  const events = Array.isArray(dashboard?.calendarEvents) ? dashboard.calendarEvents : [];
  const [selectedCall, setSelectedCall] = useState(null);
  const weekEnd = dateRange?.dateTo || todayEt();
  const days = calendarSevenDays(weekEnd);
  const weekStart = days[0]?.iso || weekEnd;
  const visibleEvents = events.filter(event => {
    const iso = isoFromAnyDate(event.eventAt);
    return iso && iso >= weekStart && iso <= weekEnd;
  });
  const eventsByDay = events.reduce((map, event) => {
    const iso = isoFromAnyDate(event.eventAt);
    if(!iso) return map;
    if(!map[iso]) map[iso] = [];
    map[iso].push(event);
    return map;
  }, {});
  const today = todayEt();
  const reviewCount = visibleEvents.filter(event => event.status === "needs_review" || event.status === "missing_keyword").length;
  const weekLabel = `${dateLabelFromIso(weekStart)} - ${dateLabelFromIso(weekEnd)}`;
  return (
    <div className="section">
      <div className="section-head">
        <div className="section-label">Calendar</div>
        <div className="section-meta">{weekLabel} · {visibleEvents.length} booked call{visibleEvents.length===1?"":"s"}</div>
      </div>
      <div className="calendar-panel">
        <div className="calendar-summary">
          <div>
            <div className="calendar-summary-title">7-day booked call view</div>
            <div className="calendar-summary-meta">{visibleEvents.length === 0 ? "No booked calls visible" : reviewCount ? `${reviewCount} need attribution` : "All visible calls are attributed or pending"}</div>
          </div>
          <div className="calendar-summary-meta">{visibleEvents.length ? "Click any appointment" : weekLabel}</div>
        </div>
        <div className="calendar-board">
          {days.map(day=><div key={"dow-"+day.iso} className="calendar-dow">{weekdayLabelFromIso(day.iso)}</div>)}
          {days.map(day=>{
            const calls = (eventsByDay[day.iso] || []).slice().sort((a,b)=>String(a.eventAt).localeCompare(String(b.eventAt)));
            return (
              <div key={day.iso} className={"calendar-cell "+(day.muted?"muted ":"")+(day.iso===today?"today":"")}>
                <div className="calendar-day-head">
                  <div className="calendar-day-num">{Number(day.iso.slice(-2))}</div>
                  {calls.length > 0 && <div className="calendar-day-count">{calls.length}</div>}
                </div>
                {calls.map(call=>(
                  <button
                    key={call.id}
                    type="button"
                    className={"calendar-call status-"+(call.status || "upcoming")}
                    title={`${call.name || "Unknown"} · ${call.campaignName || "Needs attribution"}`}
                    onClick={()=>setSelectedCall(call)}
                  >
                    <div className="calendar-call-top">
                      <div className="calendar-call-name">{call.name || "Unknown"}</div>
                      <span className={"calendar-status-pill "+(call.status || "upcoming")}>{calendarStatusLabel(call.status)}</span>
                    </div>
                    <div className="calendar-call-time">{timeFromAnyDate(call.eventAt)}</div>
                    <div className="calendar-call-meta">
                      {call.campaignName || "Needs attribution"}{call.keyword ? ` · ${call.keyword}` : ""}
                    </div>
                  </button>
                ))}
              </div>
            );
          })}
        </div>
      </div>
      {selectedCall && (
        <CalendarAppointmentModal
          call={selectedCall}
          onClose={()=>setSelectedCall(null)}
          onOpenWorkspace={onOpenWorkspace}
        />
      )}
    </div>
  );
}

// ------- Keyword entry
const BUCKETS = [
  {id:"msgs", label:"Messages", unit:"messages"},
  {id:"calls", label:"45-min calls booked", unit:"calls"},
  {id:"taken", label:"45-min calls taken", unit:"calls"},
  {id:"clients", label:"New clients", unit:"clients"},
  {id:"collected", label:"Collected $", unit:"USD"},
];

const SETTERS = ["Amara"];

function emptyRow(){ return {id: Math.random().toString(36).slice(2,9), keyword:"", value:""}; }

function KeywordEntry({onSubmit}){
  const [campaign, setCampaign] = useState("tyson");
  const [setter, setSetter] = useState(SETTERS[0]);
  const [eventDate, setEventDate] = useState(todayEt());
  // bucket groups appear in order added. Each: {id (bucket), rows: [{id,keyword,value}]}
  const [groups, setGroups] = useState([
    {bucket:"msgs", rows:[emptyRow()]},
  ]);

  const addBucket = (bucketId) => {
    setGroups(g => {
      if(g.find(x=>x.bucket===bucketId)) return g;
      return [...g, {bucket:bucketId, rows:[emptyRow()]}];
    });
  };
  const removeBucket = (bucketId) => setGroups(g => g.filter(x=>x.bucket!==bucketId));
  const addRow = (bucketId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows:[...x.rows, emptyRow()]} : x));
  const removeRow = (bucketId, rowId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.length>1 ? x.rows.filter(r=>r.id!==rowId) : x.rows} : x));
  const updateRow = (bucketId, rowId, patch) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.map(r => r.id===rowId?{...r,...patch}:r)} : x));

  // Available buckets to add
  const availableBuckets = BUCKETS.filter(b => !groups.find(g => g.bucket === b.id));

  // Count valid rows
  const validRows = groups.flatMap(g => g.rows.filter(r => r.keyword && r.value).map(r => ({bucket:g.bucket, ...r})));
  const totalRows = groups.reduce((s,g)=>s+g.rows.length, 0);

  const submit = () => {
    if(validRows.length===0) return;
    validRows.forEach(r => {
      onSubmit({campaign, date:eventDate, bucket:r.bucket, setter, keyword: r.keyword.toUpperCase(), value: parseFloat(r.value)});
    });
    // Reset to clean state
    setGroups([{bucket:"msgs", rows:[emptyRow()]}]);
  };

  return (
    <div className="panel entry-panel">
      <div className="entry-head">Log keywords</div>

      <div className="entry-row">
        <select className="entry-select" value={campaign} onChange={e=>setCampaign(e.target.value)}>
          <option value="tyson">Tyson — Spring Shred</option>
          <option value="keith">Keith — Spring Shred</option>
        </select>
        <select className="entry-select" value={setter} onChange={e=>setSetter(e.target.value)} style={{maxWidth:140}}>
          {SETTERS.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <input
          className="entry-select"
          type="date"
          value={eventDate}
          onChange={e=>setEventDate(e.target.value || todayEt())}
          style={{maxWidth:150}}
        />
      </div>

      {groups.map(g => {
        const bucket = BUCKETS.find(b=>b.id===g.bucket);
        const unit = bucket?.unit || "";
        const isUsd = unit === "USD";
        const filled = g.rows.filter(r=>r.keyword && r.value).length;
        return (
          <div className="bucket-group" key={g.bucket}>
            <div className="bucket-group-head">
              <div className="bucket-group-label">
                {bucket.label}
                <span className="bucket-group-count">{filled}/{g.rows.length} filled</span>
              </div>
              <button className="bucket-group-rem" title="Remove section" onClick={()=>removeBucket(g.bucket)}>×</button>
            </div>
            {g.rows.map((r, i) => (
              <div className="br-row" key={r.id}>
                <span className="br-num">{String(i+1).padStart(2,"0")}</span>
                <input
                  className="br-input mono"
                  placeholder="KEYWORD"
                  value={r.keyword}
                  onChange={e=>updateRow(g.bucket, r.id, {keyword:e.target.value.toUpperCase()})}
                />
                <input
                  className="br-input val"
                  placeholder={isUsd?"$0":"0"}
                  value={r.value}
                  onChange={e=>updateRow(g.bucket, r.id, {value:e.target.value.replace(/[^\d.]/g,"")})}
                />
                <span style={{color:'var(--text-4)',fontSize:10,minWidth:60,textAlign:'right'}}>{unit}</span>
                <button className="br-remove" onClick={()=>removeRow(g.bucket, r.id)} title="Remove row">×</button>
              </div>
            ))}
            <button className="br-addrow" onClick={()=>addRow(g.bucket)}>
              <span style={{color:'var(--gold)',fontSize:13,lineHeight:1}}>+</span> Add row
            </button>
          </div>
        );
      })}

      {availableBuckets.length > 0 && (
        <div className="bucket-picker">
          <span className="bucket-picker-label">Add stage</span>
          {availableBuckets.map(b => (
            <button key={b.id} className="bp-chip" onClick={()=>addBucket(b.id)}>
              <span className="pl">+</span> {b.label}
            </button>
          ))}
        </div>
      )}

      <div className="entry-submit-row">
        <button className="entry-submit" onClick={submit} disabled={validRows.length===0}>
          Log {validRows.length>0 ? validRows.length+" "+(validRows.length===1?"entry":"entries") : "entry"}
        </button>
        <span className="entry-hint">
          {validRows.length>0 ? <span style={{color:'var(--text-3)'}}>{validRows.length} of {totalRows} rows ready</span> : ""}
        </span>
      </div>
    </div>
  );
}

function csvEscape(value){
  const text = String(value ?? "");
  return /[",\n]/.test(text) ? `"${text.replace(/"/g,'""')}"` : text;
}

function downloadCsv(filename, rows){
  const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function rowsForCsv(campaigns){
  const header = ["Level","Account","Date","Ad","Ad spend","Impressions","Link clicks","Messages","45-min calls booked","45-min calls taken","New clients","Collected revenue","CPM","CTR","CPC","Cost / message","Cost / 45-min booked","Cost / call taken","Cost / client","Collected ROI"];
  const rows = [header];
  campaigns.forEach(c => {
    const campaignAgg = aggregate(c.rows);
    rows.push([
      "campaign", c.short, "", "", campaignAgg.spend, campaignAgg.imp, campaignAgg.clicks, campaignAgg.msgs,
      campaignAgg.calls, campaignAgg.taken, campaignAgg.clients, campaignAgg.collected, campaignAgg.cpm,
      campaignAgg.ctr, campaignAgg.cpc, campaignAgg.cpMsg, campaignAgg.cpCall || "", campaignAgg.cpTaken || "", campaignAgg.cpClient || "",
      campaignAgg.collectedRoi,
    ]);
    c.rows.forEach(day => {
      const dayMetrics = deriveRow(day);
      rows.push([
        "day", c.short, day.date, "", dayMetrics.spend, dayMetrics.imp, dayMetrics.clicks, dayMetrics.msgs,
        dayMetrics.calls, dayMetrics.taken, dayMetrics.clients, dayMetrics.collected, dayMetrics.cpm,
        dayMetrics.ctr, dayMetrics.cpc, dayMetrics.cpMsg, dayMetrics.cpCall || "", dayMetrics.cpTaken || "", dayMetrics.cpClient || "",
        dayMetrics.collectedRoi,
      ]);
      buildAdRows(c.id, day, c.ads).forEach(ad => {
        const adMetrics = deriveRow({
          date: day.date,
          spend: ad.spend, imp: ad.imp, clicks: ad.clicks, msgs: ad.msgs,
          calls: ad.calls, taken: ad.taken, clients: ad.clients, collected: ad.collected,
        });
        rows.push([
          "ad", c.short, day.date, ad.adName, adMetrics.spend, adMetrics.imp, adMetrics.clicks, adMetrics.msgs,
          adMetrics.calls, adMetrics.taken, adMetrics.clients, adMetrics.collected, adMetrics.cpm,
          adMetrics.ctr, adMetrics.cpc, adMetrics.cpMsg, adMetrics.cpCall || "", adMetrics.cpTaken || "", adMetrics.cpClient || "",
          adMetrics.collectedRoi,
        ]);
      });
    });
  });
  return rows;
}

function RecentEntries({extra, includeFallback=false, campaigns=[], onManualSubmit, onResolve, onToast}){
  const [open, setOpen] = useState(false);
  const [manualOpen, setManualOpen] = useState(false);
  const [page, setPage] = useState(0);
  const [entries, setEntries] = useState(null); // null → derive from extra+RECENT
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({kw:"", value:"", bucket:"msgs", camp:"tyson"});
  const [confirmDel, setConfirmDel] = useState(null);
  const [fixingEvent, setFixingEvent] = useState(null);
  const [savingFix, setSavingFix] = useState(false);

  // Build a stable list with ids the first time (so state mutations are consistent)
  const seedAll = useMemo(() => {
    const source = extra?.length ? extra : (includeFallback ? RECENT : []);
    return source.map((e, i) => ({id: "e-"+i, ...e}));
  }, [extra, includeFallback]);
  const list = entries ?? seedAll;
  const pageSize = 50;
  const pageCount = Math.max(1, Math.ceil(list.length / pageSize));
  const safePage = Math.min(page, pageCount - 1);
  const visibleList = list.slice(safePage * pageSize, safePage * pageSize + pageSize);

  useEffect(()=>{ setPage(0); }, [seedAll.length]);

  const startEdit = (e) => {
    setEditingId(e.id);
    setDraft({kw: e.kw, value: String(e.value), bucket: e.bucket, camp: e.camp});
    setConfirmDel(null);
  };
  const cancelEdit = () => { setEditingId(null); setConfirmDel(null); };
  const saveEdit = () => {
    if(!draft.kw || !draft.value) return;
    const next = (entries ?? seedAll).map(e =>
      e.id === editingId
        ? {...e, kw: draft.kw.toUpperCase(), value: parseFloat(draft.value), bucket: draft.bucket, camp: draft.camp, edited: true}
        : e
    );
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry updated");
  };
  const deleteEntry = (id) => {
    const next = (entries ?? seedAll).filter(e => e.id !== id);
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry deleted");
  };
  const submitManualEntry = (entry) => {
    onManualSubmit && onManualSubmit(entry);
    setManualOpen(false);
  };
  const saveEventResolution = async (payload) => {
    if(!onResolve) return;
    setSavingFix(true);
    try{
      await onResolve(payload);
      setFixingEvent(null);
    }catch(err){
      onToast && onToast(err?.message || "Attribution save failed");
    }finally{
      setSavingFix(false);
    }
  };

  return (
    <div className="recent">
      <div className="recent-head" onClick={()=>setOpen(!open)}>
        <div className="recent-title">
          <span className={"recent-caret "+(open?"open":"")}>▸</span>
          Attribution events history
          <span className="recent-count">{list.length} latest</span>
        </div>
        <span style={{color:'var(--text-4)',fontSize:11}}></span>
      </div>
      <div className={"recent-body "+(open?"open":"")}>
        <div className="manual-log-toggle">

            <div className="history-pager">
              <button className="history-page-btn" onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePage===0}>Prev</button>
              <span className="history-page-label">{safePage+1}/{pageCount}</span>
              <button className="history-page-btn" onClick={()=>setPage(p=>Math.min(pageCount-1,p+1))} disabled={safePage>=pageCount-1}>Next</button>
            </div>
          )}

          <div className="manual-log-area">

        <table className="recent-tbl">
          <thead>
            <tr>
              <th style={{width:150}}>Time (ET)</th>
              <th style={{width:160}}>Source</th>
              <th style={{width:90}}>Setter</th>
              <th style={{width:110}}>Campaign</th>
              <th style={{width:150}}>Keyword</th>
              <th style={{width:180}}>Event</th>
              <th className="r" style={{width:110}}>Value</th>
              <th className="actions-col">Status</th>
            </tr>
          </thead>
          <tbody>
            {list.length === 0 && (
              <tr>
                <td colSpan="8" style={{color:"var(--text-3)",padding:"16px 24px"}}>
                  No live attribution events for this range.
                </td>
              </tr>
            )}
            {visibleList.map((e)=>{
              const isEditing = editingId === e.id;
              const isLive = e.locked !== false;
              const isDollar = e.bucket === "collected";
              const bucketLabel = ({
                dm:"DM received",
                booked_call:"45-min call booked",
                call_taken:"45-min call taken",
                no_show:"No-show",
                sale:"Collected revenue",
                manual_correction:"Manual correction",
              }[e.eventType]) || BUCKETS.find(b=>b.id===e.bucket)?.label || e.bucket;
              const sourceLabel = String(e.eventType || "").startsWith("manual_")
                ? "Manual"
                : e.source === "manychat" ? "ManyChat" : e.source === "ghl" ? "GHL" : e.source === "sales_tracker" ? "Sales Tracker" : "Manual";
              const statusLabel = {
                attributed:"Attributed",
                needs_review:"Needs review",
                missing_keyword:"Missing keyword",
                organic:"Organic",
                unattributed:"Unattributed",
                ignored:"Ignored",
              }[e.status] || "Attributed";
              const canResolveLive = isLive && e.saleKey && (e.status === "needs_review" || e.status === "missing_keyword");
              return (
                <tr key={e.id} className={isEditing ? "editing-row" : ""}>
                  <td className="mono" style={{color:'var(--text-3)',fontSize:11,verticalAlign:'middle'}}>
                    {e.ts}{e.edited && <span className="edited-tag" title="Edited">·edited</span>}
                  </td>
                  <td style={{verticalAlign:'middle'}}>
                    <div style={{color:'var(--text-2)'}}>{sourceLabel}</div>
                    {e.name && <div style={{color:'var(--text-4)',fontSize:10,marginTop:3}}>{e.name}</div>}
                  </td>
                  <td style={{verticalAlign:'middle'}}>{e.setter}</td>
                  <td style={{color:'var(--text-3)',verticalAlign:'middle'}}>
                    {isEditing ? (
                      <select className="rec-edit-input" style={{width:90}} value={draft.camp} onChange={ev=>setDraft(d=>({...d, camp:ev.target.value}))}>
                        <option value="tyson">Tyson</option>
                        <option value="keith">Keith</option>
                      </select>
                    ) : (
                      <div>
                        <div>{e.camp==="tyson" ? "Tyson" : e.camp==="keith" ? "Keith" : "Unknown"}</div>

                    )}

                  <td style={{verticalAlign:'middle'}}>
                    {isEditing ? (
                      <input
                        className="rec-edit-input kw"
                        value={draft.kw}
                        onChange={ev=>setDraft(d=>({...d, kw:ev.target.value.toUpperCase()}))}

                        onKeyDown={ev=>{ if(ev.key==="Enter") saveEdit(); if(ev.key==="Escape") cancelEdit(); }}

                      <input

                  <td className="actions-col" style={{verticalAlign:'middle'}}>

      {confirmDel!==null && (() => {

          <Modal title="Delete entry?" subtitle="This cannot be undone." onClose={()=>setConfirmDel(null)}

        <AttributionAlertModal
          alert={alertFromHistoryEntry(fixingEvent)}

function alertFromHistoryEntry(entry){
  const eventDate = entry.eventAt ? eventDateKeyFromIso(entry.eventAt) : "";
  return {
    key: entry.saleKey,
    saleKey: entry.saleKey,
    date: eventDate,
    eventAt: entry.eventAt || null,
    clientKey: entry.camp || null,
    name: entry.name || "Unknown",
    setter: entry.setter || "",
    amount: entry.eventType === "sale" ? Number(entry.value || 0) : 0,
    reason: entry.reason || "",
    alertType: entry.alertType || (entry.eventType === "booked_call" ? "missing_booking_keyword" : entry.eventType === "call_taken" || entry.eventType === "no_show" ? "call" : "sale"),
    appointmentId: entry.appointmentId || null,
    contactId: entry.contactId || null,
  };
}

function eventDateKeyFromIso(value){
  const dt = value ? new Date(value) : null;
  if(!dt || Number.isNaN(dt.getTime())) return "";
  return dt.toLocaleDateString("en-CA", {timeZone:"America/New_York"});
}

function recentEntriesFromDashboard(dashboard){
  const history = Array.isArray(dashboard?.eventsHistory) && dashboard.eventsHistory.length
    ? dashboard.eventsHistory
    : (dashboard?.recentEvents || []);
  if(!history.length) return [];
  return history.map((event, i) => {
    const dt = event.eventAt ? new Date(event.eventAt) : null;
    const ts = dt && !Number.isNaN(dt.getTime())
      ? dt.toLocaleString("en-US", {timeZone:"America/New_York", month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZoneName:"short"})
      : "Recent";
    const manualBuckets = {
      manual_messages: "msgs",
      manual_booked_calls: "calls",
      manual_calls_taken: "taken",
      manual_new_clients: "clients",
      manual_collected_revenue: "collected",
    };
    const historyBuckets = {
      dm: "msgs",
      booked_call: "calls",
      call_taken: "taken",
      no_show: "taken",
      sale: "collected",
      manual_correction: "collected",
    };
    const bucket = historyBuckets[event.eventType] || manualBuckets[event.eventType] || (event.source === "ghl" ? "calls" : "msgs");
    const rawValue = Number(event.value || 0);
    const value = event.eventType === "manual_collected_revenue" || event.eventType === "sale"
      ? rawValue / 100
      : (rawValue || 1);
    return {
      ts,
      setter: event.setter || "Auto",
      camp: event.clientKey || "tyson",
      kw: event.keyword || "UNKNOWN",
      bucket,
      value,
      source: event.source || "live",
      eventType: event.eventType || "",
      name: event.name || "",
      status: event.status || "attributed",
      reason: event.reason || "",
      campaignName: event.campaignName || "",
      adName: event.adName || "",
      saleKey: event.saleKey || null,
      alertType: event.alertType || null,
      appointmentId: event.appointmentId || null,
      contactId: event.contactId || null,
      eventAt: event.eventAt || null,
      locked: true,
      id: "live-"+i,
    };
  });
}

function AttributionSummaryTiles({dashboard, alerts, scope="range"}){
  const summary = dashboard?.summary || {};
  const attribution = dashboard?.attribution || {};
  const isAllTime = scope === "allTime";
  const scopedTotals = isAllTime
    ? (attribution.allTime || {})
    : (attribution.selectedRange || {});
  const query = dashboard?.query || {};
  const alertsInRange = (alerts || []).filter(alert => {
    if(isAllTime) return true;
    if(!query.dateFrom || !query.dateTo || !alert?.date) return false;
    return alert.date >= query.dateFrom && alert.date <= query.dateTo;
  });
  const paid = Number(scopedTotals.paidAttributedRevenue ?? (isAllTime ? attribution.allTimePaidAttributedRevenue : attribution.paidAttributedRevenue) ?? summary.paidAttributedRevenue ?? summary.collectedRevenue ?? 0);
  const unresolved = Number(scopedTotals.unattributedRevenue ?? (isAllTime ? attribution.allTimeUnattributedRevenue : attribution.unattributedRevenue) ?? alertsInRange.reduce((sum, alert) => sum + Number(alert.amount || 0), 0));
  const organic = Number(scopedTotals.organicRevenue ?? (isAllTime ? attribution.allTimeOrganicRevenue : attribution.organicRevenue) ?? summary.organicRevenue ?? 0);
  // Untraceable "no ad keyword" calls aren't an actionable backlog — keep them
  // out of the red unresolved count so the tile reflects real work to be done.
  const actionableInRange = alertsInRange.filter(alert => !alert.noAdKeyword);
  const unattributedIsClear = unresolved <= 0;

  return (
    <div className="alerts-summary-shell">
      <div className="alerts-summary-scope">
        <div className="alerts-summary-scope-label">Attribution totals</div>
        <div className="alerts-summary-scope-pill">{isAllTime ? "All time" : "Selected range"}</div>
      </div>
      <div className="alerts-summary">
        <div className="alerts-summary-card">
          <div className="alerts-summary-label">Attributed</div>
          <div className="alerts-summary-value">{fmtUsd(paid)}</div>
          <div className="alerts-summary-note">Tied to paid ads</div>
        </div>
        <div className="alerts-summary-card">
          <div className="alerts-summary-label">Organic</div>
          <div className="alerts-summary-value">{fmtUsd(organic)}</div>
          <div className="alerts-summary-note">Resolved as non-paid</div>
        </div>
        <div className={"alerts-summary-card "+(unattributedIsClear ? "good" : "warn")}>
          <div className="alerts-summary-label">Unattributed</div>
          <div className={"alerts-summary-value "+(unattributedIsClear ? "good" : "warn")}>{fmtUsd(unresolved)}</div>
          <div className="alerts-summary-note">{actionableInRange.length} unresolved item{actionableInRange.length===1?"":"s"}</div>
        </div>
      </div>
    </div>
  );
}

function clientLabel(key){
  // Delegates to the shared creator-name helper so every creator (not just the
  // original two) reads correctly. Falls back to a title-cased key, then
  // "Unknown" only when there's genuinely no creator.
  return creatorName(key);
}

function alertSaleKey(alert){
  return alert?.key || alert?.saleKey || "";
}

function alertReasonLabel(reason){
  if(reason==="missing_sales_name") return "Missing Sales Tracker name";
  if(reason==="missing_booking_keyword") return "Booked call has no keyword";
  if(reason==="no_matching_ghl_booking") return "No matching GHL booking";
  if(reason==="ambiguous_or_missing_meta_match") return "No unique Meta ad match";
  if(reason==="missing_manychat_keyword") return "Missing ManyChat keyword";
  return reason || "Needs review";
}

function alertDateLabel(alert){
  return alert?.date ? dateLabelFromIso(alert.date) : "Recent";
}

function alertTimestampLabel(alert){
  const date = alertDateLabel(alert);
  const time = alert?.time || alert?.eventTime || "";
  return time ? `${date} · ${time}` : date;
}

function alertAmountLabel(alert){
  const amount = Number(alert?.amount || 0);
  if(amount > 0) return fmtUsd(amount);
  if(alert?.alertType === "call" || alert?.callTaken) return "Call taken";
  if(alert?.alertType === "missing_dm_keyword") return "DM keyword";
  if(alert?.alertType === "missing_booking_keyword") return "Booked call";
  return "No revenue";
}

function alertTitleLabel(alert){
  if(alert?.alertType === "call") return "Call attribution";
  if(alert?.alertType === "missing_dm_keyword") return "Keyword attribution";
  if(alert?.alertType === "missing_booking_keyword") return "Booking attribution";
  return "Sale attribution";
}

function alertWorkspaceKind(alert){
  // Genuinely untraceable booked call (no keyword + no ManyChat to recover from):
  // its own calm bucket, checked first so it never reads as a red "Booked" alert.
  if(alert?.noAdKeyword) return "nokeyword";
  if(alert?.alertType === "missing_dm_keyword" || alert?.reason === "missing_manychat_keyword") return "keyword";
  if(alert?.alertType === "missing_booking_keyword" || alert?.reason === "missing_booking_keyword") return "booking";
  if(alert?.alertType === "call" || alert?.callTaken) return "call";
  if(Number(alert?.amount || 0) > 0) return "revenue";
  return "other";
}

function alertWorkspaceKindLabel(alert){
  const kind = alertWorkspaceKind(alert);
  if(kind === "revenue") return "Revenue";
  if(kind === "booking") return "Booked call";
  if(kind === "keyword") return "DM keyword";
  if(kind === "call") return "Call";
  if(kind === "nokeyword") return "No ad keyword";
  return "Review";
}

// Calm, plain-English explanation for the genuinely-untraceable bucket. These
// are never organic and never ad revenue — just calls we couldn't tie to a
// keyword, kept visible but out of the urgent pile.
function alertWorkspaceIssueLabel(alert){
  if(alert?.noAdKeyword) return "No ad keyword captured · can't be traced";
  return alertReasonLabel(alert?.reason);
}

function alertWorkspaceSearchText(alert){
  return [
    alert?.name,
    alert?.setter,
    alert?.keyword,
    alert?.campaignName,
    alert?.adName,
    alert?.instagramHandle,
    clientLabel(alert?.clientKey),
    alertAmountLabel(alert),
    alertTimestampLabel(alert),
    alertReasonLabel(alert?.reason),
    alertWorkspaceKindLabel(alert),
  ].map(value=>String(value || "").toLowerCase()).join(" ");
}

function alertDateKey(alert){
  return safeIsoDate(alert?.date) || eventDateKeyFromIso(alert?.eventAt);
}

function alertInSelectedRange(alert, range){
  if(!range?.dateFrom || !range?.dateTo) return true;
  const date = alertDateKey(alert);
  if(!date) return false;
  return date >= range.dateFrom && date <= range.dateTo;
}

function normalizeUiKeyword(value){
  return String(value || "").trim().replace(/\s+/g," ").toUpperCase();
}

function safeIsoDate(value){
  return /^\d{4}-\d{2}-\d{2}$/.test(String(value || "")) ? String(value) : "";
}

function daysBetweenIso(a,b){
  const aMs = Date.parse(`${a}T00:00:00Z`);
  const bMs = Date.parse(`${b}T00:00:00Z`);
  if(!Number.isFinite(aMs) || !Number.isFinite(bMs)) return 9999;
  return Math.abs(Math.round((bMs-aMs)/86400000));
}

function optionDateDistance(option, alertDate){
  if(!alertDate) return 9999;
  const first = safeIsoDate(option.firstDate);
  const last = safeIsoDate(option.lastDate);
  if(first && last && first <= alertDate && alertDate <= last) return 0;
  if(last && last < alertDate) return daysBetweenIso(last, alertDate);
  if(first && first > alertDate) return daysBetweenIso(first, alertDate);
  return 9999;
}

function optionStatus(option, alertDate){
  if(optionDateDistance(option, alertDate) === 0) return {label:"On date", cls:"date", score:0};
  if(option.status === "active") return {label:"Active", cls:"active", score:1};
  const distance = optionDateDistance(option, alertDate);
  if(distance <= 30) return {label:`${distance}d away`, cls:"", score:2};
  return {label:"Off", cls:"", score:3};
}

function rankAttributionOptions(options, alert){
  const alertDate = safeIsoDate(alert?.date) || eventDateKeyFromIso(alert?.eventAt);
  const alertKeyword = normalizeUiKeyword(alert?.keyword || alert?.adName);
  return options.slice().sort((a,b)=>{
    const aStatus = optionStatus(a, alertDate);
    const bStatus = optionStatus(b, alertDate);
    const aKw = alertKeyword && a.keyword===alertKeyword ? 0 : 1;
    const bKw = alertKeyword && b.keyword===alertKeyword ? 0 : 1;
    if(aKw!==bKw) return aKw-bKw;
    if(aStatus.score!==bStatus.score) return aStatus.score-bStatus.score;
    const dist = optionDateDistance(a, alertDate) - optionDateDistance(b, alertDate);
    if(dist!==0) return dist;
    return String(b.lastDate || "").localeCompare(String(a.lastDate || "")) || String(a.keyword || a.campaignName || "").localeCompare(String(b.keyword || b.campaignName || ""));
  });
}

function normalizeKeywordOption(option, alert){
  const keyword = normalizeUiKeyword(option.keyword || option.groupName || option.adName);
  if(!keyword || keyword==="UNKNOWN") return null;
  const clientKey = option.clientKey || alert?.clientKey || "";
  const campaignId = option.campaignId || "";
  const adId = option.adId || option.groupId || option.id || keyword;
  const groupId = option.groupId || `${clientKey}:${campaignId || option.campaignName || "campaign"}:${adId}`;
  return {
    id: option.id || `${clientKey}:${groupId}:${keyword}`,
    clientKey,
    keyword,
    campaignId,
    campaignName: option.campaignName || option.meta || "",
    adId: String(adId),
    adName: option.adName || option.groupName || keyword,
    groupId,
    groupName: option.groupName || option.adName || keyword,
    firstDate: option.firstDate || option.dateFrom || "",
    lastDate: option.lastDate || option.dateTo || "",
    status: option.status || "finished",
    label: `${keyword} · ${clientLabel(clientKey)}`,
    meta: option.campaignName || option.meta || "",
    spend: Number(option.spend || 0),
  };
}

function normalizeCampaignOption(option, alert){
  const clientKey = option.clientKey || alert?.clientKey || "";
  const campaignName = option.campaignName || option.name || "";
  const campaignId = option.campaignId || option.id || campaignName;
  if(!campaignName && !campaignId) return null;
  return {
    id: option.id || `${clientKey}:${campaignId}`,
    clientKey,
    campaignId,
    campaignName: campaignName || campaignId,
    groupId: option.groupId || `${clientKey}:${campaignId}`,
    groupName: campaignName || campaignId,
    firstDate: option.firstDate || "",
    lastDate: option.lastDate || option.latestIso || "",
    status: option.status || "finished",
    spend: Number(option.spend || 0),
  };
}

function attributionOptionsFromProvided(options, alert){
  const clientKey = alert?.clientKey;
  const normalized = (options || [])
    .map(o=>normalizeKeywordOption(o, alert))
    .filter(Boolean)
    .filter(o=>!clientKey || o.clientKey===clientKey);
  return rankAttributionOptions(normalized, alert);
}

function campaignOptionsFromProvided(options, alert){
  const clientKey = alert?.clientKey;
  const normalized = (options || [])
    .map(o=>normalizeCampaignOption(o, alert))
    .filter(Boolean)
    .filter(o=>!clientKey || o.clientKey===clientKey);
  return rankAttributionOptions(normalized, alert);
}

function attributionOptionsFromCampaigns(campaigns, alert){
  const clientKey = alert?.clientKey;
  const options = [];
  const seen = new Set();
  for(const campaign of campaigns || []){
    if(clientKey && campaign.clientKey !== clientKey) continue;
    const campaignId = String(campaign.id || "");
    const rawCampaignId = campaignId.includes(":") ? campaignId.split(":").slice(1).join(":") : campaignId;
    const ads = [];
    (campaign.ads || []).forEach(ad => ads.push(ad));
    (campaign.rows || []).forEach(row => (row.adRows || []).forEach(ad => ads.push({
      id: ad.adId,
      name: ad.adName,
      keyword: ad.keyword || ad.adName,
    })));

    for(const ad of ads){
      const adId = ad.id || ad.adId || ad.name;
      const adName = ad.name || ad.adName || ad.keyword || "UNKNOWN";
      const keyword = normalizeUiKeyword(ad.keyword || adName);
      if(!keyword || keyword==="UNKNOWN") continue;
      const groupId = String(adId).startsWith(`${campaignId}:`)
        ? String(adId)
        : `${campaignId}:${adId}`;
      const key = `${campaign.clientKey}:${groupId}:${keyword}`;
      if(seen.has(key)) continue;
      seen.add(key);
      const firstDate = (campaign.rows || []).reduce((min,row)=>!min || String(row.iso || "") < min ? String(row.iso || "") : min, "");
      options.push({
        id: key,
        clientKey: campaign.clientKey,
        keyword,
        campaignId: rawCampaignId,
        campaignName: campaign.name,
        adId: String(adId),
        adName,
        groupId,
        groupName: keyword,
        label: `${keyword} · ${clientLabel(campaign.clientKey)}`,
        meta: campaign.name || campaign.short || "",
        firstDate,
        lastDate: campaign.latestIso || "",
        status: campaign.status || "finished",
      });
    }
  }

  return rankAttributionOptions(options, alert);
}

function campaignOptionsFromCampaigns(campaigns, alert){
  const clientKey = alert?.clientKey;
  const options = (campaigns || [])
    .filter(c=>!clientKey || c.clientKey===clientKey)
    .map(c=>{
      const firstDate = (c.rows || []).reduce((min,row)=>!min || String(row.iso || "") < min ? String(row.iso || "") : min, "");
      return normalizeCampaignOption({
        id:c.id,
        clientKey:c.clientKey,
        campaignId:String(c.id || "").includes(":") ? String(c.id).split(":").slice(1).join(":") : c.id,
        campaignName:c.name,
        firstDate,
        lastDate:c.latestIso || "",
        status:c.status || "finished",
      }, alert);
    })
    .filter(Boolean);
  return rankAttributionOptions(options, alert);
}

function groupedKeywordOptions(options){
  const groups = new Map();
  for(const option of options){
    const key = `${clientLabel(option.clientKey)} · ${option.campaignName || "Unknown campaign"}`;
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(option);
  }
  return Array.from(groups.entries()).map(([label, items])=>({label, items}));
}

function optionMatchesQuery(option, query){
  const q = String(query || "").trim().toLowerCase();
  if(!q) return true;
  return [
    option.keyword,
    option.campaignName,
    option.adName,
    option.groupName,
    clientLabel(option.clientKey),
  ].some(value=>String(value || "").toLowerCase().includes(q));
}

function keywordOptionSubLabel(option){
  const adName = String(option.adName || "").trim();
  const keyword = normalizeUiKeyword(option.keyword);
  const normalizedAd = normalizeUiKeyword(adName);
  if(adName && normalizedAd && normalizedAd!==keyword) return adName;
  return "";
}

// System-TRACKED wins per keyword for one client, summed straight from the
// per-ad data the rest of the Deep Dive uses (ad.clients = closed wins the
// software could trace by keyword). This is the hard number the setter's memory
// gets compared against — it stays the source of truth for ROAS/profit.
function systemKeywordWins(campaigns, clientKey){
  const m = new Map();
  (campaigns||[]).forEach(c=>{
    if(clientKey && c.clientKey !== clientKey) return;
    (c.rows||[]).forEach(r=>{
      (r.adRows||[]).forEach(ad=>{
        const kw = String(ad.keyword || ad.adName || "UNKNOWN").toUpperCase().trim();
        if(!kw || kw==="UNKNOWN") return;
        m.set(kw, (m.get(kw)||0) + Number(ad.clients||0));
      });
    });
  });
  return m;
}

// "What the setter knows." A setter often KNOWS roughly how many wins came from
// each keyword even when the link/ManyChat trail is missing. We store that here,
// show it NEXT TO the system-tracked number so the gap is visible, and NEVER let
// it touch ROAS or profit (those stay on hard tracking only). Clearly labelled
// setter-reported so nobody mistakes a memory for a measurement.
function SetterCountsPanel({campaigns, clientFilter, onToast}){
  const initialClient = (clientFilter==="tyson"||clientFilter==="keith") ? clientFilter : "tyson";
  const [open, setOpen] = useState(false);
  const [counts, setCounts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [cmpClient, setCmpClient] = useState(initialClient);
  const [form, setForm] = useState({keyword:"", count:"", setter:"", note:""});

  const load = async () => {
    setLoading(true);
    try{
      const res = await fetch("/api/ads-tracker/setter-counts", {cache:"no-store"});
      const json = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(json.error || "Could not load setter counts");
      setCounts(Array.isArray(json.counts) ? json.counts : []);
    }catch(err){
      onToast && onToast(err?.message || "Could not load setter counts");
    }finally{
      setLoading(false);
    }
  };

  useEffect(()=>{ if(open && counts.length===0) load(); }, [open]);

  const addCount = async () => {
    const kw = form.keyword.trim();
    const n = Number(form.count);
    if(!kw){ onToast && onToast("Add a keyword"); return; }
    if(!Number.isFinite(n) || n < 0){ onToast && onToast("Count must be a number"); return; }
    setSaving(true);
    try{
      const res = await fetch("/api/ads-tracker/setter-counts", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({clientKey:cmpClient, keyword:kw, count:n, setter:form.setter.trim()||null, note:form.note.trim()||null}),
      });
      const json = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(json.error || "Save failed");
      setForm({keyword:"", count:"", setter:form.setter, note:""});
      onToast && onToast("Setter count saved");
      await load();
    }catch(err){
      onToast && onToast(err?.message || "Save failed");
    }finally{
      setSaving(false);
    }
  };

  const removeCount = async (id) => {
    try{
      const res = await fetch("/api/ads-tracker/setter-counts?id="+encodeURIComponent(id), {method:"DELETE"});
      if(!res.ok){ const j = await res.json().catch(()=>({})); throw new Error(j.error || "Delete failed"); }
      setCounts(x=>x.filter(c=>c.id!==id));
    }catch(err){
      onToast && onToast(err?.message || "Delete failed");
    }
  };

  const sysMap = systemKeywordWins(campaigns, cmpClient);
  const clientCounts = counts.filter(c=>c.clientKey===cmpClient);
  const setterMap = new Map();
  clientCounts.forEach(c=>{
    const kw = String(c.keyword||"").toUpperCase().trim();
    if(!kw) return;
    const prev = setterMap.get(kw);
    if(prev){ prev.count += Number(c.count||0); prev.entries.push(c); }
    else setterMap.set(kw, {count:Number(c.count||0), entries:[c]});
  });
  const allKw = Array.from(new Set([...sysMap.keys(), ...setterMap.keys()]))
    .sort((a,b)=>(setterMap.get(b)?.count||0)-(setterMap.get(a)?.count||0) || (sysMap.get(b)||0)-(sysMap.get(a)||0) || a.localeCompare(b));

  return (
    <div className="sc-panel">
      <div className="sc-panel-head" onClick={()=>setOpen(o=>!o)}>
        <div>
          <div className="sc-panel-title">
            <span className={"sc-chevron "+(open?"open":"")}>▶</span>
            What you know — setter counts
            <span className="sc-badge">setter-reported · not in ROAS</span>
          </div>
          <div className="sc-panel-sub">Type in wins you know came from a keyword even when the system couldn't trace them. Shown beside the tracked number so the gap is visible — your ROAS and profit never change.</div>
        </div>
      </div>
      {open && (
        <div className="sc-body">
          <div className="sc-form">
            <div className="sc-field">
              <span className="sc-label">Account</span>
              <div className="sc-client-pills">
                <button className={"sc-pill "+(cmpClient==="tyson"?"active":"")} onClick={()=>setCmpClient("tyson")}><span className="sc-dot"></span>Tyson</button>
                <button className={"sc-pill "+(cmpClient==="keith"?"active":"")} onClick={()=>setCmpClient("keith")}><span className="sc-dot keith"></span>Keith</button>
              </div>
            </div>
            <div className="sc-field">
              <span className="sc-label">Keyword</span>
              <input className="sc-input kw" value={form.keyword} onChange={e=>setForm(f=>({...f,keyword:e.target.value}))} placeholder="FOCUS" />
            </div>
            <div className="sc-field">
              <span className="sc-label">Wins</span>
              <input className="sc-input num" type="number" min="0" value={form.count} onChange={e=>setForm(f=>({...f,count:e.target.value}))} placeholder="8" />
            </div>
            <div className="sc-field">
              <span className="sc-label">Setter (optional)</span>
              <input className="sc-input" style={{width:"120px"}} value={form.setter} onChange={e=>setForm(f=>({...f,setter:e.target.value}))} placeholder="Amara" />
            </div>
            <div className="sc-field" style={{flex:1,minWidth:"160px"}}>
              <span className="sc-label">Note (optional)</span>
              <input className="sc-input note" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Tyson's campaign, this month" />
            </div>
            <button className="sc-add-btn" onClick={addCount} disabled={saving}>{saving?"Saving…":"Add"}</button>
          </div>
          <div className="sc-cmp">
            <div className="sc-cmp-grid sc-cmp-head">
              <div>Keyword</div>
              <div className="num">System tracked</div>
              <div className="num">Setter reported</div>
              <div className="num">Gap</div>
              <div></div>
            </div>
            {loading ? (
              <div className="sc-cmp-empty">Loading…</div>
            ) : allKw.length===0 ? (
              <div className="sc-cmp-empty">No keywords yet. Add what you know above, or tracked wins will appear here.</div>
            ) : allKw.map(kw=>{
              const sys = sysMap.get(kw)||0;
              const setterRec = setterMap.get(kw);
              const setter = setterRec?.count;
              const hasSetter = setterRec!=null;
              const gap = hasSetter ? setter - sys : null;
              const gapClass = gap==null ? "neg" : gap>0 ? "pos" : "zero";
              const note = setterRec?.entries?.map(e=>e.note).filter(Boolean)[0] || null;
              const delId = setterRec?.entries?.length===1 ? setterRec.entries[0].id : null;
              return (
                <div className="sc-cmp-grid sc-cmp-row" key={kw}>
                  <div>
                    <span className="sc-kw">{kw}</span>
                    {note && <div className="sc-note-cell">{note}</div>}
                  </div>
                  <div className="num sc-sys">{sys}</div>
                  <div className={"num sc-setter "+(hasSetter?"":"none")}>{hasSetter?setter:"—"}</div>
                  <div className={"num sc-gap "+gapClass}>{gap==null?"—":(gap>0?"+"+gap:gap)}</div>
                  <div>{delId && <button className="sc-del" title="Remove this setter count" onClick={()=>removeCount(delId)}>×</button>}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function AttributionWorkspace({dashboard, campaigns, onResolve, onToast, onClose}){
  const attribution = dashboard?.attribution || {};
  const alerts = Array.isArray(attribution.unmatchedSales) ? attribution.unmatchedSales : [];
  const keywordOptions = Array.isArray(attribution.keywordOptions) ? attribution.keywordOptions : [];
  const campaignOptions = Array.isArray(attribution.campaignOptions) ? attribution.campaignOptions : [];
  const range = dashboard?.query || {};
  const rangeLabel = range.dateFrom && range.dateTo ? `${dateLabelFromIso(range.dateFrom)} - ${dateLabelFromIso(range.dateTo)}` : "selected range";
  const scopedAlerts = alerts.filter(alert=>alertInSelectedRange(alert, range));
  const [clientFilter, setClientFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");
  const [searchQuery, setSearchQuery] = useState("");
  const [modal, setModal] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    const onKey = (event) => {
      if(event.key === "Escape" && !modal) onClose();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose, modal]);

  // The genuinely-untraceable "No ad keyword captured" calls get their own calm
  // section. They stay visible but out of the urgent count and the default view,
  // so the needs-review pile only shows calls a setter can actually act on.
  const actionableAlerts = scopedAlerts.filter(alert=>!alert.noAdKeyword);
  const noKeywordAlerts = scopedAlerts.filter(alert=>alert.noAdKeyword);
  // Count per creator dynamically so Lucy, Antwan, and any future creator get a
  // workspace tab automatically the moment they have an unresolved item — no
  // more tyson/keith hardcoding that silently hid everyone else.
  const clientCounts = { all: actionableAlerts.length };
  for(const alert of actionableAlerts){
    const k = alert.clientKey;
    if(k) clientCounts[k] = (clientCounts[k] || 0) + 1;
  }
  const clientLabel = (key)=>{
    const clients = dashboard && dashboard.moneyModel && dashboard.moneyModel.clients;
    const hit = Array.isArray(clients) ? clients.find(c=>c && c.key===key) : null;
    return (hit && hit.name) || (key ? key.charAt(0).toUpperCase()+key.slice(1) : key);
  };
  const typeCounts = {
    all: actionableAlerts.length,
    revenue: actionableAlerts.filter(alert=>alertWorkspaceKind(alert)==="revenue").length,
    booking: actionableAlerts.filter(alert=>alertWorkspaceKind(alert)==="booking").length,
    keyword: actionableAlerts.filter(alert=>alertWorkspaceKind(alert)==="keyword").length,
    other: actionableAlerts.filter(alert=>["call","other"].includes(alertWorkspaceKind(alert))).length,
    nokeyword: noKeywordAlerts.length,
  };
  const filteredAlerts = scopedAlerts.filter(alert => {
    if(clientFilter !== "all" && alert.clientKey !== clientFilter) return false;
    const kind = alertWorkspaceKind(alert);
    // Keep the untraceable bucket out of every view except its own tab.
    if(typeFilter !== "nokeyword" && kind === "nokeyword") return false;
    if(typeFilter === "nokeyword" && kind !== "nokeyword") return false;
    if(typeFilter === "other" && !["call","other"].includes(kind)) return false;
    if(typeFilter !== "all" && typeFilter !== "other" && typeFilter !== "nokeyword" && kind !== typeFilter) return false;
    const q = searchQuery.trim().toLowerCase();
    if(q && !alertWorkspaceSearchText(alert).includes(q)) return false;
    return true;
  });

  const saveResolution = async (payload) => {
    if(!payload.saleKey) return;
    setSaving(true);
    try{
      await onResolve(payload);
      setModal(null);
    }catch(err){
      onToast && onToast(err?.message || "Attribution save failed");
    }finally{
      setSaving(false);
    }
  };

  return (
    <div className="attribution-workspace">
      <div className="workspace-top">
        <div>
          <div className="workspace-kicker">Selected range queue</div>
          <div className="workspace-title">Attribution Workspace</div>
          <div className="workspace-sub">{actionableAlerts.length} unresolved{noKeywordAlerts.length ? ` · ${noKeywordAlerts.length} no ad keyword` : ""} · {rangeLabel}</div>
        </div>
        <button className="workspace-close" onClick={onClose}>Back to dashboard</button>
      </div>
      <div className="workspace-body">
        <AttributionSummaryTiles dashboard={dashboard} alerts={scopedAlerts} scope="range"/>
        <div className="workspace-toolbar">
          <div className="workspace-filter-row">
            <div className="alerts-tabs">
              {[
                ["all","All",clientCounts.all],
                ...Object.keys(clientCounts)
                  .filter(k=>k!=="all")
                  .sort()
                  .map(k=>[k, clientLabel(k), clientCounts[k]]),
              ].map(([id,label,count])=>(
                <button key={id} className={"alerts-tab "+(clientFilter===id?"active":"")} onClick={()=>setClientFilter(id)}>
                  {label}
                  <span className="alerts-tab-count">{count}</span>
                </button>
              ))}
            </div>
            <div className="workspace-type-tabs">
              {[
                ["all","All",typeCounts.all],

// ------- App
// ===== Deep Dive Report: pure-math reporting view, reactive to time range =====
function aggregateByAdWord(campaigns){
  const map = new Map();
  (campaigns||[]).forEach(c => {
    const accountLabel = c.clientKey==="tyson" ? "Tyson" : c.clientKey==="keith" ? "Keith" : (c.clientKey||"—");
    (c.rows||[]).forEach(r => {
      (r.adRows||[]).forEach(ad => {
        const kw = String(ad.keyword || ad.adName || "UNKNOWN").toUpperCase();
        if(!map.has(kw)) map.set(kw, {keyword:kw, spend:0, imp:0, clicks:0, leads:0, booked:0, taken:0, clients:0, collected:0, active:false, _accounts:new Set(), _campaigns:new Set(), _ads:new Set()});
        const t = map.get(kw);
        t.spend += Number(ad.spend||0);
        t.imp += Number(ad.imp||0);
        t.clicks += Number(ad.clicks||0);
        t.leads += Number(ad.msgs||0);
        t.booked += Number(ad.calls||0);
        t.taken += Number(ad.taken||0);
        t.clients += Number(ad.clients||0);
        t.collected += Number(ad.collected||0);
        if(ad.status==="active") t.active = true;
        t._accounts.add(accountLabel);
        if(c.name) t._campaigns.add(String(c.name).replace(/^.*?—\s*/, ""));
        if(ad.adName) t._ads.add(String(ad.adName));
      });
    });
  });
  return Array.from(map.values()).map(t => ({
    ...t,
    accounts: Array.from(t._accounts),
    campaigns: Array.from(t._campaigns),
    ads: Array.from(t._ads),
  }));
}

// The server already did the careful work of matching collected cash to a
// specific ad (gating ManyChat credit on real spend, etc.). dashboard.adRoas
// is that authoritative per-ad result. We sum it up by ad WORD (keyword) so the
// Deep Dive's ROAS uses the same server-blessed revenue, never a guess.
function roasByKeyword(adRoas){
  const m = new Map();
  (adRoas||[]).forEach(r => {
    const kw = String(r.label || r.adName || "UNKNOWN").toUpperCase();
    if(!m.has(kw)) m.set(kw, {collected:0, spend:0});
    const t = m.get(kw);
    t.collected += Number(r.collectedRevenue||0);
    t.spend += Number(r.adSpend||0);
  });
  return m;
}

// The REAL ads behind each ad word — the actual Facebook creative image and the
// words our reader pulled off it. This is the "is this a real ad or did the
// software make it up?" proof: a kill/scale call can be eyeballed against the
// live creative. Pulled straight from the same authoritative adRoas payload —
// nothing generated. Strongest-spending ad first (most representative).
function adsByKeyword(adRoas){
  const m = new Map();
  (adRoas||[]).forEach(r => {
    const kw = String(r.label || r.adName || "UNKNOWN").toUpperCase();
    const thumb = r.previewThumbnailUrl || r.previewImageUrl || null;
    // full = the higher-resolution image for hover-to-enlarge + open/save.
    const full = r.previewImageUrl || r.previewThumbnailUrl || null;
    const copy = typeof r.onImageText === "string" ? r.onImageText.trim() : "";
    if(!thumb && !copy && !(r.adName)) return;
    if(!m.has(kw)) m.set(kw, []);
    m.get(kw).push({
      adId: r.adId || r.id || null,
      adName: r.adName || r.label || "",
      account: r.clientKey || "",
      campaign: r.campaignName || "",
      adset: r.adsetName || "",
      thumb,
      full,
      copy,
      spend: Number(r.adSpend||0),
    });
  });
  // One keyword = one current ad within the window. Keep only the live, top-spending
  // ad behind each word; a pre-window reuse of the same word is a different ad and
  // must not bleed in. (Sort by spend desc, then take the single representative.)
  m.forEach((list, kw) => {
    list.sort((a,b)=>b.spend-a.spend);
    m.set(kw, list.slice(0,1));
  });
  return m;
}

// Attach honest ROAS to each ad word. "Traced" means we've tied real cash to it.
// Where we can't, roas stays null — we show "not traced yet", never a fake 0×
// that would trick someone into killing a profitable ad.
function withRoas(row, roasMap){
  const rk = roasMap && roasMap.get(row.keyword);
  const tracedRev = rk ? rk.collected : Number(row.collected||0);
  const traced = tracedRev > 0;
  // When we've traced real cash to this word, EVERY money figure rolls up from
  // the same per-ad source the "explore all ads" list uses — so a word's ROAS
  // here is exactly Σ(its ads' revenue) ÷ Σ(its ads' spend) and reconciles ad-
  // for-ad with that list. (Before, ROAS divided traced revenue by the campaign
  // row's spend — two different denominators — so the same word could read 11.9×
  // in one panel and 7.1× in another. That mismatch is what broke trust.) Fall
  // back to the campaign row's spend only when nothing is traced.
  const spend = (rk && rk.spend > 0) ? rk.spend : Number(row.spend||0);
  // Below ~$100 of spend a ROAS multiple is noise off one lucky sale.
  const roasReliable = traced && spend >= 100;
  const roas = (traced && spend > 0) ? tracedRev/spend : null;
  const rate = row.leads>0 ? (row.booked/row.leads)*100 : 0;
  const cpc = row.booked>0 ? spend/row.booked : 0;
  const cpl = row.leads>0 ? spend/row.leads : 0;
  const ctr = row.imp>0 ? (row.clicks/row.imp)*100 : 0;
  return {...row, spend, tracedRev, traced, roas, roasReliable, rate, cpc, cpl, ctr};
}

// ── Decision rules — ONE source of truth ───────────────────────────────────
// The engine (adVerdict, buildPlaybook) AND the on-screen Decision Rules panel
// both read THIS object, so what the page tells the team can never drift from
// what the code actually does (they used to contradict: the panel said "scale at
// 4×, kill under 2× for 3 days", the code scaled at 2× and only killed under 1×).
// Numbers are Alex's confirmed rules, anchored to the unit economics:
//   • ~75.5% variable margin → 3:1 gross GP:CAC ≈ 4× cash ROAS; break-even ≈ 2×.
//   • So 2× = the KPI / break-even line, 3×+ = the keep-and-grow winner floor.
// Built to become user-editable next: swap this constant for a fetched settings
// object and every threshold below follows — no code change needed to retune.
const DECISION_RULES = {
  protectFloor: 3.0,    // 3×+ ROAS = winner. NEVER turned off.
  scaleAt: 3.0,         // 3×+ = scale candidate (raise the ad set's budget).
  kpiLine: 2.0,         // 2× = break-even KPI line. Reliably under it = turn off.
  spendFloor: 100,      // under ~$100 spend a ROAS multiple is one-lucky-sale noise — no verdict.
  windowDays: 14,       // Turn-off/scale cards judge a FIXED trailing window this long
  //                       (≥ the sales cycle so revenue has matured), independent of the
  //                       page's date picker — so a maturing winner is never mistaken for a loser.
  budgetStepLow: 10, budgetStepHigh: 30,        // raise ad-set budget 10–30% / day
  costPerDmLow: 6.75, costPerDmHigh: 12,        // healthy cost-per-DM band ($ above = warning)
  costPerCallLow: 50, costPerCallHigh: 100,     // healthy cost-per-booked-call band
};

// Verdict is pure rules over the real numbers — never AI, never invented. Reads
// DECISION_RULES so it matches the panel exactly. ROAS leads: if we can see the
// money, the verdict is about PROFIT (a call that costs 2× but returns 5× is a
// winner — cost-per-call alone is a vanity metric). Only where revenue isn't
// traced yet do we fall back to booking rate.
function adVerdict(row, R){
  R = R || DECISION_RULES;
  if(row.traced && row.roas != null){
    if(row.roasReliable){
      if(row.roas >= R.protectFloor) return {cls:"v-scale", label:"Scale it", basis:"roas"};
      if(row.roas >= R.kpiLine)      return {cls:"v-ok",    label:"Profitable", basis:"roas"};
      return {cls:"v-kill", label:"Losing money", basis:"roas"};
    }
    return {cls:"v-low", label:"Too early", basis:"roas-early"};
  }
  const rate = row.leads>0 ? (row.booked/row.leads)*100 : 0;
  if(row.leads < 10) return {cls:"v-low", label:"Low volume", basis:"bookings"};
  if(rate < 2) return {cls:"v-kill", label:"Turn off", basis:"bookings"};
  if(rate < 5) return {cls:"v-weak", label:"Weak", basis:"bookings"};
  return {cls:"v-ok", label:"Books well", basis:"bookings"};
}

// Turns the raw numbers into a tiny list of dead-simple, money-first moves.
// Pure rules over real data — anyone could read it and act. ROAS leads:
// scale the proven money-makers, cut the proven money-losers. Only when no
// revenue is traced do we fall back to "this burns cash and books nothing".
// Balanced on purpose: the old version put every scale move first and sliced to
// 5, so big money-pits got pushed off the list entirely — a scaling bias. Now
// scaling and killing are SEPARATE, both first-class, and we quantify the
// reallocation (the instant move: cut the bleeders, point that budget at winners).
function buildPlaybook(rows, R){
  R = R || DECISION_RULES;
  const scaleRoas = [], cutRoas = [], cutBlind = [];
  rows.forEach(r => {
    if(r.traced && r.roasReliable && r.roas != null){
      // 3×+ = winner → scale. Under the 2× KPI line → turn off. The band in
      // between (2–3×) is profitable: keep running, neither scale nor kill.
      // 3×+ can ONLY land in scale, so a winner is never offered up to be killed.
      if(r.roas >= R.scaleAt) scaleRoas.push({...r, type:"scale"});
      else if(r.roas < R.kpiLine) cutRoas.push({...r, type:"kill"});
    } else if(!r.traced && r.spend > 0 && r.leads >= 25 && r.rate < 2.5){
      // No traceable sale + lots of DMs but almost no bookings = likely waste.
      cutBlind.push({...r, type:"kill"});
    }
  });
  scaleRoas.sort((a,b)=>b.roas-a.roas);                                  // best return first
  cutRoas.sort((a,b)=>(b.spend-b.tracedRev)-(a.spend-a.tracedRev));      // biggest bleed first
  cutBlind.sort((a,b)=>b.spend-a.spend);
  // Full sorted lists. ActionPlaybook drops any move already acted on, then
  // recomputes the reallocation hero over what's LEFT — so a killed bleeder
  // stops counting toward "budget to reclaim" the moment Alex marks it done.
  return { scales: scaleRoas, kills: [...cutRoas, ...cutBlind] };
}

// Renders a real Facebook ad creative, degrading gracefully. Facebook's preview
// image links are valid at sync time but expire over time — so if one fails to
// load we fall back to the clean number badge (collapsed) or a small "no
// preview" tile (expanded). A broken-image icon would hurt trust more than help,
// so we never show one. Fresh data → see the real ad; stale link → tidy fallback.
function CreativeImg({src, alt, kind, badge}){
  const [ok, setOk] = useState(true);
  if(kind === "thumb"){
    if(!src || !ok) return <div className="ddr-pnum">{badge}</div>;
    return (
      <div className="ddr-pthumb" title={alt||""}>
        <img src={src} alt={alt} loading="lazy" decoding="async" referrerPolicy="no-referrer" onError={()=>setOk(false)}/>
        <span className="ddr-pbadge">{badge}</span>
      </div>
    );
  }
  if(!src || !ok) return <div className="ddr-padimg noimg">no preview</div>;
  return <img className="ddr-padimg" src={src} alt={alt} loading="lazy" decoding="async" referrerPolicy="no-referrer" onError={()=>setOk(false)}/>;
}

// How sure are we about THIS recommendation? Pure evidence, never invented:
// how many real sales traced to it and how much was spent (the sample size).
// Surfacing this is the honesty win — Alex sees the strength behind every move,
// not just the headline number. See project-ccos-attribution-workspace.
function playbookConfidence(a){
  const sales = a.clients || 0;
  const plural = (n)=> n===1 ? "" : "s";
  if (a.type === "scale") {
    const note = sales+" sale"+plural(sales)+" traced · "+fmtUsd(a.spend)+" spent";
    if (sales >= 3 && a.spend >= 500) return { cls:"hi", label:"High confidence", note };
    if (sales >= 2 || a.spend >= 800) return { cls:"md", label:"Solid signal", note };
    return { cls:"lo", label:"Thin so far", note:"scale gently — "+sales+" sale"+plural(sales)+" traced" };
  }
  if (a.traced) {
    const note = fmtUsd(a.tracedRev)+" back on "+fmtUsd(a.spend)+" spent";
    if (a.spend >= 500) return { cls:"hi", label:"High confidence", note };
    if (a.spend >= 200) return { cls:"md", label:"Solid signal", note };
    return { cls:"lo", label:"Early read", note };
  }
  const leads = a.leads || 0;
  const note = fmtNum(leads)+" leads, 0 sales traced";
  if (leads >= 60) return { cls:"hi", label:"High confidence", note };
  if (leads >= 30) return { cls:"md", label:"Solid signal", note };
  return { cls:"lo", label:"Early read", note };
}

// One action card. Collapsed = the move + the one reason + the dollar impact.
// Tap it open for the full money chain, every supporting number, where the ad
// lives in Meta, and exactly what to do next.
function PlaybookCard({a, i, peak, rangeText, onDid}){
  const [open, setOpen] = useState(false);
  // Hover a creative → a big, high-res peek of the real ad follows the cursor.
  // Click it → open the full image in a new tab so Alex can actually see / save it.
  const [hov, setHov] = useState(null);
  const low = (s)=> String(s||"").toLowerCase();
  const cap = (s)=> s ? s.charAt(0)+s.slice(1).toLowerCase() : s;
  const isKill = a.type==="kill";
  const blind = isKill && !a.traced;
  const word = low(a.keyword);

  const why = a.type==="scale"
    ? <span><b>{fmtUsd(a.spend)}</b> in <span className="ar">→</span> <b>{fmtUsd(a.tracedRev)}</b> back</span>
    : blind
      ? <span><b>{fmtNum(a.leads)}</b> leads · <b>{fmtNum(a.booked)}</b> booked · <b>0</b> sales traced</span>
      : <span><b>{fmtUsd(a.spend)}</b> in <span className="ar">→</span> only <b>{fmtUsd(a.tracedRev)}</b> back</span>;

  const conf = playbookConfidence(a);
  const barPct = Math.max(7, Math.min(100, peak>0 ? (a.type==="scale" ? a.roas : a.spend)/peak*100 : 0));

  const impactBig = a.type==="scale" ? a.roas.toFixed(1)+"×" : fmtUsd(a.spend);
  const impactCap = a.type==="scale" ? "return on spend" : "to reclaim";

  // The real ads behind this word — actual creative + the copy we read off it.
  const previews = Array.isArray(a.previews) ? a.previews : [];
  const hero = previews.find(p=>p.thumb) || previews[0] || null;

  // Hover-to-enlarge + click-to-open helpers for any preview tile.
  const bigUrl = (p)=> (p && (p.full || p.thumb)) || null;
  const showHov = (e, p)=>{ const url=bigUrl(p); if(!url) return; setHov({url, copy:p.copy||"", name:p.adName||word, pos:adPreviewPosition(e)}); };
  const moveHov = (e, p)=>{ const url=bigUrl(p); if(!url) return; setHov(h=> h ? {...h, pos:adPreviewPosition(e)} : {url, copy:p.copy||"", name:p.adName||word, pos:adPreviewPosition(e)}); };
  const hideHov = ()=> setHov(null);
  const openImg = (e, p)=>{ e.stopPropagation(); const url=bigUrl(p); if(url) window.open(url, "_blank", "noopener,noreferrer"); };

  // Self-contained verdict — action leads (bold), the reason (with numbers) supports.
  const roasTxt = a.roas!=null ? a.roas.toFixed(1)+"×" : "—";
  const whyLine = a.type==="scale"
    ? <><span className="pm-act">Raise the ad set's budget 20–30%.</span><span className="pm-rsn">ROAS {roasTxt}, {a.roas>=4?"above your 4× target":"above the 2× floor"}.</span></>
    : blind
      ? <><span className="pm-act">Turn it off.</span><span className="pm-rsn">No sales traced on {fmtUsd(a.spend)} spent — or tag its ManyChat link to prove them.</span></>
      : <><span className="pm-act">Turn it off.</span><span className="pm-rsn">ROAS {roasTxt}, under your 2× floor — move the budget to a winner.</span></>;

  return (
    <div className={"ddr-pcard "+a.type+(open?" open":"")} onClick={()=>setOpen(o=>!o)}>
      <span
        className={"ddr-pthumb-wrap"+(hero && hero.thumb ? " live" : "")}
        onMouseEnter={hero && hero.thumb ? (e)=>showHov(e, hero) : undefined}
        onMouseMove={hero && hero.thumb ? (e)=>moveHov(e, hero) : undefined}
        onMouseLeave={hideHov}
        onClick={hero && hero.thumb ? (e)=>openImg(e, hero) : undefined}
        title={hero && hero.thumb ? "Click to open the full ad image" : undefined}
      >
        <CreativeImg kind="thumb" src={hero && hero.thumb} alt={hero ? ("Real ad creative for "+word) : ""} badge={i+1}/>
      </span>
      <div className="ddr-pmid">
        <div className="ddr-pword">{cap(word)}</div>
        <div className="ddr-psub">{a.traced
          ? <span>{fmtUsd(a.spend)} → {fmtUsd(a.tracedRev)}</span>
          : <span>{fmtUsd(a.spend)} → $0 tracked</span>}</div>
      </div>
      <div className="ddr-pimpact">
        <div className="big">{a.roas!=null ? a.roas.toFixed(1)+"×" : "—"}</div>
        <div className="ddr-pchev">{open ? "−" : "+"}</div>
      </div>

      {open && (
        <div className="ddr-pmore" onClick={(e)=>e.stopPropagation()}>
          {/* 1 — the verdict: what to do, the card's own reason. The lead. */}
          <div className="pm-call">{whyLine}</div>

          {/* 2 — the money flow: in → path → out. Endpoints lead, path recedes. */}
          <div className="pm-flow">
            <div className="pm-end">
              <div className="pm-end-v">{fmtUsd(a.spend)}</div>
              <div className="pm-end-l">spent</div>
            </div>
            <div className="pm-path">
              <span><b>{fmtNum(a.leads)}</b> leads</span>
              <span className="d">·</span>
              <span><b>{fmtNum(a.booked)}</b> booked</span>
              <span className="d">·</span>
              <span className={a.taken>0?"":"z"}><b>{fmtNum(a.taken)}</b> showed</span>
              <span className="d">·</span>
              <span className={a.clients>0?"":"z"}><b>{fmtNum(a.clients)}</b> clients</span>
            </div>
            <div className={"pm-end out"+(a.type==="scale" && a.traced?" win":"")}>
              <div className="pm-end-v">{a.traced?fmtUsd(a.tracedRev):"—"}</div>
              <div className="pm-end-l">{a.traced?"collected":"not traced"}</div>
            </div>
          </div>

          {/* 3 — the ad: proof it's a live, real ad (image + what it says) */}
          {hero && (hero.thumb || hero.copy) && (
            <div className="pm-ad">
              {hero.thumb && (
                <span className="ddr-padimg-wrap live"
                  onMouseEnter={(e)=>showHov(e,hero)} onMouseMove={(e)=>moveHov(e,hero)}
                  onMouseLeave={hideHov} onClick={(e)=>openImg(e,hero)} title="Click to open the full ad image">
                  <CreativeImg kind="full" src={hero.thumb} alt={"Ad creative: "+word}/>
                </span>
              )}
              {hero.copy && <p className="pm-copy">{hero.copy}</p>}
            </div>
          )}

          <div className="pm-rule"></div>

          {/* 4 — fine print: costs + where to act. Recedes. */}
          <div className="pm-fine">
            {(a.cpl>0 || a.cpc>0 || a.leads>0) && (
              <div className="pm-costs">
                {a.cpl>0 && <span><i>Cost/lead</i>{fmtUsd(a.cpl)}</span>}
                {a.cpc>0 && <span><i>Cost/booked call</i>{fmtUsd(a.cpc)}</span>}
                {a.leads>0 && <span><i>Book rate</i>{fmtPct(a.rate,1)}</span>}
              </div>
            )}
            <div className="pm-where">
              <span><i>Creator</i>{hero&&hero.account?cap(hero.account):((a.accounts||[]).length?cap((a.accounts||[])[0]):"—")}</span>
              <span><i>Campaign</i>{hero&&hero.campaign?hero.campaign:((a.campaigns||[]).length?(a.campaigns||[])[0]:"—")}</span>
              <span><i>Ad set</i>{hero&&hero.adset?hero.adset:"—"}</span>
              <span><i>Ad</i>{hero&&hero.adName?cap(hero.adName):cap(word)}</span>
            </div>
          </div>

          {onDid && (
            <button type="button" className={"ddr-pdid "+a.type} onClick={(e)=>{e.stopPropagation(); onDid(a);}}>
              {a.type==="kill" ? "Turned it off — track it" : "Raised the budget — track it"}
            </button>
          )}
        </div>
      )}

      {hov && (
        <div className="ad-preview-popover" style={{left:hov.pos.left, top:hov.pos.top}}>
          <img className="ad-preview-image" src={hov.url} alt={hov.name||""}/>
          {hov.copy
            ? <div className="ad-preview-copy"><div className="ad-preview-copy-label">What this ad says</div><div className="ad-preview-copy-text">{hov.copy}</div></div>
            : <div className="ad-preview-copy empty">No words read off this image yet</div>}
          <div className="ad-preview-hint">Click the image to open / save the full ad ↗</div>
        </div>
      )}
    </div>
  );
}

function ActionPlaybook({rows, rangeText, decByKey, onDid, windowDays}){
  const {scales, kills} = buildPlaybook(rows);
  const acted = decByKey || {};
  const isActed = (a)=> !!acted[String(a.keyword||"").toLowerCase()];
  // Drop anything Alex has already acted on — the whole point of the feedback
  // loop is to stop nagging him to do what's done. The tracker below keeps it.
  // Show EVERY ad that qualifies — no cap. If the rules say 7 ads should be
  // turned off, all 7 show; hiding the 5th+ "for simplicity" silently buried
  // real money-losing decisions. The lists are already sorted worst-first
  // (biggest bleed / best return), so the most urgent moves sit at the top.
  const aScales = scales.filter(a=>!isActed(a));
  const aKills  = kills.filter(a=>!isActed(a));
  const actedCount = scales.filter(isActed).length + kills.filter(isActed).length;

  // Reallocation hero recomputed over ONLY the moves still on the table.
  const freedUp = aKills.reduce((s,r)=>s+r.spend,0);
  const bleed = aKills.reduce((s,r)=>s+(r.traced?Math.max(0,r.spend-r.tracedRev):r.spend),0);
  const scaleSpend = aScales.reduce((s,r)=>s+r.spend,0);
  const winRev = aScales.reduce((s,r)=>s+r.tracedRev,0);
  const blendedWinRoas = scaleSpend>0 ? winRev/scaleSpend : null;
  const reallocReturn = blendedWinRoas!=null ? freedUp*blendedWinRoas : null;
  const killCount = aKills.length;
  const nothing = aScales.length===0 && aKills.length===0;

  // Why a 7-day window can show zero "turn off" cards while 30 days makes them
  // obvious: a kill call needs enough evidence in the SELECTED window — about
  // $100+ of traced spend for a ROAS verdict, or 25+ leads for a no-sale verdict.
  // Short windows simply haven't accumulated that yet. We count the ads still
  // under that bar so we can explain the gap in plain English instead of leaving
  // Alex wondering why the signal "suddenly" appears on a longer range.
  const thin = rows.filter(r => Number(r.spend||0) > 0 && !r.roasReliable && Number(r.leads||0) < 25).length;

  // Peaks anchor each card's strength bar — scales scale by ROAS, kills by the
  // dollars they're burning, so the bar reads as "biggest move" at a glance.
  const scalePeak = aScales.reduce((m,s)=>Math.max(m,s.roas||0),0);
  const killPeak = aKills.reduce((m,k)=>Math.max(m,k.spend||0),0);

  return (
    <div className="ddr-play">
      {windowDays && (
        <div
          style={{fontSize:'9px',letterSpacing:'.11em',textTransform:'uppercase',color:'var(--text-4)',marginBottom:'2px'}}
          title={"These calls always use the last "+windowDays+" days (long enough for sales to land), not the date filter above."}
        >{windowDays}-day window</div>
      )}
      {nothing && (
        <div className="ddr-play-clean">Nothing to scale or cut right now.</div>
      )}

      {aKills.length>0 && (
        <div className="ddr-pgroup">
          <div className="ddr-pgh kill">Turn off</div>
          {aKills.map((a,i)=><PlaybookCard a={a} i={i} peak={killPeak} key={a.keyword} rangeText={rangeText} onDid={onDid}/>)}
        </div>
      )}
      {aScales.length>0 && (
        <div className="ddr-pgroup">
          <div className="ddr-pgh scale">Scale</div>
          {aScales.map((a,i)=><PlaybookCard a={a} i={i} peak={scalePeak} key={a.keyword} rangeText={rangeText} onDid={onDid}/>)}
        </div>
      )}

      {!nothing && aKills.length===0 && thin>0 && (
        <div className="ddr-play-note">Nothing losing money in this window yet.</div>
      )}
    </div>
  );
}
