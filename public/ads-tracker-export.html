<script type="text/babel" data-presets="react">
const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback } = React;

// ------- Icons (minimal, stroke)
const Icon = ({ d, size=14, stroke=1.4 }) => (

const IcSync = () => <Icon d={<><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M3 12a9 9 0 0 0 15 6.7L21 16"/><path d="M21 4v4h-4"/><path d="M3 20v-4h4"/></>}/>;
const IcPlus = () => <Icon d={<><path d="M12 5v14"/><path d="M5 12h14"/></>} />;

const IcEdit = () => <Icon d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></>} />;
const IcBolt = () => <Icon size={13} d={<path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/>} />;

// ------- Helpers
const fmtUsd = (n, d=0) => {
  if(n==null || isNaN(n)) return "—";
  const neg = n<0; n = Math.abs(n);
  const s = n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
  return (neg?"-":"")+"$"+s;
};
const fmtNum = (n, d=0) => (n==null||isNaN(n))? "—" : n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = (n, d=2) => (n==null||isNaN(n))? "—" : n.toFixed(d)+"%";

// ------- Data
// Ad roster per campaign (used to synthesize ad-level rows deterministically)
const TYSON_ADS = [
  {id:"t-fit-01",    name:"FIT",     weight:0.22},
  {id:"t-strong-02", name:"STRONG",  weight:0.20},
  {id:"t-shred-04",  name:"SHRED",   weight:0.17},
  {id:"t-ripped-01", name:"RIPPED",  weight:0.14},
  {id:"t-lean-03",   name:"LEAN",    weight:0.12},
  {id:"t-cut-02",    name:"CUT",     weight:0.09},
  {id:"t-bulk-01",   name:"BULK",    weight:0.06},
];
const KEITH_ADS = [
  {id:"k-goal-02",   name:"GOAL",    weight:0.26},
  {id:"k-dialed-03", name:"DIALED",  weight:0.22},
  {id:"k-focus-01",  name:"FOCUS",   weight:0.19},
  {id:"k-ready-04",  name:"READY",   weight:0.15},
  {id:"k-power-06",  name:"POWER",   weight:0.11},
  {id:"k-drive-02",  name:"DRIVE",   weight:0.07},
];

// Deterministic pseudo-random so ad rows are stable between renders
function seededRand(seed){
  let s = 0;
  for(let i=0;i<seed.length;i++) s = ((s<<5)-s + seed.charCodeAt(i))|0;
  s = Math.abs(s);
  return () => {
    s = (s*9301 + 49297) % 233280;
    return s/233280;
  };
}

// Split a daily total across ads by weight, with small jitter
function splitByWeight(total, ads, seedStr, rounding=0){
  total = Number(total || 0);
  const rand = seededRand(seedStr);
  // apply jitter to weights
  const jittered = ads.map(a => ({...a, jw: a.weight * (0.82 + rand()*0.36)}));
  const jSum = jittered.reduce((a,b)=>a+b.jw,0);
  let acc = 0;
  const out = jittered.map((a,i) => {
    let v;
    if(i === jittered.length-1) v = total - acc;
    else {
      v = total * (a.jw/jSum);
      if(rounding === 0) v = Math.round(v);
      else v = Math.round(v*Math.pow(10,rounding))/Math.pow(10,rounding);
      acc += v;
    }
    return {id:a.id, name:a.name, v};
  });
  return out;
}

function buildAdRows(campaignId, dayRow, adRoster){
  if(Array.isArray(dayRow.adRows) && dayRow.adRows.length){
    return dayRow.adRows.map(ad => ({
      adId: ad.adId,
      adName: ad.adName,
      previewImageUrl: ad.previewImageUrl || ad.previewThumbnailUrl || null,
      previewThumbnailUrl: ad.previewThumbnailUrl || null,
      spend: ad.spend || 0,
      imp: ad.imp || 0,
      clicks: ad.clicks || 0,
      msgs: ad.msgs || 0,
      calls: ad.calls || 0,
      taken: ad.taken || 0,
      clients: ad.clients || 0,
      mainClients: ad.mainClients ?? ad.clients ?? 0,
      subClients: ad.subClients || 0,
      collected: ad.collected || 0,
    }));
  }
  // Never invent ad-level metrics. If Meta did not return rows for the ads on
  // this date, show an explicit empty state instead of splitting campaign totals.
  return [];
}

function aggregateAdRowsForCampaign(campaign){
  const adsById = new Map();

  (campaign.rows || []).forEach(row => {
    buildAdRows(campaign.id, row, campaign.ads || []).forEach(ad => {

// Derive per-row metrics
function deriveRow(r){
  const cpm = r.imp>0 ? (r.spend / r.imp) * 1000 : 0;  // cost per 1000 impressions
  const ctr = r.imp>0 ? (r.clicks/r.imp)*100 : 0;
  const cpc = r.clicks>0 ? r.spend / r.clicks : 0;
  const cpMsg = r.msgs>0 ? r.spend / r.msgs : 0;  // cost per message (DM)
  const cpCall = r.calls>0 ? r.spend/r.calls : null;
  const cpTaken = r.taken>0 ? r.spend/r.taken : null;
  const cpClient = r.clients>0 ? r.spend/r.clients : null;
  const closingBase = r.taken || r.calls;
  const closing = closingBase>0 ? (r.clients/closingBase)*100 : 0;
  const msgConv = r.msgs>0 ? (r.calls/r.msgs)*100 : 0;
  const collectedRoi = r.spend>0 ? (r.collected/r.spend) : 0;
  return {...r,cpm,ctr,cpc,cpMsg,cpCall,cpTaken,cpClient,closing,msgConv,collectedRoi};
}

function aggregate(rows){
  const sum = (k) => rows.reduce((a,r)=>a+(r[k]||0),0);
  const spend = sum("spend"), imp=sum("imp"), clicks=sum("clicks"), msgs=sum("msgs"),
    calls=sum("calls"), taken=sum("taken"), clients=sum("clients"),
    collected=sum("collected");
  return deriveRow({date:"Total", spend, imp, clicks, msgs, calls, taken, clients, collected});
}

function isoDate(d){
  return d.toISOString().slice(0,10);
}

function todayEt(){
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(new Date());
}

function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z");
  d.setUTCDate(d.getUTCDate()+days);
  return isoDate(d);
}

function monthStartIso(date){
  return (date || todayEt()).slice(0,7)+"-01";
}

function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00");
  d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}

function monthTitle(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return d.toLocaleDateString("en-US", {month:"long", year:"numeric"});
}

function daysInMonth(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

function isoForMonthDay(monthIso, day){
  return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`;
}

function isoFromAnyDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return String(value).slice(0,10);
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(d);
}

function timeFromAnyDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleTimeString("en-US", {
    timeZone:"America/New_York",
    hour:"numeric",
    minute:"2-digit",
  }).replace(" AM","a").replace(" PM","p");
}

function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){
    const y = shiftIso(anchor, -1);
    return {preset:id, dateFrom:y, dateTo:y};
  }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){
    const start = shiftMonth(monthStartIso(anchor), -1);
    return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))};
  }
  return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
}

function dateLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}

function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom);
  const to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}

function labelForPreset(id){
  return PRESETS.find(p=>p.id===id)?.label || "Custom";
}

function metricRowFromApi(row, dateLabel){
  return {
    date: dateLabel || row.dateLabel || row.keyword || "Total",
    spend: Number(row.adSpend || 0),
    imp: Number(row.impressions || 0),
    clicks: Number(row.linkClicks || 0),
    msgs: Number(row.messages || 0),
    calls: Number(row.bookedCalls || 0),
    taken: Number(row.callsTaken || 0),
    clients: Number(row.newClients || 0),
    mainClients: Number(row.mainOfferClients ?? row.newClients ?? 0),
    subClients: Number(row.subscriptionClients || 0),
    collected: Number(row.collectedRevenue || 0),
  };
}

function addMetric(target, row){
  target.spend += row.spend || 0;
  target.imp += row.imp || 0;
  target.clicks += row.clicks || 0;
  target.msgs += row.msgs || 0;
  target.calls += row.calls || 0;
  target.taken += row.taken || 0;
  target.clients += row.clients || 0;
  target.mainClients += row.mainClients ?? row.clients ?? 0;
  target.subClients += row.subClients || 0;
  target.collected += row.collected || 0;
}

function emptyMetric(date){
  return {date, spend:0, imp:0, clicks:0, msgs:0, calls:0, taken:0, clients:0, mainClients:0, subClients:0, collected:0};
}

function campaignsFromDashboard(dashboard, range){
  if(!dashboard || dashboard.error || !Array.isArray(dashboard.rows) || dashboard.rows.length===0) {
    return [];
  }

  const sourceRows = Array.isArray(dashboard.dailyRows) && dashboard.dailyRows.length
    ? dashboard.dailyRows
    : dashboard.rows.map(row => ({...row, dateLabel: rangeLabel(range)}));
  const campaignMap = new Map();

  for(const apiRow of sourceRows){
    const client = apiRow.clientKey || "unknown";
    // Show EVERY creator's data, not just the two we started with. Only skip
    // rows with no real creator attached. (Previously this hard-coded
    // tyson/keith and silently dropped Lucy, Antwan and any future creator.)
    if(client==="unknown") continue;
    const keyword = (apiRow.keyword || "UNKNOWN").toUpperCase();
    const clientLabel = creatorName(client);
    const attributionOnly = Boolean(apiRow.attributionOnly) || (!apiRow.campaignId && !apiRow.adId && !Number(apiRow.adSpend || 0));
    const campaignId = apiRow.campaignId || `${client}:keyword-attribution`;
    const campaignKey = `${client}:${campaignId}`;
    const campaignName = apiRow.campaignName || `${clientLabel} — Keyword Attribution`;
    const adId = apiRow.adId || `${campaignKey}:${keyword.toLowerCase()}`;
    const adName = (apiRow.adName || keyword || apiRow.name).toUpperCase();
    const previewImageUrl = apiRow.previewImageUrl || apiRow.previewThumbnailUrl || null;
    const previewThumbnailUrl = apiRow.previewThumbnailUrl || null;
    const rowStatus = apiRow.status === "finished" ? "finished" : "active";
    const dateKey = /^\d{4}-\d{2}-\d{2}$/.test(apiRow.dateLabel || "")
      ? apiRow.dateLabel
      : (apiRow.date || apiRow.dateLabel || range.dateTo);
    const dateLabel = /^\d{4}-\d{2}-\d{2}$/.test(dateKey) ? dateLabelFromIso(dateKey) : dateKey;
    const row = metricRowFromApi(apiRow, dateLabel);

    if(!campaignMap.has(campaignKey)){
      campaignMap.set(campaignKey, {
        id: campaignKey,
        clientKey: client,
        name: campaignName,
        short: `${clientLabel} · ${campaignName.replace(/^.*?—\s*/, "")}`,
        attributionOnly,
        status: rowStatus,
        latestIso: dateKey,
        hasSpend: false,
        dot: client,
        adsByName: new Map(),
        rowsByDate: new Map(),
      });
    }

    const campaign = campaignMap.get(campaignKey);
    campaign.attributionOnly = campaign.attributionOnly && attributionOnly;
    if(rowStatus==="active") campaign.status = "active";
    if(String(dateKey).localeCompare(String(campaign.latestIso || "")) > 0) campaign.latestIso = dateKey;
    if(Number(row.spend || 0) > 0) campaign.hasSpend = true;
    if(!campaign.adsByName.has(adId)){
      campaign.adsByName.set(adId, {id:adId, name:adName, keyword, previewImageUrl, previewThumbnailUrl, status:rowStatus, weight:1});
    }else{
      const existingAd = campaign.adsByName.get(adId);
      if(existingAd){
        existingAd.previewImageUrl = existingAd.previewImageUrl || previewImageUrl;
        existingAd.previewThumbnailUrl = existingAd.previewThumbnailUrl || previewThumbnailUrl;
        if(rowStatus==="active") existingAd.status = "active";
      }
    }

    if(!campaign.rowsByDate.has(dateKey)){
      campaign.rowsByDate.set(dateKey, {...emptyMetric(dateLabel), iso:dateKey, status:rowStatus, adRows:[]});
    }

    const day = campaign.rowsByDate.get(dateKey);
    addMetric(day, row);
    if(rowStatus==="active") day.status = "active";
    day.adRows.push({
      ...row,
      adId,
      adName,
      keyword,
      previewImageUrl,
      previewThumbnailUrl,
      status: rowStatus,
    });
  }

  const campaigns = Array.from(campaignMap.values()).map(c => {
    const ads = Array.from(c.adsByName.values()).sort((a,b)=>a.name.localeCompare(b.name));
    const rows = Array.from(c.rowsByDate.values())
      .sort((a,b)=>String(b.iso).localeCompare(String(a.iso)))
      .map(row => ({
        ...row,
        adRows: row.adRows.sort((a,b)=>b.collected-a.collected || b.spend-a.spend),
      }));
    const hasRangeSpend = rows.some(row => Number(row.spend || 0) > 0);
    return {...c, ads, adCount:ads.length, rows, hasSpend:hasRangeSpend || c.hasSpend};
  });

  return campaigns.sort((a,b)=>String(b.latestIso || "").localeCompare(String(a.latestIso || "")));
}

function labelsFromCampaigns(campaigns){
  const labels = Array.from(new Set(campaigns.flatMap(c => c.rows.map(r => r.date))));
  return labels.length ? labels.sort((a,b)=>{
    const ai = campaigns.flatMap(c=>c.rows).find(r=>r.date===a)?.iso || a;
    const bi = campaigns.flatMap(c=>c.rows).find(r=>r.date===b)?.iso || b;
    return String(ai).localeCompare(String(bi));
  }) : DAY_LABELS;
}

function rowSortKey(row){
  return row?.iso || row?.date || "";
}

function filterCampaignsBySearch(campaigns, search){
  const term = (search || "").trim().toLowerCase();
  if(!term) return campaigns;

  return campaigns.map(c => {
    const campaignMatches = [c.name, c.short, c.id, c.clientKey].some(v => String(v || "").toLowerCase().includes(term));
    if(campaignMatches) return c;

    const rows = c.rows.map(row => {
      const adRows = (row.adRows || []).filter(ad =>
        [ad.adName, ad.adId].some(v => String(v || "").toLowerCase().includes(term))
      );
      if(!adRows.length) return null;

      const next = {...emptyMetric(row.date), iso:row.iso, adRows};
      adRows.forEach(ad => addMetric(next, metricRowFromApi({
        adSpend:ad.spend,
        impressions:ad.imp,
        linkClicks:ad.clicks,
        messages:ad.msgs,
        bookedCalls:ad.calls,
        callsTaken:ad.taken,
        newClients:ad.clients,
        mainOfferClients:ad.mainClients,
        subscriptionClients:ad.subClients,
        collectedRevenue:ad.collected,
      }, row.date)));
      return next;
    }).filter(Boolean);

    if(!rows.length) return null;
    const adsById = new Map();
    rows.forEach(row => row.adRows.forEach(ad => {
      if(!adsById.has(ad.adId)) adsById.set(ad.adId, {id:ad.adId, name:ad.adName, weight:1});
    }));
    const ads = Array.from(adsById.values()).sort((a,b)=>a.name.localeCompare(b.name));
    return {...c, rows, ads, adCount:ads.length};
  }).filter(Boolean);
}

function scopeCampaigns(campaigns, account, status){
  return campaigns.filter(c => {
    if(account !== "all" && account !== (c.clientKey || c.id)) return false;
    if(status !== "all" && status !== c.status) return false;
    return true;
  });
}

function applyLocalEntriesToCampaigns(campaigns, entries){
  if(!entries?.length) return campaigns;
  const bucketToMetric = {msgs:"msgs", calls:"calls", taken:"taken", clients:"clients", collected:"collected"};
  return campaigns.map(c => {
    const matching = entries.filter(e => e.camp === c.id && bucketToMetric[e.bucket]);
    if(!matching.length) return c;
    const rows = c.rows.map((row, idx) => {
      if(idx !== 0) return row;
      const next = {...row, adRows: row.adRows ? row.adRows.map(ad => ({...ad})) : row.adRows};
      matching.forEach(e => {
        const metric = bucketToMetric[e.bucket];
        const value = Number(e.value || 0);
        const previousMainClients = next.mainClients ?? next.clients ?? 0;
        next[metric] = (next[metric] || 0) + value;
        if(metric === "clients") next.mainClients = previousMainClients + value;
        if(Array.isArray(next.adRows)){
          const keyword = String(e.kw || "").toUpperCase();
          const ad = next.adRows.find(a => String(a.adName || "").toUpperCase() === keyword);
          if(ad) {
            const previousAdMainClients = ad.mainClients ?? ad.clients ?? 0;
            ad[metric] = (ad[metric] || 0) + value;
            if(metric === "clients") ad.mainClients = previousAdMainClients + value;
          }
        }
      });
      return next;
    });
    return {...c, rows};
  });
}

const PRESETS = [
  {id:"today",label:"Today",days:0},
  {id:"yesterday",label:"Yesterday",days:-1},
  {id:"last3",label:"Last 3 days",days:3},
  {id:"last7",label:"Last 7 days",days:7},
  {id:"last14",label:"Last 14 days",days:14},
  {id:"last30",label:"Last 30 days",days:30},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];

function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button
              key={i}
              className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")}
              onClick={()=>onPick(x.iso)}
            >
              {x.d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || rangeForPreset("last7"));
  const [monthIso, setMonthIso] = useState(monthStartIso((value || rangeForPreset("last7")).dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const current = value || rangeForPreset("last7");
  useEffect(()=>{
    if(open){
      setDraft(current);
      setMonthIso(monthStartIso(current.dateTo));
      setSelectingEnd(false);
    }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){
        setSelectingEnd(true);
        return {preset:"custom", dateFrom:iso, dateTo:iso};
      }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="dim" style={{fontSize:11}}>· {rangeLabel(current)}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop" style={{minWidth:520}}>
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div
                key={p.id}
                className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom") {
                    onChange && onChange(rangeForPreset(p.id));
                    setOpen(false);
                  } else {
                    setDraft({...draft, preset:"custom"});
                    setSelectingEnd(false);
                  }
                }}
              >
                <span>{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar
              monthIso={monthIso}
              rangeStart={draft.dateFrom}
              rangeEnd={draft.dateTo}
              onPick={pickDate}
              onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))}
            />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      {open && (

          {options.map(o=>(
            <div key={o.id} className={"pop-item "+(value===o.id?"selected":"")} onClick={()=>{onChange(o.id);setOpen(false);}}>
              <span>{o.label}</span>
              <span className="check"><IcCheck/></span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ------- Status segmented
function Segmented({options, value, onChange}){

        <button key={o.id} className={"seg "+(value===o.id?"active":"")} onClick={()=>onChange(o.id)}>{o.label}</button>
      ))}

  );

// ------- Campaign table
const DEFAULT_COL_WIDTHS = {
  date: 150, spend: 110, imp: 120, cpm: 90, clicks: 110, ctr: 90, cpc: 90,
  msgs: 110, calls: 120, cpCall: 145, taken: 110, cpTaken: 145, clients: 110, collected: 140,
  cpMsg: 110, closing: 130, msgConv: 120, cpClient: 130, collectedRoi: 140,
};

// Keys that are calculated (vs logged/imported)
const CALC_KEYS = new Set(["cpm","ctr","cpc","cpMsg","cpCall","cpTaken","cpClient","closing","msgConv","collectedRoi"]);
const LOGGED_KEYS = new Set(["msgs","calls","taken","clients","collected"]);

function CampaignTable({account, status, loggedTotals, campaigns=CAMPAIGNS}){
  const [view, setView] = useState("campaign"); // 'campaign' | 'ad'
  const [expanded, setExpanded] = useState({tyson:false, keith:false});
  const [expandedDays, setExpandedDays] = useState({});
  const [sort, setSort] = useState({key:"date", dir:"desc"});
  const [widths, setWidths] = useState(DEFAULT_COL_WIDTHS);
  const [resizingKey, setResizingKey] = useState(null);

  const startResize = (k, e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = widths[k];
    setResizingKey(k);
    const onMove = (ev) => {
      const newW = Math.max(60, startW + (ev.clientX - startX));
      setWidths(w => ({...w, [k]: newW}));
    };
    const onUp = () => {
      setResizingKey(null);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const toggleSort = (key) => {
    setSort(current => ({
      key,
      dir: current.key === key && current.dir === "desc" ? "asc" : "desc",
    }));
  };

  const valueForSort = (row, key) => {
    if(key === "date") return row.latestIso || row.iso || row.date || "";
    const derived = deriveRow(row);
    const value = derived[key];
    return Number.isFinite(Number(value)) ? Number(value) : 0;
  };

  const compareBySort = (a, b, key=sort.key, dir=sort.dir) => {
    const av = valueForSort(a, key);
    const bv = valueForSort(b, key);
    const mult = dir === "asc" ? 1 : -1;
    if(typeof av === "string" || typeof bv === "string"){
      return String(av).localeCompare(String(bv)) * mult;
    }
    return (av - bv) * mult;
  };

  const statusLabelForCampaign = (campaign) => {
    if(campaign.status === "active") return "Active";
    if(!campaign.hasSpend) return "No spend";
    return "Off";
  };

  // Apply loggedTotals onto campaign rows (add to latest date)
  const augmentedCampaigns = campaigns.map(c => {
    const bump = loggedTotals?.[c.id] || {};
    const rows = c.rows.map((r, idx) => {
      if(idx !== 0) return r; // apply to newest (first in desc array)
      return {
        ...r,
        msgs: r.msgs + (bump.msgs||0),
        calls: r.calls + (bump.calls||0),
        taken: (r.taken||0) + (bump.taken||0),
        clients: r.clients + (bump.clients||0),
        mainClients: (r.mainClients ?? r.clients ?? 0) + (bump.clients||0),
        subClients: r.subClients || 0,
        collected: r.collected + (bump.collected||0),
      };
    });
    return {...c, rows};
  });

  const totalCampaigns = augmentedCampaigns.filter(c=>{
    if(account!=="all" && account!==(c.clientKey || c.id)) return false;
    if(status!=="all" && status!==c.status) return false;
    return true;
  });
  const visibleCampaigns = totalCampaigns
    .filter(c => !c.attributionOnly)
    .sort((a,b) => compareBySort({...aggregate(a.rows), latestIso:a.latestIso}, {...aggregate(b.rows), latestIso:b.latestIso}));
  const tableCampaigns = augmentedCampaigns.filter(c => !c.attributionOnly);

  const setTableView = (next) => {
    setView(next);
  };

  const cols = [
    {k:"date", label:"Campaign / Date"},
    {k:"spend", label:"Ad spend", fmt:(r)=>fmtUsd(r.spend,0), cls:()=>""},
    {k:"imp", label:"Impressions", fmt:(r)=>fmtNum(r.imp)},
    {k:"cpm", label:"CPM", fmt:(r)=>"$"+r.cpm.toFixed(2), cls:(r)=> r.cpm<=7?"pos":(r.cpm>=10?"neg":"dim"), calc:true},
    {k:"clicks", label:"Link clicks", fmt:(r)=>fmtNum(r.clicks)},
    {k:"ctr", label:"CTR", fmt:(r)=>fmtPct(r.ctr,2), cls:(r)=> r.ctr>=2.0?"pos":(r.ctr<1.7?"neg":""), calc:true},
    {k:"cpc", label:"CPC", fmt:(r)=>"$"+r.cpc.toFixed(2), cls:(r)=> r.cpc<=0.35?"pos":(r.cpc>=0.45?"neg":""), calc:true},
    {k:"msgs", label:"Messages", fmt:(r)=>fmtNum(r.msgs), logged:true},
    {k:"cpMsg", label:"Cost / msg", fmt:(r)=>"$"+r.cpMsg.toFixed(2), cls:(r)=> r.cpMsg<=5?"pos":(r.cpMsg>=6.5?"neg":""), calc:true},
    {k:"calls", label:"45-min calls booked", fmt:(r)=>fmtNum(r.calls), logged:true},
    {k:"cpCall", label:"Cost / 45-min booked", fmt:(r)=> r.cpCall?"$"+r.cpCall.toFixed(0):"—", cls:(r)=> r.cpCall && r.cpCall<=30?"pos":(r.cpCall && r.cpCall>=40?"neg":""), calc:true},
    {k:"taken", label:"45-min calls taken", fmt:(r)=>fmtNum(r.taken), logged:true},
    {k:"cpTaken", label:"Cost / call taken", fmt:(r)=> r.cpTaken?"$"+r.cpTaken.toFixed(0):"—", cls:(r)=> r.cpTaken && r.cpTaken<=45?"pos":(r.cpTaken && r.cpTaken>=70?"neg":""), calc:true},
    {k:"clients", label:"New clients", fmt:(r)=>fmtNum(r.clients), cls:(r)=> r.clients>=5?"pos":(r.clients<=2?"neg":""), logged:true},
    {k:"closing", label:"Call close rate", fmt:(r)=>fmtPct(r.closing,0), cls:(r)=> r.closing>=40?"pos":(r.closing<=25?"neg":""), calc:true},
    {k:"msgConv", label:"Msg → call", fmt:(r)=>fmtPct(r.msgConv,1), cls:(r)=> r.msgConv>=15?"pos":(r.msgConv<=12?"neg":""), calc:true},
    {k:"collected", label:"Collected rev", fmt:(r)=>fmtUsd(r.collected), cls:()=>"pos", logged:true},
    {k:"cpClient", label:"Cost / client", fmt:(r)=> r.cpClient?"$"+r.cpClient.toFixed(0):"—", cls:(r)=> r.cpClient && r.cpClient<=80?"pos":(r.cpClient && r.cpClient>=120?"neg":""), calc:true},
    {k:"collectedRoi", label:"Collected ROI", fmt:(r)=>r.collectedRoi.toFixed(1)+"×", cls:(r)=> r.collectedRoi>=20?"pos":(r.collectedRoi<=10?"neg":""), calc:true},
  ];

  const totalMin = cols.reduce((s,c)=>s+widths[c.k], 0);

  const overall = useMemo(()=>{
    const allRows = visibleCampaigns.flatMap(c=>c.rows);
    return aggregate(allRows);
  },[visibleCampaigns]);

  return (
    <div className="panel">
      <div className="tbl-toolbar">
        <div className="tbl-view-toggle">
          <button className={"tvt-btn "+(view==="campaign"?"active":"")} onClick={()=>setView("campaign")}>
            Campaign level
          </button>
          <button className={"tvt-btn "+(view==="ad"?"active":"")} onClick={()=>setTableView("ad")}>
            Ad level
            <span className="tvt-count">{tableCampaigns.reduce((sum,c)=>sum+(c.ads?.length||0),0)}</span>
          </button>
        </div>
        <div className="tbl-toolbar-meta"></div>
      </div>
      <div className="tbl-scroll" style={{cursor: resizingKey?"col-resize":"auto"}}>
        <table className="ads" style={{minWidth: totalMin}}>
          <colgroup>
            {cols.map(c => <col key={c.k} style={{width: widths[c.k]}} />)}
          </colgroup>
          <thead>
            <tr>
              {cols.map((c,i)=>(
                <th
                  key={c.k}
                  className={(i===0?"":"num ")+(c.calc?"calc ":"")+(c.logged?"logged ":"")+"sortable-th "+(sort.key===c.k?"sorted":"")}
                  style={{position:"relative"}}
                  onClick={()=>toggleSort(c.k)}
                >
                  <span className="th-inner">
                    {i===0 && view==="ad" ? "Campaign / Date / Ad" : c.label}
                    <span className="sort-arrow">{sort.key===c.k ? (sort.dir==="desc" ? "↓" : "↑") : "↕"}</span>
                  </span>
                  <span
                    className={"col-resize "+(resizingKey===c.k?"active":"")}
                    onMouseDown={(e)=>startResize(c.k, e)}
                  ></span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {visibleCampaigns.length === 0 && (
              <tr>
                <td colSpan={cols.length} style={{textAlign:"left",color:"var(--text-3)",padding:"18px 20px"}}>
                  No ads match these filters.
                </td>
              </tr>
            )}
            {visibleCampaigns.map(c => {
              const agg = aggregate(c.rows);
              const isOpen = expanded[c.id];
              const orderedRows = [...c.rows].sort((a,b)=>compareBySort(a,b));
              const shortName = widths.date < 200 ? c.short : c.name;
              const statusLabel = statusLabelForCampaign(c);
              return (
                <React.Fragment key={c.id}>
                  <tr className="campaign-row" onClick={()=>setExpanded(s=>({...s,[c.id]:!s[c.id]}))} style={{cursor:'pointer'}}>
                    <td>
                      <div className="campaign-cell">
                        <span className="chevron">{isOpen?"▾":"▸"}</span>
                        <span className={"camp-dot "+c.dot}></span>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{shortName}</span>
                        {view==="ad" && (
                          <span className="ad-count-chip">{c.ads.length} ads</span>
                        )}
                        <span className={"status-pill "+(c.status==="active"?"active":"finished")+" "+(!c.hasSpend?"empty":"")}>{statusLabel}</span>
                      </div>
                    </td>
                    {cols.slice(1).map(col=>{
                      const cls = (col.cls? col.cls(agg):"")+(col.calc?" calc":"");
                      return <td key={col.k} className={cls}>{col.fmt(agg)}</td>;
                    })}
                  </tr>
                  {isOpen && view==="ad" && (()=>{
                    const adTotals = aggregateAdRowsForCampaign(c);
                    if(adTotals.length===0){
                      return (
                        <tr className="ad-row">
                          <td colSpan={cols.length}>
                            <span style={{paddingLeft:30,color:'var(--text-4)',fontSize:11}}>No ad-level data returned by Meta for this date range.</span>
                          </td>
                        </tr>
                      );
                    }
                    return adTotals.map(ad => {
                      const adMetrics = deriveRow({
                        date: ad.adName,
                        spend: ad.spend, imp: ad.imp, clicks: ad.clicks,
                        msgs: ad.msgs, calls: ad.calls, clients: ad.clients,
                        taken: ad.taken,
                        collected: ad.collected,
                      });
                      return (
                        <tr key={c.id+":ad:"+ad.adId} className="ad-row">
                          <td>
                            <span style={{paddingLeft:30,color:'var(--text-2)',display:'inline-flex',alignItems:'center',gap:8,fontSize:12}}>
                              <span className="ad-id mono">{ad.adId}</span>
                              <span style={{color:'var(--text-3)'}}>·</span>
                              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ad.adName}</span>
                            </span>
                          </td>
                          {cols.slice(1).map(col=>{
                            const cls = (col.cls? col.cls(adMetrics):"")+(col.calc?" calc":"");
                            let val;
                            try { val = col.fmt(adMetrics); } catch(e){ val = "—"; }
                            return <td key={col.k} className={cls} style={{fontSize:11.5}}>{val}</td>;
                          })}
                        </tr>
                      );
                    });
                  })()}
                  {isOpen && view!=="ad" && orderedRows.map(r0=>{
                    const r = deriveRow(r0);
                    const isAdView = view === "ad";
                    const dayKey = `${c.id}:${r0.iso || r0.date}`;
                    const dayOpen = Boolean(expandedDays[dayKey]);
                    const dayAdRows = isAdView
                      ? buildAdRows(c.id, r0, c.ads).sort((a,b)=>compareBySort(a,b))
                      : [];
                    return (
                      <React.Fragment key={c.id+r.date}>
                        <tr
                          className={isAdView?"day-row":""}
                          style={isAdView?{cursor:'pointer'}:undefined}
                          onClick={isAdView ? (e)=>{e.stopPropagation(); setExpandedDays(s=>({...s,[dayKey]:!s[dayKey]}));} : undefined}
                        >
                          <td>
                            <span style={{paddingLeft:30,color:'var(--text-3)',display:'inline-flex',alignItems:'center',gap:8}} className="mono">
	                              {isAdView && <span className="day-chevron">{dayOpen?"▾":"▸"}</span>}
	                              {r.date}
	                              {isAdView && <span className="day-ad-count">{dayAdRows.length}</span>}
	                            </span>
	                          </td>
                          {cols.slice(1).map(col=>{
                            const cls = (col.cls? col.cls(r):"")+(col.calc?" calc":"");
                            return <td key={col.k} className={cls}>{col.fmt(r)}</td>;
                          })}
                        </tr>
	                        {isAdView && dayOpen && dayAdRows.length === 0 && (
	                          <tr className="ad-row">
	                            <td colSpan={cols.length}>
	                              <span style={{paddingLeft:56,color:'var(--text-4)',fontSize:11}}>No individual ad rows for this date.</span>
	                            </td>
	                          </tr>
	                        )}
	                        {isAdView && dayOpen && dayAdRows.map(ad => {
	                            const adMetrics = deriveRow({
	                              date: ad.adName,
	                              spend: ad.spend, imp: ad.imp, clicks: ad.clicks,
                              msgs: ad.msgs, calls: ad.calls, clients: ad.clients,
                              taken: ad.taken,
                              collected: ad.collected,
                            });
                            return (
                              <tr key={c.id+r.date+ad.adId} className="ad-row">
                                <td>
                                  <span style={{paddingLeft:56,color:'var(--text-2)',display:'inline-flex',alignItems:'center',gap:8,fontSize:12}}>
                                    <span className="ad-id mono">{ad.adId}</span>
                                    <span style={{color:'var(--text-3)'}}>·</span>
                                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ad.adName}</span>
                                  </span>
                                </td>
                                {cols.slice(1).map(col=>{
                                  const cls = (col.cls? col.cls(adMetrics):"")+(col.calc?" calc":"");
                                  let val;
                                  try { val = col.fmt(adMetrics); } catch(e){ val = "—"; }
                                  return <td key={col.k} className={cls} style={{fontSize:11.5}}>{val}</td>;
                                })}
                              </tr>
                            );
                          })}
                      </React.Fragment>
                    );
                  })}
                </React.Fragment>
              );
            })}
            <tr className="total-row">
              <td>Total</td>
              {cols.slice(1).map(col=>{
                const cls = (col.cls? col.cls(overall):"")+(col.calc?" calc":"");
                return <td key={col.k} className={cls}>{col.fmt(overall)}</td>;
              })}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ------- Shared line chart (curvy, 2 lines, fade, hover tooltip)
// Catmull-Rom → cubic bezier so the curve is smooth with sparse points
function smoothPath(points){
  if(points.length < 2) return "";
  const p = points;
  let d = `M ${p[0].x} ${p[0].y}`;
  for(let i=0; i<p.length-1; i++){
    const p0 = p[i-1] || p[i];
    const p1 = p[i];
    const p2 = p[i+1];
    const p3 = p[i+2] || p2;
    const t = 0.18;
    const c1x = p1.x + (p2.x - p0.x) * t;
    const c1y = p1.y + (p2.y - p0.y) * t;
    const c2x = p2.x - (p3.x - p1.x) * t;
    const c2y = p2.y - (p3.y - p1.y) * t;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function LineChart({series, labels, height=200, width=640, fmt=(v)=>v, fmtRight, primaryColor="var(--gold)", yLabel=""}){
  // series: [{name, values[], color, dashed?, isPrimary?, fmt?, axis?: 'left'|'right'}]
  const [hoverIdx, setHoverIdx] = useState(null);
  const hasRight = series.some(s => s.axis === "right");
  const pad = {t: hasRight ? 30 : 22, r: hasRight ? 52 : 16, b: 28, l: 46};
  const innerW = width - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const n = labels.length;

  // Build scale per axis
  const buildScale = (vals) => {
    const minV = Math.min(...vals, 0);
    const maxV = Math.max(...vals);
    const range = Math.max(maxV - minV, 1);
    const yMax = maxV + range * 0.18;
    const yMin = Math.max(0, minV - range * 0.12);
    const yR = Math.max(yMax - yMin, 1);
    return {yMin, yMax, yR};
  };
  const leftVals = series.filter(s => s.axis !== "right").flatMap(s => s.values);
  const rightVals = series.filter(s => s.axis === "right").flatMap(s => s.values);
  const leftScale = buildScale(leftVals.length ? leftVals : [0,1]);
  const rightScale = hasRight ? buildScale(rightVals) : leftScale;
  const scaleFor = (s) => s.axis === "right" ? rightScale : leftScale;

  const xOf = (i) => pad.l + (n === 1 ? innerW/2 : (i/(n-1)) * innerW);
  const yOfScale = (v, sc) => pad.t + innerH - ((v - sc.yMin)/sc.yR) * innerH;
  const yOf = (v, s) => yOfScale(v, scaleFor(s));
  const pointsFor = (s) => s.values.map((v,i)=>({x: xOf(i), y: yOf(v, s)}));

  // y-axis ticks (4) for left scale; right scale gets same fractions but labeled with rightScale values
  const tickFractions = [0, 0.33, 0.66, 1];
  const leftTicks = tickFractions.map(t => leftScale.yMin + t*leftScale.yR);
  const rightTicks = tickFractions.map(t => rightScale.yMin + t*rightScale.yR);

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scale = width / rect.width;
    const x = (e.clientX - rect.left) * scale;
    if(x < pad.l - 8 || x > pad.l + innerW + 8){ setHoverIdx(null); return; }
    const rel = (x - pad.l) / innerW;
    const idx = Math.max(0, Math.min(n-1, Math.round(rel*(n-1))));
    setHoverIdx(idx);
  };

  return (
    <div className="lc-wrap">
      <svg className="lc-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none"
        onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
        <defs>
          {series.map((s,i)=> s.isPrimary && (
            <linearGradient key={"g"+i} id={`lc-fade-${i}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.35"/>
              <stop offset="60%" stopColor={s.color} stopOpacity="0.08"/>
              <stop offset="100%" stopColor={s.color} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        {/* grid (left axis) */}
        {leftTicks.map((t,i)=>{
          const y = yOfScale(t, leftScale);
          const leftColor = series.find(s => s.axis !== "right")?.color || "var(--text-4)";
          return (
            <g key={"lt"+i}>
              <line x1={pad.l} x2={pad.l+innerW} y1={y} y2={y} stroke="var(--panel-2)" strokeWidth="1"/>
              <text x={pad.l-8} y={y+3} textAnchor="end" fontSize="9.5" fill={hasRight?leftColor:"var(--text-4)"} fillOpacity={hasRight?0.7:1} fontFamily="'JetBrains Mono',monospace">{fmt(t)}</text>
            </g>
          );
        })}
        {/* right axis ticks */}
        {hasRight && rightTicks.map((t,i)=>{
          const y = yOfScale(t, rightScale);
          const rightColor = series.find(s => s.axis === "right")?.color || "var(--text-4)";
          return (
            <text key={"rt"+i} x={pad.l+innerW+8} y={y+3} textAnchor="start" fontSize="9.5" fill={rightColor} fillOpacity="0.7" fontFamily="'JetBrains Mono',monospace">{(fmtRight||fmt)(t)}</text>
          );
        })}
        {/* axis labels */}
        {hasRight && (
          <>
            <text x={pad.l-8} y={pad.t-8} textAnchor="end" fontSize="8.5" fill={series.find(s=>s.axis!=="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis!=="right")?.name || "").toUpperCase()}</text>
            <text x={pad.l+innerW+8} y={pad.t-8} textAnchor="start" fontSize="8.5" fill={series.find(s=>s.axis==="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis==="right")?.name || "").toUpperCase()}</text>
          </>
        )}
        {/* x labels */}
        {labels.map((l,i)=>{
          const step = n > 10 ? Math.ceil(n/8) : 1;
          if(i % step !== 0 && i !== n-1) return null;
          return (
            <text key={i} x={xOf(i)} y={height-10} textAnchor="middle" fontSize="9.5" fill="var(--text-4)" fontFamily="'JetBrains Mono',monospace">{l}</text>
          );
        })}
        {/* fade areas (primary only) */}
        {series.map((s,i)=>{
          if(!s.isPrimary) return null;
          const pts = pointsFor(s);
          const baseline = yOfScale(scaleFor(s).yMin, scaleFor(s));
          const d = smoothPath(pts) + ` L ${pts[pts.length-1].x} ${baseline} L ${pts[0].x} ${baseline} Z`;
          return <path key={"f"+i} d={d} fill={`url(#lc-fade-${i})`}/>;
        })}
        {/* lines */}
        {series.map((s,i)=>{
          const d = smoothPath(pointsFor(s));
          return <path key={"l"+i} d={d} fill="none" stroke={s.color}
            strokeWidth={s.isPrimary ? 2 : 1.5}
            strokeDasharray={s.dashed ? "4 4" : undefined}
            strokeOpacity={s.isPrimary ? 1 : 0.6}
            strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {/* hover guide */}
        {hoverIdx !== null && (
          <g>
            <line x1={xOf(hoverIdx)} x2={xOf(hoverIdx)} y1={pad.t} y2={pad.t+innerH} stroke="var(--border-2)" strokeWidth="1" strokeDasharray="3 3"/>
            {series.map((s,i)=>(

                fill="var(--bg)" stroke={s.color} strokeWidth="2"/>
            ))}

const DAY_LABELS = ["Apr 16","Apr 17","Apr 18","Apr 19","Apr 20","Apr 21","Apr 22"];
// Build daily totals from CAMPAIGNS (already contains Apr 17-22). Synthesize Apr 16.
function seriesForCampaignKey(key, filterId="all", campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const camps = filterId === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===filterId);
  // Map date -> summed value
  const byDate = {};
  camps.forEach(c => c.rows.forEach(r => {
    byDate[r.date] = (byDate[r.date] || 0) + r[key];
  }));
  return labels.map(l => byDate[l] || 0);
}

// ------- Cost per DM chart
// Attribute cost per DM either overall (spend / msgs aggregated) or per keyword (spend of keyword / msgs count)
function seriesCpmOverall(client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const spend = seriesForCampaignKey("spend", client, campaigns, labels);
  const msgs = seriesForCampaignKey("msgs", client, campaigns, labels);
  return msgs.map((m,i)=> m ? spend[i]/m : 0);
}
function seriesCpmKeyword(kw, client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const live = labels.map(label => {
    let spend = 0;
    let msgs = 0;
    const camps = client === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===client);
    camps.forEach(c => {
      const day = c.rows.find(r=>r.date===label);
      const ad = day?.adRows?.find(a=>a.adName===kw);
      if(ad){
        spend += ad.spend || 0;
        msgs += ad.msgs || 0;
      }
    });
    return msgs ? spend / msgs : 0;
  });
  if(live.some(Boolean)) return live;
  return labels.map(()=>0);
}

function firstLastRealDelta(vals){
  const real = vals.filter(v => Number.isFinite(v) && v > 0);
  if(real.length < 2) return 0;
  return real[real.length - 1] - real[0];
}

function CostPerDMChart({campaigns=CAMPAIGNS}){
  const [mode, setMode] = useState("overall"); // 'overall' | 'keyword'
  const labels = labelsFromCampaigns(campaigns);
  const liveKws = campaigns.flatMap(c => (c.ads||[]).map(ad => ({kw:ad.name, camp:c.clientKey || c.id})));
  const availableKws = liveKws;

  let series, avg, delta, subLabel;
  if(mode === "overall"){
    const vals = seriesCpmOverall("all", campaigns, labels);
    const totalSpend = seriesForCampaignKey("spend", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    const totalMsgs = seriesForCampaignKey("msgs", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    avg = totalMsgs ? totalSpend / totalMsgs : 0;
    delta = firstLastRealDelta(vals);
    subLabel = "selected period";
    series = [
      {name: "Cost / DM", values: vals, color: "var(--blue)", isPrimary:true, fmt: (v)=>"$"+v.toFixed(2)},
    ];
  } else {
    // One line per keyword
    const kwSeries = availableKws.map(k => ({
      name: k.kw,
      values: seriesCpmKeyword(k.kw, "all", campaigns, labels),
      color: k.camp === "tyson" ? "var(--gold)" : "var(--blue)",
      camp: k.camp,
      fmt: (v)=>"$"+v.toFixed(2),
    }));
    if(kwSeries.length === 0){
      const vals = labels.map(()=>0);
      avg = 0;
      delta = 0;
      subLabel = "No keyword data";
      series = [{name:"Cost / DM", values:vals, color:"var(--blue)", isPrimary:true, fmt:(v)=>"$"+v.toFixed(2)}];
    } else {
    // Pick the best-performing (lowest avg) as primary for the fade
    const withAvg = kwSeries.map(s => {
      const real = s.values.filter(v => v > 0);
      return {...s, _avg: real.length ? real.reduce((a,b)=>a+b,0)/real.length : Number.POSITIVE_INFINITY};
    });
    const best = withAvg.reduce((a,b) => a._avg < b._avg ? a : b);
    series = kwSeries.map(s => ({...s, isPrimary: s.name === best.name}));
    // Aggregate average = weighted average across all kw series
    const totalSpend = seriesForCampaignKey("spend", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    const totalMsgs = seriesForCampaignKey("msgs", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    avg = totalMsgs ? totalSpend / totalMsgs : 0;
    // Delta: overall last-vs-first (mean across all lines)
    const firstMean = kwSeries.reduce((a,b)=>a+b.values[0],0) / kwSeries.length;
    const lastMean  = kwSeries.reduce((a,b)=>a+b.values[b.values.length-1],0) / kwSeries.length;
    delta = firstLastRealDelta([firstMean, lastMean]);
    subLabel = `Avg across ${kwSeries.length} keyword${kwSeries.length===1?"":"s"}`;
    }
  }

  return (
    <div className="panel chart-card">
      <div className="chart-head">
        <div>
          <div className="chart-title">Cost per DM</div>
          <div className="chart-subtitle">
            <span className="chart-big">${avg.toFixed(2)}</span>
            <span className={delta<=0?"chart-delta pos":"chart-delta neg"}>
              {delta<=0?"▼":"▲"} ${Math.abs(delta).toFixed(2)}
            </span>
            <span className="chart-sub-label">{subLabel}</span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(mode==="overall"?"active":"")} onClick={()=>setMode("overall")}>Overall</button>
            <button className={"kw-tab "+(mode==="keyword"?"active":"")} onClick={()=>setMode("keyword")}>By keyword</button>
          </div>
        </div>
      </div>
      <LineChart
        labels={labels}
        series={series}
        fmt={(v)=>"$"+v.toFixed(2)}
      />
      <div className="chart-legend cpm-legend">
        {mode === "overall" ? (
          <>
            <span className="chart-legend-item"><span className="chart-sw" style={{background:'var(--blue)'}}></span>Cost per DM</span>
          </>
        ) : (
          <>
            <div className="cpm-kw-legend">
              {series.map(s => (
                <span key={s.name} className="chart-legend-item">
                  <span className="chart-sw" style={{background:s.color}}></span>{s.name}
                </span>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ------- Ad ROAS chart (was Keyword ROI)
// Build aggregated per-ad metrics across the 6 known days
function allAdsAggregated(campaigns=CAMPAIGNS, authoritativeAdRoas=[]){
  const out = [];
  campaigns.forEach(c => {
    c.ads.forEach(a => {
      // sum across rows
      let spend=0, collected=0, clients=0;
      let previewImageUrl = a.previewImageUrl || a.previewThumbnailUrl || null;
      let previewThumbnailUrl = a.previewThumbnailUrl || null;
      c.rows.forEach(r0 => {
        const ads = buildAdRows(c.id, r0, c.ads);
        const mine = ads.find(x=>x.adId===a.id);
        if(mine){
          spend += mine.spend;
          collected += mine.collected;
          clients += mine.clients;
          previewImageUrl = previewImageUrl || mine.previewImageUrl || mine.previewThumbnailUrl || null;
          previewThumbnailUrl = previewThumbnailUrl || mine.previewThumbnailUrl || null;
        }
      });
      out.push({
        adId: a.id, adName: a.name, camp: c.clientKey || c.id,
        spend, collected, clients, previewImageUrl, previewThumbnailUrl,
        // Below ~$100 of spend a ROAS multiple is meaningless noise.
        roasReliable: spend >= 100,
      });
    });
  });

  if(Array.isArray(authoritativeAdRoas) && authoritativeAdRoas.length){
    const byAdId = new Map(out.map(ad => [String(ad.adId), ad]));
    const visibleAdIds = new Set(out.map(ad => String(ad.adId)));
    const visibleCampaignIds = new Set((campaigns || []).map(c => String(c.id || "")));
    return authoritativeAdRoas
      .map(row => {
        const adId = row.adId || row.id || row.label;
        const matched = byAdId.get(String(adId));
        const spend = Number(row.adSpend || 0);
        const collected = Number(row.collectedRevenue || 0);
        const roas = Number.isFinite(Number(row.collectedRoi))
          ? Number(row.collectedRoi)
          : (spend ? collected / spend : 0);
        return {
          adId,
          adName: row.adName || row.label || matched?.adName || "UNKNOWN",
          camp: row.clientKey || matched?.camp || "",
          campaignId: row.campaignId || null,
          spend,
          collected,
          clients: Number(row.newClients || 0),
          roas,
          // Honor the server's reliability verdict when present; otherwise fall
          // back to the same $100 spend floor. Keeps a $40-spend ad from
          // printing "181× ROAS" off a single attributed sale.
          roasReliable: typeof row.roasReliable === "boolean" ? row.roasReliable : spend >= 100,
          previewImageUrl: row.previewImageUrl || row.previewThumbnailUrl || matched?.previewImageUrl || matched?.previewThumbnailUrl || null,
          previewThumbnailUrl: row.previewThumbnailUrl || matched?.previewThumbnailUrl || null,
          // The words the software already read off this ad's image (from the
          // payload). Empty until the reader has processed this ad.
          onImageText: typeof row.onImageText === "string" ? row.onImageText : "",
        };
      })
      .filter(ad => {
        const campaignId = String(ad.campaignId || "");
        const isVisible = visibleAdIds.has(String(ad.adId)) || (campaignId && visibleCampaignIds.has(campaignId));
        return isVisible && (ad.spend > 0 || ad.collected > 0 || ad.clients > 0);
      });
  }

  return out;
}

function adPreviewPosition(event){
  const previewWidth = Math.min(340, Math.max(260, window.innerWidth - 28));
  const previewHeight = Math.min(560, window.innerHeight - 28);
  const pad = 14;
  let left = event.clientX + 18;
  let top = event.clientY - 42;

  if(left + previewWidth > window.innerWidth - pad) left = event.clientX - previewWidth - 18;
  if(top + previewHeight > window.innerHeight - pad) top = window.innerHeight - previewHeight - pad;
  if(left < pad) left = pad;
  if(top < pad) top = pad;
  return {left, top};
}

function AdROASChart({campaigns=CAMPAIGNS, dashboard=null}){
  const [view, setView] = useState("top"); // 'top' | 'all'
  const [preview, setPreview] = useState(null);
  // adId -> {loading:true} | {text:"..."} — the words written ON each ad image,
  // read once (lazily, on hover) and remembered so we never re-read the same ad.
  const [copy, setCopy] = useState({});
  const all = useMemo(()=>allAdsAggregated(campaigns, dashboard?.adRoas), [campaigns, dashboard?.adRoas]);
  const filtered = all
    .map(a => ({...a, roas: Number.isFinite(a.roas) ? a.roas : (a.spend ? a.collected/a.spend : 0)}))
    .sort((a,b) => b.collected - a.collected);
  const list = view === "top" ? filtered.slice(0,6) : filtered;
  const max = list[0]?.collected || 1;
  // Ask the reader what words are on this ad's image. Fires at most once per ad.
  const loadCopy = (ad) => {
    const url = ad.previewImageUrl || ad.previewThumbnailUrl;
    if(!ad.adId || !url) return;
    // The software may have already read this ad (attached on the payload) —
    // use that instantly, no network call.
    if(typeof ad.onImageText === "string" && ad.onImageText){
      setCopy(prev => prev[ad.adId] ? prev : {...prev, [ad.adId]: {text: ad.onImageText}});
      return;
    }
    setCopy(prev => {
      if(prev[ad.adId]) return prev; // already loading or loaded
      fetch("/api/ads/creative-copy", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({adId: ad.adId, imageUrl: url, clientKey: ad.camp})
      })
        .then(r => r.ok ? r.json() : null)
        .then(d => setCopy(p => ({...p, [ad.adId]: {text: (d && d.onImageText) ? d.onImageText : ""}})))
        .catch(() => setCopy(p => ({...p, [ad.adId]: {text: ""}})));
      return {...prev, [ad.adId]: {loading: true}};
    });
  };
  const showPreview = (event, ad) => {
    const url = ad.previewImageUrl || ad.previewThumbnailUrl;
    if(!url) return;
    loadCopy(ad);
    setPreview({url, adId: ad.adId, position: adPreviewPosition(event)});
  };
  const movePreview = (event, ad) => {
    const url = ad.previewImageUrl || ad.previewThumbnailUrl;
    if(!url) return;
    setPreview({url, adId: ad.adId, position: adPreviewPosition(event)});
  };
  return (
    <div className="panel chart-card ads-roas">
      <div className="chart-head">
        <div>
          <div className="chart-title">Ad ROAS</div>
          <div className="chart-subtitle">
            <span className="chart-sub-label">{view==="top" ? "Top ads by revenue" : `All ads · ${list.length} running`}</span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(view==="top"?"active":"")} onClick={()=>setView("top")}>Top</button>
            <button className={"kw-tab "+(view==="all"?"active":"")} onClick={()=>setView("all")}>All ads</button>
          </div>
        </div>
      </div>
      <div className={"ar-chart-wrap "+(view==="all"?"scroll-x":"")}>
        <div className="ar-chart" style={{minWidth: Math.max(list.length * 64, 100) + "px"}}>
          {list.length === 0 && (
            <div style={{alignSelf:"center",width:"100%",textAlign:"center",color:"var(--text-4)",fontSize:12}}>
              No ads match these filters.
            </div>
          )}
          {list.map((a,i)=>{
            const h = (a.collected/max)*150;
            const color = a.camp==="tyson" ? "var(--gold)" : "var(--blue)";
            const hasPreview = Boolean(a.previewImageUrl || a.previewThumbnailUrl);
            return (
              <div key={a.adId} className="ar-col">
                <div className="ar-val">
                  <div className="ar-val-rev mono">${Math.round(a.collected/1000*10)/10}k</div>
                  <div className="ar-val-roas">{a.roasReliable===false ? "low spend" : a.roas.toFixed(1)+"× ROAS"}</div>
                </div>
                <div
                  className={"ar-bar-v-wrap "+(hasPreview?"has-preview":"")}
                  onMouseEnter={(event)=>showPreview(event, a)}
                  onMouseMove={(event)=>movePreview(event, a)}
                  onMouseLeave={()=>setPreview(null)}
                  aria-label={hasPreview ? `${a.adName} creative preview` : `${a.adName}`}
                >
                  <div className="ar-bar-v" style={{height:h+"px", background:color}}></div>
                </div>
                <div className="ar-col-label">
                  <div className="ar-col-kw">{a.adName}</div>
                  <div className="ar-col-camp" style={{color}}>{a.camp}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {preview && (
        <div className="ad-preview-popover" style={{left:preview.position.left, top:preview.position.top}}>
          <img className="ad-preview-image" src={preview.url} alt="" />
          {(() => {
            const c = copy[preview.adId];
            if(!c || c.loading) return <div className="ad-preview-copy loading">Reading the words on this ad…</div>;
            if(!c.text) return <div className="ad-preview-copy empty">No words on this image</div>;
            return (
              <div className="ad-preview-copy">
                <div className="ad-preview-copy-label">What this ad says</div>
                <div className="ad-preview-copy-text">{c.text}</div>
              </div>
            );
          })()}
        </div>
      )}
      <div className="chart-legend">
        <span className="chart-legend-item"><span className="chart-sw" style={{background:'var(--gold)'}}></span>Tyson</span>
        <span className="chart-legend-item"><span className="chart-sw" style={{background:'var(--blue)'}}></span>Keith</span>
      </div>
    </div>
  );
}

function calendarEventsForCurrentWeek(dashboard){
  const events = Array.isArray(dashboard?.calendarEvents) ? dashboard.calendarEvents : [];
  const weekEnd = dashboard?.query?.dateTo || todayEt();
  const days = calendarSevenDays(weekEnd);
  const weekStart = days[0]?.iso || weekEnd;
  return events.filter(event => {
    const iso = isoFromAnyDate(event.eventAt);
    return iso && iso >= weekStart && iso <= weekEnd;
  });
}

function UpcomingCallsCard({dashboard}){
  const visibleEvents = calendarEventsForCurrentWeek(dashboard);
  const upcoming = visibleEvents.filter(event => {
    const status = event.status || "upcoming";

  });
  return (
    <div className="panel chart-card single-number-card">

function safeRatio(num, den){
  return den ? num / den : 0;
}

function fmtCompactUsd(n){
  if(n==null || isNaN(n)) return "—";
  const sign = n < 0 ? "-" : "";
  const v = Math.abs(n);
  if(v >= 1000000) return sign+"$"+(v/1000000).toFixed(v>=10000000?0:1)+"M";
  if(v >= 1000) return sign+"$"+(v/1000).toFixed(v>=10000?0:1)+"k";
  return sign+"$"+Math.round(v).toLocaleString();
}

function fmtCompactNum(n){
  if(n==null || isNaN(n)) return "—";
  const sign = n < 0 ? "-" : "";
  const v = Math.abs(n);
  if(v >= 1000000) return sign+(v/1000000).toFixed(v>=10000000?0:1)+"M";
  if(v >= 1000) return sign+(v/1000).toFixed(v>=10000?0:1)+"k";
  return sign+Math.round(v).toLocaleString();
}

function aggregateRowsByLabel(campaigns, labels){
  return labels.map(label => {
    const row = {...emptyMetric(label)};
    campaigns.forEach(c => {
      const day = (c.rows || []).find(r => r.date === label);
      if(day) addMetric(row, day);
    });
    return row;
  });
}

function aggregateTotal(rows){
  const total = {...emptyMetric("Total")};
  rows.forEach(row => addMetric(total, row));
  return total;
}

function metricDefFor(id){
  return METRIC_CARD_DEFS.find(def => def.id === id);
}

function sanitizeMetricLayout(ids, fallback=DEFAULT_METRIC_CARD_IDS){
  const valid = new Set(METRIC_CARD_DEFS.map(def => def.id));
  const seen = new Set();
  const clean = (Array.isArray(ids) ? ids : [])
    .filter(id => valid.has(id) && !seen.has(id) && seen.add(id));
  return clean.length ? clean : fallback;
}

function loadMetricLayout(){
  try{
    const raw = window.localStorage.getItem(METRIC_CARD_STORAGE_KEY);
    if(raw) return sanitizeMetricLayout(JSON.parse(raw), []);
  }catch(err){}
  return DEFAULT_METRIC_CARD_IDS;
}

function moveMetricCardToIndex(ids, fromId, toIndex){
  if(!fromId) return ids;
  const fromIndex = ids.indexOf(fromId);
  if(fromIndex === -1 || toIndex < 0 || toIndex >= ids.length || fromIndex === toIndex) return ids;
  const next = ids.filter(id => id !== fromId);
  next.splice(toIndex, 0, fromId);
  return next;
}

function MetricAddModal({layout, onApply, onClose}){
  const [selected, setSelected] = useState(()=>new Set(layout));
  const toggle = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };
  const apply = () => {
    const kept = layout.filter(id => selected.has(id));
    const added = METRIC_CARD_DEFS
      .map(def => def.id)
      .filter(id => selected.has(id) && !kept.includes(id));
    onApply([...kept, ...added]);
  };
  return (
    <Modal
      title="Add cards"
      subtitle="Choose which campaign metrics are visible in this chart section."
      onClose={onClose}
      wide
      footer={<>
        <button className="btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn-primary" onClick={apply}>Apply</button>
      </>}
    >

        {METRIC_CARD_DEFS.map(def => {
          const isSelected = selected.has(def.id);
          return (
            <button key={def.id} className={"metric-pick-card "+(isSelected?"selected":"")} onClick={()=>toggle(def.id)}>

        })}

    </Modal>
  );
}

function MetricCardBoard({campaigns=CAMPAIGNS, dashboard=null}){
  const [layout, setLayout] = useState(loadMetricLayout);
  const [editing, setEditing] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [dragInfo, setDragInfo] = useState(null);
  const [dropTargetId, setDropTargetId] = useState(null);
  const visibleLayout = sanitizeMetricLayout(layout, []);
  const leftLayout = visibleLayout.filter((_, i) => i % 2 === 0);
  const rightLayout = visibleLayout.filter((_, i) => i % 2 === 1);
  const cardRefs = useRef({});
  const pendingRects = useRef(null);
  const visibleLayoutRef = useRef(visibleLayout);
  const dragInfoRef = useRef(null);
  const dragSlotRectsRef = useRef([]);
  const visibleLayoutKey = visibleLayout.join("|");
  const draggingId = dragInfo?.id || null;

  useLayoutEffect(()=>{
    visibleLayoutRef.current = visibleLayout;
  }, [visibleLayoutKey]);

  useEffect(()=>{
    dragInfoRef.current = dragInfo;
  }, [dragInfo]);

  useEffect(()=>{
    try{ window.localStorage.setItem(METRIC_CARD_STORAGE_KEY, JSON.stringify(visibleLayout)); }catch(err){}
  }, [visibleLayoutKey]);

  useEffect(()=>{
    document.body.classList.toggle("metric-dragging", Boolean(dragInfo));
    return ()=>document.body.classList.remove("metric-dragging");
  }, [Boolean(dragInfo)]);

  const measureCards = () => {
    const rects = {};
    visibleLayoutRef.current.forEach(id => {
      const node = cardRefs.current[id];
      if(node) {
        const rect = node.getBoundingClientRect();
        rects[id] = {left:rect.left, top:rect.top};
      }
    });
    return rects;
  };

  const setLayoutWithAnimation = (updater) => {
    pendingRects.current = measureCards();
    setLayout(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      visibleLayoutRef.current = sanitizeMetricLayout(next, []);
      return next;
    });
  };

  useLayoutEffect(()=>{
    const before = pendingRects.current;
    if(!before) return;
    pendingRects.current = null;
    visibleLayout.forEach(id => {
      if(id === draggingId) return;
      const node = cardRefs.current[id];
      const prev = before[id];
      if(!node || !prev) return;
      const rect = node.getBoundingClientRect();
      const dx = prev.left - rect.left;
      const dy = prev.top - rect.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      node.style.transition = "none";
      node.style.transform = `translate(${dx}px, ${dy}px)`;
      node.getBoundingClientRect();
      requestAnimationFrame(()=>{
        node.style.transition = "transform 320ms cubic-bezier(.22,.72,.2,1)";
        node.style.transform = "";
        window.setTimeout(()=>{
          node.style.transition = "";
        }, 370);
      });
    });
  }, [visibleLayoutKey, draggingId]);

  const deleteCard = (id) => {
    setLayout(prev => prev.filter(cardId => cardId !== id));
  };
  const applyPicker = (next) => {
    setLayout(sanitizeMetricLayout(next, []));
    setPickerOpen(false);
  };

  const registerRef = (id, node) => {
    if(node) cardRefs.current[id] = node;
    else delete cardRefs.current[id];
  };

  const beginPointerDrag = (event, id) => {
    if(!editing || event.button !== 0) return;
    if(event.target.closest("button,input,select,textarea")) return;
    const node = cardRefs.current[id];
    if(!node) return;
    const rect = node.getBoundingClientRect();
    event.preventDefault();
    setDropTargetId(null);
    dragSlotRectsRef.current = visibleLayoutRef.current
      .map((cardId, index) => {
        const slotNode = cardRefs.current[cardId];
        if(!slotNode) return null;
        const slotRect = slotNode.getBoundingClientRect();
        return {
          id:cardId,
          index,
          left:slotRect.left,
          right:slotRect.right,
          top:slotRect.top,
          bottom:slotRect.bottom,
          centerX:slotRect.left + slotRect.width / 2,
          centerY:slotRect.top + slotRect.height / 2,
        };
      })
      .filter(Boolean);
    const nextDrag = {
      id,
      pointerId:event.pointerId,
      x:event.clientX,
      y:event.clientY,
      offsetX:event.clientX - rect.left,
      offsetY:event.clientY - rect.top,
      width:rect.width,
      height:rect.height,
    };
    dragInfoRef.current = nextDrag;
    setDragInfo(nextDrag);
  };

  const reorderTowardPointer = (clientX, clientY) => {
    const activeDrag = dragInfoRef.current;
    if(!activeDrag) return;
    const candidates = dragSlotRectsRef.current
      .map(slot => {
        if(clientX < slot.left || clientX > slot.right || clientY < slot.top || clientY > slot.bottom) return null;
        const dx = clientX - slot.centerX;
        const dy = clientY - slot.centerY;
        return {...slot, distance: Math.hypot(dx, dy)};
      })
      .filter(Boolean)
      .sort((a,b)=>a.distance-b.distance);
    const targetSlot = candidates[0];
    if(!targetSlot) {
      setDropTargetId(null);
      return;
    }
    const currentLayout = visibleLayoutRef.current;
    if(currentLayout.indexOf(activeDrag.id) === targetSlot.index) return;
    const targetId = currentLayout[targetSlot.index];
    setDropTargetId(targetId);
    setLayoutWithAnimation(prev => moveMetricCardToIndex(prev, activeDrag.id, targetSlot.index));
  };

  useEffect(()=>{
    if(!dragInfo) return;
    const onMove = (event) => {
      const activeDrag = dragInfoRef.current;
      if(!activeDrag || event.pointerId !== activeDrag.pointerId) return;
      const nextDrag = {...activeDrag, x:event.clientX, y:event.clientY};
      dragInfoRef.current = nextDrag;
      setDragInfo(nextDrag);
      reorderTowardPointer(event.clientX, event.clientY);
    };
    const onUp = (event) => {
      const activeDrag = dragInfoRef.current;
      if(!activeDrag || event.pointerId !== activeDrag.pointerId) return;
      dragInfoRef.current = null;
      dragSlotRectsRef.current = [];
      setDragInfo(null);
      setDropTargetId(null);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      window.removeEventListener("pointercancel", onUp);
    };
  }, [Boolean(dragInfo)]);

  const floatingDef = dragInfo ? metricDefFor(dragInfo.id) : null;
  const floatingStyle = dragInfo ? {
    left:dragInfo.x - dragInfo.offsetX,
    top:dragInfo.y - dragInfo.offsetY,
    width:dragInfo.width,
  } : null;

  const renderCard = (id) => {
    const def = metricDefFor(id);
    if(!def) return null;
    return (
      <MetricCardShell
        key={id}
        id={id}
        editing={editing}
        draggingId={draggingId}
        dropTargetId={dropTargetId}
        dragHeight={dragInfo?.id === id ? dragInfo.height : null}
        onDelete={deleteCard}
        onPointerDown={beginPointerDrag}
        registerRef={registerRef}
      >
        {def.render({campaigns,dashboard})}
      </MetricCardShell>
    );
  };

  return (
    <>
      <div className="metric-board-head">
        <h2 className="metric-board-title">Metrics</h2>
        <div className="metric-board-actions">
          <button className="metric-board-btn" onClick={()=>setPickerOpen(true)}><IcPlus/> Add</button>
          <button className={"metric-board-btn "+(editing?"active":"")} onClick={()=>setEditing(v=>!v)}>
            <IcEdit/> {editing ? "Done" : "Edit"}
          </button>
        </div>
      </div>
      <div className={"grid-charts metric-grid "+(editing?"editing":"")}>
        <div className="chart-column">{leftLayout.map(renderCard)}</div>
        <div className="chart-column">{rightLayout.map(renderCard)}</div>
      </div>
      {floatingDef && (
        <div className="metric-floating-card" style={floatingStyle}>
          {floatingDef.render({campaigns,dashboard})}
        </div>
      )}
      {pickerOpen && <MetricAddModal layout={visibleLayout} onApply={applyPicker} onClose={()=>setPickerOpen(false)}/>}
    </>
  );
}

function calendarSevenDays(endIso){
  const end = endIso || todayEt();
  return Array.from({length:7}, (_, i) => ({iso:shiftIso(end, i - 6), muted:false}));
}

function weekdayLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString("en-US", {weekday:"short"});
}

  if(status === "show") return "Showed";
  if(status === "no_show") return "No-show";
  if(status === "needs_review") return "Review";
  if(status === "missing_keyword") return "Missing keyword";
  return "Booked";
}
