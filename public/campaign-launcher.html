<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Campaign Launcher — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --panel:#111; --panel-2:#141414; --panel-3:#0c0c0c;
    --border:#1f1f1f; --border-2:#262626;
    --text:#e8e8e8; --text-2:#a8a8a8; --text-3:#6b6b6b; --text-4:#4a4a4a;
    --green:#7dd3a8; --green-bg:#0c1a12; --green-border:#1a2e22;
    --red:#e89a94; --red-bg:#1a0e0e; --red-border:#3a1f1f;
    --gold:#d4b27a; --gold-bg:#1a1608; --gold-border:#2a2417;
    --blue:#7aa7d4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;line-height:1.55;height:100vh;overflow:hidden}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input,textarea,select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  textarea{resize:none}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#222;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#333}

  .app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:#0c0c0c}
  .crumb{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-4);font-family:'JetBrains Mono',monospace}
  .crumb a{color:var(--text-3);text-decoration:none}
  .crumb .here{color:var(--gold)}
  .crumb .sep{color:var(--text-4);margin:0 7px}
  .top-title{font-size:14px;font-weight:600}
  .top-actions{display:flex;gap:8px}
  .btn-ghost{padding:6px 11px;border:1px solid var(--border-2);border-radius:5px;font-size:12px;color:var(--text-2);background:#0f0f0f}
  .btn-ghost:hover{background:#141414;color:var(--text)}

  .main{display:grid;grid-template-columns:1fr 280px;height:100%;overflow:hidden}

  /* RAIL */
  .rail{border-left:1px solid var(--border);background:#0c0c0c;display:flex;flex-direction:column;overflow:hidden;order:2}
  .rail-head{padding:14px 18px;border-bottom:1px solid var(--border)}
  .rail-head .lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-4);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:6px}
  .rail-head .title{font-size:14px;color:var(--text);font-weight:600}
  .rail-head .sub{font-size:11.5px;color:var(--text-3);margin-top:2px}

  .rail-steps{padding:6px 0;flex:1;overflow-y:auto}
  .rail-step{padding:10px 18px;cursor:pointer;border-left:2px solid transparent}
  .rail-step:hover{background:#101010}
  .rail-step.current{background:#0f0d08;border-left-color:var(--gold)}
  .rail-step .row{display:grid;grid-template-columns:22px 1fr auto;gap:10px;align-items:center}
  .rs-num{display:grid;place-items:center;width:22px;height:22px;border-radius:99px;background:#0c0c0c;border:1px solid var(--border-2);font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-weight:500}
  .rail-step.done .rs-num{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
  .rail-step.current .rs-num{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
  .rail-step.blocked .rs-num{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
  .rs-name{font-size:13px;color:var(--text-2)}
  .rail-step.current .rs-name{color:var(--text);font-weight:600}
  .rail-step.done .rs-name{color:var(--text-3)}
  .rs-meta{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace}
  .rs-meta.bad{color:var(--red)}.rs-meta.warn{color:var(--gold)}.rs-meta.ok{color:var(--green)}

  /* substep dots — visible only on current */
  .substeps{display:none;margin:8px 0 4px 32px;padding-left:10px;border-left:1px solid var(--border)}
  .rail-step.current .substeps{display:block}
  .ss{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--text-3);cursor:pointer}
  .ss:hover{color:var(--text-2)}
  .ss .d{width:6px;height:6px;border-radius:99px;background:var(--border-2);flex-shrink:0}
  .ss.done .d{background:var(--green)}
  .ss.current{color:var(--text);font-weight:500}
  .ss.current .d{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:dot-pulse 1.8s ease-in-out infinite}
  @keyframes dot-pulse{
    0%,100%{box-shadow:0 0 6px var(--gold), 0 0 0 0 rgba(212,178,122,0.6)}
    50%{box-shadow:0 0 10px var(--gold), 0 0 0 5px rgba(212,178,122,0)}
  }
  /* substep just-completed flash */
  .ss.flash .d{animation:dot-flash .6s ease-out}
  @keyframes dot-flash{
    0%{background:var(--gold);box-shadow:0 0 0 0 rgba(212,178,122,0.9)}
    100%{background:var(--green);box-shadow:0 0 0 12px rgba(125,211,168,0)}
  }
  .ss.locked{color:var(--text-4);cursor:not-allowed}

  .rr-section{padding:14px 18px;border-top:1px solid var(--border)}
  .rr-lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-4);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:8px}
  .blocker-banner{padding:12px;border:1px solid var(--red-border);background:var(--red-bg);border-radius:7px}
  .bb-title{font-size:13px;font-weight:600;color:var(--red);display:flex;align-items:center;gap:8px}
  .bb-title .ico{width:18px;height:18px;border-radius:99px;background:#0a0a0a;border:1px solid var(--red-border);display:grid;place-items:center;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600}
  .bb-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .bb-item{font-size:11.5px;color:var(--text-2);padding-left:13px;position:relative}
  .bb-item::before{content:'';position:absolute;left:0;top:6px;width:5px;height:5px;border-radius:99px;background:var(--red)}

  /* CENTER STAGE — single focused card */
  .stage{overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;align-items:center;position:relative}
  .stage-inner{width:100%;max-width:640px;padding:36px 32px 24px;display:flex;flex-direction:column;align-items:stretch}

  /* page-level progress hairline — fills as you advance */
  .progress-hair{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg, transparent, var(--gold) 40%, var(--gold));box-shadow:0 0 12px rgba(212,178,122,0.6);z-index:50;transition:width .55s cubic-bezier(.2,.7,.2,1)}

  /* focus card slide-in */
  #focus{animation:focus-in .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes focus-in{
    0%{opacity:0;transform:translateY(8px) scale(0.995)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  /* gold glow underlay on the focus card on entry */
  .focus-card{position:relative}
  .focus-card.entering::before{content:'';position:absolute;inset:-1px;border-radius:11px;background:radial-gradient(60% 50% at 50% 0%, rgba(212,178,122,0.18), transparent 70%);pointer-events:none;animation:card-glow 1.1s ease-out forwards}
  @keyframes card-glow{
    0%{opacity:1}
    100%{opacity:0}
  }

  /* particle layer — glowing emissions from card edges */
  .confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .particle{position:absolute;width:6px;height:6px;border-radius:99px;background:#f0d9a8;box-shadow:0 0 8px 2px rgba(240,217,168,0.9), 0 0 18px 4px rgba(212,178,122,0.55);will-change:transform,opacity;animation:p-drift var(--dur,2.2s) ease-out forwards}
  @keyframes p-drift{
    0%{transform:translate3d(0,0,0) scale(0.4);opacity:0}
    20%{opacity:1}
    100%{transform:translate3d(var(--dx,0),var(--dy,-40px),0) scale(1);opacity:0}
  }
  /* card-edge halo — soft outer bloom locked to card edge */
  .card-halo{position:fixed;border-radius:10px;pointer-events:none;z-index:54;opacity:0;animation:card-halo 1.7s ease-out forwards}
  @keyframes card-halo{
    0%{opacity:0;box-shadow:0 0 0 0 rgba(212,178,122,0), 0 0 0 0 rgba(212,178,122,0)}
    25%{opacity:1;box-shadow:0 0 30px 4px rgba(212,178,122,0.6), 0 0 70px 12px rgba(212,178,122,0.32)}
    100%{opacity:0;box-shadow:0 0 80px 24px rgba(212,178,122,0), 0 0 140px 40px rgba(212,178,122,0)}
  }

  /* rail step "just completed" green pop */
  .rail-step.just-done{animation:row-pop .55s ease-out}
  @keyframes row-pop{
    0%{background:rgba(125,211,168,0.18)}
    100%{background:transparent}
  }

  /* Completed step summary chips at top */
  .summary-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;min-height:24px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--green-border);background:var(--green-bg);border-radius:99px;font-size:11.5px;color:var(--green);cursor:pointer}
  .chip:hover{filter:brightness(1.15)}
  .chip .d{width:5px;height:5px;border-radius:99px;background:var(--green)}
  .chip .v{color:var(--text);font-weight:500}

  .focus-eyebrow{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:8px}
  .focus-title{font-size:26px;font-weight:600;letter-spacing:-0.02em;margin:0;line-height:1.2}
  .focus-help{font-size:14px;color:var(--text-3);margin-top:8px;line-height:1.55}

  .focus-card{margin-top:22px;border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:22px;display:flex;flex-direction:column;gap:14px}
  .focus-card.tight{padding:0;overflow:hidden}

  .input-row{display:flex;flex-direction:column;gap:7px}
  .input-row .lbl{font-size:12px;color:var(--text-3);font-weight:500}
  .input-row .lbl .opt{font-size:11px;color:var(--text-4);margin-left:6px;font-family:'JetBrains Mono',monospace}
  .field-input{width:100%;padding:12px 14px;background:#0a0a0a;border:1px solid var(--border-2);border-radius:6px;font-size:15px;color:var(--text)}
  .field-input:focus{border-color:var(--gold);background:#0c0b08}
  .field-input.select{cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .field-input.select .caret{color:var(--text-4);font-size:11px}
  .field-input.select-native{cursor:pointer;color:var(--text);background:#0a0a0a}
  .field-input.select-native option{background:#111;color:var(--text)}
  textarea.field-input{min-height:140px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;letter-spacing:0.04em;resize:vertical}

  .uploader{padding:30px 18px;text-align:center;border:1.5px dashed var(--border-2);border-radius:8px;background:#0a0a0a;cursor:pointer;display:block}
  .uploader:hover{border-color:var(--gold);background:#0c0b08}
  .uploader.dragging{border-color:var(--gold);background:#0f0d08}
  .upload-input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
  .uploader .glyph{font-size:24px;color:var(--text-3);font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:8px}
  .uploader .head{font-size:14px;color:var(--text);font-weight:500}
  .uploader .sub{font-size:12px;color:var(--text-4);margin-top:4px}
  .upload-status{font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-top:12px}
  .upload-status.good{color:var(--green)}
  .thumbs-inline{display:flex;gap:5px;margin-top:14px;flex-wrap:wrap;justify-content:center}
  .thumb-mini{width:32px;height:32px;border-radius:4px;border:1px solid var(--border-2);overflow:hidden}
  .thumb-mini img,.thumb-mini video{width:100%;height:100%;object-fit:cover;display:block}
  .thumb-mini svg{width:100%;height:100%;display:block}
  .thumb-mini.more{display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-4);border-style:dashed}
  .file-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
  .file-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:9px 10px;border:1px solid var(--border-2);background:#0a0a0a;border-radius:6px}
  .file-row .name{font-size:12px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-row .meta{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace}

  .safe-panel{margin-top:14px;border:1px solid var(--border-2);border-radius:8px;background:#0a0a0a;overflow:hidden}
  .safe-panel .safe-head{padding:12px 14px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .safe-panel .safe-title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-weight:500}
  .safe-panel .safe-sub{font-size:11.5px;color:var(--text-4)}
  .safe-list{display:flex;flex-direction:column}
  .safe-row{display:grid;grid-template-columns:22px 1fr;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
  .safe-row:last-child{border-bottom:none}
  .safe-row .ic{width:20px;height:20px;border-radius:99px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;background:#111;border:1px solid var(--border-2)}
  .safe-row.ok .ic{color:var(--green);border-color:var(--green-border);background:var(--green-bg)}
  .safe-row.warn .ic{color:var(--gold);border-color:var(--gold-border);background:var(--gold-bg)}
  .safe-row.bad .ic{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}
  .safe-row .txt{min-width:0}
  .safe-row .main{font-size:13px;color:var(--text-2);display:block;overflow:hidden;text-overflow:ellipsis}
  .safe-row.ok .main{color:var(--green)}
  .safe-row.bad .main{color:var(--red)}
  .safe-row.warn .main{color:var(--gold)}
  .safe-row .sub{font-size:11.5px;color:var(--text-4);margin-top:2px}

  .review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .review-card{padding:13px 14px;border:1px solid var(--border-2);border-radius:7px;background:#0a0a0a}
  .review-card .l{font-size:10.5px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
  .review-card .v{font-size:14px;color:var(--text);font-weight:500}
  .status-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 9px;border-radius:99px;border:1px solid var(--border-2);font-size:11.5px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
  .status-pill.ok{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
  .status-pill.warn{border-color:var(--gold-border);background:var(--gold-bg);color:var(--gold)}
  .status-pill.bad{border-color:var(--red-border);background:var(--red-bg);color:var(--red)}
  .mini-note{font-size:12.5px;color:var(--text-3);line-height:1.55}
  .audit-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .audit-row{display:flex;justify-content:space-between;gap:12px;padding:9px 10px;border:1px solid var(--border-2);border-radius:6px;background:#0a0a0a;font-size:12px;color:var(--text-2)}
  .audit-row .time{font-family:'JetBrains Mono',monospace;color:var(--text-4);font-size:10.5px;white-space:nowrap}

  /* Generated name preview — calmer */
  .gen-card{padding:18px 22px;background:#0c0b08;border:1px solid var(--gold-border);border-radius:8px;margin-top:18px}
  .gen-card .l{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:7px}
  .gen-card .v{font-size:15px;color:var(--text);font-weight:500;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .gen-card .v .copy{padding:4px 10px;font-size:11px;border:1px solid var(--gold-border);border-radius:4px;color:var(--gold);font-family:'JetBrains Mono',monospace;background:transparent}

  /* STEP 2 single-substep card */
  .meta-task{display:flex;flex-direction:column;gap:14px}
  .meta-task .where{font-size:12.5px;color:var(--text-3);font-family:'JetBrains Mono',monospace;letter-spacing:0.02em;display:flex;align-items:center;gap:7px}
  .meta-task .where .arrow{color:var(--text-4)}
  .meta-task .where .crumb-bit{color:var(--text-2)}
  .meta-task .where .crumb-bit.last{color:var(--gold)}

  .field-block{padding:14px 16px;border:1px solid var(--border-2);border-radius:7px;background:#0a0a0a;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .field-block .l{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-weight:500;flex-shrink:0;width:90px}
  .field-block .v{font-size:14px;color:var(--text);font-weight:500;font-family:'JetBrains Mono',monospace;flex:1;min-width:0;word-break:break-all}
  .field-block.set{padding:10px 14px}
  .field-block .copy{padding:5px 10px;font-size:11px;border:1px solid var(--border-2);border-radius:4px;color:var(--text-3);font-family:'JetBrains Mono',monospace;background:transparent}
  .field-block .copy:hover{background:#141414;color:var(--text)}
  .field-block.toggle{background:var(--red-bg);border-color:var(--red-border)}
  .field-block.toggle .l{color:var(--red)}
  .field-block.toggle .v{color:var(--text)}

  .greeting-box{padding:16px;border:1px solid var(--border-2);border-radius:7px;background:#0a0a0a}
  .greeting-box .l{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
  .greeting-box .body{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);line-height:1.65;white-space:pre-wrap;background:#141414;border:1px solid var(--border-2);border-radius:5px;padding:12px 14px}
  .greeting-box .actions{margin-top:10px;display:flex;justify-content:flex-end}

  /* STEP 3 single check */
  .check-block{display:flex;flex-direction:column;gap:14px}
  .check-status{padding:18px 20px;border-radius:8px;display:flex;align-items:center;gap:14px}
  .check-status.ok{background:var(--green-bg);border:1px solid var(--green-border)}
  .check-status.bad{background:var(--red-bg);border:1px solid var(--red-border)}
  .check-status.warn{background:var(--gold-bg);border:1px solid var(--gold-border)}
  .check-status .ic{width:30px;height:30px;border-radius:99px;background:#0a0a0a;display:grid;place-items:center;font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:700;flex-shrink:0}
  .check-status.ok .ic{color:var(--green);border:1px solid var(--green-border)}
  .check-status.bad .ic{color:var(--red);border:1px solid var(--red-border)}
  .check-status.warn .ic{color:var(--gold);border:1px solid var(--gold-border)}
  .check-status .body{flex:1;min-width:0}
  .check-status .head{font-size:15px;font-weight:600;letter-spacing:-0.005em}
  .check-status.ok .head{color:var(--green)}
  .check-status.bad .head{color:var(--red)}
  .check-status.warn .head{color:var(--gold)}
  .check-status .sub{font-size:13px;color:var(--text-2);margin-top:3px;line-height:1.5}
  .check-status .sub strong{color:var(--text);font-weight:600}

  .check-instr{padding:16px 18px;border:1px solid var(--border-2);border-radius:7px;background:#0a0a0a}
  .check-instr .l{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
  .check-instr .steps{display:flex;flex-direction:column;gap:9px}
  .check-instr .stp{display:flex;align-items:flex-start;gap:11px;font-size:13px;color:var(--text-2);line-height:1.55}
  .check-instr .stp .n{width:20px;height:20px;border-radius:99px;background:#141414;border:1px solid var(--border-2);display:grid;place-items:center;font-size:11px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:600;flex-shrink:0}
  .check-instr .stp strong{color:var(--text);font-weight:600}

  .group-progress{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
  .group-progress .dots{display:flex;gap:4px}
  .group-progress .dot{width:6px;height:6px;border-radius:99px;background:var(--border-2)}
  .group-progress .dot.ok{background:var(--green)}
  .group-progress .dot.bad{background:var(--red)}
  .group-progress .dot.cur{background:var(--gold);box-shadow:0 0 4px var(--gold)}

  /* Plan / launch / done — same as before but lighter */
  .plan-summary{padding:18px 20px;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#0c0c0c}
  .plan-summary .num{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}
  .plan-summary .num.green{color:var(--green)}
  .plan-summary .lbl{font-size:13px;color:var(--text-2);margin-right:6px}
  .plan-summary .sep{color:var(--text-4);margin:0 4px}
  .plan-table-wrap{max-height:380px;overflow-y:auto}
  table.plan{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
  table.plan thead th{padding:9px 14px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);font-weight:500;background:#0c0c0c;text-align:left;border-bottom:1px solid var(--border-2);position:sticky;top:0;z-index:1}
  table.plan tbody td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  .pl-thumb{width:28px;height:28px;border-radius:4px;border:1px solid var(--border-2);overflow:hidden;background:#0c0c0c}
  .pl-thumb svg{width:100%;height:100%;display:block}
  .pl-kw{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.06em;color:var(--text);font-weight:500}
  .pl-action{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500}
  .pl-action .d{width:6px;height:6px;border-radius:99px}
  .pl-action.create{color:var(--green)}.pl-action.create .d{background:var(--green)}
  .pl-action.keep{color:var(--blue)}.pl-action.keep .d{background:var(--blue)}
  .pl-msg{font-size:12px;color:var(--text-2)}
  .pl-msg .gold{color:var(--gold);font-family:'JetBrains Mono',monospace}

  .pg-grid{display:grid;grid-template-columns:repeat(2,1fr)}
  .pg-cell{padding:18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .pg-cell:nth-child(2n){border-right:none}.pg-cell:nth-last-child(-n+2){border-bottom:none}
  .pg-lbl{font-size:11px;color:var(--text-3);margin-bottom:8px}
  .pg-num{display:flex;align-items:baseline;gap:6px}
  .pg-num .v{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums}
  .pg-num .v.active{color:var(--gold)}.pg-num .v.idle{color:var(--text-4)}
  .pg-num .total{font-size:13px;color:var(--text-4);font-family:'JetBrains Mono',monospace}
  .pg-bar{height:3px;background:#161616;border-radius:99px;margin-top:8px;overflow:hidden}
  .pg-bar > span{display:block;height:100%;background:linear-gradient(90deg,#8a7348,var(--gold))}
  .pg-current{padding:13px 18px;background:#0a0a0a;font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
  .pg-current .what{font-family:'JetBrains Mono',monospace;color:var(--text)}

  .done-head{padding:22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
  .done-seal{width:40px;height:40px;border-radius:99px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);display:grid;place-items:center;font-size:18px;flex-shrink:0;font-weight:700}
  .done-row{padding:11px 22px;display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--text-2)}
  .done-row .ic{width:18px;color:var(--green);text-align:center;font-weight:600;font-family:'JetBrains Mono',monospace}
  .done-row .ic.warn{color:var(--gold)}
  .done-row strong{color:var(--text);font-weight:500}
  .done-actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:#0c0c0c}

  /* BOTTOM ACTION BAR */
  .actionbar{display:flex;align-items:center;gap:14px;padding:14px 22px;border-top:1px solid var(--border);background:#0c0c0c}
  .ab-context{font-size:13px;color:var(--text-3);flex:1;min-width:0}
  .ab-context strong{color:var(--text);font-weight:500}
  .ab-context.bad strong{color:var(--red)}
  .ab-shortcut{font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
  .ab-shortcut kbd{display:inline-block;padding:1px 6px;border:1px solid var(--border-2);border-radius:3px;background:#141414;color:var(--text-2);font-size:10.5px}
  /* PRIMARY BUTTON — alive, glowing */
  .btn-primary{padding:11px 22px;background:var(--gold);color:#0a0a0a;border-radius:7px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;position:relative;transition:transform .12s ease, filter .15s ease;box-shadow:0 0 24px -2px rgba(212,178,122,0.55), 0 0 0 1px rgba(212,178,122,0.4), inset 0 1px 0 rgba(255,255,255,0.18)}
  .btn-primary::before{content:'';position:absolute;inset:-6px;border-radius:11px;background:radial-gradient(closest-side, rgba(212,178,122,0.55), rgba(212,178,122,0));z-index:-1;animation:btn-breathe 2.4s ease-in-out infinite;pointer-events:none}
  .btn-primary:hover{transform:translateY(-1px);filter:brightness(1.08)}
  .btn-primary:active{transform:translateY(0);filter:brightness(0.95)}
  .btn-primary:disabled{background:#161616;color:var(--text-4);cursor:not-allowed;border:1px solid var(--border-2);box-shadow:none;filter:none}
  .btn-primary:disabled::before{display:none}
  @keyframes btn-breathe{
    0%,100%{opacity:0.55;transform:scale(1)}
    50%{opacity:1;transform:scale(1.08)}
  }
  .btn-primary.flash::after{content:'';position:absolute;inset:-3px;border-radius:9px;border:2px solid var(--gold);animation:btn-flash .55s ease-out forwards;pointer-events:none}
  @keyframes btn-flash{
    0%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:scale(1.22)}
  }
  .btn-secondary{padding:10px 14px;background:#0f0f0f;border:1px solid var(--border-2);border-radius:6px;color:var(--text-2);font-size:13px;font-weight:500}
  .btn-secondary:hover{background:#141414;color:var(--text)}
  .btn-back{padding:10px 14px;background:transparent;color:var(--text-3);font-size:13px}
  .btn-back:hover{color:var(--text)}

  .fix-btn{padding:7px 12px;font-size:12px;border:1px solid var(--border-2);border-radius:4px;background:#0c0c0c;color:var(--text-2);font-weight:500}
  .fix-btn.primary{background:var(--gold);color:#0a0a0a;border-color:var(--gold);font-weight:600}

  @media (max-width:1100px){
    body{height:auto;overflow:auto}
    .app{height:auto;display:flex;flex-direction:column}
    .main{display:flex;flex-direction:column}
  }
</style>
</head>
<body>

<template id="__bundler_thumbnail" data-bg-color="#0a0a0a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0a0a0a"/>
    <rect x="80" y="120" width="760" height="600" rx="14" fill="#111" stroke="#1f1f1f" stroke-width="2"/>
    <text x="120" y="180" font-family="Inter, sans-serif" font-size="32" fill="#e8e8e8" font-weight="600">Campaign Launcher</text>
    <text x="120" y="210" font-family="JetBrains Mono, monospace" font-size="13" fill="#d4b27a" letter-spacing="2">FOCUS-MODE WIZARD</text>
  </svg>
</template>

<div class="progress-hair" id="progressHair"></div>
<div class="confetti-layer" id="confettiLayer"></div>

<div class="app">

  <div class="topbar">
    <div class="crumb">
      <a href="/ads" target="_top">CCOS</a><span class="sep">/</span><a href="/ads" target="_top">Ads</a><span class="sep">/</span><span class="here">Campaign Launcher</span>
    </div>
    <div class="top-title" id="topTitle">Summer Shred — Tyson</div>
    <div class="top-actions">
      <button class="btn-ghost" id="runHistoryBtn">Run history</button>
      <button class="btn-ghost" id="saveDraftBtn">Save draft</button>
    </div>
  </div>

  <div class="main">
    <div class="stage">
      <div class="stage-inner">
        <div class="summary-strip" id="summaryStrip"></div>
        <div id="focus"></div>
      </div>
    </div>

    <div class="rail">
      <div class="rail-head">
        <div class="lbl">Launch</div>
        <div class="title" id="railTitle">Summer Shred</div>
        <div class="sub" id="railSub">Tyson · Meta</div>
      </div>
      <div class="rail-steps" id="railSteps"></div>
      <div class="rr-section" id="railStatus"></div>
    </div>
  </div>

  <div class="actionbar">
    <button class="btn-back" id="btnBack">← Back</button>
    <div class="ab-context" id="abContext"></div>

    <button class="btn-secondary" id="btnSecondary" style="display:none"></button>
    <button class="btn-primary" id="btnPrimary"></button>
  </div>
</div>

<script>
  // =========================================================================
  // FLOW MODEL
  // =========================================================================
  const FLOW = [
    { id:'inputs', name:'Inputs', substeps:[
      { id:'client', label:'Who & what' },
      { id:'plan',   label:'Plan & seed' },
      { id:'media',  label:'Images & keywords' },
      { id:'review', label:'Confirm name' }
    ]},
    { id:'meta', name:'Build in Meta', substeps:[
      { id:'campaign',  label:'Campaign' },
      { id:'adset',     label:'Ad set' },
      { id:'audience',  label:'Audience' },
      { id:'placement', label:'Placement' },
      { id:'seed',      label:'Seed ad' },
      { id:'message',   label:'Message template' },
      { id:'toggles',   label:'Manual toggles' }
    ]},
    { id:'check', name:'Setup check', substeps:[
      { id:'campaign',  label:'Campaign'  },
      { id:'adset',     label:'Ad set'    },
      { id:'seed',      label:'Seed ad'   },
      { id:'message',   label:'Message'   },
      { id:'toggles',   label:'Toggles'   }
    ]},
    { id:'plan', name:'Launch plan' },
    { id:'launch', name:'Launch' },
    { id:'done', name:'Done' }
  ];

  // VA's mental progress — start at the first input so the launch has one clean path.
  const state = {
    step: 0,           // 0-indexed step
    sub: 0,            // 0-indexed substep within step
    completed: {},
    audit: []
  };
  const STORAGE_KEY = 'ccos_campaign_launcher_draft_v1';
  const FALLBACK_RECENT_KEYWORDS = [
    'IRON','BURN','FIRE','VIBE','PUSH','JACKED','OWN','RIPPED','WARRIOR','DRIVE','SHRED','UNLEASH','MOVE','NEXT','QUICK','PEAK','HUSTLE','EDGE','LEAN','TOUGH','GRIND','SCULPT','CUT','KEEN','RESULTS','FOCUS','CONFIDENCE','PROUD','RISE','CHISELED'
  ];
  const draft = {
    client: 'Tyson',
    challenge: 'Summer Shred',
    date: '5/7',
    audience: 'Warm',
    budgetType: 'ABO',
    dailyBudget: '',
    mediaType: 'Story Images',
    seedKeyword: '',
    keywords: '',
    uploadedCount: 0,
    uploadedNames: [],
    mediaItems: [],
    lastSavedAt: null
  };
  const keywordUsage = {
    loadedFor: null,
    loading: false,
    available: false,
    error: null,
    keywords: []
  };
  const metaVerify = {
    checkedFor: null,
    loading: false,
    available: false,
    error: null,
    data: null,
    manualConfirmed: {}
  };
  const CLIENT_OPTIONS = ['Tyson','Keith'];
  const AUDIENCE_OPTIONS = ['Warm','Cold'];
  const BUDGET_TYPE_OPTIONS = ['ABO','CBO'];
  const MEDIA_TYPE_OPTIONS = ['Story Images','Story Video','Story Images/Video'];

  function esc(value){
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[ch]));
  }
  function normalizeKeywordText(value){
    return String(value || '').trim().toUpperCase().replace(/\s+/g, '');
  }
  function formatBytes(size){
    if (!Number.isFinite(size)) return '';
    if (size < 1024) return `${size} B`;
    if (size < 1024 * 1024) return `${Math.round(size / 1024)} KB`;
    return `${(size / (1024 * 1024)).toFixed(1)} MB`;
  }
  function nowLabel(){
    return new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
  }
  function addAudit(text){
    state.audit.unshift({ text, at: nowLabel() });
    state.audit = state.audit.slice(0, 12);
  }
  function serializeDraft(){
    const { mediaItems, ...rest } = draft;
    return {
      ...rest,
      mediaItems: (mediaItems || []).map(item => ({
        name: item.name,
        type: item.type,
        size: item.size
      }))
    };
  }
  function saveDraft(silent){
    draft.lastSavedAt = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      draft: serializeDraft(),
      audit: state.audit
    }));
    if (!silent) addAudit('Draft saved');
    updateShell();
    renderActionBar();
  }
  function loadDraft(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      Object.assign(draft, saved.draft || {});
      draft.mediaItems = (draft.mediaItems || []).map(item => ({ ...item, previewUrl:null }));
      draft.uploadedNames = draft.mediaItems.map(item => item.name);
      draft.uploadedCount = draft.mediaItems.length;
      state.audit = Array.isArray(saved.audit) ? saved.audit.slice(0, 12) : [];
    } catch (error) {
      console.warn('[campaign-launcher] Could not load saved draft', error);
    }
  }
  function campaignName(){
    return `${draft.date || 'DATE'} - ${draft.challenge || 'Challenge'} - ${draft.budgetType} - ${draft.audience} - ${draft.mediaType}`;
  }
  function selectField(label, key, options){
    return `<div class="input-row"><div class="lbl">${label}</div><select class="field-input select-native" data-draft="${key}">${
      options.map(option => `<option value="${esc(option)}" ${draft[key] === option ? 'selected' : ''}>${esc(option)}</option>`).join('')
    }</select></div>`;
  }
  function textField(label, key, attrs=''){
    return `<div class="input-row"><div class="lbl">${label}</div><input class="field-input" data-draft="${key}" value="${esc(draft[key])}" ${attrs}></div>`;
  }
  function keywordList(){
    return draft.keywords
      .split(/\n+/)
      .map(keyword => normalizeKeywordText(keyword))
      .filter(Boolean);
  }
  function keywordLines(){
    return draft.keywords.split(/\r?\n/);
  }
  function recentKeywordMap(){
    const map = new Map();
    const fallback = FALLBACK_RECENT_KEYWORDS.map(keyword => ({
      keyword,
      lastSeen:'recent campaign',
      source:'known last-30-day list'
    }));
    const rows = keywordUsage.available ? keywordUsage.keywords : fallback;
    rows.forEach(row => {
      const key = normalizeKeywordText(row.keyword);
      if (key) map.set(key, row);
    });
    return map;
  }
  function validateDraft(){
    const lines = keywordLines();
    const keywords = keywordList();
    const blanks = lines.length > 1 ? lines.filter(line => !line.trim()).length : 0;
    const duplicateKeywords = keywords.filter((kw, idx) => keywords.indexOf(kw) !== idx);
    const duplicateSet = [...new Set(duplicateKeywords)];
    const recent = recentKeywordMap();
    const reused = keywords.filter(kw => recent.has(kw));
    const seed = normalizeKeywordText(draft.seedKeyword);
    const errors = [];
    const warnings = [];

    if (!draft.client) errors.push('Pick a client.');
    if (!draft.challenge.trim()) errors.push('Add the challenge name.');
    if (!draft.date.trim()) errors.push('Add the campaign date label.');
    if (!draft.dailyBudget.trim()) errors.push('Add the daily budget Alex gave you.');
    if (!seed) errors.push('Add the seed keyword.');
    if (!draft.uploadedCount) errors.push('Upload the ad media files.');
    if (!keywords.length) errors.push('Add one keyword per file.');
    if (blanks) errors.push('Remove blank keyword lines.');
    if (duplicateSet.length) errors.push(`Remove duplicate keywords: ${duplicateSet.join(', ')}.`);
    if (draft.uploadedCount && keywords.length && draft.uploadedCount !== keywords.length) {
      errors.push(`Media count and keyword count must match: ${draft.uploadedCount} files, ${keywords.length} keywords.`);
    }
    if (seed && keywords.length && !keywords.includes(seed)) errors.push(`Seed keyword ${seed} must be included in the keyword list.`);
    if (reused.length) errors.push(`Do not reuse recent keywords: ${[...new Set(reused)].join(', ')}.`);
    if (!keywordUsage.available) warnings.push('Recent keyword check is using the saved safety list because live lookup is not available yet.');
    if (draft.mediaItems.some(item => !/^image\//.test(item.type || '') && !/^video\//.test(item.type || ''))) {
      warnings.push('Only image and video files should be used for Meta Stories ads.');
    }

    return { errors, warnings, keywords, reused };
  }
  function validationRows({ includeGood = true } = {}){
    const v = validateDraft();
    const rows = [];
    if (includeGood && draft.uploadedCount && v.keywords.length && draft.uploadedCount === v.keywords.length) rows.push({type:'ok', text:'Image count matches keyword count'});
    if (includeGood && draft.dailyBudget.trim()) rows.push({type:'ok', text:'Daily budget is filled in'});
    if (includeGood && normalizeKeywordText(draft.seedKeyword) && v.keywords.includes(normalizeKeywordText(draft.seedKeyword))) rows.push({type:'ok', text:'Seed keyword is included in the keyword list'});
    v.errors.forEach(text => rows.push({type:'bad', text}));
    v.warnings.forEach(text => rows.push({type:'warn', text}));
    if (!rows.length) rows.push({type:'warn', text:'Add the launch info to start the safety check.'});
    return rows;
  }
  function safetyPanel(title='Safety checks', subtitle='The app stops if anything is unsafe.'){
    const rows = validationRows();
    return `<div class="safe-panel">
      <div class="safe-head"><div class="safe-title">${esc(title)}</div><div class="safe-sub">${esc(subtitle)}</div></div>
      <div class="safe-list">${rows.map(row => `
        <div class="safe-row ${row.type}">
          <div class="ic">${row.type === 'ok' ? '✓' : row.type === 'bad' ? '!' : '?'}</div>
          <div class="txt"><div class="main">${esc(row.text)}</div>${row.sub ? `<div class="sub">${esc(row.sub)}</div>` : ''}</div>
        </div>`).join('')}</div>
    </div>`;
  }
  function uploadStatus(){
    if (!draft.uploadedCount) return 'No files selected yet';
    return `✓ ${draft.uploadedCount} file${draft.uploadedCount === 1 ? '' : 's'} selected`;
  }
  function uploadThumbs(){
    if (!draft.uploadedCount) return '';
    const shown = Math.min(draft.uploadedCount, 4);
    const thumbs = (draft.mediaItems || []).slice(0, shown).map((item, i) => {
      if (item.previewUrl && /^image\//.test(item.type || '')) return `<div class="thumb-mini"><img src="${esc(item.previewUrl)}" alt=""></div>`;
      if (item.previewUrl && /^video\//.test(item.type || '')) return `<div class="thumb-mini"><video src="${esc(item.previewUrl)}" muted></video></div>`;
      return `<div class="thumb-mini"><svg viewBox="0 0 60 60"><rect width="60" height="60" fill="${['#1a1608','#0e1420','#0c1a12','#1a0e0e'][i % 4]}"/><circle cx="30" cy="30" r="10" fill="${['#2a2417','#1c2a3e','#1a2e22','#3a1f1f'][i % 4]}"/></svg></div>`;
    }).join('');
    return `${thumbs}${draft.uploadedCount > 4 ? `<div class="thumb-mini more">+${draft.uploadedCount - 4}</div>` : ''}`;
  }
  function fileList(){
    if (!draft.mediaItems?.length) return '';
    return `<div class="file-list">${draft.mediaItems.map((item, index) => `
      <div class="file-row">
        <div class="name">${String(index + 1).padStart(2,'0')} · ${esc(item.name)}</div>
        <div class="meta">${esc(formatBytes(item.size))}</div>
      </div>`).join('')}</div>`;
  }

  function isStepFullyDone(stepIdx){
    const step = FLOW[stepIdx];
    if (!step.substeps) return (state.completed[stepIdx] && state.completed[stepIdx].length > 0);
    return (state.completed[stepIdx] || []).length === step.substeps.length;
  }
  function isSubDone(stepIdx, subIdx){
    return (state.completed[stepIdx] || []).includes(subIdx);
  }
  function markSubDone(stepIdx, subIdx){
    state.completed[stepIdx] = state.completed[stepIdx] || [];
    if (!state.completed[stepIdx].includes(subIdx)) state.completed[stepIdx].push(subIdx);
  }

  // =========================================================================
  // CONTENT — one focused card per (step, sub)
  // =========================================================================
  const CONTENT = {};

  // ---------- STEP 1 — INPUTS ----------
  CONTENT['inputs.client'] = () => `
    <h1 class="focus-title">Who is this campaign for?</h1>
    <div class="focus-help">This tells the app which ad account and recent keyword history to check.</div>
    <div class="focus-card">
      ${selectField('Client', 'client', CLIENT_OPTIONS)}
      ${textField('Challenge', 'challenge', 'autofocus')}
    </div>
    ${safetyPanel('What the app needs', 'Fill this in first.')}`;

  CONTENT['inputs.plan'] = () => `
    <h1 class="focus-title">How will it run?</h1>
    <div class="focus-card">
      ${textField('Campaign date', 'date', 'autofocus')}
      ${selectField('Audience', 'audience', AUDIENCE_OPTIONS)}
      ${selectField('Budget type', 'budgetType', BUDGET_TYPE_OPTIONS)}
      <div class="input-row"><div class="lbl">Daily budget <span class="opt">from Alex / launch brief</span></div><input class="field-input" data-draft="dailyBudget" value="${esc(draft.dailyBudget)}" placeholder="$ amount for this launch"></div>
      ${selectField('Media type', 'mediaType', MEDIA_TYPE_OPTIONS)}
      ${textField('Seed keyword', 'seedKeyword', 'placeholder="first keyword used on the starter ad"')}
    </div>
    ${safetyPanel('Plan safety', 'Budget and seed keyword are required.')}`;

  CONTENT['inputs.media'] = () => `
    <h1 class="focus-title">Drop your images and keywords</h1>
    <div class="focus-help">Counts must match.</div>
    <div class="focus-card">
      <label class="uploader" for="mediaUpload">
        <input class="upload-input" id="mediaUpload" type="file" multiple accept="image/*,video/*">
        <div class="glyph">↑</div>
        <div class="head">Drop ad images, or <span style="color:var(--gold)">browse</span></div>
        <div class="sub">jpg, png, mp4 · Stories ratio</div>
        <div class="thumbs-inline" data-upload-thumbs>${uploadThumbs()}</div>
        <div class="upload-status ${draft.uploadedCount ? 'good' : ''}" data-upload-status>${uploadStatus()}</div>
      </label>
      <div data-file-list>${fileList()}</div>
      <div class="input-row" style="margin-top:6px"><div class="lbl">Keywords <span class="opt">one per line · UPPERCASE</span></div>

        e.preventDefault();
        e.stopPropagation();
        const fieldValue = btn.closest('.field-block')?.querySelector('.v');
        const greetingValue = btn.closest('.greeting-box')?.querySelector('.body');
        const generatedValue = btn.closest('.gen-card')?.querySelector('.v');
        const raw = (fieldValue || greetingValue || generatedValue)?.textContent || '';
        const value = raw.replace(/\bCopy\b/g, '').trim();
        if (!value) return;
        navigator.clipboard?.writeText(value);
        const previous = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = previous; }, 900);
      });
    });
  }

  function bindUtilityButtons(){
    focusEl.querySelectorAll('[data-open-meta]').forEach(btn => {
      btn.addEventListener('click', () => window.open('https://business.facebook.com/adsmanager/manage/campaigns', '_blank', 'noopener,noreferrer'));
    });
    focusEl.querySelectorAll('[data-export-report]').forEach(btn => {
      btn.addEventListener('click', () => {
        const report = {
          exportedAt: new Date().toISOString(),
          campaignName: campaignName(),
          draft: serializeDraft(),
          validation: validateDraft(),
          audit: state.audit,
          safety: 'No Meta write or publish action was performed by this app.'
        };
        const blob = new Blob([JSON.stringify(report, null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${campaignName().replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'') || 'campaign-launch'}-report.json`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 500);
      });
    });
    focusEl.querySelectorAll('[data-reset-launch]').forEach(btn => {
      btn.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      });
    });
  }

  async function refreshKeywordUsage(){
    const client = String(draft.client || '').toLowerCase();
    if (!client || keywordUsage.loading || keywordUsage.loadedFor === client) return;
    keywordUsage.loading = true;
    keywordUsage.error = null;
    renderActionBar();
    try {
      const res = await fetch(`/api/ads/launcher/keywords?client=${encodeURIComponent(client)}`, { cache:'no-store' });
      const data = await res.json();
      keywordUsage.loadedFor = client;
      keywordUsage.available = !!data.available;
      keywordUsage.keywords = Array.isArray(data.keywords) ? data.keywords : [];
      keywordUsage.error = data.error || null;
      addAudit(keywordUsage.available ? `Loaded ${keywordUsage.keywords.length} recent keywords` : 'Recent keyword lookup unavailable');
    } catch (error) {
      keywordUsage.loadedFor = client;
      keywordUsage.available = false;
      keywordUsage.keywords = [];
      keywordUsage.error = error instanceof Error ? error.message : 'Keyword lookup failed';
    } finally {
      keywordUsage.loading = false;
      render();
    }
  }

  async function refreshMetaVerification(){
    const client = String(draft.client || '').toLowerCase();
    const verifyKey = `${client}:${campaignName()}:${normalizeKeywordText(draft.seedKeyword)}`;
    metaVerify.loading = true;
    metaVerify.error = null;
    render();
    try {
      const params = new URLSearchParams({
        client,
        campaignName: campaignName(),
        seedKeyword: normalizeKeywordText(draft.seedKeyword)
      });
      const res = await fetch(`/api/ads/launcher/verify?${params.toString()}`, { cache:'no-store' });
      const data = await res.json();
      metaVerify.checkedFor = verifyKey;
      metaVerify.available = !!data.available;
      metaVerify.data = data;
      metaVerify.error = data.error || null;
      addAudit(metaVerify.available ? 'Meta read-only scan completed' : 'Meta read-only scan unavailable');
    } catch (error) {
      metaVerify.checkedFor = verifyKey;
      metaVerify.available = false;
      metaVerify.data = null;
      metaVerify.error = error instanceof Error ? error.message : 'Meta verification failed';
    } finally {
      metaVerify.loading = false;
      render();
    }
  }

  function renderRail(){
    railStepsEl.innerHTML = FLOW.map((s, si) => {
      const isCurrent = si === state.step;
      const isDone = isStepFullyDone(si);
      let meta = '';
      if (isDone) meta = '<span class="rs-meta ok">done</span>';
      else if (isCurrent && si === 2) meta = '<span class="rs-meta warn">manual</span>';
      else if (isCurrent) meta = '<span class="rs-meta warn">in progress</span>';
      const subs = s.substeps ? `<div class="substeps">${
        s.substeps.map((ss, sj) => {
          const done = isSubDone(si, sj);
          const cur = isCurrent && sj === state.sub;
          // unlock: done already, or current, or the one right after the latest done
          const maxDone = Math.max(-1, ...(state.completed[si]||[]));
          const unlocked = done || cur || sj <= maxDone + 1;
          const cls = ['ss', done?'done':'', cur?'current':'', unlocked?'':'locked'].filter(Boolean).join(' ');
          return `<div class="${cls}" data-step="${si}" data-sub="${sj}"><span class="d"></span>${ss.label}</div>`;
        }).join('')
      }</div>` : '';
      return `<div class="rail-step ${isCurrent?'current':''} ${isDone?'done':''}" data-step="${si}">
        <div class="row">
          <span class="rs-num">${isDone?'✓':si+1}</span>
          <span class="rs-name">${s.name}</span>
          ${meta}
        </div>
        ${subs}
      </div>`;
    }).join('');

    railStepsEl.querySelectorAll('.rail-step').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('.ss')) return;
        const si = +el.dataset.step;
        if (isStepFullyDone(si) || si === state.step){ state.step = si; state.sub = 0; render(); }
      });
    });
    railStepsEl.querySelectorAll('.ss').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        if (el.classList.contains('locked')) return;
        state.step = +el.dataset.step;
        state.sub = +el.dataset.sub;
        render();
      });
    });
  }

  function renderStatus(){
    const validation = validateDraft();
    if (validation.errors.length){
      railStatusEl.innerHTML = `
        <div class="blocker-banner">
          <div class="bb-title"><span class="ico">!</span>${validation.errors.length} launch blocker${validation.errors.length === 1 ? '' : 's'}</div>
          <div class="bb-list">
            ${validation.errors.slice(0, 4).map(error => `<div class="bb-item">${esc(error)}</div>`).join('')}
          </div>
        </div>`;
    } else if (state.step === 2) {
      railStatusEl.innerHTML = `
        <div class="safe-panel" style="margin-top:0">
          <div class="safe-list">
            <div class="safe-row warn"><div class="ic">?</div><div class="txt"><div class="main">Manual Meta checks required</div><div class="sub">The app can read campaign/seed basics, but hidden toggles stay human-confirmed.</div></div></div>
          </div>
        </div>`;
    } else {
      railStatusEl.innerHTML = '';
    }
  }

  function renderSummaryStrip(){
    summaryEl.innerHTML = '';
  }

  function renderActionBar(){
    const a = actionFor();
    btnPrimary.textContent = a.primary;
    btnPrimary.disabled = !!a.primaryDisabled;
    currentSecondaryAction = a.secondaryAction || null;
    if (a.secondary){ btnSecondary.textContent = a.secondary; btnSecondary.style.display = ''; }
    else btnSecondary.style.display = 'none';
    abContext.innerHTML = a.context || '';
    abContext.className = 'ab-context ' + (a.ctx||'');
  }

  function render(opts){
    renderFocus();
    renderRail();
    renderStatus();
    renderSummaryStrip();
    renderActionBar();
    updateProgressHair();
    if (opts && opts.fresh){
      const fc = document.querySelector('.focus-card');
      if (fc){ fc.classList.add('entering'); setTimeout(()=>fc.classList.remove('entering'), 1200); }
    }
  }

  // -------- progress hairline (overall completion %) --------
  function updateProgressHair(){
    const totalUnits = FLOW.reduce((n,s)=> n + (s.substeps ? s.substeps.length : 1), 0);
    let done = 0;
    FLOW.forEach((s, si) => {
      const c = (state.completed[si]||[]).length;
      done += c;
    });
    // also count current sub as half-progress for live feel
    const cur = FLOW[state.step];
    const subUnits = cur.substeps ? 1 : 1;
    const halfBoost = 0.5;
    const pct = Math.min(100, ((done + halfBoost) / totalUnits) * 100);
    document.getElementById('progressHair').style.width = pct + '%';
  }

  // -------- glowing particle emissions from card edges --------
  const COLORS = ['#f0d9a8','#e8c992','#d4b27a','#fff1d6'];
  function emitFromCard(count){
    const card = document.querySelector('.focus-card');
    const layer = document.getElementById('confettiLayer');
    if (!card || !layer) return;
    const r = card.getBoundingClientRect();
    const perim = 2*(r.width + r.height);
    for (let i=0; i<count; i++){
      // pick a point along the perimeter
      let t = Math.random() * perim;
      let x, y, nx, ny; // outward normal
      if (t < r.width){ x = r.left + t; y = r.top; nx = 0; ny = -1; }
      else if (t < r.width + r.height){ x = r.right; y = r.top + (t - r.width); nx = 1; ny = 0; }
      else if (t < 2*r.width + r.height){ x = r.right - (t - r.width - r.height); y = r.bottom; nx = 0; ny = 1; }
      else { x = r.left; y = r.bottom - (t - 2*r.width - r.height); nx = -1; ny = 0; }
      const p = document.createElement('div');
      p.className = 'particle';
      const dist = 28 + Math.random()*70;
      const jitter = (Math.random()-0.5) * 30;
      const dx = nx*dist + (-ny)*jitter;
      const dy = ny*dist + (nx)*jitter;
      const size = 4 + Math.random()*6;
      p.style.width = size+'px'; p.style.height = size+'px';
      p.style.left = x+'px'; p.style.top = y+'px';
      p.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      p.style.setProperty('--dx', dx+'px');
      p.style.setProperty('--dy', dy+'px');
      p.style.setProperty('--dur', '1.7s');
      layer.appendChild(p);
      setTimeout(()=>p.remove(), 1800);
    }
  }
  function celebrate(small){
    const card = document.querySelector('.focus-card');
    if (card){
      const r = card.getBoundingClientRect();
      const halo = document.createElement('div');
      halo.className = 'card-halo';
      halo.style.left = r.left+'px'; halo.style.top = r.top+'px';
      halo.style.width = r.width+'px'; halo.style.height = r.height+'px';
      document.body.appendChild(halo);
      setTimeout(()=>halo.remove(), 1700);
    }
    emitFromCard(small ? 18 : 60);
    if (!small){
      // second wave for richness
      setTimeout(()=>emitFromCard(40), 120);
    }
  }

  function advance(){
    if (btnPrimary.disabled) return;
    const step = FLOW[state.step];
    const wasLastSub = step.substeps && state.sub === step.substeps.length - 1;
    const subId = step.substeps ? step.substeps[state.sub].id : null;
    const key = subId ? `${step.id}.${subId}` : step.id;
    btnPrimary.classList.remove('flash'); void btnPrimary.offsetWidth; btnPrimary.classList.add('flash');

    let small = true;
    if (step.substeps){
      markSubDone(state.step, state.sub);
      if (!wasLastSub){
        state.sub++; small = true;
      } else if (state.step < FLOW.length - 1){
        state.step++; state.sub = 0; small = false;
      } else {
        small = false;
      }
    } else {
      if (state.step < FLOW.length - 1){
        state.step++; state.sub = 0; small = false;
      }
    }
    if (key.startsWith('check.')) addAudit(`${subId || 'Meta'} check confirmed`);
    if (key === 'plan') addAudit('Final launch plan reviewed');
    if (key === 'launch') addAudit('Marked ready for manual publish');
    saveDraft(true);
    render({fresh:true});
    requestAnimationFrame(()=>requestAnimationFrame(()=>celebrate(small)));
  }

  function goBack(){
    if (state.sub > 0){ state.sub--; }
    else if (state.step > 0){
      state.step--;
      const prev = FLOW[state.step];
      state.sub = prev.substeps ? prev.substeps.length - 1 : 0;
    }
    render();
  }

  btnPrimary.addEventListener('click', advance);
  btnBack.addEventListener('click', goBack);
  btnSecondary.addEventListener('click', () => {
    if (currentSecondaryAction === 'verify') {
      refreshMetaVerification();
      return;
    }
    window.open('https://business.facebook.com/adsmanager/manage/campaigns', '_blank', 'noopener,noreferrer');
  });
  saveDraftBtn?.addEventListener('click', () => {
    saveDraft();
    render();
  });
  runHistoryBtn?.addEventListener('click', () => {
    state.step = 5;
    state.sub = 0;
    render();
  });

  document.addEventListener('keydown', e => {
    if (e.target.matches('input, textarea')) return;
    if (e.key === 'Enter' && !btnPrimary.disabled){ e.preventDefault(); advance(); }
    if (e.key === 'Escape'){ goBack(); }
  });

  // Start at the beginning for the VA.
  loadDraft();
  state.step = 0; state.sub = 0;
  render();
  refreshKeywordUsage();
</script>

</body>
