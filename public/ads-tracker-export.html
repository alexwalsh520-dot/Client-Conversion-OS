const FLOW_ZOOM_MIN = 0.45, FLOW_ZOOM_MAX = 2.6;
const flowClamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

function DataFlowMap({ open, sel, setSel }){
  const nodeById = useMemo(() => {
    const m = {}; FLOW_NODES.forEach(n => { m[n.id] = n; }); return m;
  }, []);
  const edges = useMemo(() => FLOW_EDGES.map(([from, to]) => ({
    from, to, d: flowEdgePath(nodeById[from], nodeById[to]),
  })), [nodeById]);

  const neighbors = useMemo(() => {
    if(!sel) return new Set();
    const s = new Set();
    edges.forEach(e => { if(e.from === sel) s.add(e.to); if(e.to === sel) s.add(e.from); });
    return s;
  }, [sel, edges]);

  const selNode = sel ? nodeById[sel] : null;
  const feedsOut = selNode ? edges.filter(e => e.from === sel).map(e => nodeById[e.to]) : [];
  const feedsIn  = selNode ? edges.filter(e => e.to === sel).map(e => nodeById[e.from]) : [];

  // ---- Pan / zoom: a fixed viewport with a larger world transformed inside it.
  const vpRef = useRef(null);
  const [view, setView] = useState({ x:0, y:0, k:0.7 });
  const [grabbing, setGrabbing] = useState(false);
  const drag = useRef(null);

  const fit = React.useCallback(() => {
    const vp = vpRef.current; if(!vp) return;
    const vw = vp.clientWidth, vh = vp.clientHeight;
    if(!vw || !vh) return;
    const k = flowClamp(Math.min(vw / FLOW_WORLD.w, vh / FLOW_WORLD.h) * 0.94, FLOW_ZOOM_MIN, FLOW_ZOOM_MAX);
    const sw = FLOW_WORLD.w * k, sh = FLOW_WORLD.h * k;
    // Center when the scaled world fits; otherwise anchor near the top-left so the
    // sources (where the flow starts) are on screen — better on narrow phones.
    setView({ k, x: sw <= vw ? (vw - sw) / 2 : 16, y: sh <= vh ? (vh - sh) / 2 : 16 });
  }, []);

  // Fit to view whenever the map opens (after the wrapper has expanded).
  useLayoutEffect(() => {
    if(!open) return;
    const t = setTimeout(fit, 70);
    return () => clearTimeout(t);
  }, [open, fit]);

  // Re-fit if the viewport itself changes size (window resize, panel reflow).
  useEffect(() => {
    if(!open) return;
    const vp = vpRef.current;
    if(!vp || typeof ResizeObserver === "undefined") return;
    const ro = new ResizeObserver(() => fit());
    ro.observe(vp);
    return () => ro.disconnect();
  }, [open, fit]);

  // Wheel-to-zoom toward the cursor (native listener so we can preventDefault).
  useEffect(() => {
    const vp = vpRef.current; if(!vp) return;
    const onWheel = (e) => {
      e.preventDefault();
      const r = vp.getBoundingClientRect();
      const cx = e.clientX - r.left, cy = e.clientY - r.top;
      setView(v => {
        const k = flowClamp(v.k * (e.deltaY < 0 ? 1.12 : 1 / 1.12), FLOW_ZOOM_MIN, FLOW_ZOOM_MAX);
        const ratio = k / v.k;
        return { k, x: cx - (cx - v.x) * ratio, y: cy - (cy - v.y) * ratio };
      });
    };
    vp.addEventListener("wheel", onWheel, { passive:false });
    return () => vp.removeEventListener("wheel", onWheel);
  }, [open]);

  const zoomBy = (factor) => setView(v => {
    const vp = vpRef.current; if(!vp) return v;
    const cx = vp.clientWidth / 2, cy = vp.clientHeight / 2;
    const k = flowClamp(v.k * factor, FLOW_ZOOM_MIN, FLOW_ZOOM_MAX);
    const ratio = k / v.k;
    return { k, x: cx - (cx - v.x) * ratio, y: cy - (cy - v.y) * ratio };
  });

  const onPointerDown = (e) => {
    if(e.button != null && e.button !== 0) return;
    drag.current = { sx:e.clientX, sy:e.clientY, ox:view.x, oy:view.y, moved:false };
    setGrabbing(true);
    const vp = vpRef.current;
    if(vp && vp.setPointerCapture){ try { vp.setPointerCapture(e.pointerId); } catch(_){} }
  };
  const onPointerMove = (e) => {
    const d = drag.current; if(!d) return;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
    if(!d.moved && Math.hypot(dx, dy) > 4) d.moved = true;
    if(d.moved) setView(v => ({ ...v, x: d.ox + dx, y: d.oy + dy }));
  };
  const onPointerUp = () => {
    const d = drag.current; drag.current = null; setGrabbing(false);
    if(d && !d.moved) setSel(null); // a real background click (not a pan) deselects
  };

  return (
      <div className={"flow-wrap" + (open ? " open" : "")}>
        <div className="flow-shell">
          <div className="flow-bar">
            <div className="flow-bar-l">
              <div className="flow-bar-t">How a click becomes a tracked dollar</div>
              <div className="flow-bar-s">Drag to roam · scroll to zoom · tap any step to trace what feeds it.</div>
            </div>
            <div className="flow-legend">
              <span className="flow-lg src"><i></i>Source</span>
              <span className="flow-lg cap"><i></i>Capture</span>
              <span className="flow-lg eng"><i></i>Engine</span>
              <span className="flow-lg alt"><i></i>Exception</span>
              <span className="flow-lg out"><i></i>Output</span>
            </div>
          </div>

          <div className="flow-stage">
            <div ref={vpRef} className={"flow-canvas" + (grabbing ? " grabbing" : "")}
              onPointerDown={onPointerDown} onPointerMove={onPointerMove}
              onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
              <div className="flow-world" style={{ width:FLOW_WORLD.w, height:FLOW_WORLD.h,
                transform:`translate(${view.x}px, ${view.y}px) scale(${view.k})` }}>
                <div className="flow-grid"></div>
                <svg className="flow-svg" width={FLOW_WORLD.w} height={FLOW_WORLD.h}
                  viewBox={"0 0 " + FLOW_WORLD.w + " " + FLOW_WORLD.h}>
                  <g>
                    {edges.map((e, i) => {
                      const connected = sel && (e.from === sel || e.to === sel);
                      const cls = "flow-edge" + (sel ? (connected ? " lit" : " faded") : "");
                      return <path key={i} className={cls} d={e.d} />;
                    })}
                  </g>
                  <g>
                    {edges.map((e, i) => {
                      const connected = sel && (e.from === sel || e.to === sel);
                      if(sel && !connected) return null;
                      if(!sel){
                        return (
                          <circle key={i} className="flow-orb amb" r="2.6">
                            <animateMotion dur="5s" begin={(i * 0.4) + "s"} repeatCount="indefinite" path={e.d} />
                          </circle>
                        );
                      }
                      return (
                        <React.Fragment key={i}>
                          <circle className="flow-orb run" r="3.4">
                            <animateMotion dur="2.1s" repeatCount="indefinite" path={e.d} />
                          </circle>
                          <circle className="flow-orb run" r="3.4">
                            <animateMotion dur="2.1s" begin="-1.05s" repeatCount="indefinite" path={e.d} />
                          </circle>
                        </React.Fragment>
                      );
                    })}
                  </g>
                </svg>

                {FLOW_NODES.map(n => {
                  const state = sel === n.id ? " sel" : neighbors.has(n.id) ? " active" : (sel ? " dim" : "");
                  return (
                    <button key={n.id} className={"flow-node g-" + n.group + state}
                      style={{ left:n.x, top:n.y }}
                      onPointerDown={(ev) => ev.stopPropagation()}
                      onClick={(ev) => { ev.stopPropagation(); setSel(s => s === n.id ? null : n.id); }}>
                      <span className="fn-ic"><FlowIcon d={n.icon} /></span>
                      <div className="fn-lbl">{n.label}</div>
                      <div className="fn-sub">{n.sub}</div>
                    </button>
                  );
                })}
              </div>

              <div className="flow-zoom" onPointerDown={(e) => e.stopPropagation()}>
                <button type="button" title="Zoom in" onClick={() => zoomBy(1.2)}>+</button>
                <button type="button" title="Zoom out" onClick={() => zoomBy(1 / 1.2)}>−</button>
                <button type="button" title="Fit to view" className="fz-fit" onClick={fit}>fit</button>
              </div>
              <div className="flow-pan-hint">drag to pan · scroll to zoom</div>
            </div>

            <div className="flow-panel">
              {selNode ? (
                <React.Fragment>
                  <span className={"fp-kind g-" + selNode.group}>{FLOW_GROUP_LABEL[selNode.group]}</span>
                  <h3 className="fp-title">{selNode.label}</h3>
                  <p className="fp-detail">{selNode.detail}</p>
                  <div className="fp-links">
                    {feedsIn.length > 0 && (
                      <div className="fp-linkgrp">
                        <div className="fpl-h">Fed by</div>
                        {feedsIn.map(t => (
                          <button key={t.id} className="fp-chip" onClick={() => setSel(t.id)}>
                            <span className={"fpc-dot flow-lg " + t.group} style={{display:"inline-block",width:6,height:6,borderRadius:2,
                              background:({src:"var(--blue)",cap:"var(--gold)",eng:"#c9a0e8",out:"var(--green)",alt:"var(--red)"})[t.group]}}></span>
                            {t.label}
                          </button>
                        ))}
                      </div>
                    )}
                    {feedsOut.length > 0 && (
                      <div className="fp-linkgrp">
                        <div className="fpl-h">Feeds into</div>
                        {feedsOut.map(t => (
                          <button key={t.id} className="fp-chip" onClick={() => setSel(t.id)}>
                            <span style={{display:"inline-block",width:6,height:6,borderRadius:2,
                              background:({src:"var(--blue)",cap:"var(--gold)",eng:"#c9a0e8",out:"var(--green)",alt:"var(--red)"})[t.group]}}></span>
                            {t.label}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                </React.Fragment>
              ) : (
                <div className="flow-panel-empty">
                  <svg className="fpe-ic" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9.5 2A2.5 2.5 0 0 0 7 4.5v.4a2.6 2.6 0 0 0-2 2.5 2.5 2.5 0 0 0-1 2 2.5 2.5 0 0 0 1.4 2.2A2.5 2.5 0 0 0 7 16.5 2.5 2.5 0 0 0 9.5 19 2.5 2.5 0 0 0 12 16.5V4.5A2.5 2.5 0 0 0 9.5 2Z"/>
                    <path d="M14.5 2A2.5 2.5 0 0 1 17 4.5v.4a2.6 2.6 0 0 1 2 2.5 2.5 2.5 0 0 1 1 2 2.5 2.5 0 0 1-1.4 2.2A2.5 2.5 0 0 1 17 16.5 2.5 2.5 0 0 1 14.5 19 2.5 2.5 0 0 1 12 16.5"/>
                  </svg>
                  <h4>The whole pipeline, one picture</h4>
                  <p>Sources on the left flow into the engine, then out into the numbers you act on. Drag to roam the map, scroll to zoom, and tap any box to trace exactly what connects to it.</p>
                </div>
              )}
            </div>
          </div>
          <div className="flow-hint">This map updates itself as the app grows — it always reflects how the ads tab works today.</div>
        </div>
      </div>
  );
}

function readFileAsDataUrl(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error||new Error("read failed")); r.readAsDataURL(file); });
}
function safeFileName(name, fallback){
  let n = String(name || fallback || "variation.png").trim().replace(/[\/\\:*?"<>|]+/g, "-");
  if(!/\.[a-z0-9]{2,4}$/i.test(n)) n += ".png";
  return n;
}
// Save one image. In Chrome/Edge this opens the native Save dialog (pick folder +
// rename) via the File System Access API; elsewhere it falls back to a normal
// download into the default Downloads folder.
async function downloadImage(url, filename){
  if(!url) return;
  let blob;
  try{ const res = await fetch(url, {mode:"cors"}); blob = await res.blob(); }
  catch(_){ try{ window.open(url, "_blank", "noopener"); }catch(__){} return; }
  const name = safeFileName(filename, "variation.png");
  if(window.showSaveFilePicker){
    try{
      const handle = await window.showSaveFilePicker({ suggestedName: name });
      const w = await handle.createWritable(); await w.write(blob); await w.close();
      return;
    }catch(e){ if(e && e.name==="AbortError") return; /* unsupported/denied → fall through */ }
  }
  const u = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=u; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(u), 3000);
}
// Save many images. In Chrome/Edge this opens the native folder picker ONCE and
// writes them all there; elsewhere it falls back to sequential downloads.
async function downloadMany(items){
  const list = (items||[]).filter(it=>it&&it.url);
  if(!list.length) return;
  if(window.showDirectoryPicker){
    try{
      const dir = await window.showDirectoryPicker();
      const used = new Set();
      for(const it of list){
        try{
          const res = await fetch(it.url, {mode:"cors"}); const blob = await res.blob();
          let name = safeFileName(it.name, "variation.png");
          let base = name, n = 1; while(used.has(name)){ const dot=base.lastIndexOf("."); name = base.slice(0,dot)+"-"+(n++)+base.slice(dot); }
          used.add(name);
          const fh = await dir.getFileHandle(name, {create:true}); const w = await fh.createWritable(); await w.write(blob); await w.close();
        }catch(_){}
      }
      return;
    }catch(e){ if(e && e.name==="AbortError") return; }
  }
  for(const it of list){ await downloadImage(it.url, it.name); await new Promise(r=>setTimeout(r,250)); }
}

          {onRefine && <button type="button" className="ddr-lb-btn gold" onClick={()=>onRefine(item)}>Tweak &amp; regenerate</button>}
          <button type="button" className="ddr-lb-btn" onClick={()=>downloadImage(item.url, item.name)}>Download</button>
          {onDelete && <button type="button" className="ddr-lb-btn del" onClick={()=>onDelete(item)}>Delete</button>}
          <button type="button" className="ddr-lb-btn ghost" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// Reference picker for the "+": pick an image from the Studio 2 R2 media library
// (same /api/studio-2/media the editor uses) OR upload one. Returns {url,name}
// where url is a public R2 URL or a data URL — the engine fetches either.
function MediaPicker({onPick, onClose}){
  const [items,setItems]=useState(null); // null = loading
  const [err,setErr]=useState(null);
  const [q,setQ]=useState("");
  const fileRef=useRef(null);
  useEffect(()=>{
    fetch("/api/studio-2/media").then(r=>r.json())
      .then(d=>{ if(d&&d.error){ setErr(d.error); setItems([]); } else setItems(((d&&d.media)||[]).filter(m=>m.kind!=="video")); })
      .catch(e=>{ setErr(String(e&&e.message||e)); setItems([]); });
  },[]);
  const upload=async (e)=>{ const f=(e.target.files||[])[0]; if(e.target) e.target.value=""; if(!f) return; if(f.size>VAR_GEN_MAX_REF_BYTES){ alert("Image is too large (max 6MB)."); return; } try{ const dataUrl=await readFileAsDataUrl(f); onPick({url:dataUrl, name:f.name||"upload"}); }catch(_){} };
  const filtered=(items||[]).filter(m=> !q.trim() || String(m.filename||"").toLowerCase().includes(q.trim().toLowerCase()));
  return (
    <div className="ddr-gp-back ddr-mp-back" onClick={(e)=>{ e.stopPropagation(); onClose(); }}>
      <div className="ddr-hist" onClick={e=>e.stopPropagation()}>
        <div className="ddr-gp-head">
          <div className="ddr-gp-title">Add a reference</div>
          <button type="button" className="ddr-gp-x" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="ddr-hist-bar">
          <button type="button" className="ddr-hist-act" onClick={()=>fileRef.current&&fileRef.current.click()}>Upload</button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={upload}/>
          <input className="ddr-mp-search" placeholder="Search your media…" value={q} onChange={e=>setQ(e.target.value)}/>
          <span className="ddr-hist-hint">or pick from your Studio media library</span>
        </div>
        <div className="ddr-hist-body">
          {items===null ? <div className="ddr-var-empty">Loading…</div>
            : err ? <div className="ddr-var-err">{err}</div>
            : filtered.length===0 ? <div className="ddr-var-empty">{items.length===0?"No images in your media library yet — use Upload.":"Nothing matches that search."}</div>
            : (
              <div className="ddr-hist-grid">
                {filtered.map(m=>(
                  <button type="button" className="ddr-hist-img ddr-mp-cell" key={m.id} onClick={()=>onPick({url:m.url, name:m.filename||"reference"})} title={m.filename||""}>
                    <img src={m.thumbnailUrl||m.url} alt="" loading="lazy" referrerPolicy="no-referrer"/>
                  </button>
                ))}
              </div>
            )}
        </div>
      </div>
    </div>
  );
}

// The Generate popup — a Studio-2-style chat: the winning ad is the default
// reference, you can add a second from the media library or upload, pick presets,
// type a prompt, choose how many, and watch each image stream in as it finishes.
function GeneratePopup({winner, onClose, onView, presets, run, onRun}){
  const PRESETS = (Array.isArray(presets)&&presets.length)?presets:VAR_GEN_PRESETS;
  const refine = !!winner.baseImageUrl;
  const [prompt,setPrompt]=useState("");
  const [count,setCount]=useState(refine?2:4);
  const [refs,setRefs]=useState([]);     // extra references: {url,name} (url = R2 public URL or data URL)
  const [pickerOpen,setPickerOpen]=useState(false);
  const slots = run ? run.slots : [];
  const running = !!(run && run.active);
  const doneCount = slots.filter(s=>s.status!=="creating").length;

  const applyPreset=(p)=> setPrompt(prev=> prev.trim()? (prev.trim()+" "+p.prompt) : p.prompt);
  const addRef=(item)=>{ setRefs(prev=> prev.length>=3?prev:[...prev,item]); setPickerOpen(false); };
  const removeRef=(i)=> setRefs(prev=>prev.filter((_,k)=>k!==i));

  const go=()=>{
    if(running) return;
    onRun(winner, {
      prompt: prompt.trim(),
      count: Math.max(1, Math.min(VAR_GEN_MAX, count)),
      kind: "background",
      extraReferenceUrls: refs.map(r=>r.url),
      baseImageUrl: refine ? winner.baseImageUrl : null,
    });
  };

  return (
    <React.Fragment>
    <div className="ddr-gp-back" onClick={onClose}>
      <div className="ddr-gp" onClick={e=>e.stopPropagation()}>
        <div className="ddr-gp-head">
          <div className="ddr-gp-title">{refine?"Tweak & regenerate":"Generate variations"} <span>{winner.name}</span></div>
          <button type="button" className="ddr-gp-x" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="ddr-gp-body">
          <div className="ddr-gp-refs">
            <div className="ddr-gp-ref">
              {winner.ref ? <img src={winner.ref} alt="" referrerPolicy="no-referrer"/> : <span className="ddr-gp-ref-ph">ad</span>}
              <span className="ddr-gp-ref-tag">{refine?"Tweaking this":"Winning ad"}</span>
            </div>
            {refs.map((r,i)=>(
              <div className="ddr-gp-ref" key={i}>
                <img src={r.url} alt="" referrerPolicy="no-referrer"/>
                <button type="button" className="ddr-gp-ref-rm" onClick={()=>removeRef(i)} aria-label="Remove reference">✕</button>
                <span className="ddr-gp-ref-tag">Reference</span>
              </div>
            ))}
            {refs.length<3 && (
              <button type="button" className="ddr-gp-ref-add" onClick={()=>setPickerOpen(true)} title="Add a reference image">
                <span className="ddr-gp-ref-plus">+</span><span>Add reference</span>
              </button>
            )}
          </div>
          <div className="ddr-gp-presets">
            {PRESETS.map((p,i)=>(
              <button type="button" key={p.id||i} className="ddr-gp-preset" onClick={()=>applyPreset(p)} title={p.prompt}>{p.label}</button>
            ))}
          </div>
          <div className="ddr-gp-chat">
            <textarea rows={3} placeholder={refine?"What one thing should change? e.g. make the headline bigger, warm up the lighting, swap the background to a gym.":"Tell the engine what to change — e.g. swap the background to a sunrise beach, keep the person and the text exactly."} value={prompt} onChange={e=>setPrompt(e.target.value)} />
          </div>
          <div className="ddr-gp-foot">
            <div className="ddr-gp-count">
              <span>How many</span>
              <button type="button" onClick={()=>setCount(c=>Math.max(1,c-1))} disabled={running||count<=1}>−</button>
              <b>{count}</b>
              <button type="button" onClick={()=>setCount(c=>Math.min(VAR_GEN_MAX,c+1))} disabled={running||count>=VAR_GEN_MAX}>+</button>
            </div>
            <button type="button" className="ddr-gp-go" onClick={go} disabled={running}>{running ? ("Generating… "+doneCount+"/"+slots.length) : (refine?("Regenerate "+count):("Generate "+count))}</button>
          </div>
          {slots.length>0 && (
            <div className="ddr-gp-results">
              {slots.map((s,i)=>(
                <div className="ddr-gp-cell" key={i}>
                  <div className={"ddr-gp-img "+s.status+(s.status==="ready"&&s.url?" clickable":"")} onClick={()=>{ if(s.status==="ready"&&s.url&&onView) onView({url:s.url, name:(winner.name||"variation")+".png", adId:winner.adId}); }}>
                    {s.status==="ready" && s.url ? <img src={s.url} alt="" loading="lazy"/> : s.status==="failed" ? <span className="ddr-gp-fail" title={s.error||""}>failed</span> : <span className="ddr-gp-spin"/>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
    {pickerOpen && <MediaPicker onPick={addRef} onClose={()=>setPickerOpen(false)} />}
    </React.Fragment>
  );
}

// History gallery — every variation the factory has made, in one place, with
// enlarge / download / delete and multi-select. Borrows Studio 2's "grab many
// at once" export idea (sequential downloads keep it dependency-free here).
function HistoryGallery({onClose, onView, pending}){
  const [items,setItems]=useState(null); // null = loading
  const [err,setErr]=useState(null);
  const [sel,setSel]=useState({});       // id -> true
  const [busy,setBusy]=useState(false);
  const load=useCallback(()=>{
    setItems(null); setErr(null);
    fetch("/api/ads/variations/library").then(r=>r.json())
      .then(d=>{ if(d&&d.error){ setErr(d.error); setItems([]); } else setItems((d&&d.variations)||[]); })
      .catch(e=>{ setErr(String(e&&e.message||e)); setItems([]); });
  },[]);
  useEffect(()=>{ load(); },[load]);
  // Re-pull when an in-flight run finishes so freshly-made images land here.
  const pendingCount = pending ? pending.length : 0;
  const prevPending = useRef(pendingCount);
  useEffect(()=>{ if(prevPending.current>0 && pendingCount<prevPending.current) load(); prevPending.current=pendingCount; }, [pendingCount, load]);

  const fname=(v)=> safeFileName((v.source_ad_id||"variation")+"-"+String(v.id).slice(0,6), "variation.png");
  const selIds=Object.keys(sel).filter(k=>sel[k]);
  const toggle=(id)=> setSel(p=>({...p,[id]:!p[id]}));
  const selectAll=()=>{ const all={}; (items||[]).forEach(v=>all[v.id]=true); setSel(all); };
  const clearSel=()=> setSel({});
  const downloadSel=()=> downloadMany((items||[]).filter(v=>sel[v.id]).map(v=>({url:v.image_url, name:fname(v)})));
  const deleteOne=async (id)=>{ if(busy) return; setBusy(true); try{ await fetch("/api/ads/variations/library?id="+encodeURIComponent(id),{method:"DELETE"}); }catch(_){} setBusy(false); setSel(p=>{const n={...p}; delete n[id]; return n;}); load(); };
  const deleteSel=async ()=>{ if(!selIds.length||busy) return; setBusy(true); for(const id of selIds){ try{ await fetch("/api/ads/variations/library?id="+encodeURIComponent(id),{method:"DELETE"}); }catch(_){} } setBusy(false); clearSel(); load(); };
  return (
    <div className="ddr-gp-back" onClick={onClose}>
      <div className="ddr-hist" onClick={e=>e.stopPropagation()}>
        <div className="ddr-gp-head">
          <div className="ddr-gp-title">Variations history <span>{items?(items.length+" saved"):""}</span></div>
          <button type="button" className="ddr-gp-x" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="ddr-hist-bar">
          {selIds.length>0 ? (
            <React.Fragment>
              <span>{selIds.length} selected</span>
              <button type="button" className="ddr-hist-act" onClick={downloadSel}>Download</button>
              <button type="button" className="ddr-hist-act del" onClick={deleteSel} disabled={busy}>{busy?"Deleting…":"Delete"}</button>
              <button type="button" className="ddr-hist-act ghost" onClick={clearSel}>Clear</button>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <span className="ddr-hist-hint">Hover an image to download or delete it. Tap to enlarge. Use the checkbox to grab or remove several.</span>
              {items&&items.length>0 && <button type="button" className="ddr-hist-act ghost" onClick={selectAll}>Select all</button>}
            </React.Fragment>
          )}
        </div>
        <div className="ddr-hist-body">
          {items===null ? <div className="ddr-var-empty">Loading…</div>
            : err ? <div className="ddr-var-err">{err}</div>
            : (items.length===0 && pendingCount===0) ? <div className="ddr-var-empty">No variations yet — generate some from a winner and they'll live here, saved for good.</div>
            : (
              <div className="ddr-hist-grid">
                {Array.from({length:pendingCount}).map((_,k)=>(
                  <div className="ddr-hist-cell pending" key={"p"+k}><div className="ddr-hist-pending"><span className="ddr-gp-spin"/></div></div>
                ))}
                {(items||[]).map(v=>(
                  <div className={"ddr-hist-cell"+(sel[v.id]?" sel":"")} key={v.id}>
                    <button type="button" className="ddr-hist-img" onClick={()=>onView&&onView({url:v.image_url, name:fname(v)})}>
                      <img src={v.image_url} alt="" loading="lazy" referrerPolicy="no-referrer"/>
                    </button>
                    <button type="button" className={"ddr-hist-ck"+(sel[v.id]?" on":"")} onClick={(e)=>{e.stopPropagation(); toggle(v.id);}} aria-label="Select">{sel[v.id]?"✓":""}</button>
                    <div className="ddr-hist-acts">
                      <button type="button" title="Download" onClick={(e)=>{e.stopPropagation(); downloadImage(v.image_url, fname(v));}}>↓</button>
                      <button type="button" className="del" title="Delete" onClick={(e)=>{e.stopPropagation(); deleteOne(v.id);}} disabled={busy}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
        </div>
      </div>
    </div>
  );
}

function AdVariations({rows}){
  const capw = (s)=>{ s=String(s||""); return s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : "—"; };
  const [pick, setPick] = useState(null);
  const [settings, setSettings] = useState(null);
  const [setBusy, setSetBusy] = useState(false);
  const [panelOpen, setPanelOpen] = useState(false);  // gear → settings/automation panel
  const [panelTab, setPanelTab] = useState("automations"); // automations | presets | rules
  const [sopDraft, setSopDraft] = useState("");        // editable SOP text (committed on blur)
  const [presetsDraft, setPresetsDraft] = useState([]); // editable preset library
  // adId -> { loading, error, jobId, createdAt, variations:[] }
  const [jobs, setJobs] = useState({});
  // adId -> { name, total, slots:[{status,url,error}], active, refine } — lifted out
  // of the popup so closing it never loses an in-flight generation.
  const [runs, setRuns] = useState({});
  const [genOpen, setGenOpen] = useState(null); // winner object whose Generate popup is open
  const [lightbox, setLightbox] = useState(null); // {url,name,adId} full-image viewer
  const [histOpen, setHistOpen] = useState(false); // history gallery open
  const [toast, setToast] = useState(null); // {id,msg,kind} global notification

  const winners = useMemo(()=>(Array.isArray(rows)?rows:[])
    .filter(r=>r.traced && r.roas!=null && r.roas>=3)
    .sort((a,b)=>b.roas-a.roas).slice(0,3)
    .map(r=>{ const p=(r.previews&&r.previews[0])||null; return {name:r.keyword, roas:r.roas, adId:p&&p.adId, ref:p&&(p.thumb||p.full)}; })
    .filter(w=>w.adId), [rows]);

  // Load the live settings (the mix the engine uses) once.
  useEffect(()=>{
    let off=false;
    fetch("/api/ads/variations/settings").then(r=>r.json()).then(d=>{ if(!off && d && d.settings){ setSettings(d.settings); setSopDraft(d.settings.sop||""); setPresetsDraft(Array.isArray(d.settings.presets)?d.settings.presets:[]); } }).catch(()=>{});
    return ()=>{ off=true; };
  }, []);

  // Persist a partial settings change (merge happens server-side). Optimistic.
  const patchSettings = (patch)=>{
    setSettings(prev=>prev?{...prev, ...patch, mix:patch.mix||prev.mix}:prev);
    setSetBusy(true);
    return fetch("/api/ads/variations/settings", {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(patch)})
      .then(r=>r.json()).then(d=>{ if(d&&d.settings){ setSettings(d.settings); if(typeof d.settings.sop==="string") setSopDraft(d.settings.sop); if(Array.isArray(d.settings.presets)) setPresetsDraft(d.settings.presets); } }).catch(()=>{}).finally(()=>setSetBusy(false));
  };
  const saveEnabled = (next)=>patchSettings({enabled:!!next});
  const saveSop = ()=>{ if(!settings || sopDraft===(settings.sop||"")) return; patchSettings({sop:sopDraft}); };
  // Preset library editing (saves the whole array; commit on blur / add / delete).
  const updatePreset = (i, field, val)=> setPresetsDraft(prev=>prev.map((p,k)=>k===i?{...p,[field]:val}:p));
  const addPreset = ()=> setPresetsDraft(prev=> prev.length>=16?prev:[...prev,{id:"preset-"+prev.length, label:"New preset", prompt:""}]);
  const savePresets = ()=>{ patchSettings({presets:presetsDraft.filter(p=>String(p.label||"").trim()&&String(p.prompt||"").trim())}); };
  const removePreset = (i)=>{ const next=presetsDraft.filter((_,k)=>k!==i); setPresetsDraft(next); patchSettings({presets:next.filter(p=>String(p.label||"").trim()&&String(p.prompt||"").trim())}); };

  // Pull each winner's most-recent batch so the "N ready" counts are real and
  // expanding is instant. Re-runs when the winner set changes.
  const loadJob = useCallback((adId)=>{
    if(!adId) return;
    setJobs(prev=>({...prev, [adId]:{...(prev[adId]||{}), loading:true, error:null}}));
    fetch("/api/ads/variations?adId="+encodeURIComponent(adId))
      .then(r=>r.json())
      .then(d=>{ setJobs(prev=>({...prev, [adId]:{loading:false, error:d&&d.error?d.error:null, jobId:d&&d.jobId, createdAt:d&&d.createdAt, variations:(d&&d.variations)||[]}})); })
      .catch(e=>{ setJobs(prev=>({...prev, [adId]:{loading:false, error:String(e&&e.message||e), variations:[]}})); });
  }, []);
  useEffect(()=>{ winners.forEach(w=>loadJob(w.adId)); }, [winners, loadJob]);

  const saveMix = (kind, delta)=>{
    if(!settings) return;
    const mix = {...settings.mix};
    mix[kind] = Math.max(0, (Number(mix[kind])||0) + delta);
    const next = {...settings, mix, variationsPerJob:(mix.background+mix.highlightWord+mix.copyTweak)};
    setSettings(next);                       // optimistic
    setSetBusy(true);
    fetch("/api/ads/variations/settings", {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify({mix})})
      .then(r=>r.json()).then(d=>{ if(d&&d.settings) setSettings(d.settings); }).catch(()=>{}).finally(()=>setSetBusy(false));
  };

  // Fire one generation run for a winner. Lives here (not in the popup) so the
  // run keeps going and stays visible after the popup is closed. Streams each
  // image into runs[adId].slots; on completion refreshes the grid + toasts.
  const startRun = useCallback((winner, opts)=>{
    const adId = winner.adId; if(!adId) return;
    const instruction = (opts.prompt||"").trim() || "Create a fresh variation of this winning ad. Keep the same person, layout, and on-image text; vary the background to a clean, on-brand alternative.";
    const n = Math.max(1, Math.min(10, opts.count||4));
    const jobId = adId+"-"+Date.now();
    const extraReferenceUrls = opts.extraReferenceUrls||[];
    const baseImageUrl = opts.baseImageUrl||null;
    setRuns(prev=>({...prev, [adId]:{name:winner.name, total:n, refine:!!baseImageUrl, active:true, slots:Array.from({length:n}).map(()=>({status:"creating",url:null,error:null}))}}));
    const setSlot = (i, patch)=> setRuns(prev=>{ const run=prev[adId]; if(!run) return prev; return {...prev,[adId]:{...run, slots:run.slots.map((s,k)=>k===i?{...s,...patch}:s)}}; });
    const tasks = Array.from({length:n}).map((_,i)=>
      fetch("/api/ads/variations/generate-one",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({adId,prompt:instruction,kind:opts.kind||"background",jobId,index:i,extraReferenceUrls,baseImageUrl})})
        .then(async r=>{ const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error((d&&d.error)||("Failed ("+r.status+")")); return d.variation; })
        .then(v=>{ setSlot(i,{status:"ready",url:v&&v.image_url,error:null}); return v&&v.image_url?1:0; })
        .catch(e=>{ setSlot(i,{status:"failed",url:null,error:String(e&&e.message||e)}); return 0; })
    );
    Promise.all(tasks).then(arr=>{
      const ok = arr.reduce((a,b)=>a+b,0);
      setRuns(prev=> prev[adId]? {...prev,[adId]:{...prev[adId],active:false}} : prev);
      loadJob(adId);
      setToast({ id:Date.now(), kind: ok>0?"ok":"warn", msg: ok>0 ? (ok+" variation"+(ok===1?"":"s")+" ready · "+capw(winner.name||"winner")) : "Generation finished with errors" });
    });
  }, [loadJob]);

  // Auto-dismiss the toast.
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null), 6000); return ()=>clearTimeout(t); }, [toast]);
  // Pending placeholders for the history gallery while runs are in flight.
  const pendingCells = useMemo(()=> Object.values(runs).filter(r=>r&&r.active).flatMap(r=> r.slots.filter(s=>s.status==="creating")), [runs]);

  const total = settings ? settings.variationsPerJob : 10;
  const mixLine = settings
    ? settings.mix.background+" background · "+settings.mix.highlightWord+" highlighted word · "+settings.mix.copyTweak+" copy tweak"
    : "6 background · 2 highlighted word · 2 copy tweak";

  return (
    <div className="ddr-var">
      <div className="ddr-var-head">
        <div>
          <div className="ddr-var-h">Variations factory</div>
          <div className="ddr-var-sub">{settings&&settings.enabled?"On — fresh variations of your winners are made automatically each morning.":"Make variations of your winners on demand — or turn on the morning automation."}</div>
        </div>
        {settings && (
          <div className="ddr-var-tools">
            <button type="button" className="ddr-var-gear" onClick={()=>setHistOpen(true)} title="Variations history" aria-label="Variations history">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
              <span>History</span>
            </button>
            <button type="button" className={"ddr-var-gear"+(panelOpen?" on":"")} onClick={()=>setPanelOpen(o=>!o)} title="Settings & automation" aria-label="Settings & automation" aria-expanded={panelOpen}>

function MoneyCockpit({model}){
  if(!model) return null;
  const m = model;
  const margin = m.variableMargin, fixed = m.fixedCosts;
  const curRev = m.collected, curRoas = m.cashRoas, curNet = m.netProfit, curSpend = m.adSpend;
  const monthLabel = m.monthLabel || "last month";
  const fb = m.fixedBreakdown || null;
  if(!(curRev>0) || !(curRoas>0) || !(curSpend>0)) return null;
  // "Even if ROAS slips as you scale" scenarios — today's, then a few lower.
  const lower = [3.5,3,2.5,2].filter(r=> r < curRoas-0.05);
  const roasOpts = [Math.round(curRoas*10)/10, ...lower].slice(0,4);
  const [roas, setRoas] = useState(roasOpts[0]);
  const targetX = 3/margin;
  // Rungs are multiples of last month's AD SPEND, not revenue — the lever Alex
  // actually pulls. The first step up is a near-term, ATTAINABLE +75% of last
  // month's spend (not a 2× leap), then a couple of bigger aspirational rungs so
  // the long-run upside is still visible. "Now" uses last month's real numbers;
  // the rest scale spend and let ROAS slip to the chosen rate.
  const spendMults = [
    { m:1,    tag:null },
    { m:1.75, tag:"next step" },
    { m:3,    tag:null },
    { m:5,    tag:null },
  ];
  const tiers = spendMults.map(({m:mult, tag})=>{
    const isNow = mult===1;
    const r = isNow ? curRoas : roas;
    const spend = curSpend*mult;
    const rev = isNow ? curRev : spend*r;
    const net = isNow ? curNet : (rev*margin - spend - fixed);
    return { mult, tag, isNow, rev, spend, fixedPct: fixed/rev,
      killFloor: (spend+fixed)/(spend*margin), nMargin: rev>0?net/rev:0, net };
  });
  const top = tiers[tiers.length-1];
  const topNet = top.net;
  return (
    <div className="ps">
      <div className="ps-top">
        <h3 className="ps-h">The more you spend, the more you keep.</h3>
      </div>
      <div className="ps-ctl">
        <span className="ps-ctl-l">As you grow, even if ROAS slips to</span>
        {roasOpts.map(r=>(
          <button key={r} type="button" className={"ps-chip"+(Math.abs(r-roas)<0.05?" on":"")} onClick={()=>setRoas(r)}>
            {Math.abs(r-roasOpts[0])<0.05 ? "today "+r.toFixed(1)+"×" : r.toFixed(1)+"×"}
          </button>
        ))}
      </div>
      <div className="ps-tablewrap">
        <table className="ps-table">
          <thead><tr>
            <th>Monthly revenue</th><th>Ad spend</th><th>Fixed %</th>
            <th>Kill floor</th><th>Target</th><th>Net margin</th><th className="hero">Net profit / mo</th>
          </tr></thead>
          <tbody>
            {tiers.map(t=>(
              <tr key={t.mult} className={t.isNow?"now":""}>
                <td className="rev">{fmtUsd(t.rev)}{t.isNow && <span className="ps-here">you are here · {monthLabel}</span>}{t.tag && <span className="ps-here">{t.tag}</span>}</td>
                <td>{fmtUsd(t.spend)}</td>
                <td className="mut">{fmtPct(t.fixedPct*100,0)}</td>
                <td className="mut">{t.killFloor.toFixed(1)}×</td>
                <td className="mut">{targetX.toFixed(1)}×</td>
                <td className="mut">{fmtPct(t.nMargin*100,0)}</td>
                <td className="hero">{fmtUsd(t.net)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="ps-foot">{fmtUsd(curSpend)}/mo in spend → {fmtUsd(top.spend)}/mo turns {fmtUsd(curNet)} profit into <b>{fmtUsd(topNet)}</b>{roas<curRoas-0.05?" — even at "+roas.toFixed(1)+"× ROAS":""}.</div>
      {fb && (
        <div style={{fontSize:'10.5px',color:'var(--text-4)',marginTop:'7px',lineHeight:1.4}}>
          Fixed costs {fmtUsd(fixed)}/mo = {fmtUsd(fb.manager)} sales manager base + {fmtUsd(fb.software)} software stack (Skool, GoHighLevel, Sendblue, ManyChat). These don't grow with sales — so every extra profitable dollar of spend dilutes them, which is why the net margin climbs as you scale.
        </div>
      )}

      {Array.isArray(m.clients) && m.clients.filter(c=>c.adSpend>0).length>0 && (
        <div className="ps-clients">
          <div className="ps-cl-h">Per client — worth keeping?</div>
          <div className="ps-cl-tab">
            <div className="ps-cl-row head"><span>Client</span><span>Spend/mo</span><span>Revenue/mo</span><span>Net/mo</span><span>At $500/day</span><span></span></div>
            {m.clients.filter(c=>c.adSpend>0).map(c=>{
              const net15 = (c.cashRoas!=null) ? 15000*(c.cashRoas*margin-1) - (c.fixedShare||0) : null;
              const verdict = c.netProfit>=20000 ? "worth it" : c.netProfit>=0 ? "building" : "under";
              return (
                <div className="ps-cl-row" key={c.key}>
                  <span className="nm">{c.name}</span>
                  <span>{fmtUsd(c.adSpend)}</span>
                  <span>{fmtUsd(c.collected)}</span>
                  <span className="net">{fmtUsd(c.netProfit)}</span>
                  <span className="mut">{net15!=null?"→ "+fmtUsd(net15):"—"}</span>
                  <span className={"vd "+verdict.replace(/\s/g,"")}>{verdict}</span>
                </div>
              );
            })}
          </div>
          <div className="ps-cl-note">Worth-it line: $20–30k net/mo per client. "At $500/day" = projected net if you scaled that client to $15k/mo spend at today's efficiency.</div>
        </div>
      )}
    </div>
  );
}

function DeepDiveReport({campaigns, dashboard, decisionDash, decisionRange, range, loading, pager}){
  // Brain-icon data-flow map — collapsed by default, lifted here so the toggle
  // can sit in the header while the full-width map expands just below it.
  const [flowOpen, setFlowOpen] = useState(false);
  const [flowSel, setFlowSel] = useState(null);
  const [showOld, setShowOld] = useState(false);
  const [rulesOpen, setRulesOpen] = useState(false);

  // Join each ad word to the server's authoritative matched cash, then attach
  // honest ROAS. This is the single source of truth the whole page leans on.
  const roasMap = useMemo(()=>roasByKeyword(dashboard && dashboard.adRoas), [dashboard]);
  // Real creative + read copy for each ad word, so the playbook can SHOW the
  // actual ad behind every move (the trust proof). Same source as ROAS.
  const previewMap = useMemo(()=>adsByKeyword(dashboard && dashboard.adRoas), [dashboard]);
  const rows = useMemo(()=>{
    const list = aggregateByAdWord(campaigns)
      .filter(r => r.spend>0 || r.leads>0 || r.booked>0)
      .map(r => { const wr = withRoas(r, roasMap); wr.previews = previewMap.get(wr.keyword) || []; return wr; });
    return list.sort((a,b)=>b.spend-a.spend);
  }, [campaigns, roasMap, previewMap]);

  // Rows for the Turn-off/Scale cards: built from the FIXED trailing window
  // (DECISION_RULES.windowDays), not the page's date range, so the decisions
  // always run on matured numbers. Same honest ROAS pipeline as `rows`. Falls
  // back to the page-range rows until the window's own payload arrives.
  const dRoasMap = useMemo(()=>roasByKeyword(decisionDash && decisionDash.adRoas), [decisionDash]);
  const dPreviewMap = useMemo(()=>adsByKeyword(decisionDash && decisionDash.adRoas), [decisionDash]);
  const decisionRows = useMemo(()=>{
    if(!decisionDash) return rows;
    const src = campaignsFromDashboard(decisionDash, decisionRange || range);
    const list = aggregateByAdWord(src)
      .filter(r => r.spend>0 || r.leads>0 || r.booked>0)
      .map(r => { const wr = withRoas(r, dRoasMap); wr.previews = dPreviewMap.get(wr.keyword) || []; return wr; });
    return list.sort((a,b)=>b.spend-a.spend);
  }, [decisionDash, decisionRange, range, rows, dRoasMap, dPreviewMap]);

  // ---- The decision feedback loop ----
  // Logged moves live in Supabase via /api/ads/decisions, scoped to the account
  // in view. One source of truth, lifted here so the action board (which hides
  // acted moves) and the tracker (which traces them) never disagree.
  const scope = (dashboard && dashboard.query && dashboard.query.account) || "all";
  const [decisions, setDecisions] = useState([]);
  useEffect(()=>{
    let cancelled = false;
    fetch("/api/ads/decisions?account="+encodeURIComponent(scope))
      .then(r=>r.json())
      .then(j=>{ if(!cancelled && j && Array.isArray(j.decisions)) setDecisions(j.decisions); })
      .catch(()=>{});
    return ()=>{ cancelled = true; };
  }, [scope]);
  const decByKey = useMemo(()=>{
    const m = {}; decisions.forEach(d=>{ if(d && d.decision_key) m[d.decision_key]=d; }); return m;
  }, [decisions]);
  const onDecide = (a)=>{
    const key = String(a.keyword||"").toLowerCase();
    if(!key) return;
    const baseline = {
      spend: Math.round(a.spend||0),
      tracedRev: Math.round(a.tracedRev||0),
      roas: a.roas==null ? null : Math.round(a.roas*100)/100,
      leads: Math.round(a.leads||0),
      booked: Math.round(a.booked||0),
      clients: Math.round(a.clients||0),
      decidedIso: todayIso(),
    };
    // Optimistic: hide the move instantly, then confirm with the server.
    const optimistic = { account:scope, decision_key:key, label:a.keyword, action:a.type, source:"playbook", baseline, status:"acting", decided_at:new Date().toISOString() };
    setDecisions(d=>[optimistic, ...d.filter(x=>x.decision_key!==key)]);
    fetch("/api/ads/decisions", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ account:scope, decisionKey:key, label:a.keyword, action:a.type, source:"playbook", baseline }),
    }).then(r=>r.json()).then(j=>{
      if(j && j.decision) setDecisions(d=>[j.decision, ...d.filter(x=>x.decision_key!==key)]);
    }).catch(()=>{});
  };
  const onUndo = (key)=>{
    setDecisions(d=>d.filter(x=>x.decision_key!==key));
    fetch("/api/ads/decisions?account="+encodeURIComponent(scope)+"&key="+encodeURIComponent(key), {method:"DELETE"}).catch(()=>{});
  };

  // Pager bar is reused in the empty/loading states too, so you can always flip
  // to another creator even when this one has no activity in the range.
  const pagerBar = pager ? (
    <div className="ddr-pager">
      <button type="button" className="ddr-pager-arrow" onClick={pager.onPrev} aria-label="Previous creator">←</button>
      <div className="ddr-pager-mid">
        <span className="ddr-pager-name">{pager.name}</span>
        <span className="ddr-pager-count">{pager.idx+1}/{pager.count}</span>
      </div>
      <button type="button" className="ddr-pager-arrow" onClick={pager.onNext} aria-label="Next creator">→</button>
    </div>
  ) : null;

  if(loading) return <div className="ddr">{pagerBar}<div className="ddr-empty">Loading the numbers…</div></div>;
  if(!rows.length) return <div className="ddr">{pagerBar}<div className="ddr-empty">No ad activity for {pager?pager.name:"this account"} in this date range.</div></div>;

  const totalSpend = rows.reduce((s,r)=>s+r.spend,0);
  const totalLeads = rows.reduce((s,r)=>s+r.leads,0);
  const totalBooked = rows.reduce((s,r)=>s+r.booked,0);
  const blendedCostPerCall = totalBooked>0 ? totalSpend/totalBooked : 0;
  const blendedRate = totalLeads>0 ? (totalBooked/totalLeads)*100 : 0;

  // ROAS — the metric everything ties to. Honest blended ROAS is computed ONLY
  // over the spend where we can actually see the cash, so it never reads
  // artificially low just because revenue elsewhere isn't tagged yet.
  const tracedRows = rows.filter(r => r.traced);
  const tracedRev = tracedRows.reduce((s,r)=>s+r.tracedRev,0);
  const tracedSpend = tracedRows.reduce((s,r)=>s+r.spend,0);
  const blendedRoas = tracedSpend>0 ? tracedRev/tracedSpend : null;

  // True total cash for the range (real payload fields) → coverage.
  const sum = dashboard && dashboard.summary ? dashboard.summary : null;
  const totalRev = sum ? Number(sum.totalCollectedRevenue||0) : tracedRev;
  const coverage = totalRev>0 ? (tracedRev/totalRev)*100 : null;

  // Honest split of every collected dollar into THREE buckets, not two. Organic
  // money is ATTRIBUTED — to organic — so it must not sit in an "unknown" pile.
  // Only cash we genuinely can't classify (no ManyChat link pasted) is unknown.
  //   adRev      → came from a specific paid ad (ROAS is built on this)
  //   organicRev → confirmed NOT from an ad; real money, correctly left out of ROAS
  //   unknownRev → no link pasted, so we can't yet tell ad vs organic — the gap to chase
  // Use the SAME traced figure the ROAS hero rests on, so the screen never shows
  // two different "from an ad" dollar amounts. Organic comes from the payload;
  // unknown is the exact leftover so all three always sum back to total cash.
  const adRev = tracedRev;
  const organicRev = sum && sum.organicRevenue != null ? Number(sum.organicRevenue) : 0;
  const ignoredRev = sum && sum.ignoredRevenue != null ? Number(sum.ignoredRevenue) : 0;
  const unknownRev = Math.max(0, totalRev - adRev - organicRev - ignoredRev);
  // Share of cash we can actually EXPLAIN (ad + organic) — the honest "do we know
  // where the money came from" number, distinct from the ad-only ROAS coverage.
  const explainedRev = adRev + organicRev;
  const explainedPct = totalRev>0 ? (explainedRev/totalRev)*100 : null;
  const pctOf = (v)=> totalRev>0 ? Math.round((v/totalRev)*100) : 0;

  // Cheap-leads, not cheap-customers: high lead volume + bottom booking rate.
  const avgRate = blendedRate;
  const wasters = rows
    .filter(r => r.leads >= 30 && r.rate < Math.max(2.5, avgRate*0.5))
    .sort((a,b)=>b.leads-a.leads);
  const wasterLeads = wasters.reduce((s,r)=>s+r.leads,0);
  const wasterBooked = wasters.reduce((s,r)=>s+r.booked,0);
  const wasterSpend = wasters.reduce((s,r)=>s+r.spend,0);
  const wasterNames = wasters.slice(0,3).map(r=>r.keyword.charAt(0)+r.keyword.slice(1).toLowerCase());

  // Spend concentration (top 7 by spend).
  const maxSpend = Math.max(...rows.map(r=>r.spend), 1);
  const spendRows = rows.filter(r=>r.spend>0).slice(0,7);

  const cap = (s)=> s ? s.charAt(0)+s.slice(1).toLowerCase() : s;
  const roasClass = blendedRoas==null ? "" : (blendedRoas>=2 ? "good" : blendedRoas<1 ? "bad" : "");

  // Real profit return (LTGP:CAC) — the money-first number. Collected ROAS is the
  // top line; this is what's actually LEFT after the team's cut and coaching costs
  // are paid, measured against ad spend. Target 9:1, floor 3:1.
  const grossProfit = sum && sum.grossProfit != null ? Number(sum.grossProfit) : null;
  const profitReturn = sum && sum.grossProfitRoi != null ? Number(sum.grossProfitRoi) : null;
  const profitClass = profitReturn==null ? "mid" : (profitReturn>=9 ? "good" : profitReturn>=3 ? "mid" : "bad");

  return (
    <div className="ddr">
      <div className="ddr-head">
        <div className="ddr-head-row">
          <h2 className="ddr-title">Deep Dive</h2>
          <DecisionRulesToggle open={rulesOpen} onToggle={()=>setRulesOpen(o=>!o)}/>
        </div>
      </div>
      <DecisionRulesPanel open={rulesOpen}/>
      {/* Data-flow map hidden from this page for now (component kept for later) */}

      {/* Data-health tripwire — catches a silently broken ad feed before it skews everything */}
      <DataHealth dashboard={dashboard}/>

      {/* All-accounts pager: flip through each creator's full view one at a time
          instead of merging everyone into one mush. Quiet, monochrome, sparse. */}
      {pagerBar}

      {/* Daily decisions: turn off losing ads first, then scale winning ad sets */}
      <ActionPlaybook rows={decisionRows} windowDays={DECISION_RULES.windowDays} rangeText={"last "+DECISION_RULES.windowDays+" days"} decByKey={decByKey} onDid={onDecide}/>

      {/* Make variations — winning creative → new ads (Higgsfield engine; scaffold) */}
      <AdVariations rows={rows}/>

      {/* The more you spend, the more you keep — scale-aware money model */}
      <MoneyCockpit model={dashboard && dashboard.moneyModel}/>

      {/* Everything that isn't a daily decision — tucked away, one click to open */}
      <button type="button" className="ddr-oldtoggle" onClick={()=>setShowOld(s=>!s)}>
        <span className="car">{showOld?"▾":"▸"}</span> Old deep dive <span className="sub2">— every other number, chart &amp; table</span>
      </button>
      {showOld && (<React.Fragment>

      {/* Close the loop — moves Alex marked done, traced to a real result */}
      <DecisionTracker decisions={decisions} dashboard={dashboard} onUndo={onUndo}/>

      {/* Real profit return (LTGP:CAC) — the money-first hero */}
      {profitReturn!=null && (
        <div className="ddr-profit">
          <div className="pnum">
            <div className="plbl">Real profit return</div>
            <div className={"big "+profitClass}>{profitReturn.toFixed(1)}<span className="x">:1</span></div>
            <div className="psub">{grossProfit!=null ? fmtUsd(grossProfit)+" kept" : ""}</div>
          </div>
          <div className="pexp">
            After your team's cut (closer, setter, manager) and coaching costs are paid, every <b>$1</b> of ad spend brings back <b>{fmtUsd(profitReturn)}</b> in real profit you keep{grossProfit!=null ? <span> — about <b>{fmtUsd(grossProfit)}</b> in your pocket from this spend</span> : null}. This is the number that actually pays you, not the top-line ROAS.
            <div className="pgoal">
              <span className="pchip floor">Floor 3:1</span>
              <span className="pchip target">Target 9:1</span>
              <span>{profitReturn>=9 ? "You're at target — this spend is printing." : profitReturn>=3 ? "Above the floor — healthy, push toward 9:1." : "Below the floor — this spend isn't paying its way yet."}</span>
            </div>
          </div>
        </div>
      )}

      {/* Summary band — ROAS leads */}
      <div className="ddr-band">
        <div className="ddr-stat hero"><div className="lbl">ROAS</div><div className={"val roas "+roasClass}>{blendedRoas!=null ? <span>{blendedRoas.toFixed(1)}<span className="x">×</span></span> : "—"}</div><div className="sub">{blendedRoas!=null ? "every $1 in → "+fmtUsd(blendedRoas)+" back" : "no revenue traced yet"}</div></div>
        <div className="ddr-stat"><div className="lbl">Revenue traced</div><div className="val">{fmtUsd(tracedRev)}</div><div className="sub">{coverage!=null ? fmtPct(coverage,0)+" of "+fmtUsd(totalRev)+" collected" : "tied to a specific ad"}</div></div>
        <div className="ddr-stat"><div className="lbl">Ad spend</div><div className="val">{fmtUsd(totalSpend)}</div><div className="sub">{spendRows.length} ad words</div></div>
        <div className="ddr-stat"><div className="lbl">Booked calls</div><div className="val">{fmtNum(totalBooked)}</div><div className="sub">{blendedRate>0?fmtPct(blendedRate,1)+" of leads":"from "+fmtNum(totalLeads)+" leads"}</div></div>
        <div className="ddr-stat"><div className="lbl">Cost / booked call</div><div className="val">{blendedCostPerCall>0?fmtUsd(blendedCostPerCall):"—"}</div><div className="sub">judge it next to ROAS</div></div>
      </div>

      {/* Every metric in the funnel — full visibility, each with a trend you can open */}
      <FunnelScoreboard dashboard={dashboard} range={range}/>

      {/* Cheap-leads callout */}
      {wasters.length>0 && (
        <div className="ddr-call">
          <div className="ct">Cheap leads — not cheap customers</div>
          <div className="ch">{wasterNames.join(" & ")} pulled <b>{fmtNum(wasterLeads)}</b> leads but booked just <b>{fmtNum(wasterBooked)}</b> calls.</div>
          <div className="cp">That's <b>{fmtUsd(wasterSpend)}</b> of spend going to ad words that fill your DMs but don't fill your calendar. Cheap leads feel good, but these aren't turning into booked calls. Turning {wasters.length>1?"these":"this"} off frees that budget for the ad words below that actually book.</div>
        </div>
      )}

      {/* Spend concentration */}
      <div className="ddr-block">
        <div className="ddr-blabel"><span className="l">Where the spend went</span><span className="m">share of {fmtUsd(totalSpend)}</span></div>
        <div className="ddr-spend">
          {spendRows.map(r=>(
            <div className="ddr-srow" key={r.keyword}>
              <div className="ddr-skw">{cap(r.keyword)}</div>
              <div className="ddr-sbar-track"><div className="ddr-sbar-fill" style={{width:Math.max(2,(r.spend/maxSpend)*100)+"%"}}></div></div>
              <div className="ddr-sval"><b>{fmtUsd(r.spend)}</b> <span className="pc">{fmtPct(totalSpend>0?(r.spend/totalSpend)*100:0,0)}</span></div>
            </div>
          ))}
        </div>
      </div>

      {/* Winners & money pits — multiple, each click-to-verify with a real trend graph */}
      <WinnersAndPits rows={rows} dashboard={dashboard}/>

      {/* Trend explorer — any metric, split by creator / campaign / ad set / ad / ad word */}
      <TrendExplorer dashboard={dashboard} range={range}/>

      {/* What actually drives the money — code-measured correlations to ROAS */}
      <CorrelationPanel rows={rows} dashboard={dashboard}/>

      {/* The sweet spot — consolidates every lever; where winners cluster apart from laggards */}
      <SweetSpotCard dashboard={dashboard}/>

      {/* ROAS by ad word: collapsed to a card that opens the full table in a modal */}
      <div className="ddr-block">
        <div className="ddr-blabel"><span className="l">ROAS by ad word</span><span className="m">the full table — opens big so you're not scrolling forever</span></div>
        <BookingTableCard rows={rows}/>
      </div>

      {/* What your messaging is telling us — software reads the ad copy and ties it to results */}
      <MessagingInsights dashboard={dashboard} range={range}/>

      {coverage!=null && (
        <div className="ddr-block">
          <div className="ddr-blabel"><span className="l">Where every dollar came from</span><span className="m">of {fmtUsd(totalRev)} collected</span></div>
          <div className="ddr-spend" style={{gap:14}}>
            <div className="cov-split">
              <div className="cov-cell ad">
                <div className="cov-amt">{fmtUsd(adRev)}</div>
                <div className="cov-lbl">From an ad</div>
                <div className="cov-pc">{pctOf(adRev)}% · ROAS built on this</div>
              </div>
              <div className="cov-cell org">
                <div className="cov-amt">{fmtUsd(organicRev)}</div>
                <div className="cov-lbl">Organic</div>
                <div className="cov-pc">{pctOf(organicRev)}% · not from an ad, on purpose</div>
              </div>
              <div className="cov-cell unk">
                <div className="cov-amt">{fmtUsd(unknownRev)}</div>
                <div className="cov-lbl">No link pasted</div>
                <div className="cov-pc">{pctOf(unknownRev)}% · can't tell yet</div>
              </div>
            </div>
            <div style={{fontSize:12.5,color:"var(--text-2)",lineHeight:1.6}}>
              <b style={{color:"var(--text)"}}>{fmtUsd(adRev)}</b> is tied to a specific ad — the ROAS above is rock-solid on that money. <b style={{color:"var(--text)"}}>{fmtUsd(organicRev)}</b> is confirmed <b style={{color:"var(--text)"}}>organic</b> — real cash that didn't come from an ad, so it's correctly left out of your ROAS (counting it would make the ads look better than they are). The only true blind spot is <b style={{color:"var(--text)"}}>{fmtUsd(unknownRev)}</b> with <b style={{color:"var(--text)"}}>no ManyChat link pasted</b> — we can't yet say ad or organic. That's the {explainedPct!=null ? (100-Math.round(explainedPct)) : 0}% to chase: get a link on those sales and it moves into ad or organic.
            </div>
          </div>
        </div>
      )}
      </React.Fragment>)}
    </div>
  );
}

// ---- Per-range snapshot cache ------------------------------------------------
// The Deep Dive must show the SAME numbers for the same date range every time —
// payroll depends on them, so they can't quietly re-roll on each visit. We save
// each loaded range to the browser and re-show that exact saved copy on return.
// A fully-past range never changes, so it stays locked indefinitely; a range that
// includes today only stays valid for the current calendar day, so a new day (or
// a manual "Sync now") refreshes it. Bump SNAP_VERSION when the math changes so
// old saved copies are discarded instead of shown under new rules.
const SNAP_VERSION = "1";
const SNAP_NS = "ccos-ads-snapshot:v" + SNAP_VERSION;
const SNAP_MAX = 24; // keep the most-recently-used ranges, evict the rest
function snapKey(account, range){ return account + "|" + range.dateFrom + "|" + range.dateTo; }
function snapReadAll(){
  try{ return JSON.parse(window.localStorage.getItem(SNAP_NS) || "{}") || {}; }
  catch(_){ return {}; }
}
function readSnapshot(account, range, allowStale){
  const e = snapReadAll()[snapKey(account, range)];
  if(!e || !e.payload) return null;
  const today = todayEt();
  const includesToday = range.dateTo >= today;
  if(!allowStale && includesToday && e.day !== today) return null;
  return e.payload;
}
function writeSnapshot(account, range, payload){
  if(!payload || payload.error) return; // never lock in an error/empty result
  try{
    const all = snapReadAll();
    all[snapKey(account, range)] = { payload, day: todayEt(), savedAt: Date.now() };
    const keys = Object.keys(all);
    if(keys.length > SNAP_MAX){
      keys.map(k => [k, all[k].savedAt || 0])
        .sort((a,b)=> a[1]-b[1])
        .slice(0, keys.length - SNAP_MAX)
        .forEach(([k]) => { delete all[k]; });
    }
    window.localStorage.setItem(SNAP_NS, JSON.stringify(all));
  }catch(_){ /* quota or disabled storage — fine, we just won't cache */ }
}
function clearSnapshots(){ try{ window.localStorage.removeItem(SNAP_NS); }catch(_){} }

function App(){
  const [account, setAccount] = useState("all");
  // When the dropdown is on "All accounts" we don't merge every creator into one
  // mush — we page through each creator's full view one at a time. viewIdx is
  // which creator in that pager we're on; it resets to 0 whenever the dropdown
  // (account) changes. For a specific creator it's ignored.
  const [viewIdx, setViewIdx] = useState(0);
  const [topView, setTopView] = useState("dashboard");
  const [status, setStatus] = useState("all");
  const [search, setSearch] = useState("");
  const [dateRange, setDateRange] = useState(()=>rangeForPreset("mtd", todayEt()));
  const [dashboard, setDashboard] = useState(null);
  // Separate payload for the Turn-off/Scale cards: a FIXED trailing window
  // (DECISION_RULES.windowDays) ending today, independent of the date picker, so
  // the action calls are always "right now" with matured revenue — not whatever
  // (often short) range the rest of the page is showing.
  const [decisionDash, setDecisionDash] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [newEntries, setNewEntries] = useState([]);
  const [toast, setToast] = useState(null);
  const [workspaceOpen, setWorkspaceOpen] = useState(false);
  const [fromCache, setFromCache] = useState(false);

  // ----- "All accounts" pager -----
  // The owner does NOT want a merged all-creators mash-up (it hides danger). On
  // "all" we instead flip through each active creator's FULL view one at a time.
  // The creator list comes from the whole-business moneyModel in the payload
  // (which lists every creator regardless of which account was fetched), keeping
  // only those that actually spent. Fallback to the known three before data lands.
  const activeCreators = useMemo(()=>{
    const clients = dashboard && dashboard.moneyModel && dashboard.moneyModel.clients;
    if(Array.isArray(clients)){
      const keys = clients.filter(c=>c && c.adSpend>0 && c.key).map(c=>c.key);
      if(keys.length) return keys;
    }
    return ["tyson","keith","lucy"];
  }, [dashboard]);
  const creatorName = (key)=>{
    const clients = dashboard && dashboard.moneyModel && dashboard.moneyModel.clients;
    const hit = Array.isArray(clients) ? clients.find(c=>c && c.key===key) : null;
    if(hit && hit.name) return hit.name;
    return key ? key.charAt(0).toUpperCase()+key.slice(1) : key;
  };
  // The creator whose data we actually fetch/scope/cache. On a specific account
  // it's just that account. On "all" the per-creator pager ONLY applies in the
  // Deep Dive ("report") view — the Dashboard must show the true merged
  // all-accounts view (the pager arrows don't exist on the Dashboard, so paging
  // there would strand you on one creator and hide the rest).
  const effectiveAccount = (account === "all" && topView === "report" && activeCreators.length)
    ? activeCreators[Math.min(viewIdx, activeCreators.length-1)]
    : account;
  // Reset the pager whenever the dropdown changes.
  useEffect(()=>{ setViewIdx(0); }, [account]);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>setToast(null), 2400);
  };

  const onLogEntry = async (e) => {
    try{
      const res = await fetch("/api/ads-tracker/manual-event", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          clientKey:e.campaign,
          date:e.date,
          bucket:e.bucket,
          setterName:e.setter,
          keyword:e.keyword,
          value:e.value,
        }),
      });
      const json = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(json.error || "Manual entry failed");
      const entry = {
        ts:"Just now", setter:e.setter, camp:e.campaign, kw:e.keyword, bucket:e.bucket, value:e.value, source:"manual", eventType:"manual"
      };
      setNewEntries(x=>[entry, ...x]);
      showToast("Manual correction saved");
      await loadDashboard({silent:true, force:true});
    }catch(err){
      console.error(err);
      showToast(err?.message || "Manual correction failed");
    }
  };

  const loadDashboard = async ({silent=false, force=false}={}) => {
    // Locked snapshot: if we already have this exact range saved (and it's still
    // valid for today), show that same copy instantly — no refetch, no re-roll.
    if(!force){
      const cached = readSnapshot(effectiveAccount, dateRange);
      if(cached){
        setDashboard(cached);
        setLoadError(null);
        setLoading(false);
        setFromCache(true);
        return;
      }
    }
    if(!silent) setLoading(true);
    setLoadError(null);
    const params = new URLSearchParams({
      account: effectiveAccount,
      status:"all",
      level:"ad",
      dateFrom:dateRange.dateFrom,
      dateTo:dateRange.dateTo,
    });
    try{
      const res = await fetch("/api/ads-tracker?"+params.toString(), {cache:"no-store"});
      const json = await res.json();
      if(!res.ok) throw new Error(json.error || "Ads Tracker API failed");
      setDashboard(json);
      writeSnapshot(effectiveAccount, dateRange, json);
      setFromCache(false);
    }catch(err){
      console.error(err);
      // Live fetch failed — fall back to the last saved copy of this range
      // (even if stale) rather than wiping the screen to an error.
      const stale = readSnapshot(effectiveAccount, dateRange, true);
      if(stale){
        setDashboard(stale);
        setLoadError(null);
        setFromCache(true);
        showToast("Showing saved data · live unavailable");
      }else{
        setDashboard({error:true, rows:[], dailyRows:[], recentEvents:[], eventsHistory:[]});
        setLoadError(err?.message || "Live data unavailable");
        showToast("Live data unavailable");
      }
    }finally{
      setLoading(false);
    }
  };

  const onResolveAlert = async (payload) => {
    const res = await fetch("/api/ads-tracker/attribution-alerts", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    const json = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error || "Attribution save failed");
    showToast("Attribution saved");
    await loadDashboard({silent:true, force:true});
  };

  useEffect(()=>{
    loadDashboard();
  }, [effectiveAccount, dateRange.dateFrom, dateRange.dateTo]);

  // Fixed trailing-window fetch for the decision cards (Deep Dive only). Keyed on
  // the account, NOT the date picker — so changing the displayed range never
  // shifts what the Turn-off/Scale cards judge. Quiet: failures just leave the
  // cards on the page-range data (handled in DeepDiveReport).
  const decisionRange = useMemo(()=>{
    const to = todayEt();
    return { dateFrom: shiftIso(to, -(DECISION_RULES.windowDays-1)), dateTo: to };
  }, []);
  useEffect(()=>{
    if(topView!=="report") return;
    let off=false;
    const params = new URLSearchParams({
      account: effectiveAccount, status:"all", level:"ad",
      dateFrom: decisionRange.dateFrom, dateTo: decisionRange.dateTo,
    });
    fetch("/api/ads-tracker?"+params.toString(), {cache:"no-store"})
      .then(r=>r.json())
      .then(j=>{ if(!off && j && !j.error) setDecisionDash(j); })
      .catch(()=>{});
    return ()=>{ off=true; };
  }, [effectiveAccount, topView, decisionRange.dateFrom, decisionRange.dateTo]);

  const apiCampaigns = useMemo(
    () => campaignsFromDashboard(dashboard, dateRange),
    [dashboard, dateRange.dateFrom, dateRange.dateTo]
  );
  const liveCampaigns = useMemo(
    () => filterCampaignsBySearch(applyLocalEntriesToCampaigns(apiCampaigns, newEntries), search),
    [apiCampaigns, newEntries, search]
  );
  const scopedCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, effectiveAccount, status),
    [liveCampaigns, effectiveAccount, status]
  );
  const metricCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, effectiveAccount, status),
    [liveCampaigns, effectiveAccount, status]
  );
  const resolveCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, effectiveAccount, "all"),
    [liveCampaigns, effectiveAccount]
  );
  const liveRecent = useMemo(
    () => recentEntriesFromDashboard(dashboard),
    [dashboard]
  );
  const fetchedLabel = loadError
    ? "Live data unavailable"
    : (dashboard ? `${fromCache ? "Saved" : "Live"} · ${rangeLabel(dateRange)}` : "Loading live data");

  const syncNow = async () => {
    if(syncing) return;
    setSyncing(true);
    showToast("Syncing ads + sales rows…");
    const body = JSON.stringify({dateFrom:dateRange.dateFrom, dateTo:dateRange.dateTo});
    try{
      const [sales, ads] = await Promise.all([
        fetch("/api/sync/sales-tracker-rows", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
        fetch("/api/sync/ads-tracker", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
      ]);
      const salesOk = sales.ok;
      const adsOk = ads.ok;
      if(!salesOk && !adsOk) throw new Error("Sync failed");
      clearSnapshots();
      await loadDashboard({silent:true, force:true});
      if(salesOk && adsOk) showToast("Synced · live data refreshed");
      else if(adsOk) showToast("Meta synced · sales sync needs setup");
      else showToast("Sales synced · Meta sync needs logs");
    }catch(err){
      console.error(err);
      showToast("Sync failed · check auth/logs");
    }finally{
      setSyncing(false);
    }
  };

  return (
    <div className="app">
        <div className="page">
          {/* Header */}
          <div className="page-head">
            <div>
              <h1 className="page-title">Ads Tracker</h1>
            </div>
            <button className="sync-pill" onClick={syncNow} disabled={syncing}>
              <svg className="sync-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/></svg>
              <span>{syncing ? "Syncing…" : "Sync now"}</span>
            </button>
          </div>

          {/* Filter bar */}
          <div className="filter-bar">
            <SelectFilter
              label="Account"
              value={account}
              onChange={setAccount}
              options={[
                {id:"all",label:"All accounts"},
                {id:"tyson",label:"Tyson"},
                {id:"keith",label:"Keith"},
                {id:"lucy",label:"Lucy"},
                {id:"antwan",label:"Antwan"},
              ]}
            />
            <Segmented
              value={status}
              onChange={setStatus}
              options={[
                {id:"active",label:"Active"},
                {id:"finished",label:"Finished"},
                {id:"all",label:"All"},
              ]}
            />
            <div className="filter-divider"></div>
            <DateDropdown value={dateRange} onChange={setDateRange} />
            <div style={{flex:1}}></div>
            <label className="search-control">
              <IcSearch/>
              <input
                className="search-input"
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Search"
              />
            </label>
          </div>

          {/* View switch: live dashboard vs deep-dive report */}
          <div className="topnav">
            <button className={"topnav-btn "+(topView==="dashboard"?"active":"")} onClick={()=>setTopView("dashboard")}>
              <span className="topnav-dot"></span>Dashboard
            </button>
            <button className={"topnav-btn "+(topView==="report"?"active":"")} onClick={()=>setTopView("report")}>
              <span className="topnav-dot"></span>Deep Dive
            </button>
          </div>

          {topView==="report" ? (
            <DeepDiveReport
              campaigns={scopedCampaigns}
              dashboard={dashboard}
              decisionDash={decisionDash}
              decisionRange={decisionRange}
              range={dateRange}
              loading={loading}
              pager={account==="all" && activeCreators.length>1 ? {
                idx: Math.min(viewIdx, activeCreators.length-1),
                count: activeCreators.length,
                name: creatorName(effectiveAccount),
                onPrev: ()=>setViewIdx(i=>{ const n=activeCreators.length; return (Math.min(i,n-1)-1+n)%n; }),
                onNext: ()=>setViewIdx(i=>{ const n=activeCreators.length; return (Math.min(i,n-1)+1)%n; }),
              } : null}
            />
          ) : (
          <React.Fragment>
          {/* Campaign table */}
          <div className="section" style={{marginTop:0}}>
            <div className="section-head">
              <div className="section-label">Campaign performance</div>
              <div className="section-meta">{loading ? "Loading…" : fetchedLabel}</div>
            </div>
            <CampaignTable account={account} status={status} campaigns={scopedCampaigns} />
          </div>

          {/* Charts */}
          <MetricCardBoard campaigns={metricCampaigns} dashboard={dashboard}/>

          <TasksSection dashboard={dashboard} campaigns={resolveCampaigns} onResolve={onResolveAlert} onToast={showToast} onOpenWorkspace={()=>setWorkspaceOpen(true)}/>

          <CalendarSection dashboard={dashboard} dateRange={dateRange} onOpenWorkspace={()=>setWorkspaceOpen(true)}/>

          {/* Recent entries (collapsed) */}
          <RecentEntries
            extra={[...newEntries, ...liveRecent]}
            includeFallback={dashboard?.mock}
            campaigns={resolveCampaigns}
            onManualSubmit={onLogEntry}
            onResolve={onResolveAlert}
            onToast={showToast}
          />

          <div className="section chart-actions-cell">
            <div className="section-head">
              <div className="section-label">Actions</div>
              <div className="section-meta">Export</div>
            </div>
            <Actions campaigns={scopedCampaigns} onToast={showToast}/>
          </div>
          </React.Fragment>
          )}

          <div style={{marginTop:40,color:'var(--text-4)',fontSize:11,display:'flex',justifyContent:'space-between'}}>
            <span>Ads Tracker v1.4 · Client Conversion OS</span>
            <span className="mono">{fetchedLabel}</span>
          </div>
        </div>
        {toast && (
          <div className="toast">
            <span className="toast-dot"></span>
            {toast}
          </div>
        )}
        {workspaceOpen && (
          <AttributionWorkspace
            dashboard={dashboard}
            campaigns={resolveCampaigns}
            onResolve={onResolveAlert}
            onToast={showToast}
            onClose={()=>setWorkspaceOpen(false)}
          />
        )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
