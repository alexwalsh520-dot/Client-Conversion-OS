<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ads Tracker — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>(function(){try{var t=localStorage.getItem("ccos-theme:last");if(t!=="light"&&t!=="dark")t="dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(t);}catch(e){}try{window.addEventListener("storage",function(e){if(e.key==="ccos-theme:last"){var n=e.newValue==="light"?"light":"dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(n);}});}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --bg-1: #0d0d0d;
    --panel: #111111;
    --panel-2: #141414;
    --row-hover: #141414;
    --border: #1f1f1f;
    --border-2: #262626;
    --text: #e8e8e8;
    --text-2: #a8a8a8;
    --text-3: #6b6b6b;
    --text-4: #4a4a4a;
    --green: #7dd3a8;
    --green-dim: #4f9b76;
    --red: #e89a94;
    --red-dim: #a36560;
    --gold: #d4b27a;
    --gold-dim: #8a7348;
    --blue: #7aa7d4;
    --focus: #2a2a2a;
    --mono: 'JetBrains Mono',ui-monospace,monospace;
  }
  html.light{
    --bg:#f6f6f4;
    --bg-1:#fbfbfa;
    --panel:#ffffff;
    --panel-2:#f0f0ee;
    --row-hover:#f3f3f1;
    --border:rgba(0,0,0,.10);
    --border-2:rgba(0,0,0,.16);
    --focus:rgba(0,0,0,.26);
    --text:#18181b;
    --text-2:#3f3f46;
    --text-3:#71717a;
    --text-4:#9a9aa3;
    --green:#3f9e6b;
    --green-dim:#6fae90;
    --red:#c0504a;
    --red-dim:#cf8b86;
    --gold:#a9823f;
    --gold-dim:#b89a6a;
    --blue:#4f7fb0;
    color-scheme:light;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{min-height:100vh}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input, select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* Shell */
  .app{min-height:100vh}
  .page{padding:26px 28px 60px;max-width:1400px;width:100%;margin:0 auto}

  /* Header */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin:0 0 4px}
  .page-sub{font-size:12px;color:var(--text-3)}
  .sync-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-2);border-radius:99px;font-size:11px;color:var(--text-3);background:var(--bg-1);letter-spacing:0.01em}
  .sync-pill:hover{background:var(--panel-2);color:var(--text-2)}
  .sync-pill:hover .sync-ic{color:var(--gold)}
  .sync-ic{color:var(--text-4);transition:color .2s}
  .sync-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;font-size:12px;color:var(--text-2);background:var(--panel)}
  .sync-btn:hover{background:var(--panel-2);color:var(--text)}

  /* Filter bar */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:22px;padding-bottom:0;flex-wrap:wrap}
  .filter{position:relative}
  .filter-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);color:var(--text);font-size:12px;min-height:30px}
  .filter-btn:hover{background:var(--panel-2)}
  .filter-btn.open{background:var(--panel-2);border-color:var(--focus)}
  .filter-btn .lbl{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-right:2px}
  .filter-btn .val{color:var(--text);font-size:12px}
  .filter-btn .caret{color:var(--text-3);font-size:9px;margin-left:2px}
  .filter-divider{width:1px;height:16px;background:var(--border-2);margin:0 4px}
  .search-control{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);color:var(--text-3);font-size:12px;min-height:30px;min-width:150px}
  .search-control:focus-within{background:var(--panel-2);border-color:var(--focus);color:var(--text-2)}
  .search-input{width:100px;color:var(--text);font-size:12px}
  .search-input::placeholder{color:var(--text-4)}
  .segmented{display:inline-flex;border:1px solid var(--border-2);border-radius:6px;background:var(--panel);padding:2px;height:30px}
  .seg{padding:4px 10px;font-size:12px;color:var(--text-3);border-radius:4px;display:flex;align-items:center}
  .seg:hover{color:var(--text-2)}
  .seg.active{background:var(--panel-2);color:var(--text)}

  /* Dropdown panel */
  .pop{position:absolute;top:calc(100% + 6px);left:0;background:var(--panel);border:1px solid var(--border-2);border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6);z-index:50;min-width:220px;padding:6px;color:var(--text-2)}
  .pop-item{padding:7px 10px;border-radius:5px;font-size:12px;color:var(--text-2);display:flex;justify-content:space-between;cursor:pointer;align-items:center}
  .pop-item:hover{background:var(--panel-2);color:var(--text)}
  .pop-item.selected{color:var(--text)}
  .pop-item .check{color:var(--gold);font-size:10px;opacity:0}
  .pop-item.selected .check{opacity:1}

  /* Date panel */
  .date-pop{width:520px;display:grid;grid-template-columns:170px 1fr;padding:0}
  .date-presets{border-right:1px solid var(--border);padding:6px}
  .date-cal{padding:12px 14px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-2);margin-bottom:10px}
  .cal-nav{color:var(--text-3);padding:3px 6px;border-radius:4px}
  .cal-nav:hover{color:var(--text);background:var(--panel-2)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
  .cal-dow{color:var(--text-4);text-align:center;padding:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
  .cal-day{text-align:center;padding:5px 0;color:var(--text-2);border-radius:4px;cursor:pointer}
  .cal-day:hover{background:var(--panel-2);color:var(--text)}
  .cal-day.muted{color:var(--text-4)}
  .cal-day.in-range{background:var(--panel-2);color:var(--text)}
  .cal-day.endpoint{background:var(--gold);color:var(--bg);font-weight:600}
  .cal-day.today:not(.endpoint){box-shadow:inset 0 0 0 1px var(--gold-dim);color:var(--gold)}
  .cal-day.trail{visibility:hidden}
  .date-foot{border-top:1px solid var(--border);padding:10px 14px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
  .apply-btn{padding:5px 12px;border-radius:5px;background:var(--gold);color:var(--bg);font-weight:600;font-size:11px}
  .apply-btn:hover{filter:brightness(1.08)}

  /* Sections */
  .section{margin-top:32px}
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500}
  .section-meta{font-size:11px;color:var(--text-4)}
	  /* Attribution alerts */
	  .alerts-panel{border-radius:8px;background:var(--panel);border:1px solid var(--border);overflow:hidden}
	  .alerts-head{min-height:92px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
	  .alerts-title{font-size:11px;line-height:1.15;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3)}
	  .alerts-sub{font-size:11px;line-height:1.25;color:var(--text-4);margin-top:6px;font-weight:400;letter-spacing:0}
	  .alerts-summary-shell{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-1)}
	  .alerts-summary-scope{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
	  .alerts-summary-scope-label{font-size:9px;line-height:1;text-transform:uppercase;letter-spacing:.13em;color:var(--text-4);font-weight:500}
	  .alerts-summary-scope-pill{height:20px;padding:0 8px;border:1px solid var(--border-2);border-radius:999px;background:var(--panel);color:var(--text-3);display:inline-flex;align-items:center;font-size:10px;font-weight:500}
	  .alerts-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
	  .alerts-summary-card{min-height:68px;border:1px solid var(--border);border-radius:7px;background:var(--panel);padding:11px 12px}
	  .alerts-summary-card.good{border-color:rgba(125,211,168,.22);background:linear-gradient(180deg,rgba(125,211,168,.055),var(--panel) 70%)}
	  .alerts-summary-card.warn{border-color:rgba(232,154,148,.25);background:linear-gradient(180deg,rgba(232,154,148,.06),var(--panel) 72%)}
	  .alerts-summary-label{font-size:9px;line-height:1;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500;margin-bottom:8px}
	  .alerts-summary-value{font-size:20px;line-height:1.05;font-weight:500;letter-spacing:-0.03em;color:var(--text)}
	  .alerts-summary-value.good{color:var(--green)}
	  .alerts-summary-value.warn{color:var(--red)}
	  .alerts-summary-note{font-size:10px;color:var(--text-4);margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
	  .potential-roas-card{min-height:270px}
	  .potential-roas-breakdown{display:grid;gap:10px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
	  .potential-roas-row{display:flex;align-items:center;justify-content:space-between;gap:14px;color:var(--text-3);font-size:12px}
	  .potential-roas-row strong{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
	  .potential-roas-row.warn strong{color:var(--red)}
	  .potential-roas-row.gold strong{color:var(--gold)}
	  .potential-roas-row.total{color:var(--text);font-size:13px}
	  .potential-roas-row.total strong{font-size:14px}
	  .potential-roas-divider{height:1px;background:var(--border);margin:1px 0}
	  .potential-roas-spacer{height:8px}
	  .alerts-tabs{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--border-2);border-radius:999px;background:var(--bg)}
	  .alerts-tab{height:30px;padding:0 11px;border-radius:999px;color:var(--text-3);font-size:12px;display:inline-flex;align-items:center;gap:7px}
	  .alerts-tab.active{background:var(--panel-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--focus)}
	  .alerts-tab-count{min-width:22px;height:18px;padding:0 6px;border-radius:999px;border:1px solid var(--border-2);background:var(--panel-2);color:var(--text-4);display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;line-height:1}
	  .alerts-tab.active .alerts-tab-count{border-color:var(--border-2);color:var(--gold)}
	  .alerts-grid{display:grid;grid-template-columns:48px minmax(0,1.4fr) minmax(120px,.8fr) 90px 118px;align-items:center}
	  .alerts-table-head{height:44px;border-bottom:1px solid var(--border);color:var(--text-4);font-size:10px;text-transform:uppercase;letter-spacing:0.13em;font-weight:500}
	  .alert-row{min-height:68px;border-bottom:1px solid var(--border)}
	  .alert-row:last-child{border-bottom:none}
	  .alert-check{width:18px;height:18px;border:1px solid var(--border-2);border-radius:4px;margin-left:20px}
	  .alert-name{font-size:13px;line-height:1.1;font-weight:600;color:var(--text);letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .alert-meta{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.25;color:var(--text-3);margin-top:5px;letter-spacing:0}
	  .alert-campaign{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:13px;letter-spacing:-0.01em;min-width:0}
	  .alert-campaign-dot{width:6px;height:6px;border-radius:99px;background:var(--gold);flex:0 0 auto}
	  .alert-campaign-dot.keith{background:var(--blue)}
	  .alert-amount{font-family:'Inter',system-ui,sans-serif;color:var(--text);font-size:13px;font-weight:500;letter-spacing:-0.01em;text-align:left;font-variant-numeric:tabular-nums}
	  .alert-actions{display:flex;justify-content:flex-start;align-items:center;gap:6px;padding-right:14px}
	  .alert-open-link{width:30px;height:30px;border:1px solid var(--focus);border-radius:7px;background:var(--panel-2);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
	  .alert-open-link:hover{background:var(--border);border-color:var(--focus);color:var(--text)}
	  .alert-resolve{height:30px;min-width:84px;padding:0 12px;border:1px solid var(--focus);border-radius:999px;background:var(--panel-2);color:var(--text);font-size:12px;font-weight:500;letter-spacing:0}
	  .alert-resolve:hover{background:var(--border);border-color:var(--focus);color:var(--text)}
	  .alert-empty{padding:22px 20px;color:var(--text-4);font-size:12px}
	  .alerts-head-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
	  .alert-workspace-btn{height:30px;padding:0 12px;border:1px solid rgba(211,180,119,.35);border-radius:999px;background:rgba(211,180,119,.08);color:var(--gold);font-size:12px;font-weight:500;white-space:nowrap}
	  .alert-workspace-btn:hover{background:rgba(211,180,119,.14);border-color:rgba(211,180,119,.5);color:var(--gold)}
	  .attribution-workspace{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
	  .workspace-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:24px 28px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
	  .workspace-kicker{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.14em;color:var(--text-4);font-weight:500;margin-bottom:8px}
	  .workspace-title{font-size:24px;line-height:1.08;font-weight:650;letter-spacing:-.035em;color:var(--text)}
	  .workspace-sub{font-size:12px;color:var(--text-3);margin-top:7px}
	  .workspace-close{height:34px;padding:0 14px;border:1px solid var(--border-2);border-radius:7px;background:var(--panel);color:var(--text-2);font-size:12px;font-weight:500}
	  .workspace-close:hover{background:var(--panel-2);color:var(--text)}
	  .workspace-body{padding:18px 28px 28px;overflow:auto;display:grid;gap:14px}
	  .workspace-toolbar{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
	  .workspace-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
	  .workspace-search{height:34px;min-width:280px;border:1px solid var(--border-2);border-radius:7px;background:var(--panel);color:var(--text);font-size:12px;padding:0 12px}
	  .workspace-search:focus{border-color:var(--focus);background:var(--panel)}
	  .workspace-type-tabs{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--border-2);border-radius:999px;background:var(--bg)}
	  .workspace-type-tab{height:28px;padding:0 11px;border-radius:999px;color:var(--text-3);font-size:12px;display:inline-flex;align-items:center;gap:6px}
	  .workspace-type-tab.active{background:var(--border);color:var(--text)}
	  .workspace-type-tab.active .alerts-tab-count{border-color:var(--border-2);color:var(--gold)}
	  .workspace-table{border:1px solid var(--border);border-radius:9px;background:var(--panel);overflow:hidden}
	  .workspace-grid{display:grid;grid-template-columns:minmax(180px,1.25fr) 128px 120px 118px 104px minmax(190px,1.1fr) 154px;align-items:center;gap:12px}
	  .workspace-grid>*{min-width:0}
	  .workspace-table-head{min-height:44px;padding:0 20px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--text-4);font-weight:500}
	  .workspace-row{min-height:68px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer}
	  .workspace-row:last-child{border-bottom:none}
	  .workspace-row:hover{background:var(--panel-2)}
	  .workspace-name{font-size:13px;line-height:1.15;font-weight:650;color:var(--text);letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-meta{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.25;color:var(--text-3);margin-top:5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-type-pill{height:24px;padding:0 9px;border:1px solid var(--border-2);border-radius:999px;background:var(--panel);color:var(--text-2);font-size:11px;display:inline-flex;align-items:center;width:max-content}
	  .workspace-type-pill.revenue{border-color:rgba(211,180,119,.28);color:var(--gold);background:rgba(211,180,119,.06)}
	  .workspace-type-pill.booking{border-color:rgba(122,167,212,.28);color:var(--blue);background:rgba(122,167,212,.06)}
	  .workspace-type-pill.keyword{border-color:rgba(125,211,168,.24);color:var(--green);background:rgba(125,211,168,.055)}
	  .workspace-type-pill.nokeyword{border-color:var(--border-2);color:var(--text-4);background:transparent}
	  .workspace-type-tab.quiet{color:var(--text-4)}
	  .workspace-type-tab.quiet.active{background:var(--border);color:var(--text-3)}
	  .workspace-row.nokeyword{opacity:.62}
	  .workspace-row.nokeyword:hover{opacity:1;background:var(--panel-2)}
	  .workspace-nokeyword-note{padding:13px 20px;border-bottom:1px solid var(--border);background:var(--bg-1);color:var(--text-3);font-size:11.5px;line-height:1.5}
	  .workspace-issue{color:var(--text-3);font-size:12px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	  .workspace-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px}
	  .workspace-empty{padding:28px 20px;color:var(--text-4);font-size:12px}
	  @media(max-width:1100px){.workspace-grid{grid-template-columns:minmax(180px,1fr) 108px 96px 88px 132px}.workspace-table-head .hide-mid,.workspace-row .hide-mid{display:none}.workspace-search{min-width:220px}}
	  /* ---- Setter counts (what the setter knows, side-by-side, never in ROAS) ---- */
	  .sc-panel{border:1px solid var(--border);border-radius:9px;background:var(--panel);overflow:hidden}
	  .sc-panel-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;cursor:pointer;user-select:none}
	  .sc-panel-head:hover{background:var(--panel-2)}
	  .sc-panel-title{font-size:13px;font-weight:650;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
	  .sc-panel-sub{font-size:11px;color:var(--text-3);margin-top:4px;line-height:1.4}
	  .sc-badge{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border-radius:999px;border:1px solid rgba(211,180,119,.3);color:var(--gold);background:rgba(211,180,119,.06);white-space:nowrap}
	  .sc-chevron{color:var(--text-4);font-size:12px;transition:transform .2s ease}
	  .sc-chevron.open{transform:rotate(90deg)}
	  .sc-body{border-top:1px solid var(--border);padding:16px 18px;display:grid;gap:16px}
	  .sc-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px}
	  .sc-field{display:flex;flex-direction:column;gap:5px}
	  .sc-label{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--text-4);font-weight:500}
	  .sc-client-pills{display:inline-flex;gap:4px;padding:3px;border:1px solid var(--border-2);border-radius:999px;background:var(--bg)}
	  .sc-pill{height:28px;padding:0 13px;border-radius:999px;color:var(--text-3);font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
	  .sc-pill:hover{color:var(--text-2)}

  .calendar-call-top{display:flex;align-items:center;justify-content:space-between;gap:8px}

  .calendar-status-pill{height:18px;display:inline-flex;align-items:center;border-radius:999px;border:1px solid var(--border-2);background:var(--panel);color:var(--text-3);font-size:9px;font-weight:600;padding:0 6px;white-space:nowrap}

  .calendar-call-time{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--text-3);margin-top:5px}

  @media(max-width:900px){.calendar-board{display:block}.calendar-dow{display:none}.calendar-cell{min-height:auto}.calendar-cell.muted{display:none}}
  .metric-card-shell{position:relative;min-width:0}

  /* Chart cards (ROAS + Cost per DM + Ad ROAS) */

  .lc-tt-val{color:var(--text);font-size:11px;font-variant-numeric:tabular-nums}

  .msg-ev-head .t{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--text-2)}
  .msg-ev-head .m{font-size:11px;color:var(--text-4);font-variant-numeric:tabular-nums}
  .msg-ev-row{display:grid;grid-template-columns:1fr auto;gap:12px 14px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)}
  .msg-ev-row:last-child{border-bottom:none}
  .msg-ev-row.dim{opacity:.62}
  .msg-ev-copy{font-size:12.5px;line-height:1.5;color:var(--text-1);font-style:italic}
  .msg-ev-copy .nm{display:block;font-style:normal;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600;margin-bottom:3px}
  .msg-ev-stats{display:flex;align-items:center;gap:13px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .msg-ev-stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .msg-ev-stat .v{font-size:13px;font-weight:650;color:var(--text)}
  .msg-ev-stat .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-4);font-weight:600}
  .msg-ev-stat .v.roas{color:var(--gold)} .msg-ev-stat .v.roas.good{color:var(--green)} .msg-ev-stat .v.roas.bad{color:var(--red)}
  .msg-ev-early{font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--text-4);border:1px solid var(--border);border-radius:99px;padding:2px 7px}
  .msg-ev-more{padding:9px 14px;font-size:11px;color:var(--text-4);text-align:center}
  @media(max-width:640px){.msg-ev-row{grid-template-columns:1fr} .msg-ev-stats{justify-content:flex-start}}

  /* Keyword chart */
  .kw-panel{padding:18px 20px}
  .kw-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .kw-title{font-size:13px;font-weight:500;color:var(--text)}
  .kw-tabs{display:flex;gap:2px}
  .kw-tab{font-size:11px;color:var(--text-3);padding:3px 9px;border-radius:4px;cursor:pointer}
  .kw-tab:hover{color:var(--text-2)}
  .kw-tab.active{background:var(--panel-2);color:var(--text)}
  .kw-chart{margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-items:end;height:200px;padding:0 10px}
  .kw-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:8px}
  .kw-bar-val{display:flex;flex-direction:column;align-items:center;gap:1px;min-height:32px;justify-content:flex-end}
  .kw-roas{font-size:14px;color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .kw-dollars{font-size:10px;color:var(--text-3);font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
  .kw-bar{width:48px;border-radius:3px 3px 0 0;position:relative;transition:all .2s}
  .kw-bar:hover{filter:brightness(1.15)}
  .kw-bar .val{position:absolute;top:-22px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-2);font-variant-numeric:tabular-nums}
  .kw-label{font-size:11px;color:var(--text-2);letter-spacing:0.04em;font-family:'JetBrains Mono',monospace}
  .kw-sub{font-size:10px;color:var(--text-4);margin-top:-4px}
  .kw-legend{display:flex;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
  .kw-legend-item{display:flex;align-items:center;gap:6px}
  .kw-sw{width:8px;height:8px;border-radius:2px}

  /* Right column: entry form + actions */
  .right-col{display:flex;flex-direction:column;gap:18px}
  .entry-panel{padding:16px 18px}
  .entry-head{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-bottom:14px;font-weight:500}
  .entry-row{display:flex;gap:8px;margin-bottom:8px}
  .entry-select, .entry-input{
    flex:1;padding:7px 10px;background:var(--bg-1);border:1px solid var(--border-2);
    border-radius:5px;font-size:12px;color:var(--text);min-width:0;
  }
  .entry-select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236b6b6b' stroke-width='1.2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:24px}
  .entry-select:focus, .entry-input:focus{border-color:var(--focus);background:var(--panel)}
  .entry-input::placeholder{color:var(--text-4)}
  .bucket-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .bucket-chip{font-size:11px;padding:5px 9px;border:1px solid var(--border-2);border-radius:99px;color:var(--text-3);cursor:pointer;background:var(--bg-1);white-space:nowrap}
  .bucket-chip:hover{color:var(--text-2);border-color:var(--focus)}
  .bucket-chip.active{background:var(--panel-2);color:var(--text);border-color:var(--focus)}
  .entry-submit-row{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .entry-submit{padding:7px 14px;background:var(--gold);color:var(--bg);border-radius:5px;font-size:12px;font-weight:600;flex:0 0 auto}
  .entry-submit:hover{filter:brightness(1.08)}
  .entry-submit:disabled{background:var(--border-2);color:var(--text-4);cursor:not-allowed;filter:none}
  .entry-hint{font-size:11px;color:var(--text-4);flex:1;text-align:right}

  /* Multi-row entry */
  .bucket-group{margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg-1)}
  .bucket-group-head{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--panel);border-bottom:1px solid var(--border)}
  .bucket-group-label{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:8px}
  .bucket-group-count{color:var(--text-4);font-size:11px;letter-spacing:0;text-transform:none;font-weight:400}
  .bucket-group-rem{color:var(--text-4);font-size:14px;padding:2px 6px;border-radius:4px;line-height:1}
  .bucket-group-rem:hover{color:var(--red);background:var(--panel-2)}
  .br-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border)}
  .br-row:last-child{border-bottom:none}
  .br-row:hover{background:var(--bg-1)}
  .br-num{width:16px;text-align:right;color:var(--text-4);font-size:10px;font-family:'JetBrains Mono',monospace}
  .br-input{flex:1;padding:5px 8px;background:var(--bg);border:1px solid transparent;border-radius:4px;font-size:12px;color:var(--text);min-width:0}
  .br-input:hover{border-color:var(--border-2)}
  .br-input:focus{border-color:var(--focus);background:var(--panel);outline:none}
  .br-input.mono{font-family:'JetBrains Mono',monospace;text-transform:uppercase;max-width:130px}
  .br-input.val{max-width:100px;font-family:'JetBrains Mono',monospace;text-align:right}
  .br-remove{color:var(--text-4);font-size:14px;padding:2px 6px;border-radius:4px;line-height:1;opacity:0;transition:opacity .15s}
  .br-row:hover .br-remove{opacity:1}
  .br-remove:hover{color:var(--red);background:var(--panel-2)}
  .br-addrow{display:flex;align-items:center;gap:6px;padding:7px 11px;font-size:11px;color:var(--text-3);background:var(--bg);width:100%;border-top:1px dashed var(--border-2)}
  .br-addrow:hover{color:var(--gold);background:var(--panel)}
  .bucket-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:8px 10px;background:var(--bg-1);border:1px dashed var(--border-2);border-radius:6px}
  .bucket-picker-label{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--text-4);margin-right:4px;align-self:center}
  .bp-chip{font-size:11px;padding:5px 10px;border:1px solid var(--border-2);border-radius:99px;color:var(--text-2);cursor:pointer;background:var(--bg-1);display:inline-flex;align-items:center;gap:5px}
  .bp-chip:hover{color:var(--text);border-color:var(--focus);background:var(--panel-2)}
  .bp-chip .pl{color:var(--text-4);font-size:11px;line-height:1}

  /* Actions */
  .actions-panel{padding:14px 18px;display:flex;gap:0;align-items:center;justify-content:space-between}
  .actions-left{display:flex;gap:4px}
  .action-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;font-size:12px;color:var(--text-2);border-radius:5px}
  .action-btn:hover{background:var(--panel-2);color:var(--text)}
  .action-btn .ic{color:var(--text-3);font-size:11px;width:12px;display:inline-flex;justify-content:center}
  .action-sep{width:1px;height:14px;background:var(--border-2);margin:0 2px;align-self:center}

  /* Recent entries */
  .recent{margin-top:22px;border:1px solid var(--border);border-radius:8px;background:var(--panel);overflow:hidden}
  .recent-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;cursor:pointer;user-select:none}
  .recent-head:hover{background:var(--panel)}
  .recent-title{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500;display:flex;align-items:center;gap:10px}
  .recent-count{color:var(--text-4);font-size:11px;letter-spacing:0}
  .recent-caret{color:var(--text-3);font-size:10px;transition:transform .18s}
  .recent-caret.open{transform:rotate(90deg)}
  .recent-body{border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease}
  .recent-body.open{max-height:980px}
  .manual-log-toggle{display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .manual-log-btn{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border:1px solid var(--border-2);border-radius:5px;background:var(--panel);color:var(--text-3);font-size:11px}
  .manual-log-btn:hover{background:var(--panel-2);color:var(--text-2)}
  .manual-log-btn.active{color:var(--gold);border-color:var(--border-2);background:var(--panel)}
  .history-pager{display:inline-flex;align-items:center;gap:6px;margin-right:auto}
  .history-page-btn{padding:5px 8px;border:1px solid var(--border-2);border-radius:5px;background:var(--panel);color:var(--text-3);font-size:10.5px}
  .history-page-btn:hover:not(:disabled){background:var(--panel-2);color:var(--text-2)}
  .history-page-btn:disabled{opacity:.35;cursor:not-allowed}
  .history-page-label{font-family:'JetBrains Mono',monospace;color:var(--text-4);font-size:10.5px}
  .manual-log-area{padding:0 18px 14px;background:var(--bg-1);border-bottom:1px solid var(--border)}
  .manual-log-area .entry-panel{background:var(--panel)}
  table.recent-tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.recent-tbl th{padding:9px 18px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-4);font-weight:500;border-bottom:1px solid var(--border)}
  table.recent-tbl th.r{text-align:right}
  table.recent-tbl td{padding:9px 18px;border-bottom:1px solid var(--border);color:var(--text-2)}
  table.recent-tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
  table.recent-tbl tr:last-child td{border-bottom:none}
  table.recent-tbl tr:hover td{background:var(--row-hover);color:var(--text)}
  .kw-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:0.04em}
  .event-status{display:inline-flex;align-items:center;justify-content:center;min-width:78px;padding:4px 8px;border-radius:999px;border:1px solid var(--border-2);background:var(--panel);color:var(--text-3);font-size:10px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
  .event-status.attributed{color:var(--green);border-color:rgba(125,211,168,.22);background:rgba(125,211,168,.045)}
  .event-status.needs_review,.event-status.missing_keyword{color:var(--red);border-color:rgba(232,154,148,.22);background:rgba(232,154,148,.045)}
  .event-status.organic{color:var(--blue);border-color:rgba(122,167,212,.2);background:rgba(122,167,212,.04)}
  .event-status.unattributed{color:var(--red);border-color:rgba(232,154,148,.22);background:rgba(232,154,148,.045)}
  .event-status.ignored{color:var(--text-4)}

  /* Chips in filter */
  .count-badge{background:var(--panel-2);color:var(--text-2);font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px}

  /* Icons */
  .i{display:inline-block;vertical-align:middle}

  /* ===== Deep Dive Report ===== */
  .topnav{display:inline-flex;gap:2px;padding:3px;background:var(--panel-2);border:1px solid var(--border);border-radius:99px;margin-bottom:18px}
  .topnav-btn{appearance:none;border:none;background:transparent;color:var(--text-3);font-size:12px;font-weight:500;padding:7px 16px;border-radius:99px;cursor:pointer;letter-spacing:.01em;transition:color .15s,background .15s;display:inline-flex;align-items:center;gap:7px}
  .topnav-btn:hover{color:var(--text-2)}
  .topnav-btn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.18)}
  .topnav-btn.active .topnav-dot{background:var(--gold)}
  .topnav-dot{width:6px;height:6px;border-radius:99px;background:var(--text-4)}

  .ddr{display:flex;flex-direction:column;gap:30px}
  .ddr-head{display:flex;flex-direction:column;gap:5px}
  .ddr-title{font-size:21px;font-weight:650;letter-spacing:-.02em;margin:0}
  .ddr-sub{font-size:12.5px;color:var(--text-3)}
  .ddr-sub b{color:var(--gold);font-weight:600}

  .ddr-band{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  .ddr-stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 15px}
  .ddr-stat .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;color:var(--text-3);font-weight:600}
  .ddr-stat .val{font-size:23px;font-weight:680;letter-spacing:-.02em;margin-top:7px;font-variant-numeric:tabular-nums}
  .ddr-stat .sub{font-size:10.5px;color:var(--text-4);margin-top:3px}
  .ddr-stat .val.good{color:var(--green)} .ddr-stat .val.bad{color:var(--red)}

  .ddr-block{display:flex;flex-direction:column;gap:12px}
  .ddr-blabel{display:flex;align-items:baseline;justify-content:space-between}
  .ddr-blabel .l{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--text-3);font-weight:600}
  .ddr-blabel .m{font-size:11px;color:var(--text-4)}

  /* ★ Copy Brief Studio — the showpiece */
  .cbs{position:relative;border-radius:16px;overflow:hidden;background:
      radial-gradient(120% 140% at 0% 0%, color-mix(in srgb,var(--gold) 9%,transparent) 0%, transparent 45%),
      radial-gradient(120% 140% at 100% 0%, color-mix(in srgb,var(--blue) 8%,transparent) 0%, transparent 42%),
      linear-gradient(180deg, color-mix(in srgb,var(--gold) 4%,var(--panel-2)) 0%, var(--panel) 70%);
    border:1px solid color-mix(in srgb,var(--gold) 22%,var(--border-2));
    box-shadow:0 0 0 1px color-mix(in srgb,var(--gold) 6%,transparent), 0 18px 50px -28px color-mix(in srgb,var(--gold) 40%,transparent);
    transition:box-shadow .4s ease,border-color .4s ease}
  .cbs.open{border-color:color-mix(in srgb,var(--gold) 38%,var(--border-2));box-shadow:0 0 0 1px color-mix(in srgb,var(--gold) 12%,transparent), 0 26px 70px -30px color-mix(in srgb,var(--gold) 55%,transparent)}
  .cbs::before{content:"";position:absolute;inset:-1px;border-radius:16px;padding:1px;background:conic-gradient(from 0deg, transparent 0deg, color-mix(in srgb,var(--gold) 60%,transparent) 70deg, transparent 150deg, color-mix(in srgb,var(--blue) 50%,transparent) 250deg, transparent 330deg);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .5s ease;animation:cbs-spin 9s linear infinite;pointer-events:none}
  .cbs.open::before{opacity:.7}
  @keyframes cbs-spin{to{transform:rotate(360deg)}}
  .cbs-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;opacity:.0;transition:opacity .6s ease}
  .cbs.open .cbs-stars{opacity:1}
  .cbs-star{position:absolute;border-radius:50%;background:radial-gradient(circle, var(--gold) 0%, transparent 70%);box-shadow:0 0 6px color-mix(in srgb,var(--gold) 80%,transparent);animation:cbs-twinkle linear infinite, cbs-float ease-in-out infinite;will-change:opacity,transform}
  @keyframes cbs-twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
  @keyframes cbs-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .cbs-trigger{position:relative;z-index:2;width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;background:transparent;border:0;cursor:pointer;text-align:left;font:inherit;color:var(--text)}
  .cbs-orb{position:relative;flex-shrink:0;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--gold) 90%,#fff) 0%, var(--gold) 45%, color-mix(in srgb,var(--gold) 40%,#000) 100%);box-shadow:0 0 18px color-mix(in srgb,var(--gold) 70%,transparent),0 0 40px color-mix(in srgb,var(--gold) 30%,transparent);animation:cbs-pulse 2.6s ease-in-out infinite}
  @keyframes cbs-pulse{0%,100%{box-shadow:0 0 16px color-mix(in srgb,var(--gold) 60%,transparent),0 0 34px color-mix(in srgb,var(--gold) 22%,transparent)}50%{box-shadow:0 0 26px color-mix(in srgb,var(--gold) 90%,transparent),0 0 58px color-mix(in srgb,var(--gold) 45%,transparent)}}
  .cbs-orb-core{font-size:18px;color:#1a1407;line-height:1;animation:cbs-spin 6s linear infinite;text-shadow:0 1px 1px rgba(255,255,255,.4)}
  .cbs-trig-txt{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .cbs-trig-txt .t{font-size:14px;font-weight:700;letter-spacing:-.01em;background:linear-gradient(90deg,var(--gold),color-mix(in srgb,var(--gold) 55%,#fff));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .cbs-trig-txt .s{font-size:11.5px;color:var(--text-3);line-height:1.35}
  .cbs-chev{flex-shrink:0;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent);border:1px solid color-mix(in srgb,var(--gold) 30%,var(--border-2));border-radius:999px;padding:6px 12px;white-space:nowrap;transition:background .2s ease}
  .cbs-trigger:hover .cbs-chev{background:color-mix(in srgb,var(--gold) 20%,transparent)}

  .cbs-body{position:relative;z-index:2;padding:0 18px 18px;display:flex;flex-direction:column;gap:14px;animation:cbs-reveal .45s cubic-bezier(.2,.7,.3,1)}
  @keyframes cbs-reveal{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .cbs-controls{display:flex;flex-wrap:wrap;gap:16px;padding-top:4px}
  .cbs-seg-group{display:flex;flex-direction:column;gap:6px}
  .cbs-seg-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-4);font-weight:700}
  .cbs-seg{display:inline-flex;gap:3px;padding:3px;border-radius:10px;background:color-mix(in srgb,var(--bg) 60%,var(--panel-2));border:1px solid var(--border)}
  .cbs-seg-b{font:inherit;font-size:11.5px;font-weight:600;color:var(--text-3);background:transparent;border:0;border-radius:7px;padding:6px 12px;cursor:pointer;transition:color .18s ease,background .18s ease,box-shadow .18s ease;white-space:nowrap}
  .cbs-seg-b:hover{color:var(--text)}
  .cbs-seg-b.on{color:#1a1407;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 92%,#fff),var(--gold));box-shadow:0 2px 12px -3px color-mix(in srgb,var(--gold) 80%,transparent)}
  .cbs-stylenote{font-size:11.5px;color:var(--text-3);font-style:italic;margin-top:-4px}

  .cbs-preview{display:flex;flex-direction:column;gap:14px;max-height:560px;overflow-y:auto;padding:14px;border-radius:12px;background:color-mix(in srgb,var(--bg) 55%,var(--panel));border:1px solid var(--border);scrollbar-width:thin}
  .cbs-rule{font-size:11.5px;line-height:1.45;color:var(--text-2);background:color-mix(in srgb,var(--gold) 8%,transparent);border:1px dashed color-mix(in srgb,var(--gold) 35%,var(--border-2));border-radius:10px;padding:10px 12px}
  .cbs-rule .k{display:block;font-weight:700;color:var(--gold);margin-bottom:2px;font-size:11px;letter-spacing:.02em}
  .cbs-offer{display:flex;flex-direction:column;gap:10px;padding:13px;border-radius:11px;background:var(--panel);border:1px solid var(--border)}
  .cbs-offer-h{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .cbs-offer-h .badge{font-size:10px;font-weight:800;letter-spacing:.08em;padding:5px 10px;border-radius:7px}
  .cbs-offer-h.free .badge{color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);border:1px solid color-mix(in srgb,var(--blue) 38%,var(--border-2))}
  .cbs-offer-h.paid .badge{color:var(--gold);background:color-mix(in srgb,var(--gold) 14%,transparent);border:1px solid color-mix(in srgb,var(--gold) 38%,var(--border-2))}
  .cbs-offer-h .meta{font-size:10.5px;color:var(--text-4);font-family:var(--mono)}
  .cbs-grp{display:flex;flex-direction:column;gap:7px}
  .cbs-grp-h{font-size:11px;font-weight:600;letter-spacing:.01em}
  .cbs-grp-h.win{color:var(--green)}
  .cbs-grp-h.lose{color:var(--red)}
  .cbs-grp-h b{font-family:var(--mono);font-weight:700}
  .cbs-quote{display:flex;gap:11px;align-items:stretch;padding:10px 12px;border-radius:10px;border:1px solid var(--border);position:relative;overflow:hidden}
  .cbs-quote.win{background:color-mix(in srgb,var(--green) 6%,var(--panel-2));border-color:color-mix(in srgb,var(--green) 26%,var(--border-2))}
  .cbs-quote.lose{background:color-mix(in srgb,var(--red) 5%,var(--panel-2));border-color:color-mix(in srgb,var(--red) 24%,var(--border-2))}
  .cbs-quote.win::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);box-shadow:0 0 12px var(--green)}
  .cbs-quote.lose::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);box-shadow:0 0 12px var(--red)}
  .cbs-q-roas{flex-shrink:0;align-self:center;font-family:var(--mono);font-size:16px;font-weight:800;min-width:48px;text-align:center}
  .cbs-q-roas.win{color:var(--green)}
  .cbs-q-roas.lose{color:var(--red)}
  .cbs-q-body{display:flex;flex-direction:column;gap:4px;min-width:0}
  .cbs-q-words{font-size:12.5px;line-height:1.4;color:var(--text);font-weight:500}
  .cbs-q-meta{font-size:10.5px;color:var(--text-4);font-family:var(--mono)}
  .cbs-dd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}
  @media(max-width:680px){.cbs-dd{grid-template-columns:1fr}}
  .cbs-dd-col{display:flex;flex-direction:column;gap:5px;padding:10px;border-radius:9px;background:color-mix(in srgb,var(--bg) 40%,var(--panel-2))}
  .cbs-dd-col .h{font-size:9.5px;font-weight:800;letter-spacing:.12em}
  .cbs-dd-col.do .h{color:var(--green)}
  .cbs-dd-col.dont .h{color:var(--red)}
  .cbs-dd-item{font-size:11.5px;line-height:1.4;color:var(--text-2);padding-left:13px;position:relative}
  .cbs-dd-col.do .cbs-dd-item::before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:700}
  .cbs-dd-col.dont .cbs-dd-item::before{content:"✕";position:absolute;left:0;color:var(--red);font-weight:700}
  .cbs-empty{font-size:12px;color:var(--text-4);text-align:center;padding:24px 12px}

  .cbs-actions{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .cbs-count{font-size:11px;color:var(--text-4);font-family:var(--mono)}
  .cbs-copy{position:relative;overflow:hidden;flex-shrink:0;font:inherit;font-size:13px;font-weight:700;letter-spacing:.01em;color:#1a1407;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 92%,#fff),var(--gold));border:0;border-radius:11px;padding:12px 22px;cursor:pointer;box-shadow:0 8px 24px -10px color-mix(in srgb,var(--gold) 90%,transparent);transition:transform .14s ease,box-shadow .25s ease}
  .cbs-copy:hover{transform:translateY(-2px);box-shadow:0 14px 32px -10px color-mix(in srgb,var(--gold) 95%,transparent)}
  .cbs-copy:active{transform:translateY(0)}
  .cbs-copy:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;transform:none}
  .cbs-copy.done{color:#fff;background:linear-gradient(180deg,color-mix(in srgb,var(--green) 85%,#fff),var(--green));box-shadow:0 10px 28px -10px color-mix(in srgb,var(--green) 85%,transparent)}
  .cbs-copy-lbl{position:relative;z-index:2}
  .cbs-copy-sheen{position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);animation:cbs-sheen 3.4s ease-in-out infinite;z-index:1}
  @keyframes cbs-sheen{0%{left:-60%}55%{left:140%}100%{left:140%}}
  .cbs-burst{position:absolute;left:50%;top:50%;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);background:transparent;box-shadow:0 0 0 0 color-mix(in srgb,var(--green) 70%,transparent);animation:cbs-burst .65s ease-out forwards;z-index:0}
  @keyframes cbs-burst{from{box-shadow:0 0 0 0 color-mix(in srgb,var(--green) 60%,transparent)}to{box-shadow:0 0 0 60px transparent}}

  /* Spend concentration bars */
  .ddr-spend{display:flex;flex-direction:column;gap:9px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 17px}
  .ddr-srow{display:grid;grid-template-columns:96px 1fr 128px;align-items:center;gap:12px}
  .ddr-skw{font-size:12px;font-weight:600;text-transform:capitalize;letter-spacing:.01em}
  .ddr-sbar-track{height:9px;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .ddr-sbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
  .ddr-sval{font-size:11.5px;color:var(--text-2);text-align:right;font-variant-numeric:tabular-nums}
  .ddr-sval b{color:var(--text);font-weight:650}
  .ddr-sval .pc{color:var(--text-4)}

  /* Booking-rate table */
  .ddr-tbl{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .ddr-tbl th{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);font-weight:600;text-align:right;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--panel-2)}
  .ddr-tbl th:first-child{text-align:left}
  .ddr-tbl td{font-size:12.5px;padding:12px 14px;text-align:right;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;color:var(--text-2)}
  .ddr-tbl tr:last-child td{border-bottom:none}
  .ddr-tbl td:first-child{text-align:left}
  .ddr-tbl tbody tr:hover{background:var(--panel-2)}
  .ddr-kw{font-weight:600;text-transform:capitalize;color:var(--text);letter-spacing:.01em}
  .ddr-rate{font-weight:680}
  .ddr-verdict{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
  .ddr-verdict .vd{width:6px;height:6px;border-radius:99px}
  .v-scale{background:rgba(125,211,168,.13);color:var(--green)} .v-scale .vd{background:var(--green)}
  .v-ok{background:var(--panel-2);color:var(--text-2)} .v-ok .vd{background:var(--green-dim)}
  .v-weak{background:rgba(232,154,148,.10);color:var(--red-dim)} .v-weak .vd{background:var(--red-dim)}
  .v-kill{background:rgba(232,154,148,.15);color:var(--red)} .v-kill .vd{background:var(--red)}
  .v-low{background:rgba(212,178,122,.12);color:var(--gold)} .v-low .vd{background:var(--gold)}

  /* Cheap-leads callout */
  .ddr-call{background:linear-gradient(180deg,rgba(232,154,148,.07),transparent),var(--panel);border:1px solid var(--red-dim);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:9px}
  .ddr-call .ct{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--red);font-weight:700}
  .ddr-call .ch{font-size:16px;font-weight:640;letter-spacing:-.01em;line-height:1.4}
  .ddr-call .ch b{color:var(--red)}
  .ddr-call .cp{font-size:12.5px;color:var(--text-3);line-height:1.55}
  .ddr-call .cp b{color:var(--text-2)}

  /* "Do This Next" playbook — built so a third grader could run it */
  .ddr-play{display:flex;flex-direction:column;gap:13px;background:linear-gradient(180deg,rgba(212,178,122,.06),transparent),var(--panel);border:1px solid var(--gold-dim);border-radius:16px;padding:20px 20px 22px}
  .ddr-play-top{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
  .ddr-play-k{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);font-weight:700}
  .ddr-play-h{font-size:18px;font-weight:660;letter-spacing:-.01em;line-height:1.35}
  .ddr-play-h b{color:var(--gold)}
  .ddr-pcard{position:relative;display:grid;grid-template-columns:46px 1fr auto;gap:16px;align-items:center;
    padding:15px 18px 15px 17px;border-radius:14px;border:1px solid var(--border);background:var(--panel-2);overflow:hidden;
    transition:border-color .25s,box-shadow .3s,transform .18s,background .25s}
  .ddr-pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border-2);transition:background .25s}
  .ddr-pcard.scale::before{background:linear-gradient(180deg,var(--green),color-mix(in srgb,var(--green) 35%,transparent))}
  .ddr-pcard.kill::before{background:linear-gradient(180deg,var(--red),color-mix(in srgb,var(--red) 35%,transparent))}
  .ddr-pcard.scale{background:linear-gradient(100deg,color-mix(in srgb,var(--green) 6%,var(--panel-2)),var(--panel-2) 58%)}
  .ddr-pcard.kill{background:linear-gradient(100deg,color-mix(in srgb,var(--red) 6%,var(--panel-2)),var(--panel-2) 58%)}
  .ddr-pcard:hover{transform:translateY(-1px)}
  .ddr-pcard.scale:hover{border-color:var(--green-dim);box-shadow:0 12px 32px -20px color-mix(in srgb,var(--green) 75%,transparent)}
  .ddr-pcard.kill:hover{border-color:var(--red-dim);box-shadow:0 12px 32px -20px color-mix(in srgb,var(--red) 75%,transparent)}
  .ddr-pnum{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;align-self:start;margin-top:1px;
    font-family:var(--mono);font-size:12.5px;font-weight:600;background:color-mix(in srgb,var(--panel) 65%,transparent);border:1px solid var(--border);color:var(--text-4)}
  .ddr-pcard.kill .ddr-pnum{color:color-mix(in srgb,var(--red) 78%,var(--text-3));border-color:color-mix(in srgb,var(--red) 24%,var(--border))}
  .ddr-pcard.scale .ddr-pnum{color:color-mix(in srgb,var(--green) 78%,var(--text-3));border-color:color-mix(in srgb,var(--green) 24%,var(--border))}
  .ddr-pmid{display:flex;flex-direction:column;gap:6px;min-width:0}
  .ddr-pmove{font-size:15px;font-weight:680;letter-spacing:-.01em;line-height:1.25}
  .ddr-pmove .verb{text-transform:uppercase;letter-spacing:.04em;font-size:13px}
  .ddr-pcard.kill .ddr-pmove .verb{color:var(--red)}
  .ddr-pcard.scale .ddr-pmove .verb{color:var(--green)}
  .ddr-pmove .word{text-transform:capitalize}
  .ddr-pwhy{font-size:12px;color:var(--text-3);line-height:1.4}
  .ddr-pwhy b{color:var(--text-2);font-weight:650;font-variant-numeric:tabular-nums}
  .ddr-pwhy .ar{color:var(--text-4);font-weight:500;margin:0 1px}
  .ddr-pcard.scale .ddr-pwhy .ar{color:color-mix(in srgb,var(--green) 60%,var(--text-4))}
  .ddr-pcard.kill .ddr-pwhy .ar{color:color-mix(in srgb,var(--red) 55%,var(--text-4))}
  .ddr-pconf{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-4);letter-spacing:.01em}
  .ddr-pconf .dot{width:7px;height:7px;border-radius:99px;flex-shrink:0}
  .ddr-pconf .sep{opacity:.45;margin:0 1px}
  .ddr-pconf.hi b{color:var(--green)} .ddr-pconf.hi .dot{background:var(--green);box-shadow:0 0 7px -1px var(--green)}
  .ddr-pconf.md b{color:var(--gold)} .ddr-pconf.md .dot{background:var(--gold)}
  .ddr-pconf.lo b{color:var(--text-3)} .ddr-pconf.lo .dot{background:transparent;border:1px dashed var(--text-4)}
  .ddr-pbar{height:4px;border-radius:99px;background:color-mix(in srgb,var(--text) 6%,transparent);overflow:hidden;margin-top:2px;max-width:340px}
  .ddr-pbar span{display:block;height:100%;border-radius:99px;transition:width .55s cubic-bezier(.16,1,.3,1)}
  .ddr-pcard.scale .ddr-pbar span{background:linear-gradient(90deg,color-mix(in srgb,var(--green) 50%,transparent),var(--green))}
  .ddr-pcard.kill .ddr-pbar span{background:linear-gradient(90deg,color-mix(in srgb,var(--red) 50%,transparent),var(--red))}
  /* Real ad creative as the card's left tile — number badge overlaid. This is
     the at-a-glance "this is a real Facebook ad" proof. */
  .ddr-pthumb{position:relative;width:46px;height:46px;border-radius:11px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--panel);box-shadow:0 4px 14px -8px rgba(0,0,0,.7)}
  .ddr-pthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .ddr-pbadge{position:absolute;left:3px;top:3px;min-width:17px;height:17px;padding:0 4px;border-radius:6px;background:rgba(0,0,0,.72);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .ddr-pcard.scale .ddr-pthumb{border-color:color-mix(in srgb,var(--green) 30%,var(--border))}
  .ddr-pcard.kill .ddr-pthumb{border-color:color-mix(in srgb,var(--red) 30%,var(--border))}
  /* Hover-to-enlarge wrappers around the creative tiles */
  .ddr-pthumb-wrap{display:inline-flex;align-self:start;line-height:0}
  .ddr-padimg-wrap{display:inline-flex;flex-shrink:0;line-height:0}
  .ddr-pthumb-wrap.live,.ddr-padimg-wrap.live{cursor:zoom-in}
  .ddr-pthumb-wrap.live .ddr-pthumb,.ddr-padimg-wrap.live .ddr-padimg{transition:transform .12s ease,box-shadow .12s ease}
  .ddr-pthumb-wrap.live:hover .ddr-pthumb{transform:scale(1.06);box-shadow:0 6px 18px -7px rgba(0,0,0,.8)}
  .ddr-padimg-wrap.live:hover .ddr-padimg{transform:scale(1.05);border-color:color-mix(in srgb,var(--gold) 40%,var(--border-2))}
  /* Expanded: every real ad behind the word, with creative + the read copy */
  .ddr-pads{margin-top:12px}
  .ddr-pads .lab{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-4);margin-bottom:8px}
  .ddr-padlist{display:flex;flex-direction:column;gap:9px}
  .ddr-paditem{display:flex;gap:11px;align-items:flex-start;padding:9px;border-radius:11px;background:var(--panel);border:1px solid var(--border)}
  .ddr-padimg{width:64px;height:64px;border-radius:9px;object-fit:cover;flex-shrink:0;border:1px solid var(--border-2);background:var(--panel-2)}
  .ddr-padimg.noimg{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-4);text-align:center;line-height:1.3}
  .ddr-padmeta{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px}
  .ddr-padmeta b{font-size:13px;color:var(--text);letter-spacing:-.01em;line-height:1.25}
  .ddr-padmeta .acct{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
  .ddr-padcopy{font-size:12px;color:var(--text-2);line-height:1.45;margin-top:2px;font-style:italic}
  .ddr-padcopy.none{color:var(--text-4);font-style:normal}
  .ddr-pimpact{text-align:right;white-space:nowrap;padding-left:8px;align-self:center}
  .ddr-pimpact .big{font-family:var(--mono);font-size:23px;font-weight:550;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
  .ddr-pcard.kill .ddr-pimpact .big{color:var(--red)} .ddr-pcard.scale .ddr-pimpact .big{color:var(--green)}
  .ddr-pimpact .cap{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);margin-top:4px}
  .ddr-play-foot{font-size:12px;color:var(--text-3);line-height:1.55;padding-top:4px;border-top:1px dashed var(--border);margin-top:3px;padding-top:13px}
  .ddr-play-foot b{color:var(--text)}
  .ddr-play-clean{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--text-2);padding:6px 2px}
  .ddr-play-clean .ic{width:30px;height:30px;border-radius:99px;background:rgba(125,211,168,.13);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .ddr-play-note{display:flex;align-items:flex-start;gap:11px;font-size:12.5px;line-height:1.6;color:var(--text-3);padding:11px 13px;margin-top:10px;background:color-mix(in srgb,var(--panel-2) 60%,transparent);border:1px dashed var(--border-2);border-radius:12px}
  .ddr-play-note .ic{width:26px;height:26px;border-radius:99px;background:color-mix(in srgb,var(--gold) 14%,transparent);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px}
  .ddr-play-note b{color:var(--text-2)}
  .ddr-play-note i{font-style:italic;color:var(--text-2)}
  /* ── Profit scale table (minimal, monochrome) ── */
  .ps{margin:14px 0 20px;padding:24px 24px 20px}
  .ps-top{margin-bottom:18px}
  .ps-h{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin:0 0 6px}
  .ps-sub{font-size:13px;color:var(--text-3);margin:0;line-height:1.55;max-width:680px}
  .ps-ctl{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:20px}
  .ps-ctl-l{font-size:12.5px;color:var(--text-4);margin-right:3px}
  .ps-chip{font-size:12.5px;font-weight:500;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .12s}
  .ps-chip:hover{border-color:var(--border-2);color:var(--text-2)}
  .ps-chip.on{border-color:var(--text-3);color:var(--text);background:var(--bg-1)}
  .ddr-pager{display:inline-flex;align-items:center;gap:4px;width:fit-content;margin:0 0 16px;padding:3px;border:1px solid var(--border);border-radius:99px;background:var(--panel-2)}
  .ddr-pager-arrow{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:99px;border:none;background:transparent;color:var(--text-4);font-size:13px;line-height:1;cursor:pointer;transition:color .12s}
  .ddr-pager-arrow:hover{color:var(--text)}
  .ddr-pager-mid{display:flex;flex-direction:row;align-items:baseline;gap:6px;padding:0 4px}
  .ddr-pager-name{font-size:13px;font-weight:600;color:var(--text)}
  .ddr-pager-count{font-size:11px;color:var(--text-4);font-variant-numeric:tabular-nums}
  .ps-tablewrap{overflow-x:auto}
  .ps-table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  .ps-table th{font-size:11px;font-weight:500;color:var(--text-4);text-align:right;padding:0 0 13px;border-bottom:1px solid var(--border);white-space:nowrap}
  .ps-table th:first-child{text-align:left}
  .ps-table th:not(:first-child),.ps-table td:not(:first-child){padding-left:24px}
  .ps-table td{font-size:14px;color:var(--text-3);text-align:right;padding:16px 0;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);white-space:nowrap}
  .ps-table tr:last-child td{border-bottom:none}
  .ps-table td.rev{text-align:left;font-weight:600;color:var(--text);font-size:15px}
  .ps-table td.mut{color:var(--text-4)}
  .ps-table td.hero{color:var(--text);font-weight:650;font-size:16px}
  .ps-table tr.now td{color:var(--text-2)}
  .ps-table tr.now td.rev,.ps-table tr.now td.hero{color:var(--gold)}
  .ps-here{display:inline-block;margin-left:10px;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;vertical-align:middle}
  .ps-foot{margin-top:18px;font-size:13px;color:var(--text-3);font-variant-numeric:tabular-nums}
  .ps-foot b{color:var(--text);font-weight:650}
  .ps-clients{margin-top:26px;padding-top:22px;border-top:1px solid var(--border)}
  .ps-cl-h{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px}
  .ps-cl-tab{display:flex;flex-direction:column;overflow-x:auto}

  /* Where every dollar came from — three honest buckets (ad / organic / unknown) */

  /* ---- Trend explorer (pick a metric + split by any dimension) ---- */
  .tx{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px 18px}

    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a8a8a' stroke-width='1.3' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 11px center}

  /* ---- Collapsible table card + wide modal ---- */
  .tcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px 17px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .12s,transform .08s}

  .mi-side .strip .s{display:flex;flex-direction:column;gap:1px}
  .mi-side .strip .s .v{font-size:13px;font-weight:650;color:var(--text);font-variant-numeric:tabular-nums}
  .mi-side .strip .s .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-4);font-weight:600}

  /* Explore — the depth layer, opens on demand */
  .mi-explore{border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden}
  .mi-exhead{display:flex;align-items:center;gap:12px;width:100%;padding:13px 15px;text-align:left;transition:background .12s}
  .mi-exhead:hover{background:var(--row-hover)}
  .mi-exhead .t{flex:1}
  .mi-exhead .t .h{font-size:13px;font-weight:620;color:var(--text)}
  .mi-exhead .t .s{font-size:11px;color:var(--text-4);margin-top:2px;font-variant-numeric:tabular-nums}
  .mi-exhead .chev{color:var(--text-3);font-size:11px;transition:transform .18s}
  .mi-explore.open .mi-exhead .chev{transform:rotate(90deg);color:var(--gold)}
  .mi-sort{display:flex;gap:5px;padding:0 15px 12px}
  .mi-sort .sb{font-size:10.5px;color:var(--text-3);padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--panel-2);transition:all .12s}
  .mi-sort .sb:hover{color:var(--text-2);border-color:var(--border-2)}
  .mi-sort .sb.on{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,transparent);background:color-mix(in srgb,var(--gold) 10%,transparent)}
  .mi-cards{display:flex;flex-direction:column}
  .mi-c{display:grid;grid-template-columns:1fr 188px;gap:16px;align-items:center;padding:13px 15px;border-top:1px solid var(--border);animation:mi-rise .32s both}
  @keyframes mi-rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .mi-c.dim{opacity:.55}
  .mi-c-words{font-size:13px;line-height:1.5;color:var(--text-1,var(--text))}
  .mi-c-words .nm{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:700;margin-bottom:4px}
  .mi-c-right{display:flex;flex-direction:column;gap:7px}
  .mi-roasrow{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .mi-roasrow .rv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;letter-spacing:-0.01em}
  .mi-roasrow .rv.good{color:var(--green)} .mi-roasrow .rv.bad{color:var(--red)} .mi-roasrow .rv.mid{color:var(--gold)} .mi-roasrow .rv.na{color:var(--text-4)}
  .mi-roasrow .rl{font-size:8.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600}
  /* ROAS bar with a breakeven (1×) marker — instant money-or-not read */
  .mi-bar{position:relative;height:7px;border-radius:99px;background:var(--panel-2);border:1px solid var(--border);overflow:visible}
  .mi-bar .fill{position:absolute;top:0;left:0;bottom:0;border-radius:99px;transition:width .5s cubic-bezier(.3,.9,.3,1)}
  .mi-bar .fill.good{background:linear-gradient(90deg,var(--green-dim),var(--green))}
  .mi-bar .fill.bad{background:linear-gradient(90deg,var(--red-dim),var(--red))}
  .mi-bar .be{position:absolute;top:-3px;bottom:-3px;width:1.5px;background:var(--text-3);opacity:.8}
  .mi-bar .be:after{content:"1×";position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:7.5px;color:var(--text-4);font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
  .mi-c-meta{display:flex;gap:13px}
  .mi-c-meta .s{display:flex;flex-direction:column;gap:0}
  .mi-c-meta .s .v{font-size:11.5px;font-weight:620;color:var(--text-2);font-variant-numeric:tabular-nums}
  .mi-c-meta .s .l{font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-4);font-weight:600}
  .mi-c-early{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--text-4);border:1px solid var(--border);border-radius:99px;padding:2px 8px;align-self:flex-start}
  @media(max-width:680px){.mi-c{grid-template-columns:1fr}}
  .mi-quiet{padding:11px 15px;border-top:1px solid var(--border);font-size:11px;color:var(--text-4)}
  .mi-loading{display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:11px;background:var(--bg-2,var(--panel-2));border:1px solid var(--border);color:var(--text-3);font-size:12.5px;line-height:1.5}

  /* ---- Decision Center: balanced scale/kill + reallocation hero ---- */
  .ddr-realloc{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:12px 0 4px;padding:14px 16px;border-radius:12px;border:1px solid color-mix(in srgb,var(--gold) 30%,var(--border-2));background:radial-gradient(130% 170% at 0% 0%,color-mix(in srgb,var(--gold) 10%,var(--panel)),var(--panel) 62%)}
  .ddr-realloc .rl-main{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
  .ddr-realloc .rl-amt{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;color:var(--red);letter-spacing:-0.02em;line-height:1}
  .ddr-realloc .rl-cap{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600}
  .ddr-realloc .rl-arrow{font-size:18px;color:var(--text-3);flex-shrink:0}
  .ddr-realloc .rl-to{flex:1;min-width:240px;font-size:12.5px;line-height:1.5;color:var(--text-2)}
  .ddr-realloc .rl-to b{color:var(--text)}
  .ddr-pgroup{margin-top:14px}
  .ddr-pgh{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-left:2px}
  .ddr-pgh .ar{font-size:12px}
  .ddr-pgh.scale{color:var(--green)} .ddr-pgh.kill{color:var(--red)}

  /* "I did this" — the close-the-loop confirm inside a playbook card */
  .ddr-pdid{margin-top:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;font:inherit;font-size:12.5px;font-weight:650;letter-spacing:.01em;padding:11px 14px;border-radius:10px;cursor:pointer;transition:transform .12s ease,box-shadow .2s ease,background .18s ease;border:1px solid}
  .ddr-pdid .ic{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;font-size:11px;font-weight:800}
  .ddr-pdid.kill{color:var(--red);background:color-mix(in srgb,var(--red) 9%,var(--panel));border-color:color-mix(in srgb,var(--red) 34%,var(--border-2))}
  .ddr-pdid.kill .ic{background:color-mix(in srgb,var(--red) 18%,transparent)}
  .ddr-pdid.scale{color:var(--green);background:color-mix(in srgb,var(--green) 9%,var(--panel));border-color:color-mix(in srgb,var(--green) 34%,var(--border-2))}
  .ddr-pdid.scale .ic{background:color-mix(in srgb,var(--green) 18%,transparent)}
  .ddr-pdid:hover{transform:translateY(-1px);box-shadow:0 8px 22px -12px currentColor}
  .ddr-pdid:active{transform:translateY(0)}
  /* ── Minimal monochrome action board: color reserved, secondary hidden ── */
  .ddr-play-h b{color:var(--text)!important}
  .ddr-realloc{background:var(--panel)!important;border-color:var(--border)!important}
  .ddr-realloc .rl-amt{color:var(--text)!important;font-weight:600!important}
  .ddr-pgh.scale,.ddr-pgh.kill{color:var(--text-4)!important}
  .ddr-pcard.scale,.ddr-pcard.kill{background:var(--panel-2)!important}
  .ddr-pcard.scale::before{background:var(--border-2)!important}
  .ddr-pcard.kill::before{background:var(--text-4)!important}
  .ddr-pcard.scale:hover,.ddr-pcard.kill:hover{border-color:var(--border-2)!important;box-shadow:none!important;transform:none!important}
  .ddr-pcard.scale .ddr-pnum,.ddr-pcard.kill .ddr-pnum{color:var(--text-3)!important;border-color:var(--border)!important}
  .ddr-pcard.scale .ddr-pmove .verb,.ddr-pcard.kill .ddr-pmove .verb{color:var(--text-3)!important}
  .ddr-pcard.scale .ddr-pwhy .ar,.ddr-pcard.kill .ddr-pwhy .ar{color:var(--text-4)!important}
  .ddr-pcard.scale .ddr-pthumb,.ddr-pcard.kill .ddr-pthumb{border-color:var(--border)!important}
  .ddr-pcard.kill .ddr-pimpact .big,.ddr-pcard.scale .ddr-pimpact .big{color:var(--text)!important}
  .ddr-pconf .dot{display:none!important}
  .ddr-pconf.hi b,.ddr-pconf.md b,.ddr-pconf.lo b{color:var(--text-3)!important}
  .ddr-pbar{display:none!important}
  .ddr-pcard.scale .ddr-pdo,.ddr-pcard.kill .ddr-pdo{border-left-color:var(--border-2)!important}
  .ddr-pdid.kill,.ddr-pdid.scale{color:var(--text-2)!important;background:var(--panel-2)!important;border-color:var(--border)!important}
  .ddr-pdid.kill .ic,.ddr-pdid.scale .ic{background:var(--bg-2)!important}
  .ddr-pdid:hover{box-shadow:none!important;border-color:var(--border-2)!important}
  .ddr-play{background:var(--panel)!important;border-color:var(--border)!important}
  .ddr-pcard::before{display:none!important}
  .ddr-pword{font-size:16px;font-weight:650;color:var(--text);text-transform:capitalize;line-height:1.2}
  .ddr-psub{font-size:12.5px;color:var(--text-4);margin-top:4px;font-variant-numeric:tabular-nums}
  .ddr-pchev{font-size:15px;color:var(--text-4);text-align:center;margin-top:3px}
  .ddr-pimpact .big{font-size:20px!important}
  .ddr-pgh.scale,.ddr-pgh.kill{font-size:11px;letter-spacing:.1em;margin-bottom:0!important}
  .ddr-pgroup{display:flex!important;flex-direction:column;gap:8px;margin-top:18px!important}
  /* Expanded decision card — editorial-financial hierarchy */
  @keyframes pm-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .ddr-pmore{grid-column:1/-1!important;display:flex!important;flex-direction:column;gap:24px;margin-top:18px;padding-top:20px;border-top:1px solid var(--border)}
  .ddr-pmore>*{animation:pm-in .34s cubic-bezier(.2,.8,.2,1) both}
  .ddr-pmore>*:nth-child(2){animation-delay:.05s}
  .ddr-pmore>*:nth-child(3){animation-delay:.10s}
  .ddr-pmore>*:nth-child(4){animation-delay:.13s}
  .ddr-pmore>*:nth-child(5){animation-delay:.16s}
  .ddr-pmore>*:nth-child(6){animation-delay:.19s}
  /* 1 — verdict (the lead) */
  .pm-call{display:flex;flex-direction:column;gap:5px}
  .pm-act{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.012em;line-height:1.25}
  .pm-rsn{font-size:13px;color:var(--text-3);line-height:1.5}
  /* 2 — money flow (endpoints lead, path recedes) */
  .pm-flow{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .pm-end{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
  .pm-end-v{font-size:27px;font-weight:600;letter-spacing:-.025em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
  .pm-end.out{margin-left:auto;text-align:right}
  .pm-end.out.win .pm-end-v{color:var(--gold)}
  .pm-end-l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4)}
  .pm-path{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-size:13px;color:var(--text-4)}
  .pm-path b{color:var(--text-2);font-weight:600;font-variant-numeric:tabular-nums}
  .pm-path .d{opacity:.4}
  .pm-path .z{opacity:.4}
  /* 3 — ad proof */
  .pm-ad{display:flex;gap:16px;align-items:flex-start}
  .pm-ad .ddr-padimg-wrap{flex-shrink:0}
  .pm-copy{margin:0;font-size:13px;line-height:1.6;color:var(--text-3);font-style:italic;max-width:64ch}
  /* divider */
  .pm-rule{height:1px;background:var(--border)}
  /* 4 — fine print (recedes) */
  .pm-fine{display:flex;flex-direction:column;gap:10px}
  .pm-costs,.pm-where{display:flex;flex-wrap:wrap;gap:7px 24px;font-size:12.5px;color:var(--text-3);font-variant-numeric:tabular-nums}
  .pm-costs i,.pm-where i{font-style:normal;color:var(--text-4);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;margin-right:7px}

  /* ---- Decision tracker: every logged move, traced to a real result ---- */
  .ddt{display:flex;flex-direction:column;gap:12px;padding:16px;border-radius:14px;border:1px solid color-mix(in srgb,var(--gold) 16%,var(--border));background:radial-gradient(120% 150% at 100% 0%,color-mix(in srgb,var(--gold) 6%,var(--panel)),var(--panel) 60%)}
  .ddt-head{display:flex;flex-direction:column;gap:3px}
  .ddt-k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold)}
  .ddt-h{font-size:12.5px;line-height:1.45;color:var(--text-3)}
  .ddt-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px}
  .ddt-card{display:flex;flex-direction:column;gap:9px;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--panel)}
  .ddt-card.kill{border-left:3px solid var(--red)} .ddt-card.scale{border-left:3px solid var(--green)}
  .ddt-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ddt-badge{font-size:9px;font-weight:800;letter-spacing:.08em;padding:3px 7px;border-radius:6px}
  .ddt-badge.kill{color:var(--red);background:color-mix(in srgb,var(--red) 14%,transparent)}
  .ddt-badge.scale{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent)}
  .ddt-word{font-size:14px;font-weight:680;color:var(--text);letter-spacing:-.01em}
  .ddt-when{font-size:10.5px;color:var(--text-4)}
  .ddt-undo{margin-left:auto;font:inherit;font-size:10.5px;color:var(--text-4);background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;transition:color .15s,border-color .15s}
  .ddt-undo:hover{color:var(--text-2);border-color:var(--border-2)}
  .ddt-base{font-size:11px;color:var(--text-4);font-family:var(--mono)}
  .ddt-base b{color:var(--text-2)}
  .ddt-result{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:10px;border:1px solid var(--border-2);background:color-mix(in srgb,var(--bg) 40%,var(--panel-2))}
  .ddt-dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:5px}
  .ddt-verdict{font-size:12.5px;line-height:1.45;font-weight:600}
  .ddt-spark{display:flex;align-items:center;gap:10px}
  .ddt-spark .spark{display:block}
  .ddt-sparklbl{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.05em}

  /* ---- Funnel scoreboard: every metric, sparkline, meaning, click-to-trend ---- */
  .fs{display:flex;flex-direction:column;gap:16px}
  .fs-stage-h{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:9px}
  .fs-stage-h .dot{width:7px;height:7px;border-radius:50%}
  .fs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:9px}
  .fs-tile{display:flex;flex-direction:column;gap:5px;padding:12px 13px 11px;border:1px solid var(--border);border-radius:11px;background:var(--panel);text-align:left;transition:border-color .14s,transform .12s,box-shadow .16s}
  .fs-tile:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.22)}
  .fs-tile.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .fs-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .fs-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:600;line-height:1.3}
  .fs-chip{font-size:9px;font-weight:700;white-space:nowrap;padding:2px 5px;border-radius:5px;font-variant-numeric:tabular-nums}
  .fs-chip.good{color:var(--green);background:color-mix(in srgb,var(--green) 13%,transparent)}
  .fs-chip.bad{color:var(--red);background:color-mix(in srgb,var(--red) 13%,transparent)}
  .fs-chip.neutral,.fs-chip.flat{color:var(--text-4);background:var(--panel-2)}
  .fs-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;letter-spacing:-0.02em;color:var(--text)}
  .fs-tile .spark{display:block;width:100%;height:28px}
  .fs-explain{font-size:10.5px;line-height:1.4;color:var(--text-4)}
  .fs-expand{margin-top:6px;border:1px solid var(--gold-dim);border-radius:12px;background:var(--panel);padding:14px 16px;animation:mi-rise .3s both}
  .fs-expand-h{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .fs-expand-h .t{font-size:14px;font-weight:650;color:var(--text)}
  .fs-expand-h .m{flex:1;font-size:11px;color:var(--text-4)}
  .fs-close{font-size:12px;color:var(--text-3);padding:2px 8px;border-radius:6px;border:1px solid var(--border)}
  .fs-close:hover{color:var(--text);border-color:var(--border-2)}

  /* ---- Winners & money pits: cards that open a proving trend graph ---- */
  .wp{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:760px){.wp{grid-template-columns:1fr}}
  .wp-col{display:flex;flex-direction:column;gap:8px}
  .wp-colh{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .wp-colh.win{color:var(--green)} .wp-colh.lose{color:var(--red)}
  .wp-none{font-size:11.5px;color:var(--text-4);padding:10px 12px;border:1px dashed var(--border);border-radius:10px}
  .pt-card{border:1px solid var(--border);border-radius:11px;background:var(--panel);overflow:hidden;transition:border-color .14s}
  .pt-card.win:hover,.pt-card.win.open{border-color:color-mix(in srgb,var(--green) 40%,transparent)}
  .pt-card.lose:hover,.pt-card.lose.open{border-color:color-mix(in srgb,var(--red) 40%,transparent)}
  .pt-head{display:grid;grid-template-columns:1fr auto;grid-template-areas:"word roas" "mini mini" "chev chev";gap:6px 10px;width:100%;padding:11px 13px;text-align:left}
  .pt-word{grid-area:word;font-size:13.5px;font-weight:620;color:var(--text);align-self:center}
  .pt-roas{grid-area:roas;font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500;align-self:center}
  .pt-roas.win{color:var(--green)} .pt-roas.lose{color:var(--red)}
  .pt-mini{grid-area:mini;display:flex;gap:14px}
  .pt-mini .s{font-size:11px;color:var(--text-4)} .pt-mini .s b{color:var(--text-2);font-variant-numeric:tabular-nums}
  .pt-chev{grid-area:chev;font-size:10.5px;color:var(--text-3);font-weight:600}
  .pt-card:hover .pt-chev{color:var(--gold)}
  .pt-body{padding:0 13px 13px;border-top:1px solid var(--border);animation:mi-rise .3s both}
  .pt-proof{font-size:11.5px;line-height:1.5;color:var(--text-3);padding:11px 0 4px}
  .pt-where{font-size:10.5px;color:var(--text-4);margin-top:8px}
  .pt-where .lab{text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-right:6px}
  .pt-where b{color:var(--text-2)}

  /* ---- Correlations: what drives the money ---- */
  .corr{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  @media(max-width:760px){.corr{grid-template-columns:1fr}}
  .corr-list{display:flex;flex-direction:column;gap:8px}
  .corr-row{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;
    width:100%;text-align:left;font:inherit;cursor:pointer;
    background:transparent;border:1px solid transparent;border-radius:9px;padding:8px 10px;
    transition:background .15s,border-color .15s,transform .1s}
  .corr-row:hover{background:var(--row-hover);border-color:var(--border)}
  .corr-row.on{background:color-mix(in srgb,var(--gold) 9%,transparent);border-color:var(--gold-dim)}
  .corr-row.on .corr-txt b{color:var(--gold)}
  .corr-row:active{transform:scale(.99)}
  .corr-bar{height:7px;border-radius:99px;background:var(--panel-2);border:1px solid var(--border);overflow:hidden}
  .corr-fill{height:100%;border-radius:99px;transition:width .5s}
  .corr-txt{font-size:12px;line-height:1.42;color:var(--text-2)} .corr-txt b{color:var(--text)}
  .corr-r{font-family:var(--mono);font-size:10.5px;color:var(--text-4)}
  .corr-hint{font-size:10.5px;color:var(--text-4);padding:2px 10px 0;letter-spacing:.02em}
  .corr-scatter{border:1px solid var(--border);border-radius:11px;background:var(--panel);padding:11px 12px}
  .corr-scatter-h{font-size:10.5px;color:var(--text-4);margin-bottom:6px;line-height:1.5}
  .corr-scatter-h .ax{font-family:var(--mono);color:var(--text-3);font-size:9.5px}
  .corr-svg{width:100%;height:auto;display:block;overflow:visible}
