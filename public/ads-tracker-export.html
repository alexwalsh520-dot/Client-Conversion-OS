function RecentEntries({extra, includeFallback=false, campaigns=[], onManualSubmit, onResolve, onToast}){
  const [open, setOpen] = useState(false);
  const [manualOpen, setManualOpen] = useState(false);
  const [page, setPage] = useState(0);
  const [entries, setEntries] = useState(null); // null → derive from extra+RECENT
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({kw:"", value:"", bucket:"msgs", camp:"tyson"});
  const [confirmDel, setConfirmDel] = useState(null);
  const [fixingEvent, setFixingEvent] = useState(null);
  const [savingFix, setSavingFix] = useState(false);

  // Build a stable list with ids the first time (so state mutations are consistent)
  const seedAll = useMemo(() => {
    const source = extra?.length ? extra : (includeFallback ? RECENT : []);
    return source.map((e, i) => ({id: "e-"+i, ...e}));
  }, [extra, includeFallback]);
  const list = entries ?? seedAll;
  const pageSize = 50;
  const pageCount = Math.max(1, Math.ceil(list.length / pageSize));
  const safePage = Math.min(page, pageCount - 1);
  const visibleList = list.slice(safePage * pageSize, safePage * pageSize + pageSize);

  useEffect(()=>{ setPage(0); }, [seedAll.length]);

  const startEdit = (e) => {
    setEditingId(e.id);
    setDraft({kw: e.kw, value: String(e.value), bucket: e.bucket, camp: e.camp});
    setConfirmDel(null);
  };
  const cancelEdit = () => { setEditingId(null); setConfirmDel(null); };
  const saveEdit = () => {
    if(!draft.kw || !draft.value) return;
    const next = (entries ?? seedAll).map(e =>
      e.id === editingId
        ? {...e, kw: draft.kw.toUpperCase(), value: parseFloat(draft.value), bucket: draft.bucket, camp: draft.camp, edited: true}
        : e
    );
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry updated");
  };
  const deleteEntry = (id) => {
    const next = (entries ?? seedAll).filter(e => e.id !== id);
    setEntries(next);
    setEditingId(null);
    setConfirmDel(null);
    onToast && onToast("Entry deleted");
  };
  const submitManualEntry = (entry) => {
    onManualSubmit && onManualSubmit(entry);
    setManualOpen(false);
  };
  const saveEventResolution = async (payload) => {
    if(!onResolve) return;
    setSavingFix(true);
    try{
      await onResolve(payload);
      setFixingEvent(null);
    }catch(err){
      onToast && onToast(err?.message || "Attribution save failed");
    }finally{
      setSavingFix(false);
    }
  };

  return (
    <div className="recent">
      <div className="recent-head" onClick={()=>setOpen(!open)}>
        <div className="recent-title">
          <span className={"recent-caret "+(open?"open":"")}>▸</span>
          Attribution events history
          <span className="recent-count">{list.length} latest</span>
        </div>
        <span style={{color:'var(--text-4)',fontSize:11}}></span>
      </div>
      <div className={"recent-body "+(open?"open":"")}>
        <div className="manual-log-toggle">
          <button
            className={"manual-log-btn "+(manualOpen?"active":"")}
            onClick={()=>setManualOpen(v=>!v)}
          >
            <span style={{color:'var(--gold)',fontSize:13,lineHeight:1}}>+</span>
            Log keyword manually
          </button>
          {list.length > pageSize && (
            <div className="history-pager">
              <button className="history-page-btn" onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePage===0}>Prev</button>
              <span className="history-page-label">{safePage+1}/{pageCount}</span>
              <button className="history-page-btn" onClick={()=>setPage(p=>Math.min(pageCount-1,p+1))} disabled={safePage>=pageCount-1}>Next</button>
            </div>
          )}
        </div>
        {manualOpen && (
          <div className="manual-log-area">
            <KeywordEntry onSubmit={submitManualEntry} />
          </div>
        )}
        <table className="recent-tbl">
          <thead>
            <tr>
              <th style={{width:150}}>Time (ET)</th>
              <th style={{width:160}}>Source</th>
              <th style={{width:90}}>Setter</th>
              <th style={{width:110}}>Campaign</th>
              <th style={{width:150}}>Keyword</th>
              <th style={{width:180}}>Event</th>
              <th className="r" style={{width:110}}>Value</th>
              <th className="actions-col">Status</th>
            </tr>
          </thead>
          <tbody>
            {list.length === 0 && (
              <tr>
                <td colSpan="8" style={{color:"var(--text-3)",padding:"16px 24px"}}>
                  No live attribution events for this range.
                </td>
              </tr>
            )}
            {visibleList.map((e)=>{
              const isEditing = editingId === e.id;
              const isLive = e.locked !== false;
              const isDollar = e.bucket === "collected";
              const bucketLabel = ({
                dm:"DM received",
                booked_call:"45-min call booked",
                call_taken:"45-min call taken",
                no_show:"No-show",
                sale:"Collected revenue",
                manual_correction:"Manual correction",
              }[e.eventType]) || BUCKETS.find(b=>b.id===e.bucket)?.label || e.bucket;
              const sourceLabel = String(e.eventType || "").startsWith("manual_")
                ? "Manual"
                : e.source === "manychat" ? "ManyChat" : e.source === "ghl" ? "GHL" : e.source === "sales_tracker" ? "Sales Tracker" : "Manual";
              const statusLabel = {
                attributed:"Attributed",
                needs_review:"Needs review",
                missing_keyword:"Missing keyword",
                organic:"Organic",
                unattributed:"Unattributed",
                ignored:"Ignored",
              }[e.status] || "Attributed";
              const canResolveLive = isLive && e.saleKey && (e.status === "needs_review" || e.status === "missing_keyword");
              return (
                <tr key={e.id} className={isEditing ? "editing-row" : ""}>
                  <td className="mono" style={{color:'var(--text-3)',fontSize:11,verticalAlign:'middle'}}>
                    {e.ts}{e.edited && <span className="edited-tag" title="Edited">·edited</span>}
                  </td>
                  <td style={{verticalAlign:'middle'}}>
                    <div style={{color:'var(--text-2)'}}>{sourceLabel}</div>
                    {e.name && <div style={{color:'var(--text-4)',fontSize:10,marginTop:3}}>{e.name}</div>}
                  </td>
                  <td style={{verticalAlign:'middle'}}>{e.setter}</td>
                  <td style={{color:'var(--text-3)',verticalAlign:'middle'}}>
                    {isEditing ? (
                      <select className="rec-edit-input" style={{width:90}} value={draft.camp} onChange={ev=>setDraft(d=>({...d, camp:ev.target.value}))}>
                        <option value="tyson">Tyson</option>
                        <option value="keith">Keith</option>
                      </select>
                    ) : (
                      <div>
                        <div>{e.camp==="tyson" ? "Tyson" : e.camp==="keith" ? "Keith" : "Unknown"}</div>
                        {(e.campaignName || e.adName) && <div style={{color:'var(--text-4)',fontSize:10,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',maxWidth:190}}>{e.adName || e.campaignName}</div>}
                      </div>
                    )}
                  </td>
                  <td style={{verticalAlign:'middle'}}>
                    {isEditing ? (
                      <input
                        className="rec-edit-input kw"
                        value={draft.kw}
                        onChange={ev=>setDraft(d=>({...d, kw:ev.target.value.toUpperCase()}))}
                        autoFocus
                        onKeyDown={ev=>{ if(ev.key==="Enter") saveEdit(); if(ev.key==="Escape") cancelEdit(); }}
                      />
                    ) : <span className="kw-tag">{e.kw}</span>}
                  </td>
                  <td style={{verticalAlign:'middle',fontSize:11,color:'var(--text-3)'}}>
                    {isEditing ? (
                      <select className="rec-edit-input" style={{width:150}} value={draft.bucket} onChange={ev=>setDraft(d=>({...d, bucket:ev.target.value}))}>
                        {BUCKETS.map(b=><option key={b.id} value={b.id}>{b.label}</option>)}
                      </select>
                    ) : bucketLabel}
                  </td>
                  <td className="r mono" style={{color:'var(--text-2)',verticalAlign:'middle'}}>
                    {isEditing ? (
                      <input
                        className="rec-edit-input"
                        style={{textAlign:'right'}}
                        value={draft.value}
                        onChange={ev=>setDraft(d=>({...d, value: ev.target.value.replace(/[^\d.]/g,"")}))}
                        placeholder={draft.bucket==="collected"?"$":""}
                        onKeyDown={ev=>{ if(ev.key==="Enter") saveEdit(); if(ev.key==="Escape") cancelEdit(); }}
                      />
                    ) : (isDollar ? fmtUsd(e.value) : e.value)}
                  </td>
                  <td className="actions-col" style={{verticalAlign:'middle'}}>
                    {isLive ? (
                      <>
                        <span className={"event-status "+(e.status || "attributed")} title={e.reason || ""}>{statusLabel}</span>
                        {canResolveLive && (
                          <button className="rec-edit-btn" style={{marginLeft:6}} onClick={()=>setFixingEvent(e)}>Resolve</button>
                        )}
                      </>
                    ) : isEditing ? (
                      <>
                        <button className="rec-save" onClick={saveEdit} disabled={!draft.kw || !draft.value}>Save</button>
                        <button className="rec-cancel" onClick={cancelEdit}>Cancel</button>
                      </>
                    ) : (
                      <>
                        <button className="rec-edit-btn" onClick={()=>startEdit(e)}>Edit</button>
                        <button className="rec-delete-btn" style={{marginLeft:4}} onClick={()=>setConfirmDel(e.id)}>Delete</button>
                      </>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {confirmDel!==null && (() => {
        const victim = (entries ?? seedAll).find(x=>x.id===confirmDel);
        if(!victim) return null;
        return (
          <Modal title="Delete entry?" subtitle="This cannot be undone." onClose={()=>setConfirmDel(null)}
            footer={<>
              <button className="btn-secondary" onClick={()=>setConfirmDel(null)}>No</button>
              <button className="btn-danger-solid" onClick={()=>deleteEntry(victim.id)}>Yes, delete</button>
            </>}>
            <div style={{padding:'12px 14px',background:'#0a0a0a',border:'1px solid var(--border)',borderRadius:5,fontSize:12,lineHeight:1.6}}>
              <div style={{color:'var(--text-4)',fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Entry</div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <span className="kw-tag">{victim.kw}</span>
                <span style={{color:'var(--text-3)'}}>{victim.setter}</span>
                <span style={{color:'var(--text-4)'}}>·</span>
                <span style={{color:'var(--text-3)'}}>{BUCKETS.find(b=>b.id===victim.bucket)?.label || victim.bucket}</span>
                <span style={{color:'var(--text-4)'}}>·</span>
                <span className="mono" style={{color:'var(--text-2)'}}>
                  {victim.bucket==="collected" ? fmtUsd(victim.value) : victim.value}
                </span>
                <span style={{color:'var(--text-4)',marginLeft:'auto',fontSize:11}}>{victim.ts}</span>
              </div>
            </div>
          </Modal>
        );
      })()}
      {fixingEvent && (
        <AttributionAlertModal
          alert={alertFromHistoryEntry(fixingEvent)}
          campaigns={campaigns}
          saving={savingFix}
          onClose={()=>setFixingEvent(null)}
          onResolve={saveEventResolution}
        />
      )}
    </div>
  );
}

function alertFromHistoryEntry(entry){
  const eventDate = entry.eventAt ? eventDateKeyFromIso(entry.eventAt) : "";
  return {
    key: entry.saleKey,
    saleKey: entry.saleKey,
    date: eventDate,
    eventAt: entry.eventAt || null,
    clientKey: entry.camp || null,
    name: entry.name || "Unknown",
    setter: entry.setter || "",
    amount: entry.eventType === "sale" ? Number(entry.value || 0) : 0,
    reason: entry.reason || "",
    alertType: entry.alertType || (entry.eventType === "booked_call" ? "missing_booking_keyword" : entry.eventType === "call_taken" || entry.eventType === "no_show" ? "call" : "sale"),
    appointmentId: entry.appointmentId || null,
    contactId: entry.contactId || null,
  };
}

function eventDateKeyFromIso(value){
  const dt = value ? new Date(value) : null;
  if(!dt || Number.isNaN(dt.getTime())) return "";
  return dt.toLocaleDateString("en-CA", {timeZone:"America/New_York"});
}

function recentEntriesFromDashboard(dashboard){
  const history = Array.isArray(dashboard?.eventsHistory) && dashboard.eventsHistory.length
    ? dashboard.eventsHistory
    : (dashboard?.recentEvents || []);
  if(!history.length) return [];
  return history.map((event, i) => {
    const dt = event.eventAt ? new Date(event.eventAt) : null;
    const ts = dt && !Number.isNaN(dt.getTime())
      ? dt.toLocaleString("en-US", {timeZone:"America/New_York", month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZoneName:"short"})
      : "Recent";
    const manualBuckets = {
      manual_messages: "msgs",
      manual_booked_calls: "calls",
      manual_calls_taken: "taken",
      manual_new_clients: "clients",
      manual_collected_revenue: "collected",
    };
    const historyBuckets = {
      dm: "msgs",
      booked_call: "calls",
      call_taken: "taken",
      no_show: "taken",
      sale: "collected",
      manual_correction: "collected",
    };
    const bucket = historyBuckets[event.eventType] || manualBuckets[event.eventType] || (event.source === "ghl" ? "calls" : "msgs");
    const rawValue = Number(event.value || 0);
    const value = event.eventType === "manual_collected_revenue" || event.eventType === "sale"
      ? rawValue / 100
      : (rawValue || 1);
    return {
      ts,
      setter: event.setter || "Auto",
      camp: event.clientKey || "tyson",
      kw: event.keyword || "UNKNOWN",
      bucket,
      value,
      source: event.source || "live",
      eventType: event.eventType || "",
      name: event.name || "",
      status: event.status || "attributed",
      reason: event.reason || "",
      campaignName: event.campaignName || "",
      adName: event.adName || "",
      saleKey: event.saleKey || null,
      alertType: event.alertType || null,
      appointmentId: event.appointmentId || null,
      contactId: event.contactId || null,
      eventAt: event.eventAt || null,
      locked: true,
      id: "live-"+i,
    };
  });
}

function AttributionSummaryTiles({dashboard, alerts, scope="range"}){
  const summary = dashboard?.summary || {};
  const attribution = dashboard?.attribution || {};
  const isAllTime = scope === "allTime";
  const scopedTotals = isAllTime
    ? (attribution.allTime || {})
    : (attribution.selectedRange || {});
  const query = dashboard?.query || {};
  const alertsInRange = (alerts || []).filter(alert => {
    if(isAllTime) return true;
    if(!query.dateFrom || !query.dateTo || !alert?.date) return false;
    return alert.date >= query.dateFrom && alert.date <= query.dateTo;
  });
  const paid = Number(scopedTotals.paidAttributedRevenue ?? (isAllTime ? attribution.allTimePaidAttributedRevenue : attribution.paidAttributedRevenue) ?? summary.paidAttributedRevenue ?? summary.collectedRevenue ?? 0);
  const unresolved = Number(scopedTotals.unattributedRevenue ?? (isAllTime ? attribution.allTimeUnattributedRevenue : attribution.unattributedRevenue) ?? alertsInRange.reduce((sum, alert) => sum + Number(alert.amount || 0), 0));
  const organic = Number(scopedTotals.organicRevenue ?? (isAllTime ? attribution.allTimeOrganicRevenue : attribution.organicRevenue) ?? summary.organicRevenue ?? 0);
  const unattributedIsClear = unresolved <= 0;

  return (
    <div className="alerts-summary-shell">
      <div className="alerts-summary-scope">
        <div className="alerts-summary-scope-label">Attribution totals</div>
        <div className="alerts-summary-scope-pill">{isAllTime ? "All time" : "Selected range"}</div>
      </div>
      <div className="alerts-summary">
        <div className="alerts-summary-card">
          <div className="alerts-summary-label">Attributed</div>
          <div className="alerts-summary-value">{fmtUsd(paid)}</div>
          <div className="alerts-summary-note">Tied to paid ads</div>
        </div>
        <div className="alerts-summary-card">
          <div className="alerts-summary-label">Organic</div>
          <div className="alerts-summary-value">{fmtUsd(organic)}</div>
          <div className="alerts-summary-note">Resolved as non-paid</div>
        </div>
        <div className={"alerts-summary-card "+(unattributedIsClear ? "good" : "warn")}>
          <div className="alerts-summary-label">Unattributed</div>
          <div className={"alerts-summary-value "+(unattributedIsClear ? "good" : "warn")}>{fmtUsd(unresolved)}</div>
          <div className="alerts-summary-note">{alertsInRange.length} unresolved item{alertsInRange.length===1?"":"s"}</div>
        </div>
      </div>
    </div>
  );
}

function clientLabel(key){
  if(key==="tyson") return "Tyson";
  if(key==="keith") return "Keith";
  return "Unknown";
}

function alertSaleKey(alert){
  return alert?.key || alert?.saleKey || "";
}

function alertReasonLabel(reason){
  if(reason==="missing_sales_name") return "Missing Sales Tracker name";
  if(reason==="missing_booking_keyword") return "Booked call has no keyword";
  if(reason==="no_matching_ghl_booking") return "No matching GHL booking";
  if(reason==="ambiguous_or_missing_meta_match") return "No unique Meta ad match";
  if(reason==="missing_manychat_keyword") return "Missing ManyChat keyword";
  return reason || "Needs review";
}

function alertDateLabel(alert){
  return alert?.date ? dateLabelFromIso(alert.date) : "Recent";
}

function alertTimestampLabel(alert){
  const date = alertDateLabel(alert);
  const time = alert?.time || alert?.eventTime || "";
  return time ? `${date} · ${time}` : date;
}

function alertAmountLabel(alert){
  const amount = Number(alert?.amount || 0);
  if(amount > 0) return fmtUsd(amount);
  if(alert?.alertType === "call" || alert?.callTaken) return "Call taken";
  if(alert?.alertType === "missing_dm_keyword") return "DM keyword";
  if(alert?.alertType === "missing_booking_keyword") return "Booked call";
  return "No revenue";
}

function alertTitleLabel(alert){
  if(alert?.alertType === "call") return "Call attribution";
  if(alert?.alertType === "missing_dm_keyword") return "Keyword attribution";
  if(alert?.alertType === "missing_booking_keyword") return "Booking attribution";
  return "Sale attribution";
}

function alertWorkspaceKind(alert){
  if(alert?.alertType === "missing_dm_keyword" || alert?.reason === "missing_manychat_keyword") return "keyword";
  if(alert?.alertType === "missing_booking_keyword" || alert?.reason === "missing_booking_keyword") return "booking";
  if(alert?.alertType === "call" || alert?.callTaken) return "call";
  if(Number(alert?.amount || 0) > 0) return "revenue";
  return "other";
}

function alertWorkspaceKindLabel(alert){
  const kind = alertWorkspaceKind(alert);
  if(kind === "revenue") return "Revenue";
  if(kind === "booking") return "Booked call";
  if(kind === "keyword") return "DM keyword";
  if(kind === "call") return "Call";
  return "Review";
}

function alertWorkspaceSearchText(alert){
  return [
    alert?.name,
    alert?.setter,
    alert?.keyword,
    alert?.campaignName,
    alert?.adName,
    alert?.instagramHandle,
    clientLabel(alert?.clientKey),
    alertAmountLabel(alert),
    alertTimestampLabel(alert),
    alertReasonLabel(alert?.reason),
    alertWorkspaceKindLabel(alert),
  ].map(value=>String(value || "").toLowerCase()).join(" ");
}

function normalizeUiKeyword(value){
  return String(value || "").trim().replace(/\s+/g," ").toUpperCase();
}

function safeIsoDate(value){
  return /^\d{4}-\d{2}-\d{2}$/.test(String(value || "")) ? String(value) : "";
}

function daysBetweenIso(a,b){
  const aMs = Date.parse(`${a}T00:00:00Z`);
  const bMs = Date.parse(`${b}T00:00:00Z`);
  if(!Number.isFinite(aMs) || !Number.isFinite(bMs)) return 9999;
  return Math.abs(Math.round((bMs-aMs)/86400000));
}

function optionDateDistance(option, alertDate){
  if(!alertDate) return 9999;
  const first = safeIsoDate(option.firstDate);
  const last = safeIsoDate(option.lastDate);
  if(first && last && first <= alertDate && alertDate <= last) return 0;
  if(last && last < alertDate) return daysBetweenIso(last, alertDate);
  if(first && first > alertDate) return daysBetweenIso(first, alertDate);
  return 9999;
}

function optionStatus(option, alertDate){
  if(optionDateDistance(option, alertDate) === 0) return {label:"On date", cls:"date", score:0};
  if(option.status === "active") return {label:"Active", cls:"active", score:1};
  const distance = optionDateDistance(option, alertDate);
  if(distance <= 30) return {label:`${distance}d away`, cls:"", score:2};
  return {label:"Off", cls:"", score:3};
}

function rankAttributionOptions(options, alert){
  const alertDate = safeIsoDate(alert?.date) || eventDateKeyFromIso(alert?.eventAt);
  const alertKeyword = normalizeUiKeyword(alert?.keyword || alert?.adName);
  return options.slice().sort((a,b)=>{
    const aStatus = optionStatus(a, alertDate);
    const bStatus = optionStatus(b, alertDate);
    const aKw = alertKeyword && a.keyword===alertKeyword ? 0 : 1;
    const bKw = alertKeyword && b.keyword===alertKeyword ? 0 : 1;
    if(aKw!==bKw) return aKw-bKw;
    if(aStatus.score!==bStatus.score) return aStatus.score-bStatus.score;
    const dist = optionDateDistance(a, alertDate) - optionDateDistance(b, alertDate);
    if(dist!==0) return dist;
    return String(b.lastDate || "").localeCompare(String(a.lastDate || "")) || String(a.keyword || a.campaignName || "").localeCompare(String(b.keyword || b.campaignName || ""));
  });
}

function normalizeKeywordOption(option, alert){
  const keyword = normalizeUiKeyword(option.keyword || option.groupName || option.adName);
  if(!keyword || keyword==="UNKNOWN") return null;
  const clientKey = option.clientKey || alert?.clientKey || "";
  const campaignId = option.campaignId || "";
  const adId = option.adId || option.groupId || option.id || keyword;
  const groupId = option.groupId || `${clientKey}:${campaignId || option.campaignName || "campaign"}:${adId}`;
  return {
    id: option.id || `${clientKey}:${groupId}:${keyword}`,
    clientKey,
    keyword,
    campaignId,
    campaignName: option.campaignName || option.meta || "",
    adId: String(adId),
    adName: option.adName || option.groupName || keyword,
    groupId,
    groupName: option.groupName || option.adName || keyword,
    firstDate: option.firstDate || option.dateFrom || "",
    lastDate: option.lastDate || option.dateTo || "",
    status: option.status || "finished",
    label: `${keyword} · ${clientLabel(clientKey)}`,
    meta: option.campaignName || option.meta || "",
    spend: Number(option.spend || 0),
  };
}

function normalizeCampaignOption(option, alert){
  const clientKey = option.clientKey || alert?.clientKey || "";
  const campaignName = option.campaignName || option.name || "";
  const campaignId = option.campaignId || option.id || campaignName;
  if(!campaignName && !campaignId) return null;
  return {
    id: option.id || `${clientKey}:${campaignId}`,
    clientKey,
    campaignId,
    campaignName: campaignName || campaignId,
    groupId: option.groupId || `${clientKey}:${campaignId}`,
    groupName: campaignName || campaignId,
    firstDate: option.firstDate || "",
    lastDate: option.lastDate || option.latestIso || "",
    status: option.status || "finished",
    spend: Number(option.spend || 0),
  };
}

function attributionOptionsFromProvided(options, alert){
  const clientKey = alert?.clientKey;
  const normalized = (options || [])
    .map(o=>normalizeKeywordOption(o, alert))
    .filter(Boolean)
    .filter(o=>!clientKey || o.clientKey===clientKey);
  return rankAttributionOptions(normalized, alert);
}

function campaignOptionsFromProvided(options, alert){
  const clientKey = alert?.clientKey;
  const normalized = (options || [])
    .map(o=>normalizeCampaignOption(o, alert))
    .filter(Boolean)
    .filter(o=>!clientKey || o.clientKey===clientKey);
  return rankAttributionOptions(normalized, alert);
}

function attributionOptionsFromCampaigns(campaigns, alert){
  const clientKey = alert?.clientKey;
  const options = [];
  const seen = new Set();
  for(const campaign of campaigns || []){
    if(clientKey && campaign.clientKey !== clientKey) continue;
    const campaignId = String(campaign.id || "");
    const rawCampaignId = campaignId.includes(":") ? campaignId.split(":").slice(1).join(":") : campaignId;
    const ads = [];
    (campaign.ads || []).forEach(ad => ads.push(ad));
    (campaign.rows || []).forEach(row => (row.adRows || []).forEach(ad => ads.push({
      id: ad.adId,
      name: ad.adName,
      keyword: ad.keyword || ad.adName,
    })));

    for(const ad of ads){
      const adId = ad.id || ad.adId || ad.name;
      const adName = ad.name || ad.adName || ad.keyword || "UNKNOWN";
      const keyword = normalizeUiKeyword(ad.keyword || adName);
      if(!keyword || keyword==="UNKNOWN") continue;
      const groupId = String(adId).startsWith(`${campaignId}:`)
        ? String(adId)
        : `${campaignId}:${adId}`;
      const key = `${campaign.clientKey}:${groupId}:${keyword}`;
      if(seen.has(key)) continue;
      seen.add(key);
      const firstDate = (campaign.rows || []).reduce((min,row)=>!min || String(row.iso || "") < min ? String(row.iso || "") : min, "");
      options.push({
        id: key,
        clientKey: campaign.clientKey,
        keyword,
        campaignId: rawCampaignId,
        campaignName: campaign.name,
        adId: String(adId),
        adName,
        groupId,
        groupName: keyword,
        label: `${keyword} · ${clientLabel(campaign.clientKey)}`,
        meta: campaign.name || campaign.short || "",
        firstDate,
        lastDate: campaign.latestIso || "",
        status: campaign.status || "finished",
      });
    }
  }

  return rankAttributionOptions(options, alert);
}

function campaignOptionsFromCampaigns(campaigns, alert){
  const clientKey = alert?.clientKey;
  const options = (campaigns || [])
    .filter(c=>!clientKey || c.clientKey===clientKey)
    .map(c=>{
      const firstDate = (c.rows || []).reduce((min,row)=>!min || String(row.iso || "") < min ? String(row.iso || "") : min, "");
      return normalizeCampaignOption({
        id:c.id,
        clientKey:c.clientKey,
        campaignId:String(c.id || "").includes(":") ? String(c.id).split(":").slice(1).join(":") : c.id,
        campaignName:c.name,
        firstDate,
        lastDate:c.latestIso || "",
        status:c.status || "finished",
      }, alert);
    })
    .filter(Boolean);
  return rankAttributionOptions(options, alert);
}

function groupedKeywordOptions(options){
  const groups = new Map();
  for(const option of options){
    const key = `${clientLabel(option.clientKey)} · ${option.campaignName || "Unknown campaign"}`;
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(option);
  }
  return Array.from(groups.entries()).map(([label, items])=>({label, items}));
}

function optionMatchesQuery(option, query){
  const q = String(query || "").trim().toLowerCase();
  if(!q) return true;
  return [
    option.keyword,
    option.campaignName,
    option.adName,
    option.groupName,
    clientLabel(option.clientKey),
  ].some(value=>String(value || "").toLowerCase().includes(q));
}

function keywordOptionSubLabel(option){
  const adName = String(option.adName || "").trim();
  const keyword = normalizeUiKeyword(option.keyword);
  const normalizedAd = normalizeUiKeyword(adName);
  if(adName && normalizedAd && normalizedAd!==keyword) return adName;
  return "";
}

function AttributionAlertModal({alert, existing, campaigns, keywordOptions, campaignOptions, saving, onClose, onResolve}){
  const options = useMemo(() => {
    const provided = attributionOptionsFromProvided(keywordOptions, alert);
    return provided.length ? provided : attributionOptionsFromCampaigns(campaigns, alert);
  }, [campaigns, keywordOptions, alert]);
  const campaignChoices = useMemo(() => {
    const provided = campaignOptionsFromProvided(campaignOptions, alert);
    return provided.length ? provided : campaignOptionsFromCampaigns(campaigns, alert);
  }, [campaigns, campaignOptions, alert]);
  const initialOptionId = existing?.groupId
    ? options.find(o=>o.groupId===existing.groupId)?.id
    : options.find(o=>o.keyword===normalizeUiKeyword(existing?.keyword || alert?.keyword))?.id;
  const [selectedId, setSelectedId] = useState(initialOptionId || options[0]?.id || "");
  const [mode, setMode] = useState(initialOptionId ? "keyword" : "keyword");
  const [query, setQuery] = useState("");
  const [noKeywordTarget, setNoKeywordTarget] = useState("unknown");
  const [selectedCampaignId, setSelectedCampaignId] = useState(campaignChoices[0]?.id || "");
  const [noteOpen, setNoteOpen] = useState(Boolean(existing?.note));
  const [note, setNote] = useState(existing?.note || "");
  useEffect(()=>{
    if(!options.find(o=>o.id===selectedId)) setSelectedId(options[0]?.id || "");
  }, [options]);
  useEffect(()=>{
    if(!campaignChoices.find(o=>o.id===selectedCampaignId)) setSelectedCampaignId(campaignChoices[0]?.id || "");
  }, [campaignChoices]);
  const selected = options.find(o=>o.id===selectedId) || null;
  const selectedCampaign = campaignChoices.find(o=>o.id===selectedCampaignId) || null;
  const keyword = normalizeUiKeyword(selected?.keyword || "");
  const filteredOptions = options.filter(option=>optionMatchesQuery(option, query)).slice(0,36);
  const filteredCampaigns = campaignChoices.filter(option=>optionMatchesQuery({...option, keyword:""}, query)).slice(0,12);
  const groups = groupedKeywordOptions(filteredOptions);
  const paidReady = mode==="keyword" ? Boolean(keyword) : noKeywordTarget==="unknown" || Boolean(selectedCampaign);
  const submit = (action) => {
    const paidNoKeyword = action==="attribute" && mode==="noKeyword";
    const paidSelection = paidNoKeyword ? selectedCampaign : selected;
    const payload = {
      resolutionId: existing?.id || null,
      saleKey: alertSaleKey(alert),
      action,
      clientKey: alert.clientKey || paidSelection?.clientKey || existing?.clientKey || null,
      keyword: action==="attribute" && mode==="keyword" ? keyword : null,
      noKeyword: paidNoKeyword,
      noKeywordTarget: paidNoKeyword ? noKeywordTarget : null,
      campaignId: action==="attribute" ? paidSelection?.campaignId || null : null,
      campaignName: action==="attribute" ? paidSelection?.campaignName || null : null,
      adId: action==="attribute" && mode==="keyword" ? selected?.adId || null : null,
      adName: action==="attribute" && mode==="keyword" ? selected?.adName || keyword : null,
      groupId: action==="attribute" ? paidSelection?.groupId || null : null,
      groupName: action==="attribute" ? paidSelection?.groupName || (paidNoKeyword ? "No keyword" : keyword) : null,
      alertType: alert.alertType || null,
      subscriberId: alert.subscriberId || null,
      subscriberName: alert.name || null,
      instagramHandle: alert.instagramHandle || null,
      manychatUrl: alert.manychatUrl || null,
      appointmentId: alert.appointmentId || null,
      contactId: alert.contactId || null,
      contactName: alert.name || null,
      eventAt: alert.eventAt || null,
      note,
      sale: {
        date: alert.date,
        name: alert.name,
        setter: alert.setter,
        amount: Number(alert.amount || 0),
        reason: alert.reason || existing?.action || "",
      },
    };
    onResolve(payload);
  };

  return (
    <div className="alert-modal-backdrop" onClick={onClose}>
      <div className="alert-modal" onClick={e=>e.stopPropagation()}>
        <div className="alert-modal-head">
          <div>
            <div className="alert-modal-title">Resolve {alertTitleLabel(alert)}</div>
            <div className="alert-modal-sub">{alert.name || "Unknown"} · {alertAmountLabel(alert)}</div>
          </div>
          <button className="alert-modal-close" onClick={onClose}>×</button>
        </div>
        <div className="alert-modal-body">
          <div className="alert-modal-info">
            <div className="alert-info-row">
              <div className="alert-info-label">Campaign</div>
              <div className="alert-info-value">
                <span className={"alert-info-pill "+(alert.clientKey==="keith"?"keith":"")}></span>
                {clientLabel(alert.clientKey)}
              </div>
            </div>
            <div className="alert-info-row">
              <div className="alert-info-label">Time</div>
              <div className="alert-info-value mono">{alertTimestampLabel(alert)}</div>
            </div>
          </div>
          <div className="alert-mode-tabs">
            <button className={"alert-mode-tab "+(mode==="keyword"?"active":"")} onClick={()=>setMode("keyword")}>Keyword</button>
            <button className={"alert-mode-tab "+(mode==="noKeyword"?"active":"")} onClick={()=>setMode("noKeyword")}>No keyword</button>
          </div>
          <div className="alert-field-label">{mode==="keyword" ? "Which keyword did they use?" : "They came from an ad, but no keyword"}</div>
          <input
            className="alert-search"
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder={mode==="keyword" ? "Search keyword or campaign..." : "Search campaign if you know it..."}
          />
          {mode==="keyword" ? (
            <div className="alert-option-list">
              {groups.length === 0 && <div className="alert-option-empty">No matching keywords.</div>}
              {groups.map(group=>(
                <div className="alert-option-group" key={group.label}>
                  <div className="alert-option-group-head">
                    <span className="alert-option-group-title">{group.label}</span>
                    <span className="alert-option-group-count">{group.items.length}</span>
                  </div>
                  {group.items.map(option=>{
                    const status = optionStatus(option, safeIsoDate(alert?.date) || eventDateKeyFromIso(alert?.eventAt));
                    const subLabel = keywordOptionSubLabel(option);
                    return (
                      <button key={option.id} className={"alert-option-card "+(selectedId===option.id?"active":"")} onClick={()=>setSelectedId(option.id)}>
                        <span className="alert-option-main">
                          <span className="alert-option-keyword">{option.keyword}</span>
                          {subLabel && <span className="alert-option-campaign">{subLabel}</span>}
                        </span>
                        <span className={"alert-option-pill "+status.cls}>{status.label}</span>
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
          ) : (
            <div className="alert-no-keyword-box">
              <button className={"alert-no-keyword-choice "+(noKeywordTarget==="unknown"?"active":"")} onClick={()=>setNoKeywordTarget("unknown")}>
                <span className="alert-no-keyword-choice-main">
                  <span className="alert-no-keyword-title">Paid ad, ad unknown</span>
                  <span className="alert-no-keyword-sub">Counts as paid. Does not get tied to a keyword.</span>
                </span>
                <span className="alert-option-pill">No keyword</span>
              </button>
              {filteredCampaigns.map(option=>{
                const status = optionStatus(option, safeIsoDate(alert?.date) || eventDateKeyFromIso(alert?.eventAt));
                return (
                  <button
                    key={option.id}
                    className={"alert-no-keyword-choice "+(noKeywordTarget==="campaign" && selectedCampaignId===option.id?"active":"")}
                    onClick={()=>{setNoKeywordTarget("campaign");setSelectedCampaignId(option.id);}}
                  >
                    <span className="alert-no-keyword-choice-main">
                      <span className="alert-no-keyword-title">{option.campaignName}</span>
                      <span className="alert-no-keyword-sub">{clientLabel(option.clientKey)} · paid, no keyword</span>
                    </span>
                    <span className={"alert-option-pill "+status.cls}>{status.label}</span>
                  </button>
                );
              })}
            </div>
          )}
          {noteOpen ? (
            <input
              className="alert-note-input"
              value={note}
              onChange={e=>setNote(e.target.value)}
              placeholder="Add note"
              autoFocus
            />
          ) : (
            <button className="alert-note-toggle" onClick={()=>setNoteOpen(true)}>+ Add note</button>
          )}
        </div>
        <div className="alert-modal-foot">
          <div className="alert-foot-actions">
            <button className="alert-outline-btn" onClick={()=>submit("unattributed")} disabled={saving}>Mark unattributed</button>
            <button className="alert-outline-btn" onClick={()=>submit("organic")} disabled={saving}>Mark organic</button>
            <button className="alert-paid-btn" onClick={()=>submit("attribute")} disabled={saving || !paidReady}>
              {saving ? "Saving…" : "Mark as paid"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AttributionWorkspace({dashboard, campaigns, onResolve, onToast, onClose}){
  const attribution = dashboard?.attribution || {};
  const alerts = Array.isArray(attribution.unmatchedSales) ? attribution.unmatchedSales : [];
  const keywordOptions = Array.isArray(attribution.keywordOptions) ? attribution.keywordOptions : [];
  const campaignOptions = Array.isArray(attribution.campaignOptions) ? attribution.campaignOptions : [];
  const [clientFilter, setClientFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [modal, setModal] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    const onKey = (event) => {
      if(event.key === "Escape" && !modal) onClose();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose, modal]);

  const clientCounts = {
    all: alerts.length,
    tyson: alerts.filter(alert=>alert.clientKey==="tyson").length,
    keith: alerts.filter(alert=>alert.clientKey==="keith").length,
  };
  const typeCounts = {
    all: alerts.length,
    revenue: alerts.filter(alert=>alertWorkspaceKind(alert)==="revenue").length,
    booking: alerts.filter(alert=>alertWorkspaceKind(alert)==="booking").length,
    keyword: alerts.filter(alert=>alertWorkspaceKind(alert)==="keyword").length,
    other: alerts.filter(alert=>["call","other"].includes(alertWorkspaceKind(alert))).length,
  };
  const filteredAlerts = alerts.filter(alert => {
    if(clientFilter !== "all" && alert.clientKey !== clientFilter) return false;
    const kind = alertWorkspaceKind(alert);
    if(typeFilter === "other" && !["call","other"].includes(kind)) return false;
    if(typeFilter !== "all" && typeFilter !== "other" && kind !== typeFilter) return false;
    const q = query.trim().toLowerCase();
    if(q && !alertWorkspaceSearchText(alert).includes(q)) return false;
    return true;
  });

  const saveResolution = async (payload) => {
    if(!payload.saleKey) return;
    setSaving(true);
    try{
      await onResolve(payload);
      setModal(null);
    }catch(err){
      onToast && onToast(err?.message || "Attribution save failed");
    }finally{
      setSaving(false);
    }
  };

  return (
    <div className="attribution-workspace">
      <div className="workspace-top">
        <div>
          <div className="workspace-kicker">All-time task queue</div>
          <div className="workspace-title">Attribution Workspace</div>
          <div className="workspace-sub">{alerts.length} unresolved · every item must be paid, organic, unattributed, or fixed</div>
        </div>
        <button className="workspace-close" onClick={onClose}>Back to dashboard</button>
      </div>
      <div className="workspace-body">
        <AttributionSummaryTiles dashboard={dashboard} alerts={alerts} scope="allTime"/>
        <div className="workspace-toolbar">
          <div className="workspace-filter-row">
            <div className="alerts-tabs">
              {[
                ["all","All",clientCounts.all],
                ["tyson","Tyson",clientCounts.tyson],
                ["keith","Keith",clientCounts.keith],
              ].map(([id,label,count])=>(
                <button key={id} className={"alerts-tab "+(clientFilter===id?"active":"")} onClick={()=>setClientFilter(id)}>
                  {label}
                  <span className="alerts-tab-count">{count}</span>
                </button>
              ))}
            </div>
            <div className="workspace-type-tabs">
              {[
                ["all","All",typeCounts.all],
                ["revenue","Revenue",typeCounts.revenue],
                ["booking","Booked",typeCounts.booking],
                ["keyword","DM keywords",typeCounts.keyword],
                ["other","Other",typeCounts.other],
              ].map(([id,label,count])=>(
                <button key={id} className={"workspace-type-tab "+(typeFilter===id?"active":"")} onClick={()=>setTypeFilter(id)}>
                  {label}
                  <span className="alerts-tab-count">{count}</span>
                </button>
              ))}
            </div>
          </div>
          <input
            className="workspace-search"
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="Search customer, setter, issue, keyword..."
          />
        </div>
        <div className="workspace-table">
          <div className="workspace-table-head workspace-grid">
            <div>Customer</div>
            <div>Type</div>
            <div>Account</div>
            <div className="hide-mid">Time</div>
            <div>Amount</div>
            <div className="hide-mid">Issue</div>
            <div></div>
          </div>
          {filteredAlerts.length === 0 ? (
            <div className="workspace-empty">No unresolved attribution alerts match this view.</div>
          ) : filteredAlerts.map(alert => {
            const kind = alertWorkspaceKind(alert);
            return (
              <div className="workspace-row workspace-grid" key={alertSaleKey(alert)} onClick={()=>setModal({alert})}>
                <div>
                  <div className="workspace-name">{alert.name || "Unknown"}</div>
                  <div className="workspace-meta">{alert.setter ? `Setter · ${alert.setter}` : alert.instagramHandle ? `IG · ${alert.instagramHandle}` : alertSaleKey(alert)}</div>
                </div>
                <div><span className={"workspace-type-pill "+kind}>{alertWorkspaceKindLabel(alert)}</span></div>
                <div className="alert-campaign">
                  <span className={"alert-campaign-dot "+(alert.clientKey==="keith"?"keith":"")}></span>
                  {clientLabel(alert.clientKey)}
                </div>
                <div className="workspace-meta hide-mid">{alertTimestampLabel(alert)}</div>
                <div className="alert-amount">{alertAmountLabel(alert)}</div>
                <div className="workspace-issue hide-mid">{alertReasonLabel(alert.reason)}</div>
                <div className="workspace-actions" onClick={e=>e.stopPropagation()}>
                  {alert.manychatUrl && (
                    <a
                      className="alert-open-link"
                      href={alert.manychatUrl}
                      target="_blank"
                      rel="noreferrer"
                      title="Open ManyChat conversation"
                    >↗</a>
                  )}
                  <button className="alert-resolve" onClick={()=>setModal({alert})}>Resolve →</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {modal && (
        <AttributionAlertModal
          alert={modal.alert}
          existing={modal.existing}
          campaigns={campaigns}
          keywordOptions={keywordOptions}
          campaignOptions={campaignOptions}
          saving={saving}
          onClose={()=>setModal(null)}
          onResolve={saveResolution}
        />
      )}
    </div>
  );
}

// ------- App
function App(){
  const [account, setAccount] = useState("all");
  const [status, setStatus] = useState("all");
  const [search, setSearch] = useState("");
  const [dateRange, setDateRange] = useState(()=>rangeForPreset("mtd", todayEt()));
  const [dashboard, setDashboard] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [newEntries, setNewEntries] = useState([]);
  const [toast, setToast] = useState(null);
  const [workspaceOpen, setWorkspaceOpen] = useState(false);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>setToast(null), 2400);
  };

  const onLogEntry = async (e) => {
    try{
      const res = await fetch("/api/ads-tracker/manual-event", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          clientKey:e.campaign,
          date:e.date,
          bucket:e.bucket,
          setterName:e.setter,
          keyword:e.keyword,
          value:e.value,
        }),
      });
      const json = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(json.error || "Manual entry failed");
      const entry = {
        ts:"Just now", setter:e.setter, camp:e.campaign, kw:e.keyword, bucket:e.bucket, value:e.value, source:"manual", eventType:"manual"
      };
      setNewEntries(x=>[entry, ...x]);
      showToast("Manual correction saved");
      await loadDashboard({silent:true});
    }catch(err){
      console.error(err);
      showToast(err?.message || "Manual correction failed");
    }
  };

  const loadDashboard = async ({silent=false}={}) => {
    if(!silent) setLoading(true);
    setLoadError(null);
    const params = new URLSearchParams({
      account,
      status:"all",
      level:"ad",
      dateFrom:dateRange.dateFrom,
      dateTo:dateRange.dateTo,
    });
    try{
      const res = await fetch("/api/ads-tracker?"+params.toString(), {cache:"no-store"});
      const json = await res.json();
      if(!res.ok) throw new Error(json.error || "Ads Tracker API failed");
      setDashboard(json);
    }catch(err){
      console.error(err);
      setDashboard({error:true, rows:[], dailyRows:[], recentEvents:[], eventsHistory:[]});
      setLoadError(err?.message || "Live data unavailable");
      showToast("Live data unavailable");
    }finally{
      setLoading(false);
    }
  };

  const onResolveAlert = async (payload) => {
    const res = await fetch("/api/ads-tracker/attribution-alerts", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    const json = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error || "Attribution save failed");
    showToast("Attribution saved");
    await loadDashboard({silent:true});
  };

  useEffect(()=>{
    loadDashboard();
  }, [account, dateRange.dateFrom, dateRange.dateTo]);

  const apiCampaigns = useMemo(
    () => campaignsFromDashboard(dashboard, dateRange),
    [dashboard, dateRange.dateFrom, dateRange.dateTo]
  );
  const liveCampaigns = useMemo(
    () => filterCampaignsBySearch(applyLocalEntriesToCampaigns(apiCampaigns, newEntries), search),
    [apiCampaigns, newEntries, search]
  );
  const scopedCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, account, status),
    [liveCampaigns, account, status]
  );
  const metricCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, account, status),
    [liveCampaigns, account, status]
  );
  const resolveCampaigns = useMemo(
    () => scopeCampaigns(liveCampaigns, account, "all"),
    [liveCampaigns, account]
  );
  const liveRecent = useMemo(
    () => recentEntriesFromDashboard(dashboard),
    [dashboard]
  );
  const fetchedLabel = loadError
    ? "Live data unavailable"
    : (dashboard ? `Live · ${rangeLabel(dateRange)}` : "Loading live data");

  const syncNow = async () => {
    if(syncing) return;
    setSyncing(true);
    showToast("Syncing ads + sales rows…");
    const body = JSON.stringify({dateFrom:dateRange.dateFrom, dateTo:dateRange.dateTo});
    try{
      const [sales, ads] = await Promise.all([
        fetch("/api/sync/sales-tracker-rows", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
        fetch("/api/sync/ads-tracker", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body,
        }),
      ]);
      const salesOk = sales.ok;
      const adsOk = ads.ok;
      if(!salesOk && !adsOk) throw new Error("Sync failed");
      await loadDashboard({silent:true});
      if(salesOk && adsOk) showToast("Synced · live data refreshed");
      else if(adsOk) showToast("Meta synced · sales sync needs setup");
      else showToast("Sales synced · Meta sync needs logs");
    }catch(err){
      console.error(err);
      showToast("Sync failed · check auth/logs");
    }finally{
      setSyncing(false);
    }
  };

  return (
    <div className="app">
        <div className="page">
          {/* Header */}
          <div className="page-head">
            <div>
              <h1 className="page-title">Ads Tracker</h1>
            </div>
            <button className="sync-pill" onClick={syncNow} disabled={syncing}>
              <svg className="sync-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/></svg>
              <span>{syncing ? "Syncing…" : "Sync now"}</span>
            </button>
          </div>

          {/* Filter bar */}
          <div className="filter-bar">
            <SelectFilter
              label="Account"
              value={account}
              onChange={setAccount}
              options={[
                {id:"all",label:"All accounts"},
                {id:"tyson",label:"Tyson"},
                {id:"keith",label:"Keith"},
              ]}
            />
            <Segmented
              value={status}
              onChange={setStatus}
              options={[
                {id:"active",label:"Active"},
                {id:"finished",label:"Finished"},
                {id:"all",label:"All"},
              ]}
            />
            <div className="filter-divider"></div>
            <DateDropdown value={dateRange} onChange={setDateRange} />
            <div style={{flex:1}}></div>
            <label className="search-control">
              <IcSearch/>
              <input
                className="search-input"
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Search"
              />
            </label>
          </div>

          {/* Campaign table */}
          <div className="section" style={{marginTop:0}}>
            <div className="section-head">
              <div className="section-label">Campaign performance</div>
              <div className="section-meta">{loading ? "Loading…" : fetchedLabel}</div>
            </div>
            <CampaignTable account={account} status={status} campaigns={scopedCampaigns} />
          </div>

          {/* Charts */}
          <MetricCardBoard campaigns={metricCampaigns} dashboard={dashboard}/>

          <TasksSection dashboard={dashboard} campaigns={resolveCampaigns} onResolve={onResolveAlert} onToast={showToast} onOpenWorkspace={()=>setWorkspaceOpen(true)}/>

          <CalendarSection dashboard={dashboard} dateRange={dateRange} onOpenWorkspace={()=>setWorkspaceOpen(true)}/>

          {/* Recent entries (collapsed) */}
          <RecentEntries
            extra={[...newEntries, ...liveRecent]}
            includeFallback={dashboard?.mock}
            campaigns={resolveCampaigns}
            onManualSubmit={onLogEntry}
            onResolve={onResolveAlert}
            onToast={showToast}
          />

          <div className="section chart-actions-cell">
            <div className="section-head">
              <div className="section-label">Actions</div>
              <div className="section-meta">Export</div>
            </div>
            <Actions campaigns={scopedCampaigns} onToast={showToast}/>
          </div>

          <div style={{marginTop:40,color:'var(--text-4)',fontSize:11,display:'flex',justifyContent:'space-between'}}>
            <span>Ads Tracker v1.4 · Client Conversion OS</span>
            <span className="mono">{fetchedLabel}</span>
          </div>
        </div>
        {toast && (
          <div className="toast">
            <span className="toast-dot"></span>
            {toast}
          </div>
        )}
        {workspaceOpen && (
          <AttributionWorkspace
            dashboard={dashboard}
            campaigns={resolveCampaigns}
            onResolve={onResolveAlert}
            onToast={showToast}
            onClose={()=>setWorkspaceOpen(false)}
          />
        )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
