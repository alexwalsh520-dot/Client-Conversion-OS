<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DMs — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>(function(){try{var t=localStorage.getItem("ccos-theme:last");if(t!=="light"&&t!=="dark")t="dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(t);}catch(e){}try{window.addEventListener("storage",function(e){if(e.key==="ccos-theme:last"){var n=e.newValue==="light"?"light":"dark";var c=document.documentElement.classList;c.remove("light","dark");c.add(n);}});}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Theme tokens — copied verbatim from ads-tracker-export.html so the DMs tab
     matches the Ads tab pixel-for-pixel (deep black/charcoal + gold accent). */
  :root{
    --bg: #0a0a0a;
    --bg-1: #0d0d0d;
    --panel: #111111;
    --panel-2: #141414;
    --row-hover: #141414;
    --border: #1f1f1f;
    --border-2: #262626;
    --text: #e8e8e8;
    --text-2: #a8a8a8;
    --text-3: #6b6b6b;
    --text-4: #4a4a4a;
    --green: #7dd3a8;
    --green-dim: #4f9b76;
    --red: #e89a94;
    --red-dim: #a36560;
    --gold: #d4b27a;
    --gold-dim: #8a7348;
    --blue: #7aa7d4;
    --focus: #2a2a2a;
    --mono: 'JetBrains Mono',ui-monospace,monospace;
  }
  html.light{
    --bg:#f6f6f4;
    --bg-1:#fbfbfa;
    --panel:#ffffff;
    --panel-2:#f0f0ee;
    --row-hover:#f3f3f1;
    --border:rgba(0,0,0,.10);
    --border-2:rgba(0,0,0,.16);
    --focus:rgba(0,0,0,.26);
    --text:#18181b;
    --text-2:#3f3f46;
    --text-3:#71717a;
    --text-4:#9a9aa3;
    --green:#3f9e6b;
    --green-dim:#6fae90;
    --red:#c0504a;
    --red-dim:#cf8b86;
    --gold:#a9823f;
    --gold-dim:#b89a6a;
    --blue:#4f7fb0;
    color-scheme:light;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;height:100%}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input, select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--focus);background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---- App shell: full-height 3-pane inbox ---- */
  .app{height:100vh;display:flex;flex-direction:column;background:var(--bg)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg-1);flex:0 0 auto}
  .topbar-left{display:flex;flex-direction:column;gap:2px;min-width:0}
  .topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.02em;margin:0}
  .topbar-sub{font-size:11px;color:var(--text-3)}
  .topbar-sub b{color:var(--text-2);font-weight:600}
  .sync-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-2);border-radius:99px;font-size:11px;color:var(--text-3);background:var(--bg-1);letter-spacing:0.01em;flex:0 0 auto}
  .sync-pill .dot{width:6px;height:6px;border-radius:99px;background:var(--green);box-shadow:0 0 7px var(--green-dim)}

  .panes{flex:1;display:grid;grid-template-columns:340px 1fr 312px;min-height:0}
  .panes.no-profile{grid-template-columns:340px 1fr}
  @media (max-width:1180px){ .panes{grid-template-columns:300px 1fr} .panes.no-profile{grid-template-columns:300px 1fr} .pane-profile{display:none} }
  @media (max-width:820px){ .panes{grid-template-columns:1fr} .panes.no-profile{grid-template-columns:1fr} .pane-list.has-sel{display:none} .pane-convo{display:none} .pane-convo.has-sel{display:flex} }

  /* ---- LEFT pane: thread list ---- */
  .pane-list{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;background:var(--panel)}
  .list-head{flex:0 0 auto;padding:12px 12px 10px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .search-control{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border-2);border-radius:8px;background:var(--panel);color:var(--text-3);font-size:12px;width:100%}
  .search-control:focus-within{background:var(--panel-2);border-color:var(--focus);color:var(--text-2)}
  .search-input{width:100%;color:var(--text);font-size:12.5px;flex:1}
  .search-input::placeholder{color:var(--text-4)}

  .filter-row{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap}
  .filter{position:relative}
  .filter-btn{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border:1px solid var(--border-2);border-radius:7px;background:var(--panel);color:var(--text);font-size:11.5px;min-height:28px}
  .filter-btn:hover{background:var(--panel-2)}
  .filter-btn.open{background:var(--panel-2);border-color:var(--focus)}
  .filter-btn.active{border-color:var(--gold-dim);color:var(--gold)}
  .filter-btn .lbl{color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-right:1px}
  .filter-btn .val{color:var(--text);font-size:11.5px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filter-btn.active .val{color:var(--gold)}
  .filter-btn .dim{color:var(--text-3)}
  .filter-btn .caret{color:var(--text-3);font-size:9px;margin-left:1px}
  .filters-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border-2);border-radius:7px;background:var(--panel);color:var(--text-2);font-size:11.5px;min-height:28px}
  .filters-toggle:hover{background:var(--panel-2)}
  .filters-toggle.on{border-color:var(--gold-dim);color:var(--gold)}
  .filter-count{display:inline-flex;align-items:center;justify-content:center;min-width:15px;height:15px;padding:0 4px;border-radius:99px;background:var(--gold);color:#1a1407;font-size:9.5px;font-weight:700}
  .clear-link{font-size:11px;color:var(--text-3);padding:6px 4px}
  .clear-link:hover{color:var(--gold)}

  /* Dropdown panel */
  .pop{position:absolute;top:calc(100% + 6px);left:0;background:var(--panel);border:1px solid var(--border-2);border-radius:8px;box-shadow:0 14px 44px rgba(0,0,0,0.65);z-index:60;min-width:210px;max-width:320px;padding:6px;color:var(--text-2);max-height:340px;overflow:auto}
  .pop-item{padding:7px 10px;border-radius:5px;font-size:12px;color:var(--text-2);display:flex;justify-content:space-between;cursor:pointer;align-items:center;gap:10px}
  .pop-item:hover{background:var(--panel-2);color:var(--text)}
  .pop-item.selected{color:var(--text)}
  .pop-item .lbl-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pop-item .check{color:var(--gold);font-size:10px;opacity:0;flex:0 0 auto}
  .pop-item.selected .check{opacity:1}
  .pop-sub{padding:8px 10px 5px;font-size:9.5px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.09em}
  .pop-sub.dim{color:var(--text-4)}
  .pop-sub .dot{display:inline-block;width:5px;height:5px;border-radius:99px;margin-right:6px;vertical-align:middle}
  .pop-sub.live .dot{background:var(--green);box-shadow:0 0 5px var(--green-dim)}
  .pop-sub.off .dot{background:var(--text-4)}

  /* Date panel */
  .date-pop{width:500px;display:grid;grid-template-columns:160px 1fr;padding:0;max-width:none}
  .date-presets{border-right:1px solid var(--border);padding:6px}
  .date-cal{padding:12px 14px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-2);margin-bottom:10px}
  .cal-nav{color:var(--text-3);padding:3px 6px;border-radius:4px}
  .cal-nav:hover{color:var(--text);background:var(--panel-2)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
  .cal-dow{color:var(--text-4);text-align:center;padding:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
  .cal-day{text-align:center;padding:5px 0;color:var(--text-2);border-radius:4px;cursor:pointer}
  .cal-day:hover{background:var(--panel-2);color:var(--text)}
  .cal-day.muted{color:var(--text-4)}
  .cal-day.in-range{background:var(--panel-2);color:var(--text)}
  .cal-day.endpoint{background:var(--gold);color:var(--bg);font-weight:600}
  .cal-day.today:not(.endpoint){box-shadow:inset 0 0 0 1px var(--gold-dim);color:var(--gold)}
  .cal-day.trail{visibility:hidden}
  .date-foot{border-top:1px solid var(--border);padding:10px 14px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
  .apply-btn{padding:5px 12px;border-radius:5px;background:var(--gold);color:var(--bg);font-weight:600;font-size:11px}
  .apply-btn:hover{filter:brightness(1.08)}

  /* Thread list */
  .list-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
  .list-meta{padding:9px 14px;font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2}
  .list-body{padding:6px 8px;display:flex;flex-direction:column;gap:4px}
  .tcard{display:flex;align-items:flex-start;gap:11px;padding:10px 11px;cursor:pointer;border-radius:10px;transition:background .1s}
  .tcard:hover{background:var(--row-hover)}
  .tcard.sel{background:var(--panel-2)}
  .avatar{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;text-transform:uppercase}
  .avatar.lg{width:56px;height:56px;font-size:20px}
  .tcard-main{flex:1;min-width:0}
  .tcard-top{display:flex;align-items:baseline;gap:7px}
  .tcard-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .tcard-time{font-size:10.5px;color:var(--text-4);white-space:nowrap;flex:0 0 auto}
  .tcard-handle{font-size:11px;color:var(--text-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .tcard-prev{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
  .tcard-prev .dir{color:var(--text-4)}
  .tcard-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid var(--border-2);color:var(--text-3);background:var(--bg-1);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .pill.kw{border-color:rgba(212,178,122,.32);background:rgba(212,178,122,.09);color:var(--gold)}
  .pill .dot{width:5px;height:5px;border-radius:99px;background:currentColor;flex:0 0 auto}
  .pill.hot{border-color:rgba(232,154,148,.34);background:rgba(232,154,148,.10);color:var(--red)}
  .pill.warm{border-color:rgba(212,178,122,.30);background:rgba(212,178,122,.08);color:var(--gold)}
  .pill.contact{border-color:rgba(122,167,212,.30);background:rgba(122,167,212,.09);color:var(--blue)}
  .pill.new{border-color:var(--border-2);color:var(--text-3)}
  .pill.qual{border-color:rgba(125,211,168,.34);background:rgba(125,211,168,.10);color:var(--green)}
  .pill.booked{border-color:rgba(122,167,212,.36);background:rgba(122,167,212,.12);color:var(--blue)}
  .pill.closed{border-color:rgba(125,211,168,.40);background:rgba(125,211,168,.14);color:var(--green)}

  /* ---- CENTER pane: conversation ---- */
  .pane-convo{display:flex;flex-direction:column;min-height:0;background:var(--bg)}
  .convo-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .convo-head .back{display:none}
  @media (max-width:820px){ .convo-head .back{display:inline-flex;color:var(--text-2);padding:4px} }
  .convo-head-main{min-width:0;flex:1}
  .panel-toggle{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--border-2);border-radius:7px;background:var(--panel);color:var(--text-3)}
  .panel-toggle:hover{background:var(--panel-2);color:var(--text)}
  .panel-toggle.on{border-color:var(--gold-dim);color:var(--gold)}
  @media (max-width:1180px){ .panel-toggle{display:none} }
  .convo-head-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .convo-head-sub{font-size:11px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .convo-scroll{flex:1;overflow-y:auto;padding:18px 22px 26px;min-height:0;display:flex;flex-direction:column;gap:2px}
  .day-sep{align-self:center;font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 8px;padding:3px 12px;border:1px solid var(--border);border-radius:99px;background:var(--bg-1)}
  .brow{display:flex;margin:3px 0;max-width:100%}
  .brow.out{justify-content:flex-end}
  .bwrap{max-width:74%;display:flex;flex-direction:column}
  .brow.out .bwrap{align-items:flex-end}
  .bubble{padding:9px 13px;border-radius:14px;font-size:12.5px;line-height:1.46;white-space:pre-wrap;word-break:break-word}
  .bubble.in{background:var(--panel-2);color:var(--text);border:1px solid var(--border-2);border-bottom-left-radius:5px}
  .bubble.out{background:#2563eb;color:#fff;border-bottom-right-radius:5px}
  html.light .bubble.out{background:#2f6fde;color:#fff}
  .btime{font-size:9.5px;color:var(--text-4);margin-top:4px;padding:0 4px}
  .convo-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);text-align:center;padding:30px;gap:8px}
  .convo-empty .ico{color:var(--text-4);opacity:.7}
  .convo-empty .big{font-size:15px;color:var(--text-2);font-weight:600}
  .convo-empty .small{font-size:12.5px;color:var(--text-3);max-width:320px}

  /* ---- RIGHT pane: profile ---- */
  .pane-profile{border-left:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;min-height:0;overflow-y:auto}
  .prof-top{padding:24px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:11px;text-align:center;border-bottom:1px solid var(--border)}
  .prof-name{font-size:15px;font-weight:600;color:var(--text)}
  .prof-handle{font-size:12px;color:var(--text-3);margin-top:-4px}
  .prof-stage-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .prof-sec{padding:16px 20px;border-bottom:1px solid var(--border)}
  .prof-sec:last-child{border-bottom:none}
  .prof-sec-title{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:11px}
  .kv{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:9px;font-size:12px}
  .kv:last-child{margin-bottom:0}
  .kv .k{color:var(--text-3);flex:0 0 auto}
  .kv .v{color:var(--text);text-align:right;word-break:break-word}
  .kv .v.gold{color:var(--gold)}
  .kv .v.muted{color:var(--text-4)}
  .score-wrap{margin-top:4px}
  .score-bar{height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden;border:1px solid var(--border-2)}
  .score-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
  .score-num{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .score-num .big{font-size:22px;font-weight:600;color:var(--text)}
  .score-num .of{font-size:11px;color:var(--text-4)}
  .flags{display:flex;flex-direction:column;gap:8px;margin-top:13px}
  .flag{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text-2)}
  .flag .mk{width:16px;height:16px;border-radius:5px;border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--text-4)}
  .flag.on .mk{background:rgba(125,211,168,.14);border-color:rgba(125,211,168,.4);color:var(--green)}
  .flag.on{color:var(--text)}
  .prof-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-4);text-align:center;padding:30px;gap:8px;font-size:12.5px}

  /* States */
  .skel{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:11px;align-items:center}
  .skel .sk-av{width:36px;height:36px;border-radius:50%;background:var(--panel-2);flex:0 0 auto}
  .skel .sk-lines{flex:1}
  .skel .sk-line{height:9px;border-radius:4px;background:var(--panel-2);margin-bottom:7px}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}
  .skel{animation:pulse 1.4s ease-in-out infinite}
  .list-empty{padding:50px 22px;text-align:center;color:var(--text-3);font-size:12.5px}
  .list-empty .big{font-size:14px;color:var(--text-2);margin-bottom:6px;font-weight:600}
  .more-btn{display:block;width:calc(100% - 28px);margin:12px 14px;padding:9px;border:1px solid var(--border-2);border-radius:8px;background:var(--panel);color:var(--text-2);font-size:12px}
  .more-btn:hover:not(:disabled){background:var(--panel-2);color:var(--text)}
  .more-btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ------- Icons (minimal, stroke) — same set/style as the Ads tab
const Icon = ({ d, size=14, stroke=1.4 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IcCheck = () => <Icon d={<path d="M20 6L9 17l-5-5"/>} />;
const IcCal = () => <Icon d={<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>} />;
const IcCaret = () => (
  <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"><path d="M1 1l4 4 4-4"/></svg>
);
const IcSearch = () => <Icon d={<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>} />;
const IcSliders = () => <Icon d={<><path d="M4 6h12M4 12h6M4 18h9"/><circle cx="18" cy="6" r="2"/><circle cx="13" cy="12" r="2"/><circle cx="17" cy="18" r="2"/></>} />;

const IcInbox = () => <Icon size={34} stroke={1.1} d={<><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></>} />;

// ------- Date helpers — copied verbatim from ads-tracker-export.html
function isoDate(d){ return d.toISOString().slice(0,10); }
function todayEt(){
  return new Intl.DateTimeFormat("en-CA", { timeZone:"America/New_York", year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
}
function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z"); d.setUTCDate(d.getUTCDate()+days); return isoDate(d);
}
function monthStartIso(date){ return (date || todayEt()).slice(0,7)+"-01"; }
function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00"); d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}
function monthTitle(monthIso){ const d = new Date(monthIso+"T00:00:00"); return d.toLocaleDateString("en-US", {month:"long", year:"numeric"}); }
function daysInMonth(monthIso){ const d = new Date(monthIso+"T00:00:00"); return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); }
function isoForMonthDay(monthIso, day){ return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`; }
function dateLabelFromIso(value){
  if(!value) return ""; const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}
function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom), to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}
const PRESETS = [
  {id:"today",label:"Today"},
  {id:"yesterday",label:"Yesterday"},
  {id:"last3",label:"Last 3 days"},
  {id:"last7",label:"Last 7 days"},
  {id:"last14",label:"Last 14 days"},
  {id:"last30",label:"Last 30 days"},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];
function labelForPreset(id){ return PRESETS.find(p=>p.id===id)?.label || "Custom"; }
function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){ const y = shiftIso(anchor, -1); return {preset:id, dateFrom:y, dateTo:y}; }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){ const start = shiftMonth(monthStartIso(anchor), -1); return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))}; }
  return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
}

function relTime(iso){
  if(!iso) return "";
  const d = new Date(iso); const now = new Date();
  const mins = Math.round((now - d)/60000);
  if(mins < 1) return "now";
  if(mins < 60) return mins+"m";
  const hrs = Math.round(mins/60);
  if(hrs < 24) return hrs+"h";
  const days = Math.round(hrs/24);
  if(days < 7) return days+"d";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function clockTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit"});
}
function dayKey(iso){
  if(!iso) return "";
  return new Intl.DateTimeFormat("en-CA",{timeZone:"America/New_York",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(iso));
}
function dayHeading(iso){
  const k = dayKey(iso); const today = todayEt(); const yest = shiftIso(today,-1);
  if(k===today) return "Today";
  if(k===yest) return "Yesterday";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
}

// ------- Calendar widget — copied verbatim from ads-tracker-export.html
function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button key={i} className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")} onClick={()=>onPick(x.iso)}>{x.d}</button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const current = value || rangeForPreset("last7");
  const [draft, setDraft] = useState(current);
  const [monthIso, setMonthIso] = useState(monthStartIso(current.dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  useEffect(()=>{
    if(open){ setDraft(current); setMonthIso(monthStartIso(current.dateTo)); setSelectingEnd(false); }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){ setSelectingEnd(true); return {preset:"custom", dateFrom:iso, dateTo:iso}; }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop">
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div key={p.id} className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom"){ onChange && onChange(rangeForPreset(p.id)); setOpen(false); }
                  else { setDraft({...draft, preset:"custom"}); setSelectingEnd(false); }
                }}>
                <span className="lbl-txt">{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar monthIso={monthIso} rangeStart={draft.dateFrom} rangeEnd={draft.dateTo}
              onPick={pickDate} onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))} />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ------- Custom in-app dropdown — same styling as the Ads tab's SelectFilter.
// An option with `_sub:true` renders as a non-clickable subheading row.
function SelectFilter({label, options, value, onChange, minWidth}){
  const [open,setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const selectable = options.filter(o=>!o._sub);
  const cur = selectable.find(o=>o.id===value) || selectable[0];
  const active = !!value;
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open ":"")+(active?"active":"")} onClick={()=>setOpen(!open)} style={minWidth?{minWidth}:null}>
        {label && <span className="lbl">{label}</span>}
        <span className="val">{cur ? cur.label : "—"}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop">
          {options.map((o,i)=> o._sub ? (
            <div key={"s"+i} className={"pop-sub "+(o.sub||"")}>{o.dot && <span className="dot"/>}{o.label}</div>
          ) : (
            <div key={o.id} className={"pop-item "+(value===o.id?"selected":"")} onClick={()=>{onChange(o.id);setOpen(false);}}>
              <span className="lbl-txt">{o.label}</span>
              <span className="check"><IcCheck/></span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function initials(name, handle){
  const src = (name || handle || "").replace(/^@/,"").trim();
  if(!src) return "?";
  const parts = src.split(/[\s_.]+/).filter(Boolean);
  if(parts.length >= 2) return (parts[0][0]+parts[1][0]);
  return src.slice(0,2);
}
function displayName(t){
  return t.leadName || (t.handle ? "@"+t.handle.replace(/^@/,"") : "Lead");
}
// Deterministic, pleasant initials-avatar color from a name/handle/id seed.
const AVATAR_COLORS = [
  "#3b6fd4","#8b5cf6","#d4763b","#3ba88a","#c2477e",
  "#d4a93b","#5b8fd4","#a04ec9","#cf5b52","#4fae7b",
];
function avatarColor(seed){
  const s = String(seed || "?");
  let h = 0;
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function avatarSeed(t){ return t.leadName || t.handle || t.conversationId; }

const CLIENT_LABELS = {
  tyson_sonnek:"Tyson", tyson:"Tyson",
  antwan_rarcus:"Antwan", antwan:"Antwan",
  keith_holland:"Keith", keith:"Keith",
  lucy_hubbard:"Lucy", lucy:"Lucy",
  matthew_conder:"Matthew",
};
function clientLabel(c){ return CLIENT_LABELS[c] || (c ? c.replace(/_/g," ") : c); }

function stagePillClass(stage){
  if(!stage || !stage.label) return "";
  if(stage.label==="Qualified") return "qual";
  if(stage.label==="Hot lead") return "hot";
  if(stage.label==="Warm") return "warm";
  if(stage.label==="In contact") return "contact";
  return "new";
}

// ------- Thread card (LEFT pane) -------
// At most ONE status/stage pill: Closed > Booked > stage. Plus the keyword tag.
function statusPill(t){
  if(t.closed) return {cls:"closed", label:"Closed"};
  if(t.booked) return {cls:"booked", label:"Booked"};
  if(t.stage && t.stage.label) return {cls:stagePillClass(t.stage), label:t.stage.label};
  return null;
}
function ThreadCard({t, selected, onSelect}){
  const sp = statusPill(t);
  return (
    <div className={"tcard "+(selected?"sel":"")} onClick={()=>onSelect(t)}>
      <div className="avatar" style={{background:avatarColor(avatarSeed(t))}}>{initials(t.leadName, t.handle)}</div>
      <div className="tcard-main">
        <div className="tcard-top">
          <span className="tcard-name">{displayName(t)}</span>
          <span className="tcard-time">{relTime(t.lastAt)}</span>
        </div>
        {t.handle && t.leadName && <div className="tcard-handle">@{t.handle.replace(/^@/,"")}</div>}
        <div className="tcard-prev">
          <span className="dir">{t.lastDirection==="outbound"?"You: ":""}</span>{t.lastMessage}
        </div>
        {(sp || t.keyword) && (
          <div className="tcard-tags">
            {sp && <span className={"pill "+sp.cls}><span className="dot"></span>{sp.label}</span>}
            {t.keyword && <span className="pill kw"><span className="dot"></span>{t.keyword}</span>}
          </div>
        )}
      </div>
    </div>
  );
}

// ------- Conversation (CENTER pane) -------
function Conversation({t, onBack, profileOpen, onToggleProfile}){
  const scrollRef = useRef(null);
  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[t && t.conversationId]);

  if(!t){
    return (
      <div className="pane-convo">
        <div className="convo-empty">
          <div className="ico"><IcInbox/></div>
          <div className="big">Select a lead</div>
          <div className="small">Pick a keyword-linked lead on the left to read the full message history.</div>
        </div>
      </div>
    );
  }
  const msgs = t.messages || [];
  let lastDay = null;
  return (
    <div className="pane-convo has-sel">
      <div className="convo-head">
        <button className="back" onClick={onBack}><IcBack/></button>
        <div className="avatar" style={{background:avatarColor(avatarSeed(t))}}>{initials(t.leadName, t.handle)}</div>
        <div className="convo-head-main">
          <div className="convo-head-name">{displayName(t)}</div>
          <div className="convo-head-sub">
            {t.handle && t.leadName ? "@"+t.handle.replace(/^@/,"")+" · " : ""}
            {t.client ? clientLabel(t.client) : "Instagram"}
            {t.setterName ? " · "+t.setterName : ""}
            {" · "+t.messageCount+" message"+(t.messageCount===1?"":"s")}
          </div>
        </div>
        <button className={"panel-toggle "+(profileOpen?"on":"")} onClick={onToggleProfile}
          title={profileOpen?"Hide lead details":"Show lead details"}><IcPanel/></button>
      </div>
      {msgs.length===0 ? (
        <div className="convo-empty">
          <div className="ico"><IcInbox/></div>
          <div className="big">No captured conversation</div>
          <div className="small">This lead fired the keyword <b style={{color:"var(--gold)"}}>{t.keyword||"—"}</b> but no DM thread is linked yet. Source &amp; status are in the right panel.</div>
        </div>
      ) : (
        <div className="convo-scroll" ref={scrollRef}>
          {msgs.map((m,i)=>{
            const out = m.direction === "outbound";
            const dk = dayKey(m.sentAt);
            const sep = dk !== lastDay;
            lastDay = dk;
            return (
              <React.Fragment key={i}>
                {sep && <div className="day-sep">{dayHeading(m.sentAt)}</div>}
                <div className={"brow "+(out?"out":"in")}>
                  <div className="bwrap">
                    <div className={"bubble "+(out?"out":"in")}>{m.body}</div>
                    <div className="btime">{clockTime(m.sentAt)}</div>
                  </div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Profile({t}){
  if(!t){
    return (
      <div className="pane-profile">
        <div className="prof-empty">Lead details appear here once you open a conversation.</div>
      </div>
    );
  }
  const stage = t.stage;

  const linked = t.keyword || t.campaignName || t.adName;

  return (

      <div className="prof-top">

          {t.booked && <span className="pill booked"><span className="dot"></span>Booked</span>}
          {stage && stage.label && <span className={"pill "+stageCls}><span className="dot"></span>{stage.label}</span>}

      {stage ? (
        <div className="prof-sec">
          <div className="prof-sec-title">Booking readiness</div>

            <div className="score-wrap">
              <div className="score-num"><span className="big">{score}</span><span className="of">/ 100</span></div>
              <div className="score-bar"><div className="score-fill" style={{width:Math.max(3,Math.min(100,score))+"%"}}/></div>
            </div>
          ) : <div className="kv"><span className="k">Score</span><span className="v muted">—</span></div>}
          <div className="flags">
            <FlagRow on={stage.goalClear} label="Goal clear" />
            <FlagRow on={stage.gapClear} label="Gap clear" />
            <FlagRow on={stage.stakesClear} label="Stakes clear" />
            <FlagRow on={stage.qualified} label="Qualified" />
          </div>
        </div>
      ) : (
        <div className="prof-sec">
          <div className="prof-sec-title">Booking readiness</div>
          <div className="kv"><span className="k">Stage</span><span className="v muted">Not analyzed yet</span></div>
        </div>
      )}

      <div className="prof-sec">
        <div className="prof-sec-title">Source</div>
        {linked ? (
          <>
            {t.keyword && <div className="kv"><span className="k">Keyword</span><span className="v gold">{t.keyword}</span></div>}
            {t.campaignName && <div className="kv"><span className="k">Campaign</span><span className="v">{t.campaignName}</span></div>}
            {t.adsetName && <div className="kv"><span className="k">Ad set</span><span className="v">{t.adsetName}</span></div>}
            {t.adName && <div className="kv"><span className="k">Ad</span><span className="v">{t.adName}</span></div>}
          </>
        ) : (
          <div className="kv"><span className="k">Origin</span><span className="v muted">Organic / not linked to an ad</span></div>
        )}
      </div>

      <div className="prof-sec">
        <div className="prof-sec-title">Conversation</div>
        <div className="kv"><span className="k">Client</span><span className="v">{t.client ? clientLabel(t.client) : "—"}</span></div>
        {t.setterName && <div className="kv"><span className="k">Setter</span><span className="v">{t.setterName}</span></div>}
        <div className="kv"><span className="k">Messages</span><span className="v">{t.messageCount}</span></div>
        <div className="kv"><span className="k">Last activity</span><span className="v">{relTime(t.lastAt)} ago</span></div>
      </div>
    </div>
  );
}

    qs.set("page", String(page));
    fetch("/api/dms/conversations?"+qs.toString())
      .then(r=>r.json())
      .then(d=>{
        if(off) return;
        if(d.error){ setErr(d.error); setData(null); }
        else {
          setData(d);
          if(d.filters) setFilterOpts(d.filters);
          setAccThreads(prev => page===1 ? (d.threads||[]) : [...prev, ...(d.threads||[])]);
        }
      })
      .catch(e=>{ if(!off) setErr(String(e)); })
      .finally(()=>{ if(!off){ setLoading(false); setLoadingMore(false); } });
    return ()=>{ off = true; };
  },[fetchKey]);

  // Client list is STATIC — always every client + All Clients, never derived from
  // the current result set (that was the disappearing-option bug).
  const clientOpts = useMemo(()=>[
    {id:"", label:"All clients"},
    ...ALL_CLIENTS.map(c=>({id:c, label:clientLabel(c)})),
  ],[]);
  // Campaigns grouped Active / Off via campaign_effective_status.
  const campaignOpts = useMemo(()=>{
    const camps = filterOpts.campaigns || [];
    const active = camps.filter(c=>c.status==="ACTIVE");
    const off = camps.filter(c=>c.status!=="ACTIVE");
    const out = [{id:"", label:"All campaigns"}];
    if(active.length){
      out.push({_sub:true, sub:"live", dot:true, label:"Active"});
      active.forEach(c=>out.push({id:c.id, label:c.label}));
    }
    if(off.length){
      out.push({_sub:true, sub:"off", dot:true, label:"Off"});
      off.forEach(c=>out.push({id:c.id, label:c.label}));
    }
    return out;
  },[filterOpts.campaigns]);
  const keywordOpts = useMemo(()=>[
    {id:"", label:"All keywords"},
    ...(filterOpts.keywords||[]).map(k=>({id:k, label:k})),
  ],[filterOpts.keywords]);
  const adsetOpts = useMemo(()=>[
    {id:"", label:"All ad sets"},
    ...(filterOpts.adsets||[]).map(a=>({id:a.id, label:a.label})),
  ],[filterOpts.adsets]);
  const adOpts = useMemo(()=>[
    {id:"", label:"All ads"},
    ...(filterOpts.ads||[]).map(a=>({id:a.id, label:a.label})),
  ],[filterOpts.ads]);

  const total = data?.total || 0;
  const pageSize = data?.pageSize || 40;
  const hasMore = accThreads.length < total;
  const totalLeads = data?.totalLeads || 0;
  const bookedLeads = data?.bookedLeads || 0;
  const closedLeads = data?.closedLeads || 0;
  const activeFilterCount = [client, campaign, keyword, adset, ad].filter(Boolean).length;

  const selected = useMemo(()=> accThreads.find(t=>t.conversationId===selectedId) || null, [accThreads, selectedId]);

  const clearFilters = useCallback(()=>{
    setClient(""); setCampaign(""); setKeyword(""); setAdset(""); setAd("");
  },[]);

  // honest counter text — anchored on keyword-fired leads
  const counterText = useMemo(()=>{
    if(loading) return "Loading…";
    if(activeFilterCount || debouncedSearch){
      return total.toLocaleString()+" lead"+(total===1?"":"s")+" · of "+totalLeads.toLocaleString()+" keyword-linked";
    }
    return totalLeads.toLocaleString()+" keyword-linked lead"+(totalLeads===1?"":"s")+" · "+bookedLeads.toLocaleString()+" booked · "+closedLeads.toLocaleString()+" closed";
  },[loading, activeFilterCount, debouncedSearch, total, totalLeads, bookedLeads, closedLeads]);

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <h1 className="topbar-title">DMs</h1>
          <div className="topbar-sub">{counterText}</div>
        </div>
        <span className="sync-pill"><span className="dot"/>Read-only · live</span>
      </div>

      <div className={"panes "+(profileOpen?"":"no-profile")}>
        {/* LEFT — thread list */}
        <div className={"pane-list "+(selected?"has-sel":"")}>
          <div className="list-head">
            <div className="search-control">
              <span style={{color:"var(--text-3)",display:"inline-flex"}}><IcSearch/></span>
              <input className="search-input" placeholder="Search leads & messages…" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="filter-row">
              <button className={"filters-toggle "+(showFilters?"on":"")} onClick={()=>setShowFilters(s=>!s)}>
                <IcSliders/>Filters{activeFilterCount>0 && <span className="filter-count">{activeFilterCount}</span>}
              </button>
              <DateDropdown value={range} onChange={setRange} />
              <SelectFilter label="Sort" options={SORTS} value={sort} onChange={setSort} />
              {activeFilterCount>0 && <button className="clear-link" onClick={clearFilters}>Clear</button>}
            </div>
            {showFilters && (
              <div className="filter-row">
                <SelectFilter options={clientOpts} value={client} onChange={setClient} />
                <SelectFilter label="Camp" options={campaignOpts} value={campaign} onChange={setCampaign} />
                <SelectFilter label="Kw" options={keywordOpts} value={keyword} onChange={setKeyword} />
                <SelectFilter label="Ad" options={adOpts} value={ad} onChange={setAd} />
                <SelectFilter label="Set" options={adsetOpts} value={adset} onChange={setAdset} />
              </div>
            )}
          </div>

          <div className="list-scroll">
            {loading && [0,1,2,3,4,5,6].map(i=>(
              <div className="skel" key={i}>
                <div className="sk-av" />
                <div className="sk-lines">
                  <div className="sk-line" style={{width:"40%"}} />
                  <div className="sk-line" style={{width:"75%",marginBottom:0}} />
                </div>
              </div>
            ))}

            {!loading && err && (
              <div className="list-empty"><div className="big">Couldn’t load</div><div>{err}</div></div>
            )}

            {!loading && !err && accThreads.length===0 && (
              <div className="list-empty">
                <div className="big">No conversations</div>
                <div>Try widening the date range or clearing a filter.</div>
              </div>
            )}

            {!loading && !err && accThreads.length>0 && (
              <>
                <div className="list-meta">{total.toLocaleString()} lead{total===1?"":"s"} · {rangeLabel(range)}</div>
                <div className="list-body">
                  {accThreads.map(t=>(
                    <ThreadCard key={t.conversationId} t={t} selected={t.conversationId===selectedId} onSelect={(x)=>setSelectedId(x.conversationId)} />
                  ))}
                </div>
                {hasMore && (
                  <button className="more-btn" disabled={loadingMore} onClick={()=>setPage(p=>p+1)}>
                    {loadingMore ? "Loading…" : "Load more ("+(total-accThreads.length).toLocaleString()+" more)"}
                  </button>
                )}
              </>
            )}
          </div>
        </div>

        {/* CENTER — conversation */}
        <Conversation t={selected} onBack={()=>setSelectedId(null)}
          profileOpen={profileOpen} onToggleProfile={()=>setProfileOpen(o=>!o)} />

        {/* RIGHT — profile (collapsible) */}
        {profileOpen && <Profile t={selected} />}
      </div>
    </div>
  );
}

class AppErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={error:null}; }
  static getDerivedStateFromError(error){ return {error}; }
  render(){
    if(this.state.error){
      return (
        <div style={{padding:"48px 32px",fontFamily:"system-ui,-apple-system,sans-serif",color:"#e5e5e7",background:"#0f0f12",minHeight:"100vh"}}>
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <div style={{color:"#c9a96e",fontSize:18,fontWeight:700,marginBottom:8}}>The DMs view hit a display error.</div>
            <div style={{color:"#a1a1aa",fontSize:14,marginBottom:20}}>This is a rendering problem, not lost data. Screenshot the details below for the team, then reload.</div>
            <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",background:"#18181b",border:"1px solid #27272a",borderRadius:8,padding:16,fontSize:12,color:"#fca5a5",maxHeight:320,overflow:"auto"}}>{String((this.state.error && (this.state.error.stack || this.state.error.message)) || this.state.error)}</pre>
            <button onClick={()=>location.reload()} style={{marginTop:20,padding:"10px 20px",background:"#c9a96e",color:"#0f0f12",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
