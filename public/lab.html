];

const SETTER_NAMES = ["Erin","Amara","Debbie","Kelechi","Gideon"];

/* ====== Setter capacity settings modal (gear) ====== */
function SetterCapacityModal({onClose, onSaved}){
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [cfg, setCfg] = useState(null);  // {mode, teamLeadsPerDay, setters:{...}}

  useEffect(()=>{
    let alive = true;
    (async()=>{
      try{
        const res = await fetch("/api/lab/setter-capacity");
        const data = await res.json();
        if(!alive) return;
        const setters = (data && data.setters) || {};
        const filled = {};
        SETTER_NAMES.forEach(n=>{ filled[n] = typeof setters[n]==="number" ? setters[n] : 100; });
        setCfg({
          mode: data && data.mode === "team" ? "team" : "per_setter",
          teamLeadsPerDay: (data && typeof data.teamLeadsPerDay==="number") ? data.teamLeadsPerDay : 100,
          setters: filled,
        });
      }catch(e){
        if(!alive) return;
        const filled = {};
        SETTER_NAMES.forEach(n=>{ filled[n]=100; });
        setCfg({mode:"per_setter", teamLeadsPerDay:100, setters:filled});
      }finally{
        if(alive) setLoading(false);
      }
    })();
    return ()=>{ alive = false; };
  },[]);

  const setMode = (mode)=> setCfg(c=>({...c, mode}));
  const setTeam = (v)=> setCfg(c=>({...c, teamLeadsPerDay: numOrZero(v)}));
  const setSetter = (name, v)=> setCfg(c=>({...c, setters:{...c.setters, [name]: numOrZero(v)}}));

  const save = async()=>{
    if(!cfg) return;
    setSaving(true);
    try{
      await fetch("/api/lab/setter-capacity", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(cfg),
      });
    }catch(e){ /* swallow — never crash the UI */ }
    setSaving(false);
    onClose();
    if(onSaved) onSaved();
  };

  return (
    <div className="lab-modal-backdrop" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="lab-modal" role="dialog" aria-modal="true" style={{width:480}}>
        <div className="lab-modal-head">
          <div>
            <h3 className="lab-modal-title">Setter capacity · leads per day</h3>
            <div className="lab-modal-sub">Sets the ceiling Gate 3 measures load against.</div>
          </div>
          <button className="lab-modal-close" onClick={onClose}>×</button>
        </div>
        <div className="lab-modal-body">
          {loading || !cfg ? (
            <div style={{fontSize:12,color:"var(--text-4)",padding:"8px 2px"}}>Loading…</div>
          ) : (
            <>
              <div className="lab-cap-toggle">
                <button
                  className={"lab-cap-seg "+(cfg.mode==="per_setter"?"on":"")}
                  onClick={()=>setMode("per_setter")}
                >Per setter</button>
                <button
                  className={"lab-cap-seg "+(cfg.mode==="team"?"on":"")}
                  onClick={()=>setMode("team")}
                >Team-wide</button>
              </div>

              {cfg.mode==="per_setter" ? (
                <div className="lab-cap-grid">
                  {SETTER_NAMES.map(name=>(
                    <div key={name} className="lab-cap-row">
                      <span className="lab-cap-name">{name}</span>
                      <input
                        className="lab-cap-input"
                        type="number" min="0"
                        value={cfg.setters[name]}
                        onChange={(e)=>setSetter(name, e.target.value)}
                      />
                      <span className="lab-cap-unit">leads/day</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="lab-cap-grid">
                  <div className="lab-cap-row">
                    <span className="lab-cap-name">Team leads/day</span>
                    <input
                      className="lab-cap-input"
                      type="number" min="0"
                      value={cfg.teamLeadsPerDay}
                      onChange={(e)=>setTeam(e.target.value)}
                    />
                    <span className="lab-cap-unit">total/day</span>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
        <div className="lab-modal-foot">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-confirm-big" disabled={loading||saving||!cfg} onClick={save}>
            {saving ? "Saving…" : "Save"}
          </button>
        </div>
      </div>
    </div>
  );
}
function numOrZero(v){ const n = parseInt(v,10); return Number.isFinite(n) && n>=0 ? n : 0; }

function Lab(){
  const [account, setAccount] = useState("tyson");
  const [dateRange, setDateRange] = useState(()=>rangeForPreset("last14"));
  const [turnOff, setTurnOff] = useState(null);   // ad row pending turn-off confirm
  const [promote, setPromote] = useState(null);   // ad row pending promote confirm
  const [capOpen, setCapOpen] = useState(false);  // setter capacity (gear) modal
  const [closer, setCloser] = useState(null);     // live closer-calendar payload
  const [setter, setSetter] = useState(null);     // live setter-load payload
  const [reloadKey, setReloadKey] = useState(0);  // bump to refetch after capacity save
  const acct = ACCOUNTS.find(a=>a.id===account) || ACCOUNTS[0];

  // Fetch gate 2 + gate 3 data for the selected account (on mount, account change,
  // date-range change, and after a capacity save).
  // The setter-load call carries the selected date range so Gate 3 + the detail
  // panel reflect a multi-day average over that window (closer-calendar stays as-is).
  const rangeFrom = (dateRange && dateRange.dateFrom) || "";
  const rangeTo = (dateRange && dateRange.dateTo) || "";
  useEffect(()=>{
    let alive = true;
    setCloser(null);
    setSetter(null);
    (async()=>{
      try{
        const res = await fetch("/api/lab/closer-calendar?account="+encodeURIComponent(account));
        const data = await res.json();
        if(alive) setCloser(data);
      }catch(e){ if(alive) setCloser({status:"unknown"}); }
    })();
    (async()=>{
      try{
        let url = "/api/lab/setter-load?account="+encodeURIComponent(account);
        if(rangeFrom) url += "&from="+encodeURIComponent(rangeFrom);
        if(rangeTo) url += "&to="+encodeURIComponent(rangeTo);
        const res = await fetch(url);
        const data = await res.json();
        if(alive) setSetter(data);
      }catch(e){ if(alive) setSetter({team:{status:"unknown"}}); }
    })();
    return ()=>{ alive = false; };
  },[account, rangeFrom, rangeTo, reloadKey]);

  const closerUtil = closer && typeof closer.filledPct==="number" && closer.status!=="unknown" ? closer.filledPct : null;
  const setterUtil = setter && setter.team && typeof setter.team.loadPct==="number" && setter.team.status!=="unknown" ? setter.team.loadPct : null;

  return (
    <div className="app">
      <div className="page">
        {/* Header — clean title + preview pill (account switcher carries the client) */}
        <div className="page-head">
          <div>
            <h1 className="page-title">Lab</h1>
          </div>
          <div className="sync-pill">
            <span className="sync-ic" style={{width:7,height:7,borderRadius:99,background:"var(--gold)",display:"inline-block"}}></span>
            Preview · layout only
          </div>
        </div>

        {/* Top row — account switcher + date-range calendar (timeline/context anchor) */}
        <div className="filter-bar">
          <SelectFilter
            label="Account"
            options={ACCOUNTS}
            value={account}
            onChange={setAccount}
          />
          <DateDropdown value={dateRange} onChange={setDateRange} />
        </div>

        {/* Green-light gates */}
        <div style={{marginTop:8}}><Gates closer={closer} setter={setter} onGear={()=>setCapOpen(true)}/></div>

        {/* Setter detail — transparency under the gates: per-setter load + leads/day trend */}
        <div style={{marginTop:12}}><SetterDetail setter={setter}/></div>

        {/* Graduates */}
        <div style={{marginTop:28}}>
          <div className="section-head">
            <span className="section-label">Graduates · Test → Scale</span>
            <span className="section-meta">passes both → Promote</span>
          </div>
          <AdMetricsTable
            rows={GRADUATES}
            dotClass={acct.dot}
            statusCols={[
              {k:"st1", label:"≥3× ROAS", ok:(r)=> r.collectedRoi>=3},
              {k:"st2", label:"3+ sales", ok:(r)=> r.clients>=3},
            ]}
            actionLabel="Promote"
            actionClass="lab-promote"
            onAction={setPromote}
          />
        </div>

        {/* Kills */}
        <div style={{marginTop:28}}>
          <div className="section-head">
            <span className="section-label">Kills · Test losers</span>
            <span className="section-meta">fails both → Turn off</span>
          </div>
          <AdMetricsTable
            rows={KILLS}
            dotClass={acct.dot}
            statusCols={[
              {k:"st1", label:"Spent ≥ 2× profit", ok:(r)=> true},
              {k:"st2", label:"Clearly worse", ok:(r)=> true},
            ]}
            actionLabel="Turn off"
            actionClass="alert-resolve"
            onAction={setTurnOff}
          />
        </div>

        {/* Scale moves — shown, pending until all gates green */}
        <div style={{marginTop:28}}>
          <div className="section-head">
            <span className="section-label">Scale moves</span>
            <span className="section-meta">winners&rsquo; current budgets</span>
          </div>
          <ScaleTable dotClass={acct.dot}/>
        </div>

        {/* This week */}
        <div style={{marginTop:28}}>
          <div className="section-head">
            <span className="section-label">This week</span>
          </div>
          <ThisWeek/>
        </div>

        {/* The climb ladder — standalone, at the bottom */}
        <div style={{marginTop:28}}>
          <ClimbLadder/>
        </div>

        {/* Constraint — at the very bottom */}
        <div style={{marginTop:18}}>
          <ConstraintCard closerUtil={closerUtil} setterUtil={setterUtil}/>
        </div>
      </div>

      {/* Action modals (skeletons) */}
      {turnOff && <TurnOffModal row={turnOff} campaign={acct.campaign} adSet={acct.adSet} onClose={()=>setTurnOff(null)}/>}
      {promote && <PromoteModal row={promote} onClose={()=>setPromote(null)}/>}
      {capOpen && <SetterCapacityModal onClose={()=>setCapOpen(false)} onSaved={()=>setReloadKey(k=>k+1)}/>}
    </div>
  );
}
