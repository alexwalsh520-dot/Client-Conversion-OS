<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ads Tracker — Client Conversion OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --bg-1: #0d0d0d;
    --panel: #111111;
    --panel-2: #141414;
    --row-hover: #141414;
    --border: #1f1f1f;
    --border-2: #262626;
    --text: #e8e8e8;
    --text-2: #a8a8a8;
    --text-3: #6b6b6b;
    --text-4: #4a4a4a;
    --green: #7dd3a8;
    --green-dim: #4f9b76;
    --red: #e89a94;
    --red-dim: #a36560;
    --gold: #d4b27a;
    --gold-dim: #8a7348;
    --blue: #7aa7d4;
    --focus: #2a2a2a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{min-height:100vh}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input, select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* Shell */
  .app{min-height:100vh}
  .page{padding:26px 28px 60px;max-width:1400px;width:100%;margin:0 auto}

  /* Header */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin:0 0 4px}
  .page-sub{font-size:12px;color:var(--text-3)}
  .sync-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-2);border-radius:99px;font-size:11px;color:var(--text-3);background:#0c0c0c;letter-spacing:0.01em}
  .sync-pill:hover{background:#141414;color:var(--text-2)}
  .sync-pill:hover .sync-ic{color:var(--gold)}
  .sync-ic{color:var(--text-4);transition:color .2s}
  .sync-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;font-size:12px;color:var(--text-2);background:#0f0f0f}
  .sync-btn:hover{background:#141414;color:var(--text)}

  /* Filter bar */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:22px;padding-bottom:0;flex-wrap:wrap}
  .filter{position:relative}
  .filter-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;color:var(--text);font-size:12px;min-height:30px}
  .filter-btn:hover{background:#141414}
  .filter-btn.open{background:#141414;border-color:#333}
  .filter-btn .lbl{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-right:2px}
  .filter-btn .val{color:var(--text);font-size:12px}
  .filter-btn .caret{color:var(--text-3);font-size:9px;margin-left:2px}
  .filter-divider{width:1px;height:16px;background:var(--border-2);margin:0 4px}
  .search-control{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;color:var(--text-3);font-size:12px;min-height:30px;min-width:150px}
  .search-control:focus-within{background:#141414;border-color:#333;color:var(--text-2)}
  .search-input{width:100px;color:var(--text);font-size:12px}
  .search-input::placeholder{color:var(--text-4)}
  .segmented{display:inline-flex;border:1px solid var(--border-2);border-radius:6px;background:#0f0f0f;padding:2px;height:30px}
  .seg{padding:4px 10px;font-size:12px;color:var(--text-3);border-radius:4px;display:flex;align-items:center}
  .seg:hover{color:var(--text-2)}
  .seg.active{background:#1e1e1e;color:var(--text)}

  /* Dropdown panel */
  .pop{position:absolute;top:calc(100% + 6px);left:0;background:#111;border:1px solid var(--border-2);border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6);z-index:50;min-width:220px;padding:6px;color:var(--text-2)}
  .pop-item{padding:7px 10px;border-radius:5px;font-size:12px;color:var(--text-2);display:flex;justify-content:space-between;cursor:pointer;align-items:center}
  .pop-item:hover{background:#1a1a1a;color:var(--text)}
  .pop-item.selected{color:var(--text)}
  .pop-item .check{color:var(--gold);font-size:10px;opacity:0}
  .pop-item.selected .check{opacity:1}

  /* Date panel */
  .date-pop{width:520px;display:grid;grid-template-columns:170px 1fr;padding:0}
  .date-presets{border-right:1px solid var(--border);padding:6px}
  .date-cal{padding:12px 14px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-2);margin-bottom:10px}
  .cal-nav{color:var(--text-3);padding:3px 6px;border-radius:4px}
  .cal-nav:hover{color:var(--text);background:#1a1a1a}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
  .cal-dow{color:var(--text-4);text-align:center;padding:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
  .cal-day{text-align:center;padding:5px 0;color:var(--text-2);border-radius:4px;cursor:pointer}
  .cal-day:hover{background:#1a1a1a;color:var(--text)}
  .cal-day.muted{color:var(--text-4)}
  .cal-day.in-range{background:#1a1a1a;color:var(--text)}
  .cal-day.endpoint{background:var(--gold);color:#0a0a0a;font-weight:600}
  .cal-day.today:not(.endpoint){box-shadow:inset 0 0 0 1px var(--gold-dim);color:var(--gold)}
  .cal-day.trail{visibility:hidden}
  .date-foot{border-top:1px solid var(--border);padding:10px 14px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
  .apply-btn{padding:5px 12px;border-radius:5px;background:var(--gold);color:#0a0a0a;font-weight:600;font-size:11px}
  .apply-btn:hover{filter:brightness(1.08)}

  /* Sections */
  .section{margin-top:32px}
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);font-weight:500}
  .section-meta{font-size:11px;color:var(--text-4)}

  /* Table panel */
  .panel{border:1px solid var(--border);border-radius:8px;background:var(--panel);overflow:hidden}
  .tbl-scroll{overflow-x:auto;overflow-y:visible}
  .tbl-scroll::-webkit-scrollbar{height:8px;width:8px}
  .tbl-scroll::-webkit-scrollbar-track{background:transparent}
  .tbl-scroll::-webkit-scrollbar-thumb{background:#222;border-radius:4px}
  .tbl-scroll::-webkit-scrollbar-thumb:hover{background:#333}

  table.ads{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;min-width:1900px}
  table.ads thead th{
    position:sticky;top:0;background:var(--panel);
    text-align:right;padding:11px 14px;
    font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);
    font-weight:500;white-space:nowrap;
    border-bottom:1px solid var(--border-2);
    z-index:2;
  }
  table.ads thead th:first-child{text-align:left;position:sticky;left:0;background:var(--panel);z-index:3;padding-left:20px}
  table.ads thead th.num{text-align:right}
  table.ads thead th .th-inner{display:inline-block;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  table.ads thead th .col-resize{position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;user-select:none;z-index:4}
  table.ads thead th .col-resize:hover,table.ads thead th .col-resize.active{background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent)}
  table.ads thead th{position:sticky;top:0;background:var(--panel);text-align:right;padding:11px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--border-2);z-index:2;position:sticky}
  table.ads tbody td{padding:11px 14px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border);color:var(--text);font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis}
  table.ads tbody td:first-child{text-align:left;position:sticky;left:0;background:var(--panel);z-index:1;padding-left:20px;color:var(--text)}
  table.ads tbody tr:hover td{background:var(--row-hover)}
  table.ads tbody tr:last-child td{border-bottom:none}
  table.ads tbody tr.campaign-row td{background:#0f0f0f;border-bottom:1px solid var(--border-2);font-weight:500}
  table.ads tbody tr.campaign-row td:first-child{background:#0f0f0f}
  table.ads tbody tr.campaign-row:hover td{background:#121212}
  table.ads tbody tr.campaign-row:hover td:first-child{background:#121212}
  table.ads tbody tr.total-row td{background:#0c0c0c;font-weight:500;border-top:1px solid var(--border-2);color:var(--text-2)}
  table.ads tbody tr.total-row td:first-child{background:#0c0c0c;color:var(--text-2);text-transform:uppercase;font-size:10px;letter-spacing:0.08em}

  .campaign-cell{display:flex;align-items:center;gap:10px}
  .camp-dot{width:6px;height:6px;border-radius:99px;flex-shrink:0}
  .camp-dot.tyson{background:var(--gold)}
  .camp-dot.keith{background:var(--blue)}
  .chevron{color:var(--text-4);font-size:9px;width:10px;display:inline-block}
  .status-pill{font-size:10px;color:var(--green-dim);letter-spacing:0.06em;text-transform:uppercase;padding-left:8px;border-left:1px solid var(--border-2);margin-left:4px}
  .status-pill.finished{color:var(--text-4)}

  .pos{color:var(--green)}
  .neg{color:var(--red)}
  .gold{color:var(--gold)}
  .dim{color:var(--text-3)}
  .muted{color:var(--text-4)}
  /* Calculated-column tint */
  table.ads thead th.calc{background:#0c0c0c;color:#8a7348}
  table.ads tbody td.calc{background:#0c0c0c}
  table.ads tbody tr.campaign-row td.calc{background:#0d0d0d}
  table.ads tbody tr.campaign-row:hover td.calc{background:#101010}
  table.ads tbody tr:hover td.calc{background:#101010}
  table.ads tbody tr.total-row td.calc{background:#0a0a0a}

  /* Day-row + ad-row styling (ad-level view) */
  table.ads tbody tr.day-row td{background:#0a0a0a;border-bottom:1px solid var(--border);cursor:pointer}
  table.ads tbody tr.day-row:hover td{background:#111}
  table.ads tbody tr.day-row td.calc{background:#090909}
  table.ads tbody tr.day-row:hover td.calc{background:#0f0f0f}
  .day-chevron{color:var(--text-3);font-size:9px;width:8px;display:inline-block;text-align:center}
  .day-ad-count{font-size:9px;color:var(--text-4);background:#151515;border:1px solid var(--border);border-radius:99px;padding:1px 6px;letter-spacing:0.02em;margin-left:4px}
  table.ads tbody tr.ad-row td{background:#060606;border-bottom:1px solid #111;color:var(--text-2);font-size:11.5px}
  table.ads tbody tr.ad-row:hover td{background:#0d0d0d}
  table.ads tbody tr.ad-row td.calc{background:#050505}
  table.ads tbody tr.ad-row:hover td.calc{background:#0c0c0c}
  .ad-id{font-size:10px;color:var(--text-4);letter-spacing:0.02em;flex-shrink:0}

  /* Table toolbar (view toggle) */
  .tbl-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:#0c0c0c}
  .tbl-view-toggle{display:inline-flex;background:#0a0a0a;border:1px solid var(--border-2);border-radius:6px;padding:2px;gap:2px}
  .tvt-btn{padding:5px 11px;font-size:11.5px;color:var(--text-3);border-radius:4px;letter-spacing:0.01em;display:inline-flex;align-items:center;gap:7px;transition:all .12s}
  .tvt-btn:hover{color:var(--text)}
  .tvt-btn.active{background:#181818;color:var(--text);box-shadow:inset 0 0 0 1px var(--border-2)}
  .tvt-count{font-size:9.5px;color:var(--text-4);background:#141414;border:1px solid var(--border);border-radius:99px;padding:1px 6px;letter-spacing:0}
  .tvt-btn.active .tvt-count{color:var(--gold);border-color:#2a2417}
  .tbl-toolbar-meta{font-size:11px;color:var(--text-4);letter-spacing:0.01em}
  .ad-count-chip{font-size:9.5px;color:var(--text-4);background:#141414;border:1px solid var(--border);border-radius:99px;padding:1px 7px;margin-left:4px;letter-spacing:0.02em}
  /* Setter-logged columns — styled same as data columns (no indicator) */

  /* Modals */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;z-index:100}
  .modal{background:#0f0f0f;border:1px solid var(--border-2);border-radius:10px;width:440px;max-width:calc(100vw - 48px);box-shadow:0 20px 60px rgba(0,0,0,0.7);overflow:hidden}
  .modal.wide{width:560px}
  .modal-head{padding:16px 20px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
  .modal-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em;margin:0}
  .modal-sub{font-size:11px;color:var(--text-3);margin-top:3px}
  .modal-close{color:var(--text-3);padding:4px 8px;border-radius:4px;font-size:16px;line-height:1}
  .modal-close:hover{background:#181818;color:var(--text)}
  .modal-body{padding:16px 20px 20px}
  .modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#0c0c0c}
  .mf-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-bottom:6px;font-weight:500;display:block}
  .mf-input, .mf-select{width:100%;padding:8px 11px;background:#0a0a0a;border:1px solid var(--border-2);border-radius:5px;font-size:13px;color:var(--text)}
  .mf-input:focus, .mf-select:focus{border-color:var(--focus);background:#111;outline:none}
  .mf-row{display:flex;gap:10px;margin-bottom:12px}
  .mf-row > *{flex:1}
  .btn-primary{padding:7px 14px;background:var(--gold);color:#0a0a0a;border-radius:5px;font-size:12px;font-weight:600}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-secondary{padding:7px 14px;border:1px solid var(--border-2);background:#0f0f0f;color:var(--text-2);border-radius:5px;font-size:12px}
  .btn-secondary:hover{background:#141414;color:var(--text)}
  .btn-danger{padding:7px 14px;border:1px solid #3a1f1f;background:#1a0e0e;color:var(--red);border-radius:5px;font-size:12px}
  .btn-danger:hover{background:#201111}
  .campaign-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .cp-card{padding:12px;border:1px solid var(--border-2);border-radius:6px;background:#0c0c0c;cursor:pointer;text-align:left}
  .cp-card:hover{border-color:#333;background:#111}
  .cp-card.selected{border-color:var(--gold);background:#121008}
  .cp-card .cp-name{font-size:12px;color:var(--text);font-weight:500}
  .cp-card .cp-meta{font-size:10px;color:var(--text-3);margin-top:3px}
  .drop-zone{border:1px dashed var(--border-2);border-radius:6px;padding:28px;text-align:center;color:var(--text-3);font-size:12px;background:#0a0a0a}
  .drop-zone:hover{border-color:var(--gold);color:var(--text-2)}

  /* Recent entries - inline edit */
  .rec-edit-btn{color:var(--text-4);font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid transparent}
  .rec-edit-btn:hover{color:var(--gold);border-color:var(--border-2);background:#141414}
  .rec-delete-btn{color:#ff5a52;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid transparent;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
  .rec-delete-btn:hover{background:rgba(255,90,82,0.14);border-color:rgba(255,90,82,0.5);color:#ff7a74}
  .btn-danger-solid{padding:7px 14px;border:1px solid #8a1f1f;background:#c81e1e;color:#fff;border-radius:5px;font-size:12px;font-weight:600;letter-spacing:0.02em}
  .btn-danger-solid:hover{background:#e02323;border-color:#ab2020}
  table.recent-tbl td.actions-col{width:128px;text-align:right}
  .rec-edit-input{padding:4px 7px;background:#0a0a0a;border:1px solid var(--border-2);border-radius:4px;font-size:11px;color:var(--text);width:70px;font-family:'JetBrains Mono',monospace}
  .rec-edit-input.kw{text-transform:uppercase;color:var(--gold);width:90px}
  .rec-save{color:var(--gold);font-size:11px;padding:3px 7px;border-radius:3px}
  .rec-save:hover{background:#1a1a1a}
  .rec-cancel{color:var(--text-3);font-size:11px;padding:3px 7px;border-radius:3px;margin-left:2px}
  .rec-cancel:hover{background:#1a1a1a;color:var(--text)}
  .edited-tag{color:var(--gold);font-size:9px;margin-left:6px;letter-spacing:0.04em;font-family:'JetBrains Mono',monospace}
  table.recent-tbl tr.editing-row td{background:#0d0d0d}
  .rec-save:disabled{opacity:0.4;cursor:not-allowed}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#141414;border:1px solid var(--border-2);border-radius:6px;padding:10px 16px;font-size:12px;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,0.7);display:flex;align-items:center;gap:10px;z-index:200}
  .toast .toast-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .recent-body.open{max-height:800px;overflow-y:auto}

  .second-col{display:flex;flex-direction:column;gap:18px}

  /* Bottom grid */
  .grid-bottom{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;margin-top:22px}
  @media (max-width: 1100px){.grid-bottom{grid-template-columns:1fr}}
  .grid-charts{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;margin-top:28px;align-items:stretch}
  @media (max-width: 1100px){.grid-charts{grid-template-columns:1fr}}
  .chart-actions-cell{grid-column:1/-1;min-width:0}

  /* Chart cards (ROAS + Cost per DM + Ad ROAS) */
  .chart-card{padding:18px 20px 14px;display:flex;flex-direction:column}
  .chart-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .chart-title{font-size:11px;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
  .chart-subtitle{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .chart-big{font-size:26px;font-weight:500;color:var(--text);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .chart-delta{font-size:11px;font-weight:500;letter-spacing:0.01em}
  .chart-delta.pos{color:var(--green)}
  .chart-delta.neg{color:var(--red)}
  .chart-sub-label{font-size:11px;color:var(--text-4)}
  .chart-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .chart-select{font-size:11px;padding:5px 8px;max-width:210px}
  .chart-legend{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
  .chart-legend-item{display:flex;align-items:center;gap:6px}
  .chart-sw{width:10px;height:2px;border-radius:2px;display:inline-block}
  .cpm-kw-legend{display:flex;flex-wrap:wrap;gap:10px 14px;flex:1}

  .client-picker{display:inline-flex;background:#0a0a0a;border:1px solid var(--border-2);border-radius:99px;padding:2px;gap:2px}
  .cpk-btn{padding:4px 11px;font-size:11px;color:var(--text-3);border-radius:99px;letter-spacing:0.01em;transition:all .12s}
  .cpk-btn:hover{color:var(--text-2)}
  .cpk-btn.active{background:#181818;color:var(--text);box-shadow:inset 0 0 0 1px var(--border-2)}

  /* Line chart */
  .lc-wrap{position:relative;width:100%}
  .lc-svg{width:100%;height:auto;display:block;cursor:crosshair}
  .lc-tooltip{position:absolute;top:0;transform:translate(-50%, -6px);background:#0f0f0f;border:1px solid var(--border-2);border-radius:6px;padding:7px 10px;font-size:11px;min-width:150px;max-width:240px;pointer-events:none;z-index:3;box-shadow:0 6px 20px rgba(0,0,0,0.6)}
  .lc-tt-date{font-size:10px;color:var(--text-4);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
  .lc-tt-row{display:flex;align-items:center;gap:7px;padding:2px 0}

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ------- Icons (minimal, stroke)
const Icon = ({ d, size=14, stroke=1.4 }) => (
  <svg className="i" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IcSync = () => <Icon d={<><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M3 12a9 9 0 0 0 15 6.7L21 16"/><path d="M21 4v4h-4"/><path d="M3 20v-4h4"/></>}/>;
const IcPlus = () => <Icon d={<><path d="M12 5v14"/><path d="M5 12h14"/></>} />;
const IcCheck = () => <Icon d={<path d="M20 6L9 17l-5-5"/>} />;
const IcUpload = () => <Icon d={<><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M20 21H4"/></>} />;

const IcCal = () => <Icon d={<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>} />;
const IcCaret = () => (
  <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"><path d="M1 1l4 4 4-4"/></svg>
);
const IcDownload = () => <Icon d={<><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M20 21H4"/></>}/>;
const IcSearch = () => <Icon d={<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>} />;

// ------- Helpers
const fmtUsd = (n, d=0) => {
  if(n==null || isNaN(n)) return "—";
  const neg = n<0; n = Math.abs(n);
  const s = n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
  return (neg?"-":"")+"$"+s;
};
const fmtNum = (n, d=0) => (n==null||isNaN(n))? "—" : n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = (n, d=2) => (n==null||isNaN(n))? "—" : n.toFixed(d)+"%";

// ------- Data
// Ad roster per campaign (used to synthesize ad-level rows deterministically)
const TYSON_ADS = [
  {id:"t-fit-01",    name:"FIT",     weight:0.22},
  {id:"t-strong-02", name:"STRONG",  weight:0.20},
  {id:"t-shred-04",  name:"SHRED",   weight:0.17},
  {id:"t-ripped-01", name:"RIPPED",  weight:0.14},
  {id:"t-lean-03",   name:"LEAN",    weight:0.12},
  {id:"t-cut-02",    name:"CUT",     weight:0.09},
  {id:"t-bulk-01",   name:"BULK",    weight:0.06},
];
const KEITH_ADS = [
  {id:"k-goal-02",   name:"GOAL",    weight:0.26},
  {id:"k-dialed-03", name:"DIALED",  weight:0.22},
  {id:"k-focus-01",  name:"FOCUS",   weight:0.19},
  {id:"k-ready-04",  name:"READY",   weight:0.15},
  {id:"k-power-06",  name:"POWER",   weight:0.11},
  {id:"k-drive-02",  name:"DRIVE",   weight:0.07},
];

// Deterministic pseudo-random so ad rows are stable between renders
function seededRand(seed){
  let s = 0;
  for(let i=0;i<seed.length;i++) s = ((s<<5)-s + seed.charCodeAt(i))|0;
  s = Math.abs(s);
  return () => {
    s = (s*9301 + 49297) % 233280;
    return s/233280;
  };
}

// Split a daily total across ads by weight, with small jitter
function splitByWeight(total, ads, seedStr, rounding=0){
  total = Number(total || 0);
  const rand = seededRand(seedStr);
  // apply jitter to weights
  const jittered = ads.map(a => ({...a, jw: a.weight * (0.82 + rand()*0.36)}));
  const jSum = jittered.reduce((a,b)=>a+b.jw,0);
  let acc = 0;
  const out = jittered.map((a,i) => {
    let v;
    if(i === jittered.length-1) v = total - acc;
    else {
      v = total * (a.jw/jSum);
      if(rounding === 0) v = Math.round(v);
      else v = Math.round(v*Math.pow(10,rounding))/Math.pow(10,rounding);
      acc += v;
    }
    return {id:a.id, name:a.name, v};
  });
  return out;
}

function buildAdRows(campaignId, dayRow, adRoster){
  if(Array.isArray(dayRow.adRows) && dayRow.adRows.length){
    return dayRow.adRows.map(ad => ({
      adId: ad.adId,
      adName: ad.adName,
      spend: ad.spend || 0,
      imp: ad.imp || 0,
      clicks: ad.clicks || 0,
      msgs: ad.msgs || 0,
      calls: ad.calls || 0,
      taken: ad.taken || 0,
      clients: ad.clients || 0,
      collected: ad.collected || 0,
    }));
  }
  // Distribute every metric across the ad roster using weights
  const seed = campaignId + "-" + dayRow.date;
  const spends = splitByWeight(dayRow.spend, adRoster, seed+"-spend");
  const imps = splitByWeight(dayRow.imp, adRoster, seed+"-imp");
  const clicks = splitByWeight(dayRow.clicks, adRoster, seed+"-clicks");
  const msgs = splitByWeight(dayRow.msgs, adRoster, seed+"-msgs");
  const calls = splitByWeight(dayRow.calls, adRoster, seed+"-calls");
  const taken = splitByWeight(dayRow.taken, adRoster, seed+"-taken");
  const clients = splitByWeight(dayRow.clients, adRoster, seed+"-clients");
  const collected = splitByWeight(dayRow.collected, adRoster, seed+"-col");
  return adRoster.map((a,i) => ({
    adId: a.id,
    adName: a.name,
    spend: spends[i].v,
    imp: imps[i].v,
    clicks: clicks[i].v,
    msgs: Math.max(0, msgs[i].v),
    calls: Math.max(0, calls[i].v),
    taken: Math.max(0, taken[i].v),
    clients: Math.max(0, clients[i].v),
    collected: Math.max(0, collected[i].v),
  }));
}

const CAMPAIGNS = [
  {
    id:"tyson", name:"Tyson — Warm Spring Shred Challenge", short:"Tyson", status:"active",
    dot:"tyson", adCount: TYSON_ADS.length,
    ads: TYSON_ADS,
    rows: [
      {date:"Apr 22", spend:412, imp:58420, clicks:1240, msgs:86, calls:14, taken:12, clients:6, collected:14200},
      {date:"Apr 21", spend:388, imp:54810, clicks:1180, msgs:79, calls:12, taken:11, clients:5, collected:10800},
      {date:"Apr 20", spend:401, imp:56120, clicks:1215, msgs:81, calls:13, taken:10, clients:4, collected:9200},
      {date:"Apr 19", spend:375, imp:52400, clicks:1098, msgs:74, calls:11, taken:9, clients:5, collected:11400},
      {date:"Apr 18", spend:420, imp:59100, clicks:1302, msgs:91, calls:15, taken:13, clients:7, collected:16200},
      {date:"Apr 17", spend:395, imp:55200, clicks:1155, msgs:78, calls:10, taken:8, clients:3, collected:5200},
    ]
  },
  {
    id:"keith", name:"Keith — Warm Spring Shred Challenge", short:"Keith", status:"active",
    dot:"keith", adCount: KEITH_ADS.length,
    ads: KEITH_ADS,
    rows: [
      {date:"Apr 22", spend:365, imp:48210, clicks:890, msgs:62, calls:9, taken:8, clients:3, collected:5800},
      {date:"Apr 21", spend:352, imp:46820, clicks:864, msgs:58, calls:8, taken:7, clients:2, collected:4100},
      {date:"Apr 20", spend:340, imp:45100, clicks:822, msgs:54, calls:7, taken:6, clients:2, collected:3400},
      {date:"Apr 19", spend:358, imp:47400, clicks:878, msgs:61, calls:9, taken:8, clients:3, collected:6200},
      {date:"Apr 18", spend:371, imp:49300, clicks:912, msgs:66, calls:10, taken:9, clients:4, collected:8800},
      {date:"Apr 17", spend:348, imp:46100, clicks:840, msgs:56, calls:6, taken:5, clients:1, collected:1600},
    ]
  }
];

// Derive per-row metrics
function deriveRow(r){
  const cpm = r.imp>0 ? (r.spend / r.imp) * 1000 : 0;  // cost per 1000 impressions
  const ctr = r.imp>0 ? (r.clicks/r.imp)*100 : 0;
  const cpc = r.clicks>0 ? r.spend / r.clicks : 0;
  const cpMsg = r.msgs>0 ? r.spend / r.msgs : 0;  // cost per message (DM)
  const cpCall = r.calls>0 ? r.spend/r.calls : null;
  const cpTaken = r.taken>0 ? r.spend/r.taken : null;
  const cpClient = r.clients>0 ? r.spend/r.clients : null;
  const closingBase = r.taken || r.calls;
  const closing = closingBase>0 ? (r.clients/closingBase)*100 : 0;
  const msgConv = r.msgs>0 ? (r.calls/r.msgs)*100 : 0;
  const collectedRoi = r.spend>0 ? (r.collected/r.spend) : 0;
  return {...r,cpm,ctr,cpc,cpMsg,cpCall,cpTaken,cpClient,closing,msgConv,collectedRoi};
}

function aggregate(rows){
  const sum = (k) => rows.reduce((a,r)=>a+(r[k]||0),0);
  const spend = sum("spend"), imp=sum("imp"), clicks=sum("clicks"), msgs=sum("msgs"),
    calls=sum("calls"), taken=sum("taken"), clients=sum("clients"),
    collected=sum("collected");
  return deriveRow({date:"Total", spend, imp, clicks, msgs, calls, taken, clients, collected});
}

function isoDate(d){
  return d.toISOString().slice(0,10);
}

function todayEt(){
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(new Date());
}

function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z");
  d.setUTCDate(d.getUTCDate()+days);
  return isoDate(d);
}

function monthStartIso(date){
  return (date || todayEt()).slice(0,7)+"-01";
}

function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00");
  d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}

function monthTitle(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return d.toLocaleDateString("en-US", {month:"long", year:"numeric"});
}

function daysInMonth(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

function isoForMonthDay(monthIso, day){
  return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`;
}

function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){
    const y = shiftIso(anchor, -1);
    return {preset:id, dateFrom:y, dateTo:y};
  }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){
    const start = shiftMonth(monthStartIso(anchor), -1);
    return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))};
  }
  return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
}

function dateLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}

function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom);
  const to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}

function labelForPreset(id){
  return PRESETS.find(p=>p.id===id)?.label || "Custom";
}

function metricRowFromApi(row, dateLabel){
  return {
    date: dateLabel || row.dateLabel || row.keyword || "Total",
    spend: Number(row.adSpend || 0),
    imp: Number(row.impressions || 0),
    clicks: Number(row.linkClicks || 0),
    msgs: Number(row.messages || 0),
    calls: Number(row.bookedCalls || 0),
    taken: Number(row.callsTaken || 0),
    clients: Number(row.newClients || 0),
    collected: Number(row.collectedRevenue || 0),
  };
}

function addMetric(target, row){
  target.spend += row.spend || 0;
  target.imp += row.imp || 0;
  target.clicks += row.clicks || 0;
  target.msgs += row.msgs || 0;
  target.calls += row.calls || 0;
  target.taken += row.taken || 0;
  target.clients += row.clients || 0;
  target.collected += row.collected || 0;
}

function emptyMetric(date){
  return {date, spend:0, imp:0, clicks:0, msgs:0, calls:0, taken:0, clients:0, collected:0};
}

function campaignsFromDashboard(dashboard, range){
  if(!dashboard || dashboard.error || !Array.isArray(dashboard.rows) || dashboard.rows.length===0) {
    return [];
  }

  const sourceRows = Array.isArray(dashboard.dailyRows) && dashboard.dailyRows.length
    ? dashboard.dailyRows
    : dashboard.rows.map(row => ({...row, dateLabel: rangeLabel(range)}));
  const campaignMap = new Map();

  for(const apiRow of sourceRows){
    const client = apiRow.clientKey || "unknown";
    if(client!=="tyson" && client!=="keith") continue;
    const keyword = (apiRow.keyword || "UNKNOWN").toUpperCase();
    const clientLabel = client==="tyson" ? "Tyson" : "Keith";
    const attributionOnly = !apiRow.campaignId;
    const campaignId = apiRow.campaignId || `${client}:keyword-attribution`;
    const campaignKey = `${client}:${campaignId}`;
    const campaignName = apiRow.campaignName || `${clientLabel} — Keyword Attribution`;
    const adId = apiRow.adId || `${campaignKey}:${keyword.toLowerCase()}`;
    const adName = (apiRow.adName || apiRow.name || keyword).toUpperCase();
    const rowStatus = apiRow.status === "finished" ? "finished" : "active";
    const dateKey = /^\d{4}-\d{2}-\d{2}$/.test(apiRow.dateLabel || "")
      ? apiRow.dateLabel
      : (apiRow.date || apiRow.dateLabel || range.dateTo);
    const dateLabel = /^\d{4}-\d{2}-\d{2}$/.test(dateKey) ? dateLabelFromIso(dateKey) : dateKey;
    const row = metricRowFromApi(apiRow, dateLabel);

    if(!campaignMap.has(campaignKey)){
      campaignMap.set(campaignKey, {
        id: campaignKey,
        clientKey: client,
        name: campaignName,
        short: `${clientLabel} · ${campaignName.replace(/^.*?—\s*/, "")}`,
        attributionOnly,
        status: rowStatus,
        dot: client,
        adsByName: new Map(),
        rowsByDate: new Map(),
      });
    }

    const campaign = campaignMap.get(campaignKey);
    campaign.attributionOnly = campaign.attributionOnly && attributionOnly;
    if(rowStatus==="active") campaign.status = "active";
    if(!campaign.adsByName.has(adId)){
      campaign.adsByName.set(adId, {id:adId, name:adName, keyword, weight:1});
    }

    if(!campaign.rowsByDate.has(dateKey)){
      campaign.rowsByDate.set(dateKey, {...emptyMetric(dateLabel), iso:dateKey, adRows:[]});
    }

    const day = campaign.rowsByDate.get(dateKey);
    addMetric(day, row);
    day.adRows.push({
      adId,
      adName,
      keyword,
      ...row,
    });
  }

  const campaigns = Array.from(campaignMap.values()).map(c => {
    const ads = Array.from(c.adsByName.values()).sort((a,b)=>a.name.localeCompare(b.name));
    const rows = Array.from(c.rowsByDate.values())
      .sort((a,b)=>String(b.iso).localeCompare(String(a.iso)))
      .map(row => ({
        ...row,
        adRows: row.adRows.sort((a,b)=>b.collected-a.collected || b.spend-a.spend),
      }));
    return {...c, ads, adCount:ads.length, rows};
  });

  return campaigns;
}

function labelsFromCampaigns(campaigns){
  const labels = Array.from(new Set(campaigns.flatMap(c => c.rows.map(r => r.date))));
  return labels.length ? labels.sort((a,b)=>{
    const ai = campaigns.flatMap(c=>c.rows).find(r=>r.date===a)?.iso || a;
    const bi = campaigns.flatMap(c=>c.rows).find(r=>r.date===b)?.iso || b;
    return String(ai).localeCompare(String(bi));
  }) : DAY_LABELS;
}

function rowSortKey(row){
  return row?.iso || row?.date || "";
}

function filterCampaignsBySearch(campaigns, search){
  const term = (search || "").trim().toLowerCase();
  if(!term) return campaigns;

  return campaigns.map(c => {
    const campaignMatches = [c.name, c.short, c.id, c.clientKey].some(v => String(v || "").toLowerCase().includes(term));
    if(campaignMatches) return c;

    const rows = c.rows.map(row => {
      const adRows = (row.adRows || []).filter(ad =>
        [ad.adName, ad.adId].some(v => String(v || "").toLowerCase().includes(term))
      );
      if(!adRows.length) return null;

      const next = {...emptyMetric(row.date), iso:row.iso, adRows};
      adRows.forEach(ad => addMetric(next, metricRowFromApi({
        adSpend:ad.spend,
        impressions:ad.imp,
        linkClicks:ad.clicks,
        messages:ad.msgs,
        bookedCalls:ad.calls,
        callsTaken:ad.taken,
        newClients:ad.clients,
        collectedRevenue:ad.collected,
      }, row.date)));
      return next;
    }).filter(Boolean);

    if(!rows.length) return null;
    const adsById = new Map();
    rows.forEach(row => row.adRows.forEach(ad => {
      if(!adsById.has(ad.adId)) adsById.set(ad.adId, {id:ad.adId, name:ad.adName, weight:1});
    }));
    const ads = Array.from(adsById.values()).sort((a,b)=>a.name.localeCompare(b.name));
    return {...c, rows, ads, adCount:ads.length};
  }).filter(Boolean);
}

function applyLocalEntriesToCampaigns(campaigns, entries){
  if(!entries?.length) return campaigns;
  const bucketToMetric = {msgs:"msgs", calls:"calls", taken:"taken", clients:"clients", collected:"collected"};
  return campaigns.map(c => {
    const matching = entries.filter(e => e.camp === c.id && bucketToMetric[e.bucket]);
    if(!matching.length) return c;
    const rows = c.rows.map((row, idx) => {
      if(idx !== 0) return row;
      const next = {...row, adRows: row.adRows ? row.adRows.map(ad => ({...ad})) : row.adRows};
      matching.forEach(e => {
        const metric = bucketToMetric[e.bucket];
        const value = Number(e.value || 0);
        next[metric] = (next[metric] || 0) + value;
        if(Array.isArray(next.adRows)){
          const keyword = String(e.kw || "").toUpperCase();
          const ad = next.adRows.find(a => String(a.adName || "").toUpperCase() === keyword);
          if(ad) ad[metric] = (ad[metric] || 0) + value;
        }
      });
      return next;
    });
    return {...c, rows};
  });
}

const PRESETS = [
  {id:"today",label:"Today",days:0},
  {id:"yesterday",label:"Yesterday",days:-1},
  {id:"last3",label:"Last 3 days",days:3},
  {id:"last7",label:"Last 7 days",days:7},

  {id:"last30",label:"Last 30 days",days:30},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];

function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button
              key={i}
              className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")}
              onClick={()=>onPick(x.iso)}
            >
              {x.d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || rangeForPreset("last7"));
  const [monthIso, setMonthIso] = useState(monthStartIso((value || rangeForPreset("last7")).dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const current = value || rangeForPreset("last7");
  useEffect(()=>{
    if(open){
      setDraft(current);
      setMonthIso(monthStartIso(current.dateTo));
      setSelectingEnd(false);
    }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){
        setSelectingEnd(true);
        return {preset:"custom", dateFrom:iso, dateTo:iso};
      }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="dim" style={{fontSize:11}}>· {rangeLabel(current)}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop" style={{minWidth:520}}>
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div
                key={p.id}
                className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom") {
                    onChange && onChange(rangeForPreset(p.id));
                    setOpen(false);
                  } else {
                    setDraft({...draft, preset:"custom"});
                    setSelectingEnd(false);
                  }
                }}
              >
                <span>{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar
              monthIso={monthIso}
              rangeStart={draft.dateFrom}
              rangeEnd={draft.dateTo}
              onPick={pickDate}
              onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))}
            />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const DEFAULT_COL_WIDTHS = {
  date: 150, spend: 110, imp: 120, cpm: 90, clicks: 110, ctr: 90, cpc: 90,
  msgs: 110, calls: 120, cpCall: 145, taken: 110, cpTaken: 145, clients: 110, collected: 140,
  cpMsg: 110, closing: 130, msgConv: 120, cpClient: 130, collectedRoi: 140,
};

// Keys that are calculated (vs logged/imported)
const CALC_KEYS = new Set(["cpm","ctr","cpc","cpMsg","cpCall","cpTaken","cpClient","closing","msgConv","collectedRoi"]);
const LOGGED_KEYS = new Set(["msgs","calls","taken","clients","collected"]);

function CampaignTable({account, status, loggedTotals, campaigns=CAMPAIGNS}){
  const [view, setView] = useState("campaign"); // 'campaign' | 'ad'
  const [expanded, setExpanded] = useState({tyson:false, keith:false});
  const [expandedDays, setExpandedDays] = useState({}); // key: "camp-date" -> bool
  const [widths, setWidths] = useState(DEFAULT_COL_WIDTHS);
  const [resizingKey, setResizingKey] = useState(null);

  const startResize = (k, e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = widths[k];
    setResizingKey(k);
    const onMove = (ev) => {
      const newW = Math.max(60, startW + (ev.clientX - startX));
      setWidths(w => ({...w, [k]: newW}));
    };
    const onUp = () => {
      setResizingKey(null);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  // Apply loggedTotals onto campaign rows (add to latest date)
  const augmentedCampaigns = campaigns.map(c => {
    const bump = loggedTotals?.[c.id] || {};
    const rows = c.rows.map((r, idx) => {
      if(idx !== 0) return r; // apply to newest (first in desc array)
      return {
        ...r,
        msgs: r.msgs + (bump.msgs||0),
        calls: r.calls + (bump.calls||0),
        taken: (r.taken||0) + (bump.taken||0),
        clients: r.clients + (bump.clients||0),
        collected: r.collected + (bump.collected||0),
      };
    });
    return {...c, rows};
  });

  const totalCampaigns = augmentedCampaigns.filter(c=>{
    if(account!=="all" && account!==(c.clientKey || c.id)) return false;
    if(status!=="all" && status!==c.status) return false;
    return true;
  });
  const visibleCampaigns = totalCampaigns.filter(c => !c.attributionOnly);
  const tableCampaigns = augmentedCampaigns.filter(c => !c.attributionOnly);

  const setTableView = (next) => {
    setView(next);
    if(next === "ad"){
      setExpanded(prev => {
        const open = {...prev};
        visibleCampaigns.forEach(c => { open[c.id] = true; });
        return open;
      });
    }
  };

  const cols = [
    {k:"date", label:"Campaign / Date"},
    {k:"spend", label:"Ad spend", fmt:(r)=>fmtUsd(r.spend,0), cls:()=>""},
    {k:"imp", label:"Impressions", fmt:(r)=>fmtNum(r.imp)},
    {k:"cpm", label:"CPM", fmt:(r)=>"$"+r.cpm.toFixed(2), cls:(r)=> r.cpm<=7?"pos":(r.cpm>=10?"neg":"dim"), calc:true},
    {k:"clicks", label:"Link clicks", fmt:(r)=>fmtNum(r.clicks)},
    {k:"ctr", label:"CTR", fmt:(r)=>fmtPct(r.ctr,2), cls:(r)=> r.ctr>=2.0?"pos":(r.ctr<1.7?"neg":""), calc:true},
    {k:"cpc", label:"CPC", fmt:(r)=>"$"+r.cpc.toFixed(2), cls:(r)=> r.cpc<=0.35?"pos":(r.cpc>=0.45?"neg":""), calc:true},
    {k:"msgs", label:"Messages", fmt:(r)=>fmtNum(r.msgs), logged:true},
    {k:"cpMsg", label:"Cost / msg", fmt:(r)=>"$"+r.cpMsg.toFixed(2), cls:(r)=> r.cpMsg<=5?"pos":(r.cpMsg>=6.5?"neg":""), calc:true},
    {k:"calls", label:"45-min calls booked", fmt:(r)=>fmtNum(r.calls), logged:true},
    {k:"cpCall", label:"Cost / 45-min booked", fmt:(r)=> r.cpCall?"$"+r.cpCall.toFixed(0):"—", cls:(r)=> r.cpCall && r.cpCall<=30?"pos":(r.cpCall && r.cpCall>=40?"neg":""), calc:true},
    {k:"taken", label:"45-min calls taken", fmt:(r)=>fmtNum(r.taken), logged:true},
    {k:"cpTaken", label:"Cost / call taken", fmt:(r)=> r.cpTaken?"$"+r.cpTaken.toFixed(0):"—", cls:(r)=> r.cpTaken && r.cpTaken<=45?"pos":(r.cpTaken && r.cpTaken>=70?"neg":""), calc:true},
    {k:"clients", label:"New clients", fmt:(r)=>fmtNum(r.clients), cls:(r)=> r.clients>=5?"pos":(r.clients<=2?"neg":""), logged:true},
    {k:"closing", label:"Call close rate", fmt:(r)=>fmtPct(r.closing,0), cls:(r)=> r.closing>=40?"pos":(r.closing<=25?"neg":""), calc:true},
    {k:"msgConv", label:"Msg → call", fmt:(r)=>fmtPct(r.msgConv,1), cls:(r)=> r.msgConv>=15?"pos":(r.msgConv<=12?"neg":""), calc:true},
    {k:"collected", label:"Collected rev", fmt:(r)=>fmtUsd(r.collected), cls:()=>"pos", logged:true},
    {k:"cpClient", label:"Cost / client", fmt:(r)=> r.cpClient?"$"+r.cpClient.toFixed(0):"—", cls:(r)=> r.cpClient && r.cpClient<=80?"pos":(r.cpClient && r.cpClient>=120?"neg":""), calc:true},
    {k:"collectedRoi", label:"Collected ROI", fmt:(r)=>r.collectedRoi.toFixed(1)+"×", cls:(r)=> r.collectedRoi>=20?"pos":(r.collectedRoi<=10?"neg":""), calc:true},
  ];

  const totalMin = cols.reduce((s,c)=>s+widths[c.k], 0);

    const allRows = totalCampaigns.flatMap(c=>c.rows);
    return aggregate(allRows);
  },[totalCampaigns]);

  return (
    <div className="panel">
      <div className="tbl-toolbar">
        <div className="tbl-view-toggle">
          <button className={"tvt-btn "+(view==="campaign"?"active":"")} onClick={()=>setView("campaign")}>
            Campaign level
          </button>
          <button className={"tvt-btn "+(view==="ad"?"active":"")} onClick={()=>setTableView("ad")}>
            Ad level
            <span className="tvt-count">{tableCampaigns.reduce((sum,c)=>sum+(c.ads?.length||0),0)}</span>
          </button>
        </div>

// ------- Shared line chart (curvy, 2 lines, fade, hover tooltip)
// Catmull-Rom → cubic bezier so the curve is smooth with sparse points
function smoothPath(points){
  if(points.length < 2) return "";
  const p = points;
  let d = `M ${p[0].x} ${p[0].y}`;
  for(let i=0; i<p.length-1; i++){
    const p0 = p[i-1] || p[i];
    const p1 = p[i];
    const p2 = p[i+1];
    const p3 = p[i+2] || p2;
    const t = 0.18;
    const c1x = p1.x + (p2.x - p0.x) * t;
    const c1y = p1.y + (p2.y - p0.y) * t;
    const c2x = p2.x - (p3.x - p1.x) * t;
    const c2y = p2.y - (p3.y - p1.y) * t;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function LineChart({series, labels, height=200, width=640, fmt=(v)=>v, fmtRight, primaryColor="var(--gold)", yLabel=""}){
  // series: [{name, values[], color, dashed?, isPrimary?, fmt?, axis?: 'left'|'right'}]
  const [hoverIdx, setHoverIdx] = useState(null);
  const hasRight = series.some(s => s.axis === "right");
  const pad = {t: hasRight ? 30 : 22, r: hasRight ? 52 : 16, b: 28, l: 46};
  const innerW = width - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const n = labels.length;

  // Build scale per axis
  const buildScale = (vals) => {
    const minV = Math.min(...vals, 0);
    const maxV = Math.max(...vals);
    const range = Math.max(maxV - minV, 1);
    const yMax = maxV + range * 0.18;
    const yMin = Math.max(0, minV - range * 0.12);
    const yR = Math.max(yMax - yMin, 1);
    return {yMin, yMax, yR};
  };
  const leftVals = series.filter(s => s.axis !== "right").flatMap(s => s.values);
  const rightVals = series.filter(s => s.axis === "right").flatMap(s => s.values);
  const leftScale = buildScale(leftVals.length ? leftVals : [0,1]);
  const rightScale = hasRight ? buildScale(rightVals) : leftScale;
  const scaleFor = (s) => s.axis === "right" ? rightScale : leftScale;

  const xOf = (i) => pad.l + (n === 1 ? innerW/2 : (i/(n-1)) * innerW);
  const yOfScale = (v, sc) => pad.t + innerH - ((v - sc.yMin)/sc.yR) * innerH;
  const yOf = (v, s) => yOfScale(v, scaleFor(s));
  const pointsFor = (s) => s.values.map((v,i)=>({x: xOf(i), y: yOf(v, s)}));

  // y-axis ticks (4) for left scale; right scale gets same fractions but labeled with rightScale values
  const tickFractions = [0, 0.33, 0.66, 1];
  const leftTicks = tickFractions.map(t => leftScale.yMin + t*leftScale.yR);
  const rightTicks = tickFractions.map(t => rightScale.yMin + t*rightScale.yR);

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scale = width / rect.width;
    const x = (e.clientX - rect.left) * scale;
    if(x < pad.l - 8 || x > pad.l + innerW + 8){ setHoverIdx(null); return; }
    const rel = (x - pad.l) / innerW;
    const idx = Math.max(0, Math.min(n-1, Math.round(rel*(n-1))));
    setHoverIdx(idx);
  };

  return (
    <div className="lc-wrap">
      <svg className="lc-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none"
        onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
        <defs>
          {series.map((s,i)=> s.isPrimary && (
            <linearGradient key={"g"+i} id={`lc-fade-${i}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.35"/>
              <stop offset="60%" stopColor={s.color} stopOpacity="0.08"/>
              <stop offset="100%" stopColor={s.color} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        {/* grid (left axis) */}
        {leftTicks.map((t,i)=>{
          const y = yOfScale(t, leftScale);
          const leftColor = series.find(s => s.axis !== "right")?.color || "var(--text-4)";
          return (
            <g key={"lt"+i}>
              <line x1={pad.l} x2={pad.l+innerW} y1={y} y2={y} stroke="#181818" strokeWidth="1"/>
              <text x={pad.l-8} y={y+3} textAnchor="end" fontSize="9.5" fill={hasRight?leftColor:"var(--text-4)"} fillOpacity={hasRight?0.7:1} fontFamily="'JetBrains Mono',monospace">{fmt(t)}</text>
            </g>
          );
        })}
        {/* right axis ticks */}
        {hasRight && rightTicks.map((t,i)=>{
          const y = yOfScale(t, rightScale);
          const rightColor = series.find(s => s.axis === "right")?.color || "var(--text-4)";
          return (
            <text key={"rt"+i} x={pad.l+innerW+8} y={y+3} textAnchor="start" fontSize="9.5" fill={rightColor} fillOpacity="0.7" fontFamily="'JetBrains Mono',monospace">{(fmtRight||fmt)(t)}</text>
          );
        })}
        {/* axis labels */}
        {hasRight && (
          <>
            <text x={pad.l-8} y={pad.t-8} textAnchor="end" fontSize="8.5" fill={series.find(s=>s.axis!=="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis!=="right")?.name || "").toUpperCase()}</text>
            <text x={pad.l+innerW+8} y={pad.t-8} textAnchor="start" fontSize="8.5" fill={series.find(s=>s.axis==="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis==="right")?.name || "").toUpperCase()}</text>
          </>
        )}
        {/* x labels */}
        {labels.map((l,i)=>{
          const step = n > 10 ? Math.ceil(n/8) : 1;
          if(i % step !== 0 && i !== n-1) return null;
          return (
            <text key={i} x={xOf(i)} y={height-10} textAnchor="middle" fontSize="9.5" fill="var(--text-4)" fontFamily="'JetBrains Mono',monospace">{l}</text>
          );
        })}
        {/* fade areas (primary only) */}
        {series.map((s,i)=>{
          if(!s.isPrimary) return null;
          const pts = pointsFor(s);
          const baseline = yOfScale(scaleFor(s).yMin, scaleFor(s));
          const d = smoothPath(pts) + ` L ${pts[pts.length-1].x} ${baseline} L ${pts[0].x} ${baseline} Z`;
          return <path key={"f"+i} d={d} fill={`url(#lc-fade-${i})`}/>;
        })}
        {/* lines */}
        {series.map((s,i)=>{
          const d = smoothPath(pointsFor(s));
          return <path key={"l"+i} d={d} fill="none" stroke={s.color}
            strokeWidth={s.isPrimary ? 2 : 1.5}
            strokeDasharray={s.dashed ? "4 4" : undefined}
            strokeOpacity={s.isPrimary ? 1 : 0.6}
            strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {/* hover guide */}
        {hoverIdx !== null && (
          <g>
            <line x1={xOf(hoverIdx)} x2={xOf(hoverIdx)} y1={pad.t} y2={pad.t+innerH} stroke="#2a2a2a" strokeWidth="1" strokeDasharray="3 3"/>
            {series.map((s,i)=>(
              <circle key={"d"+i} cx={xOf(hoverIdx)} cy={yOf(s.values[hoverIdx], s)} r={s.isPrimary?4:3}
                fill="#0a0a0a" stroke={s.color} strokeWidth="2"/>
            ))}
          </g>
        )}
      </svg>
      {hoverIdx !== null && (
        <div className="lc-tooltip" style={{
          left: `${(xOf(hoverIdx)/width)*100}%`,
        }}>
          <div className="lc-tt-date">{labels[hoverIdx]}</div>
          {series.map((s,i)=>(
            <div key={i} className="lc-tt-row">
              <span className="lc-tt-sw" style={{background:s.color, opacity: s.isPrimary?1:0.6}}></span>
              <span className="lc-tt-name">{s.name}</span>
              <span className="lc-tt-val mono">{(s.fmt||fmt)(s.values[hoverIdx])}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const DAY_LABELS = ["Apr 16","Apr 17","Apr 18","Apr 19","Apr 20","Apr 21","Apr 22"];
// Build daily totals from CAMPAIGNS (already contains Apr 17-22). Synthesize Apr 16.
function seriesForCampaignKey(key, filterId="all", campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const camps = filterId === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===filterId);
  // Map date -> summed value
  const byDate = {};
  camps.forEach(c => c.rows.forEach(r => {
    byDate[r.date] = (byDate[r.date] || 0) + r[key];
  }));
  return labels.map(l => byDate[l] || 0);
}

// ------- Cost per DM chart
// Attribute cost per DM either overall (spend / msgs aggregated) or per keyword (spend of keyword / msgs count)
function seriesCpmOverall(client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const spend = seriesForCampaignKey("spend", client, campaigns, labels);
  const msgs = seriesForCampaignKey("msgs", client, campaigns, labels);
  return msgs.map((m,i)=> m ? spend[i]/m : 0);
}
// Use the same KW_DATA.collected as our keyword roster; cost per DM per keyword per day: fluctuate around spend/count
const KW_ROSTER = [
  {kw:"FIT",     camp:"tyson", baseSpend: 480, baseMsgs: 48},
  {kw:"STRONG",  camp:"tyson", baseSpend: 420, baseMsgs: 38},
  {kw:"SHRED",   camp:"tyson", baseSpend: 380, baseMsgs: 32},
  {kw:"RIPPED",  camp:"tyson", baseSpend: 340, baseMsgs: 26},
  {kw:"GOAL",    camp:"keith", baseSpend: 320, baseMsgs: 30},
  {kw:"DIALED",  camp:"keith", baseSpend: 290, baseMsgs: 24},
  {kw:"FOCUS",   camp:"keith", baseSpend: 260, baseMsgs: 20},
];
function seriesCpmKeyword(kw, client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const live = labels.map(label => {
    let spend = 0;
    let msgs = 0;
    const camps = client === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===client);
    camps.forEach(c => {
      const day = c.rows.find(r=>r.date===label);
      const ad = day?.adRows?.find(a=>a.adName===kw);
      if(ad){
        spend += ad.spend || 0;
        msgs += ad.msgs || 0;
      }
    });
    return msgs ? spend / msgs : 0;
  });
  if(live.some(Boolean)) return live;

  const def = KW_ROSTER.find(k=>k.kw===kw);
  if(!def) return labels.map(()=>0);
  const rand = (n)=>{ let x=0; for(let i=0;i<n.length;i++)x=((x<<5)-x+n.charCodeAt(i))|0; x=Math.abs(x); return ()=>{x=(x*9301+49297)%233280; return x/233280;}; };
  const r = rand(kw+client);
  return labels.map(()=> (def.baseSpend/7) / (def.baseMsgs/7 * (0.7 + r()*0.6)));
}

function CostPerDMChart({campaigns=CAMPAIGNS}){
  const [client, setClient] = useState("all");
  const [mode, setMode] = useState("overall"); // 'overall' | 'keyword'
  const labels = labelsFromCampaigns(campaigns);
  const liveKws = campaigns.flatMap(c => (c.ads||[]).map(ad => ({kw:ad.name, camp:c.clientKey || c.id})));
  const availableKws = (liveKws.length ? liveKws : KW_ROSTER).filter(k => client==="all" || k.camp===client);

  let series, avg, delta, subLabel;
  if(mode === "overall"){
    const vals = seriesCpmOverall(client, campaigns, labels);
    avg = vals.reduce((a,b)=>a+b,0) / vals.length;
    delta = vals[vals.length-1] - vals[0];
    subLabel = "7-day avg overall";
    series = [
      {name: "Cost / DM", values: vals, color: "var(--blue)", isPrimary:true, fmt: (v)=>"$"+v.toFixed(2)},
    ];
  } else {
    // One line per keyword
    const kwSeries = availableKws.map(k => ({
      name: k.kw,
      values: seriesCpmKeyword(k.kw, client, campaigns, labels),
      color: k.camp === "tyson" ? "var(--gold)" : "var(--blue)",
      camp: k.camp,
      fmt: (v)=>"$"+v.toFixed(2),
    }));
    if(kwSeries.length === 0){
      const vals = labels.map(()=>0);
      avg = 0;
      delta = 0;
      subLabel = "No keyword data";
      series = [{name:"Cost / DM", values:vals, color:"var(--blue)", isPrimary:true, fmt:(v)=>"$"+v.toFixed(2)}];
    } else {
    // Pick the best-performing (lowest avg) as primary for the fade
    const withAvg = kwSeries.map(s => ({...s, _avg: s.values.reduce((a,b)=>a+b,0)/s.values.length}));
    const best = withAvg.reduce((a,b) => a._avg < b._avg ? a : b);
    series = kwSeries.map(s => ({...s, isPrimary: s.name === best.name}));
    // Aggregate average = weighted average across all kw series
    const allVals = kwSeries.flatMap(s => s.values);
    avg = allVals.reduce((a,b)=>a+b,0) / allVals.length;
    // Delta: overall last-vs-first (mean across all lines)
    const firstMean = kwSeries.reduce((a,b)=>a+b.values[0],0) / kwSeries.length;
    const lastMean  = kwSeries.reduce((a,b)=>a+b.values[b.values.length-1],0) / kwSeries.length;
    delta = lastMean - firstMean;
    subLabel = `Avg across ${kwSeries.length} keyword${kwSeries.length===1?"":"s"}`;
    }
  }

  return (
    <div className="panel chart-card">
      <div className="chart-head">
        <div>
          <div className="chart-title">Cost per DM</div>
          <div className="chart-subtitle">
            <span className="chart-big">${avg.toFixed(2)}</span>
            <span className={delta<=0?"chart-delta pos":"chart-delta neg"}>
              {delta<=0?"▼":"▲"} ${Math.abs(delta).toFixed(2)}
            </span>
            <span className="chart-sub-label">{subLabel}</span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(mode==="overall"?"active":"")} onClick={()=>setMode("overall")}>Overall</button>
            <button className={"kw-tab "+(mode==="keyword"?"active":"")} onClick={()=>setMode("keyword")}>By keyword</button>
          </div>
          <ClientPicker value={client} onChange={setClient}/>
        </div>
      </div>
      <LineChart
        labels={labels}
        series={series}
        fmt={(v)=>"$"+v.toFixed(2)}
      />
      <div className="chart-legend cpm-legend">
        {mode === "overall" ? (
          <>
            <span className="chart-legend-item"><span className="chart-sw" style={{background:'var(--blue)'}}></span>Cost per DM</span>
            <span style={{marginLeft:'auto',color:'var(--text-4)',fontSize:10}}>Lower is better</span>
          </>
        ) : (
          <>
            <div className="cpm-kw-legend">
              {series.map(s => (
                <span key={s.name} className="chart-legend-item">
                  <span className="chart-sw" style={{background:s.color}}></span>{s.name}
                </span>
              ))}
            </div>
            <span style={{marginLeft:'auto',color:'var(--text-4)',fontSize:10}}>Hover to compare · lower is better</span>
          </>
        )}
      </div>
    </div>
  );
}

// Build aggregated per-ad metrics across the 6 known days
function allAdsAggregated(campaigns=CAMPAIGNS){
  const out = [];
  campaigns.forEach(c => {
    c.ads.forEach(a => {
      // sum across rows
      let spend=0, collected=0, clients=0;
      c.rows.forEach(r0 => {
        const ads = buildAdRows(c.id, r0, c.ads);
        const mine = ads.find(x=>x.adId===a.id);
        if(mine){
          spend += mine.spend;
          collected += mine.collected;
          clients += mine.clients;
        }
      });
      out.push({
        adId: a.id, adName: a.name, camp: c.clientKey || c.id,
        spend, collected, clients,
      });
    });
  });
  return out;
}

// ------- Keyword entry
const BUCKETS = [
  {id:"msgs", label:"Messages", unit:"messages"},
  {id:"calls", label:"45-min calls booked", unit:"calls"},
  {id:"taken", label:"45-min calls taken", unit:"calls"},
  {id:"clients", label:"New clients", unit:"clients"},
  {id:"collected", label:"Collected $", unit:"USD"},
];

const SETTERS = ["Amara"];

function emptyRow(){ return {id: Math.random().toString(36).slice(2,9), keyword:"", value:""}; }

function KeywordEntry({onSubmit}){
  const [campaign, setCampaign] = useState("tyson");
  const [setter, setSetter] = useState(SETTERS[0]);
  // bucket groups appear in order added. Each: {id (bucket), rows: [{id,keyword,value}]}
  const [groups, setGroups] = useState([
    {bucket:"msgs", rows:[emptyRow()]},
  ]);

  const addBucket = (bucketId) => {
    setGroups(g => {
      if(g.find(x=>x.bucket===bucketId)) return g;
      return [...g, {bucket:bucketId, rows:[emptyRow()]}];
    });
  };
  const removeBucket = (bucketId) => setGroups(g => g.filter(x=>x.bucket!==bucketId));
  const addRow = (bucketId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows:[...x.rows, emptyRow()]} : x));
  const removeRow = (bucketId, rowId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.length>1 ? x.rows.filter(r=>r.id!==rowId) : x.rows} : x));
  const updateRow = (bucketId, rowId, patch) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.map(r => r.id===rowId?{...r,...patch}:r)} : x));

  // Available buckets to add
  const availableBuckets = BUCKETS.filter(b => !groups.find(g => g.bucket === b.id));

  // Count valid rows
  const validRows = groups.flatMap(g => g.rows.filter(r => r.keyword && r.value).map(r => ({bucket:g.bucket, ...r})));
  const totalRows = groups.reduce((s,g)=>s+g.rows.length, 0);

  const submit = () => {
    if(validRows.length===0) return;
    validRows.forEach(r => {
      onSubmit({campaign, bucket:r.bucket, setter, keyword: r.keyword.toUpperCase(), value: parseFloat(r.value)});
    });
    // Reset to clean state
    setGroups([{bucket:"msgs", rows:[emptyRow()]}]);
  };

  return (
    <div className="panel entry-panel">
      <div className="entry-head">Log keywords</div>

      <div className="entry-row">
        <select className="entry-select" value={campaign} onChange={e=>setCampaign(e.target.value)}>
          <option value="tyson">Tyson — Spring Shred</option>
          <option value="keith">Keith — Spring Shred</option>
        </select>
        <select className="entry-select" value={setter} onChange={e=>setSetter(e.target.value)} style={{maxWidth:140}}>
          {SETTERS.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      {groups.map(g => {
        const bucket = BUCKETS.find(b=>b.id===g.bucket);
        const unit = bucket?.unit || "";
        const isUsd = unit === "USD";
        const filled = g.rows.filter(r=>r.keyword && r.value).length;
        return (
          <div className="bucket-group" key={g.bucket}>
            <div className="bucket-group-head">
              <div className="bucket-group-label">
                {bucket.label}
                <span className="bucket-group-count">{filled}/{g.rows.length} filled</span>
              </div>
              <button className="bucket-group-rem" title="Remove section" onClick={()=>removeBucket(g.bucket)}>×</button>
            </div>
            {g.rows.map((r, i) => (
              <div className="br-row" key={r.id}>
                <span className="br-num">{String(i+1).padStart(2,"0")}</span>
                <input
                  className="br-input mono"
                  placeholder="KEYWORD"
                  value={r.keyword}
                  onChange={e=>updateRow(g.bucket, r.id, {keyword:e.target.value.toUpperCase()})}
                />
                <input
                  className="br-input val"
                  placeholder={isUsd?"$0":"0"}
                  value={r.value}
                  onChange={e=>updateRow(g.bucket, r.id, {value:e.target.value.replace(/[^\d.]/g,"")})}
                />
                <span style={{color:'var(--text-4)',fontSize:10,minWidth:60,textAlign:'right'}}>{unit}</span>
                <button className="br-remove" onClick={()=>removeRow(g.bucket, r.id)} title="Remove row">×</button>
              </div>
            ))}
            <button className="br-addrow" onClick={()=>addRow(g.bucket)}>
              <span style={{color:'var(--gold)',fontSize:13,lineHeight:1}}>+</span> Add row
            </button>
          </div>
        );
      })}

      {availableBuckets.length > 0 && (
        <div className="bucket-picker">
          <span className="bucket-picker-label">Add stage</span>
          {availableBuckets.map(b => (
            <button key={b.id} className="bp-chip" onClick={()=>addBucket(b.id)}>
              <span className="pl">+</span> {b.label}
            </button>
          ))}
        </div>
      )}

      <div className="entry-submit-row">
        <button className="entry-submit" onClick={submit} disabled={validRows.length===0}>
          Log {validRows.length>0 ? validRows.length+" "+(validRows.length===1?"entry":"entries") : "entry"}
        </button>
        <span className="entry-hint">
          {validRows.length>0 ? <span style={{color:'var(--text-3)'}}>{validRows.length} of {totalRows} rows ready</span> : ""}
        </span>
      </div>
    </div>
  );
}

function csvEscape(value){
  const text = String(value ?? "");
  return /[",\n]/.test(text) ? `"${text.replace(/"/g,'""')}"` : text;
}

function downloadCsv(filename, rows){
  const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function rowsForCsv(campaigns){
  const header = ["Level","Account","Date","Ad","Ad spend","Impressions","Link clicks","Messages","45-min calls booked","45-min calls taken","New clients","Collected revenue","CPM","CTR","CPC","Cost / message","Cost / 45-min booked","Cost / call taken","Cost / client","Collected ROI"];
  const rows = [header];
  campaigns.forEach(c => {
    const campaignAgg = aggregate(c.rows);
    rows.push([
      "campaign", c.short, "", "", campaignAgg.spend, campaignAgg.imp, campaignAgg.clicks, campaignAgg.msgs,
      campaignAgg.calls, campaignAgg.taken, campaignAgg.clients, campaignAgg.collected, campaignAgg.cpm,
      campaignAgg.ctr, campaignAgg.cpc, campaignAgg.cpMsg, campaignAgg.cpCall || "", campaignAgg.cpTaken || "", campaignAgg.cpClient || "",
      campaignAgg.collectedRoi,
    ]);
    c.rows.forEach(day => {
      const dayMetrics = deriveRow(day);
      rows.push([
        "day", c.short, day.date, "", dayMetrics.spend, dayMetrics.imp, dayMetrics.clicks, dayMetrics.msgs,
        dayMetrics.calls, dayMetrics.taken, dayMetrics.clients, dayMetrics.collected, dayMetrics.cpm,
        dayMetrics.ctr, dayMetrics.cpc, dayMetrics.cpMsg, dayMetrics.cpCall || "", dayMetrics.cpTaken || "", dayMetrics.cpClient || "",
        dayMetrics.collectedRoi,
      ]);
      buildAdRows(c.id, day, c.ads).forEach(ad => {
        const adMetrics = deriveRow({
          date: day.date,
          spend: ad.spend, imp: ad.imp, clicks: ad.clicks, msgs: ad.msgs,
          calls: ad.calls, taken: ad.taken, clients: ad.clients, collected: ad.collected,
        });
        rows.push([
          "ad", c.short, day.date, ad.adName, adMetrics.spend, adMetrics.imp, adMetrics.clicks, adMetrics.msgs,
          adMetrics.calls, adMetrics.taken, adMetrics.clients, adMetrics.collected, adMetrics.cpm,
          adMetrics.ctr, adMetrics.cpc, adMetrics.cpMsg, adMetrics.cpCall || "", adMetrics.cpTaken || "", adMetrics.cpClient || "",
          adMetrics.collectedRoi,
        ]);
      });
    });
  });
  return rows;
}
