  .ddr-stat .val.roas .x{font-size:15px;color:var(--text-3);font-weight:600;margin-left:1px}

  /* Real profit return (LTGP:CAC) — the money-first hero, sits above the band */
  .ddr-profit{margin:0 0 13px;background:linear-gradient(180deg,rgba(212,178,122,.09),transparent),var(--panel);border:1px solid var(--gold-dim);border-radius:12px;padding:17px 20px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .ddr-profit .pnum{display:flex;flex-direction:column;gap:4px;min-width:150px}
  .ddr-profit .plbl{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--gold);font-weight:700}
  .ddr-profit .big{font-size:42px;font-weight:720;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .ddr-profit .big.good{color:var(--green)} .ddr-profit .big.bad{color:var(--red)} .ddr-profit .big.mid{color:var(--gold)}
  .ddr-profit .big .x{font-size:21px;color:var(--text-3);font-weight:600;margin-left:2px}
  .ddr-profit .psub{font-size:10.5px;color:var(--text-4)}
  .ddr-profit .pexp{flex:1;min-width:250px;font-size:12.5px;color:var(--text-2);line-height:1.6}
  .ddr-profit .pexp b{color:var(--text)}
  .ddr-profit .pgoal{margin-top:6px;display:flex;gap:8px;align-items:center;font-size:10.5px;color:var(--text-4)}
  .ddr-profit .pchip{padding:2px 8px;border-radius:999px;border:1px solid var(--border);font-weight:600;letter-spacing:.03em}
  .ddr-profit .pchip.floor{color:var(--red)} .ddr-profit .pchip.target{color:var(--green)}

  /* Where every dollar came from — three honest buckets (ad / organic / unknown) */
  .cov-split{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
  .cov-cell{border:1px solid var(--border);border-radius:10px;padding:13px 14px;border-left-width:3px}
  .cov-cell.ad{border-left-color:var(--green)}
  .cov-cell.org{border-left-color:var(--gold)}
  .cov-cell.unk{border-left-color:var(--text-4)}
  .cov-amt{font-size:21px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--text)}
  .cov-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-2);margin-top:5px}
  .cov-pc{font-size:10.5px;color:var(--text-4);margin-top:2px}
  @media(max-width:700px){.cov-split{grid-template-columns:1fr}}

  /* Playbook dropdowns — maximum context, one tap away */
  .ddr-pcard{cursor:pointer}
  .ddr-pcard.open{box-shadow:inset 0 0 0 1px var(--border-2)}
  .ddr-pchev{font-size:9px;color:var(--text-4);margin-top:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .ddr-pcard.open .ddr-pchev{color:var(--gold)}
  .ddr-pmore{grid-column:1 / -1;margin-top:5px;padding-top:14px;border-top:1px dashed var(--border);display:flex;flex-direction:column;gap:14px;cursor:default}
  .ddr-chain{display:flex;flex-wrap:wrap;align-items:center;gap:7px}
  .ddr-chain .seg{display:flex;flex-direction:column;gap:1px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:7px 11px;min-width:58px}
  .ddr-chain .seg b{font-size:14px;color:var(--text);font-weight:660;font-variant-numeric:tabular-nums}
  .ddr-chain .seg .cl{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600}
  .ddr-chain .arr{color:var(--text-4);font-size:12px}
  .ddr-chain .seg.rev b{color:var(--green)} .ddr-chain .seg.rev.dim b{color:var(--text-4)}
  .ddr-mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:9px}
  .ddr-mstat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
  .ddr-mstat .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);font-weight:600}
  .ddr-mstat .v{font-size:14px;font-weight:650;margin-top:3px;color:var(--text);font-variant-numeric:tabular-nums}
  .ddr-pfind{font-size:11.5px;color:var(--text-3);line-height:1.65}
  .ddr-pfind .lab{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);font-weight:700;margin-right:6px}
  .ddr-pfind .bk-pill{margin-top:4px}
  .ddr-pdo{font-size:12.5px;line-height:1.6;color:var(--text-2);background:var(--panel-2);border-left:2px solid var(--gold);border-radius:0 8px 8px 0;padding:11px 14px}
  .ddr-pdo b{color:var(--text)}
  .ddr-pdo .h{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);font-weight:700;margin-bottom:5px}
  .ddr-pcard.kill .ddr-pdo{border-left-color:var(--red)}
  .ddr-pcard.scale .ddr-pdo{border-left-color:var(--green)}

  /* ROAS column in the ad-word table */
  .bk-roas{font-weight:700;font-variant-numeric:tabular-nums}
  .bk-sub{display:block;font-size:8px;color:var(--text-4);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-top:1px}

  .ddr-empty{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;color:var(--text-3);font-size:13px}
  @media(max-width:900px){.ddr-band{grid-template-columns:repeat(2,1fr)} .ddr-srow{grid-template-columns:80px 1fr 96px}}

  /* ---- Trend explorer (pick a metric + split by any dimension) ---- */
  .tx{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px 18px}
  .tx-controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:6px}

  .tx-field .lab{font-size:9px;text-transform:uppercase;letter-spacing:.11em;color:var(--text-4);font-weight:700}
  .tx-select{appearance:none;cursor:pointer;width:100%;padding:8px 30px 8px 11px;background:var(--bg);border:1px solid var(--border-2);border-radius:6px;font-size:12.5px;color:var(--text);font-family:inherit;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a8a8a' stroke-width='1.3' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 11px center}
  .tx-select:focus{border-color:var(--focus,var(--gold));outline:none}
  .tx-legend{display:flex;flex-wrap:wrap;gap:7px;margin:13px 0 4px}
  .tx-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--panel-2);color:var(--text-3);font-size:11.5px;cursor:pointer;transition:all .12s;font-variant-numeric:tabular-nums}
  .tx-chip:hover{border-color:var(--border-2);color:var(--text-2)}
  .tx-chip.on{color:var(--text);border-color:var(--border-2);background:var(--panel)}
  .tx-chip.on .tx-dot{box-shadow:0 0 0 3px color-mix(in srgb, currentColor 18%, transparent)}
  .tx-chip .tx-dot{width:9px;height:9px;border-radius:99px;flex-shrink:0}
  .tx-chip .tx-sv{font-size:10px;color:var(--text-4);font-weight:600}
  .tx-chip.off .tx-dot{opacity:.32}
  .tx-actions{display:flex;gap:9px;margin-left:auto}
  .tx-mini{font-size:10.5px;color:var(--text-4);cursor:pointer;border:1px solid var(--border);background:var(--panel-2);border-radius:6px;padding:4px 9px}
  .tx-mini:hover{color:var(--text-2);border-color:var(--border-2)}
  .tx-empty{padding:30px;text-align:center;color:var(--text-4);font-size:12.5px}
  .tx-foot{margin-top:11px;font-size:11px;color:var(--text-4);line-height:1.55}
  @media(max-width:700px){.tx-field{min-width:100%}}

  /* ---- Collapsible table card + wide modal ---- */
  .tcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px 17px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .12s,transform .08s}
  .tcard:hover{border-color:var(--border-2)}
  .tcard:active{transform:translateY(1px)}
  .tcard-main{flex:1;min-width:0}
  .tcard-title{font-size:13.5px;font-weight:650;color:var(--text);letter-spacing:-0.01em}
  .tcard-sub{font-size:11.5px;color:var(--text-3);margin-top:3px}
  .tcard-prev{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .tcard-pill{font-size:10.5px;color:var(--text-2);background:var(--panel-2);border:1px solid var(--border);border-radius:99px;padding:3px 9px;display:inline-flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
  .tcard-pill .tx-dot{width:7px;height:7px;border-radius:99px}
  .tcard-open{display:flex;align-items:center;gap:7px;color:var(--gold);font-size:12px;font-weight:600;white-space:nowrap;border:1px solid var(--border-2);border-radius:7px;padding:8px 13px;background:var(--panel-2)}
  .tcard:hover .tcard-open{background:var(--gold);color:var(--bg);border-color:var(--gold)}
  .modal.huge{width:min(1080px,calc(100vw - 40px));max-height:84vh;display:flex;flex-direction:column}
  .modal.huge .modal-body{overflow:auto;padding:14px 18px 18px}
  .modal-backdrop.tall{align-items:flex-start;padding-top:7vh}

  /* ---- Custom in-app picker (replaces the native OS <select>) ---- */
  .pk{position:relative;width:100%}
  .pk-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border-2);border-radius:8px;font-size:13px;color:var(--text);text-align:left;transition:border-color .14s,background .14s}
  .pk-btn:hover{border-color:var(--gold-dim)}
  .pk.open .pk-btn{border-color:var(--gold);background:var(--panel)}
  .pk-val{flex:1;font-weight:560;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pk-chev{width:9px;height:9px;flex-shrink:0;color:var(--text-3);transition:transform .16s ease,color .14s}
  .pk.open .pk-chev{transform:rotate(180deg);color:var(--gold)}
  .pk-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:100%;width:max-content;max-width:340px;max-height:340px;overflow-y:auto;background:var(--panel);border:1px solid var(--border-2);border-radius:10px;box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2);padding:5px;z-index:60;animation:pk-pop .15s cubic-bezier(.2,.9,.3,1)}
  html.light .pk-menu{box-shadow:0 18px 44px rgba(0,0,0,.16)}
  @keyframes pk-pop{from{opacity:0;transform:translateY(-5px) scale(.985)}to{opacity:1;transform:none}}
  .pk-grp{font-size:8.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-4);font-weight:700;padding:9px 11px 4px}
  .pk-grp:first-child{padding-top:4px}
  .pk-opt{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:7px;font-size:12.5px;color:var(--text-2);text-align:left;transition:background .1s,color .1s}
  .pk-opt:hover{background:var(--row-hover);color:var(--text)}
  .pk-opt.on{color:var(--text);background:color-mix(in srgb,var(--gold) 12%,transparent)}
  .pk-check{width:13px;flex-shrink:0;color:var(--gold);font-size:11px;font-weight:800;text-align:center}
  .pk-opt-l{flex:1;white-space:nowrap}
  .pk-opt-m{font-size:10px;color:var(--text-4);font-variant-numeric:tabular-nums}

  /* ---- Messaging: what your ads SAY → what it EARNS ---- */
  .mi{display:flex;flex-direction:column;gap:14px}
  /* Verdict hero */
  .mi-verdict{position:relative;overflow:hidden;border:1px solid color-mix(in srgb,var(--gold) 26%,var(--border-2));border-radius:14px;padding:18px 20px;
    background:radial-gradient(120% 140% at 0% 0%, color-mix(in srgb,var(--gold) 9%,var(--panel)) 0%, var(--panel) 55%)}
  .mi-verdict .ey{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .mi-verdict .ey .pulse{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 color-mix(in srgb,var(--gold) 60%,transparent);animation:mi-pulse 2.4s infinite}
  @keyframes mi-pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--gold) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .mi-verdict .hl{font-size:18.5px;line-height:1.42;font-weight:680;letter-spacing:-0.015em;color:var(--text)}
  .mi-take{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .mi-take .tk{font-size:11.5px;line-height:1.35;color:var(--text-2);background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;max-width:100%}
  .mi-take .tk b{color:var(--text)}
  .mi-conf{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:12px}

  /* Head-to-head: best vs worst, from real numbers */
  .mi-vs{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:680px){.mi-vs{grid-template-columns:1fr}}
  .mi-side{position:relative;border-radius:13px;padding:15px 16px 14px;border:1px solid var(--border-2);background:var(--panel);overflow:hidden;transition:transform .12s,box-shadow .16s}
  .mi-side:hover{transform:translateY(-2px)}
  .mi-side.win{border-color:color-mix(in srgb,var(--green) 38%,transparent);background:linear-gradient(170deg,color-mix(in srgb,var(--green) 9%,var(--panel)),var(--panel) 62%)}
  .mi-side.lose{border-color:color-mix(in srgb,var(--red) 36%,transparent);background:linear-gradient(170deg,color-mix(in srgb,var(--red) 9%,var(--panel)),var(--panel) 62%)}
  .mi-side .tag{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;display:flex;align-items:center;gap:6px;margin-bottom:11px}
  .mi-side.win .tag{color:var(--green)} .mi-side.lose .tag{color:var(--red)}
  .mi-side .tag .ar{font-size:12px}
  .mi-quote{font-size:14.5px;line-height:1.46;font-weight:560;color:var(--text);letter-spacing:-0.01em;min-height:1.46em}
  .mi-quote .qm{color:var(--text-4);font-weight:400}
  .mi-side .nm{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-4);font-weight:600;margin-top:9px}
  .mi-bignum{display:flex;align-items:baseline;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .mi-bignum .r{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:500;letter-spacing:-0.02em;line-height:1}
  .mi-side.win .mi-bignum .r{color:var(--green)} .mi-side.lose .mi-bignum .r{color:var(--red)}
  .mi-bignum .rl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-4);font-weight:600}
  .mi-side .strip{display:flex;gap:16px;margin-top:11px}
  .mi-side .strip .s{display:flex;flex-direction:column;gap:1px}
  .mi-side .strip .s .v{font-size:13px;font-weight:650;color:var(--text);font-variant-numeric:tabular-nums}
  .mi-side .strip .s .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-4);font-weight:600}

  /* Explore — the depth layer, opens on demand */
  .mi-explore{border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden}
  .mi-exhead{display:flex;align-items:center;gap:12px;width:100%;padding:13px 15px;text-align:left;transition:background .12s}
  .mi-exhead:hover{background:var(--row-hover)}
  .mi-exhead .t{flex:1}
  .mi-exhead .t .h{font-size:13px;font-weight:620;color:var(--text)}
  .mi-exhead .t .s{font-size:11px;color:var(--text-4);margin-top:2px;font-variant-numeric:tabular-nums}
  .mi-exhead .chev{color:var(--text-3);font-size:11px;transition:transform .18s}
  .mi-explore.open .mi-exhead .chev{transform:rotate(90deg);color:var(--gold)}
  .mi-sort{display:flex;gap:5px;padding:0 15px 12px}
  .mi-sort .sb{font-size:10.5px;color:var(--text-3);padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--panel-2);transition:all .12s}
  .mi-sort .sb:hover{color:var(--text-2);border-color:var(--border-2)}
  .mi-sort .sb.on{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,transparent);background:color-mix(in srgb,var(--gold) 10%,transparent)}
  .mi-cards{display:flex;flex-direction:column}
  .mi-c{display:grid;grid-template-columns:1fr 188px;gap:16px;align-items:center;padding:13px 15px;border-top:1px solid var(--border);animation:mi-rise .32s both}
  @keyframes mi-rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .mi-c.dim{opacity:.55}
  .mi-c-words{font-size:13px;line-height:1.5;color:var(--text-1,var(--text))}
  .mi-c-words .nm{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:700;margin-bottom:4px}
  .mi-c-right{display:flex;flex-direction:column;gap:7px}
  .mi-roasrow{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .mi-roasrow .rv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;letter-spacing:-0.01em}
  .mi-roasrow .rv.good{color:var(--green)} .mi-roasrow .rv.bad{color:var(--red)} .mi-roasrow .rv.mid{color:var(--gold)} .mi-roasrow .rv.na{color:var(--text-4)}
  .mi-roasrow .rl{font-size:8.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600}
  /* ROAS bar with a breakeven (1×) marker — instant money-or-not read */
  .mi-bar{position:relative;height:7px;border-radius:99px;background:var(--panel-2);border:1px solid var(--border);overflow:visible}
  .mi-bar .fill{position:absolute;top:0;left:0;bottom:0;border-radius:99px;transition:width .5s cubic-bezier(.3,.9,.3,1)}
  .mi-bar .fill.good{background:linear-gradient(90deg,var(--green-dim),var(--green))}
  .mi-bar .fill.bad{background:linear-gradient(90deg,var(--red-dim),var(--red))}
  .mi-bar .be{position:absolute;top:-3px;bottom:-3px;width:1.5px;background:var(--text-3);opacity:.8}
  .mi-bar .be:after{content:"1×";position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:7.5px;color:var(--text-4);font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
  .mi-c-meta{display:flex;gap:13px}
  .mi-c-meta .s{display:flex;flex-direction:column;gap:0}
  .mi-c-meta .s .v{font-size:11.5px;font-weight:620;color:var(--text-2);font-variant-numeric:tabular-nums}
  .mi-c-meta .s .l{font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-4);font-weight:600}
  .mi-c-early{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--text-4);border:1px solid var(--border);border-radius:99px;padding:2px 8px;align-self:flex-start}
  @media(max-width:680px){.mi-c{grid-template-columns:1fr}}
  .mi-quiet{padding:11px 15px;border-top:1px solid var(--border);font-size:11px;color:var(--text-4)}
  .mi-loading{display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:11px;background:var(--bg-2,var(--panel-2));border:1px solid var(--border);color:var(--text-3);font-size:12.5px;line-height:1.5}

  /* ---- Decision Center: balanced scale/kill + reallocation hero ---- */
  .ddr-realloc{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:12px 0 4px;padding:14px 16px;border-radius:12px;border:1px solid color-mix(in srgb,var(--gold) 30%,var(--border-2));background:radial-gradient(130% 170% at 0% 0%,color-mix(in srgb,var(--gold) 10%,var(--panel)),var(--panel) 62%)}
  .ddr-realloc .rl-main{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
  .ddr-realloc .rl-amt{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;color:var(--red);letter-spacing:-0.02em;line-height:1}
  .ddr-realloc .rl-cap{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4);font-weight:600}
  .ddr-realloc .rl-arrow{font-size:18px;color:var(--text-3);flex-shrink:0}
  .ddr-realloc .rl-to{flex:1;min-width:240px;font-size:12.5px;line-height:1.5;color:var(--text-2)}
  .ddr-realloc .rl-to b{color:var(--text)}
  .ddr-pgroup{margin-top:14px}
  .ddr-pgh{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-left:2px}
  .ddr-pgh .ar{font-size:12px}
  .ddr-pgh.scale{color:var(--green)} .ddr-pgh.kill{color:var(--red)}

  /* "I did this" — the close-the-loop confirm inside a playbook card */
  .ddr-pdid{margin-top:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;font:inherit;font-size:12.5px;font-weight:650;letter-spacing:.01em;padding:11px 14px;border-radius:10px;cursor:pointer;transition:transform .12s ease,box-shadow .2s ease,background .18s ease;border:1px solid}
  .ddr-pdid .ic{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;font-size:11px;font-weight:800}
  .ddr-pdid.kill{color:var(--red);background:color-mix(in srgb,var(--red) 9%,var(--panel));border-color:color-mix(in srgb,var(--red) 34%,var(--border-2))}
  .ddr-pdid.kill .ic{background:color-mix(in srgb,var(--red) 18%,transparent)}
  .ddr-pdid.scale{color:var(--green);background:color-mix(in srgb,var(--green) 9%,var(--panel));border-color:color-mix(in srgb,var(--green) 34%,var(--border-2))}
  .ddr-pdid.scale .ic{background:color-mix(in srgb,var(--green) 18%,transparent)}
  .ddr-pdid:hover{transform:translateY(-1px);box-shadow:0 8px 22px -12px currentColor}
  .ddr-pdid:active{transform:translateY(0)}
  /* ── Minimal monochrome action board: color reserved, secondary hidden ── */
  .ddr-play-h b{color:var(--text)!important}
  .ddr-realloc{background:var(--panel)!important;border-color:var(--border)!important}
  .ddr-realloc .rl-amt{color:var(--text)!important;font-weight:600!important}
  .ddr-pgh.scale,.ddr-pgh.kill{color:var(--text-4)!important}
  .ddr-pcard.scale,.ddr-pcard.kill{background:var(--panel-2)!important}
  .ddr-pcard.scale::before{background:var(--border-2)!important}
  .ddr-pcard.kill::before{background:var(--text-4)!important}
  .ddr-pcard.scale:hover,.ddr-pcard.kill:hover{border-color:var(--border-2)!important;box-shadow:none!important;transform:none!important}
  .ddr-pcard.scale .ddr-pnum,.ddr-pcard.kill .ddr-pnum{color:var(--text-3)!important;border-color:var(--border)!important}
  .ddr-pcard.scale .ddr-pmove .verb,.ddr-pcard.kill .ddr-pmove .verb{color:var(--text-3)!important}
  .ddr-pcard.scale .ddr-pwhy .ar,.ddr-pcard.kill .ddr-pwhy .ar{color:var(--text-4)!important}
  .ddr-pcard.scale .ddr-pthumb,.ddr-pcard.kill .ddr-pthumb{border-color:var(--border)!important}
  .ddr-pcard.kill .ddr-pimpact .big,.ddr-pcard.scale .ddr-pimpact .big{color:var(--text)!important}
  .ddr-pconf .dot{display:none!important}
  .ddr-pconf.hi b,.ddr-pconf.md b,.ddr-pconf.lo b{color:var(--text-3)!important}
  .ddr-pbar{display:none!important}
  .ddr-pcard.scale .ddr-pdo,.ddr-pcard.kill .ddr-pdo{border-left-color:var(--border-2)!important}
  .ddr-pdid.kill,.ddr-pdid.scale{color:var(--text-2)!important;background:var(--panel-2)!important;border-color:var(--border)!important}
  .ddr-pdid.kill .ic,.ddr-pdid.scale .ic{background:var(--bg-2)!important}
  .ddr-pdid:hover{box-shadow:none!important;border-color:var(--border-2)!important}
  .ddr-play{background:var(--panel)!important;border-color:var(--border)!important}
  .ddr-pcard::before{display:none!important}
  .ddr-pword{font-size:16px;font-weight:650;color:var(--text);text-transform:capitalize;line-height:1.2}
  .ddr-psub{font-size:12.5px;color:var(--text-4);margin-top:4px;font-variant-numeric:tabular-nums}
  .ddr-pchev{font-size:15px;color:var(--text-4);text-align:center;margin-top:3px}
  .ddr-pimpact .big{font-size:20px!important}
  .ddr-pgh.scale,.ddr-pgh.kill{font-size:11px;letter-spacing:.1em;margin-bottom:0!important}
  .ddr-pgroup{display:flex!important;flex-direction:column;gap:8px;margin-top:18px!important}
  /* Expanded decision card — editorial-financial hierarchy */
  @keyframes pm-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .ddr-pmore{grid-column:1/-1!important;display:flex!important;flex-direction:column;gap:24px;margin-top:18px;padding-top:20px;border-top:1px solid var(--border)}
  .ddr-pmore>*{animation:pm-in .34s cubic-bezier(.2,.8,.2,1) both}
  .ddr-pmore>*:nth-child(2){animation-delay:.05s}
  .ddr-pmore>*:nth-child(3){animation-delay:.10s}
  .ddr-pmore>*:nth-child(4){animation-delay:.13s}
  .ddr-pmore>*:nth-child(5){animation-delay:.16s}
  .ddr-pmore>*:nth-child(6){animation-delay:.19s}
  /* 1 — verdict (the lead) */
  .pm-call{display:flex;flex-direction:column;gap:5px}
  .pm-act{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.012em;line-height:1.25}
  .pm-rsn{font-size:13px;color:var(--text-3);line-height:1.5}
  /* 2 — money flow (endpoints lead, path recedes) */
  .pm-flow{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .pm-end{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
  .pm-end-v{font-size:27px;font-weight:600;letter-spacing:-.025em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
  .pm-end.out{margin-left:auto;text-align:right}
  .pm-end.out.win .pm-end-v{color:var(--gold)}
  .pm-end-l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4)}
  .pm-path{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-size:13px;color:var(--text-4)}
  .pm-path b{color:var(--text-2);font-weight:600;font-variant-numeric:tabular-nums}
  .pm-path .d{opacity:.4}
  .pm-path .z{opacity:.4}
  /* 3 — ad proof */
  .pm-ad{display:flex;gap:16px;align-items:flex-start}
  .pm-ad .ddr-padimg-wrap{flex-shrink:0}
  .pm-copy{margin:0;font-size:13px;line-height:1.6;color:var(--text-3);font-style:italic;max-width:64ch}
  /* divider */
  .pm-rule{height:1px;background:var(--border)}
  /* 4 — fine print (recedes) */
  .pm-fine{display:flex;flex-direction:column;gap:10px}
  .pm-costs,.pm-where{display:flex;flex-wrap:wrap;gap:7px 24px;font-size:12.5px;color:var(--text-3);font-variant-numeric:tabular-nums}
  .pm-costs i,.pm-where i{font-style:normal;color:var(--text-4);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;margin-right:7px}

  /* ---- Decision tracker: every logged move, traced to a real result ---- */
  .ddt{display:flex;flex-direction:column;gap:12px;padding:16px;border-radius:14px;border:1px solid color-mix(in srgb,var(--gold) 16%,var(--border));background:radial-gradient(120% 150% at 100% 0%,color-mix(in srgb,var(--gold) 6%,var(--panel)),var(--panel) 60%)}
  .ddt-head{display:flex;flex-direction:column;gap:3px}
  .ddt-k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold)}
  .ddt-h{font-size:12.5px;line-height:1.45;color:var(--text-3)}
  .ddt-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px}
  .ddt-card{display:flex;flex-direction:column;gap:9px;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--panel)}
  .ddt-card.kill{border-left:3px solid var(--red)} .ddt-card.scale{border-left:3px solid var(--green)}
  .ddt-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ddt-badge{font-size:9px;font-weight:800;letter-spacing:.08em;padding:3px 7px;border-radius:6px}
  .ddt-badge.kill{color:var(--red);background:color-mix(in srgb,var(--red) 14%,transparent)}
  .ddt-badge.scale{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent)}
  .ddt-word{font-size:14px;font-weight:680;color:var(--text);letter-spacing:-.01em}
  .ddt-when{font-size:10.5px;color:var(--text-4)}
  .ddt-undo{margin-left:auto;font:inherit;font-size:10.5px;color:var(--text-4);background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;transition:color .15s,border-color .15s}
  .ddt-undo:hover{color:var(--text-2);border-color:var(--border-2)}
  .ddt-base{font-size:11px;color:var(--text-4);font-family:var(--mono)}
  .ddt-base b{color:var(--text-2)}
  .ddt-result{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:10px;border:1px solid var(--border-2);background:color-mix(in srgb,var(--bg) 40%,var(--panel-2))}
  .ddt-dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:5px}
  .ddt-verdict{font-size:12.5px;line-height:1.45;font-weight:600}
  .ddt-spark{display:flex;align-items:center;gap:10px}
  .ddt-spark .spark{display:block}
  .ddt-sparklbl{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.05em}

  /* ---- Funnel scoreboard: every metric, sparkline, meaning, click-to-trend ---- */
  .fs{display:flex;flex-direction:column;gap:16px}
  .fs-stage-h{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:9px}
  .fs-stage-h .dot{width:7px;height:7px;border-radius:50%}
  .fs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:9px}
  .fs-tile{display:flex;flex-direction:column;gap:5px;padding:12px 13px 11px;border:1px solid var(--border);border-radius:11px;background:var(--panel);text-align:left;transition:border-color .14s,transform .12s,box-shadow .16s}
  .fs-tile:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.22)}
  .fs-tile.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .fs-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .fs-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:600;line-height:1.3}
  .fs-chip{font-size:9px;font-weight:700;white-space:nowrap;padding:2px 5px;border-radius:5px;font-variant-numeric:tabular-nums}
  .fs-chip.good{color:var(--green);background:color-mix(in srgb,var(--green) 13%,transparent)}
  .fs-chip.bad{color:var(--red);background:color-mix(in srgb,var(--red) 13%,transparent)}
  .fs-chip.neutral,.fs-chip.flat{color:var(--text-4);background:var(--panel-2)}
  .fs-val{font-family:'Inter',system-ui,sans-serif;font-size:20px;font-weight:500;letter-spacing:-0.02em;color:var(--text);font-variant-numeric:tabular-nums}
  .fs-tile .spark{display:block;width:100%;height:28px}
  .fs-explain{font-size:10.5px;line-height:1.4;color:var(--text-4)}
  .fs-expand{margin-top:6px;border:1px solid var(--gold-dim);border-radius:12px;background:var(--panel);padding:14px 16px;animation:mi-rise .3s both}
  .fs-expand-h{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .fs-expand-h .t{font-size:14px;font-weight:650;color:var(--text)}
  .fs-expand-h .m{flex:1;font-size:11px;color:var(--text-4)}
  .fs-close{font-size:12px;color:var(--text-3);padding:2px 8px;border-radius:6px;border:1px solid var(--border)}
  .fs-close:hover{color:var(--text);border-color:var(--border-2)}

  /* ---- Setter detail panel (Gate 3 transparency: per-setter load + leads/day trend) ---- */
  .sd-panel{margin-top:10px;border:1px solid var(--border);border-radius:11px;background:var(--panel);overflow:hidden}
  .sd-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border)}
  .sd-head-l{display:flex;flex-direction:column;gap:4px;min-width:0}
  .sd-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);font-weight:600}
  .sd-cap{font-size:10.5px;color:var(--text-4);line-height:1.4}
  .sd-team{display:flex;align-items:baseline;gap:7px;white-space:nowrap}
  .sd-team-val{font-family:'Inter',system-ui,sans-serif;font-size:20px;font-weight:500;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:var(--text)}
  .sd-team-val.green{color:var(--green)} .sd-team-val.red{color:var(--red)}
  .sd-team-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-4)}
  .sd-body{padding:14px 16px;display:grid;gap:16px}
  .sd-rows{display:flex;flex-direction:column;gap:3px}
  .sd-row{display:grid;grid-template-columns:minmax(90px,1.1fr) 1fr 132px;gap:13px;align-items:center;padding:8px 10px;border-radius:9px;border:1px solid transparent;transition:background .15s,border-color .15s}
  .sd-row:hover{background:var(--row-hover);border-color:var(--border)}
  .sd-name{font-size:12.5px;color:var(--text-2);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sd-bar{position:relative;height:8px;border-radius:99px;background:var(--panel-2);border:1px solid var(--border);overflow:hidden}
  .sd-fill{position:absolute;top:0;left:0;bottom:0;border-radius:99px;transition:width .5s ease}
  .sd-fill.green{background:var(--green)} .sd-fill.red{background:var(--red)}
  .sd-stat{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--text-3);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .sd-stat b{color:var(--text-2);font-weight:600}
  .sd-stat .pct{margin-left:8px}
  .sd-stat .pct.green{color:var(--green)} .sd-stat .pct.red{color:var(--red)}
  .sd-empty{padding:18px 6px;color:var(--text-4);font-size:11.5px;text-align:center;border:1px dashed var(--border);border-radius:9px;background:var(--bg-1)}
  .sd-chart-h{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);font-weight:600;margin-bottom:6px}
  .sd-chart-wrap{border:1px solid var(--border);border-radius:9px;background:var(--bg-1);padding:8px 6px 2px}

  /* ---- Winners & money pits: cards that open a proving trend graph ---- */
  .wp{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:760px){.wp{grid-template-columns:1fr}}
  .wp-col{display:flex;flex-direction:column;gap:8px}
  .wp-colh{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .wp-colh.win{color:var(--green)} .wp-colh.lose{color:var(--red)}
  .wp-none{font-size:11.5px;color:var(--text-4);padding:10px 12px;border:1px dashed var(--border);border-radius:10px}
  .pt-card{border:1px solid var(--border);border-radius:11px;background:var(--panel);overflow:hidden;transition:border-color .14s}
  .pt-card.win:hover,.pt-card.win.open{border-color:color-mix(in srgb,var(--green) 40%,transparent)}
  .pt-card.lose:hover,.pt-card.lose.open{border-color:color-mix(in srgb,var(--red) 40%,transparent)}
  .pt-head{display:grid;grid-template-columns:1fr auto;grid-template-areas:"word roas" "mini mini" "chev chev";gap:6px 10px;width:100%;padding:11px 13px;text-align:left}
  .pt-word{grid-area:word;font-size:13.5px;font-weight:620;color:var(--text);align-self:center}
  .pt-roas{grid-area:roas;font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500;align-self:center}
  .pt-roas.win{color:var(--green)} .pt-roas.lose{color:var(--red)}
  .pt-mini{grid-area:mini;display:flex;gap:14px}
  .pt-mini .s{font-size:11px;color:var(--text-4)} .pt-mini .s b{color:var(--text-2);font-variant-numeric:tabular-nums}
  .pt-chev{grid-area:chev;font-size:10.5px;color:var(--text-3);font-weight:600}
  .pt-card:hover .pt-chev{color:var(--gold)}
  .pt-body{padding:0 13px 13px;border-top:1px solid var(--border);animation:mi-rise .3s both}
  .pt-proof{font-size:11.5px;line-height:1.5;color:var(--text-3);padding:11px 0 4px}
  .pt-where{font-size:10.5px;color:var(--text-4);margin-top:8px}
  .pt-where .lab{text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-right:6px}
  .pt-where b{color:var(--text-2)}

  /* ---- Correlations: what drives the money ---- */
  .corr{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  @media(max-width:760px){.corr{grid-template-columns:1fr}}
  .corr-list{display:flex;flex-direction:column;gap:8px}
  .corr-row{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;
    width:100%;text-align:left;font:inherit;cursor:pointer;
    background:transparent;border:1px solid transparent;border-radius:9px;padding:8px 10px;
    transition:background .15s,border-color .15s,transform .1s}
  .corr-row:hover{background:var(--row-hover);border-color:var(--border)}
  .corr-row.on{background:color-mix(in srgb,var(--gold) 9%,transparent);border-color:var(--gold-dim)}
  .corr-row.on .corr-txt b{color:var(--gold)}
  .corr-row:active{transform:scale(.99)}
  .corr-bar{height:7px;border-radius:99px;background:var(--panel-2);border:1px solid var(--border);overflow:hidden}
  .corr-fill{height:100%;border-radius:99px;transition:width .5s}
  .corr-txt{font-size:12px;line-height:1.42;color:var(--text-2)} .corr-txt b{color:var(--text)}
  .corr-r{font-family:var(--mono);font-size:10.5px;color:var(--text-4)}
  .corr-hint{font-size:10.5px;color:var(--text-4);padding:2px 10px 0;letter-spacing:.02em}
  .corr-scatter{border:1px solid var(--border);border-radius:11px;background:var(--panel);padding:11px 12px}
  .corr-scatter-h{font-size:10.5px;color:var(--text-4);margin-bottom:6px;line-height:1.5}
  .corr-scatter-h .ax{font-family:var(--mono);color:var(--text-3);font-size:9.5px}
  .corr-svg{width:100%;height:auto;display:block;overflow:visible}
  .corr-plot{position:relative}
  .corr-tip{position:absolute;transform:translate(-50%,calc(-100% - 12px));pointer-events:none;z-index:5;
    background:var(--panel-2);border:1px solid var(--border-2);border-radius:9px;padding:8px 10px;
    box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:128px;white-space:nowrap}
  .corr-tip .kw{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:700;
    margin-bottom:5px;letter-spacing:.02em}
  .corr-tip .rows{display:flex;flex-direction:column;gap:3px}
  .corr-tip .rows span{display:flex;justify-content:space-between;gap:14px;font-size:11px}
  .corr-tip .rows i{font-style:normal;color:var(--text-4)}
  .corr-tip .rows b{font-family:var(--mono);color:var(--text-2);font-weight:600}
  .corr-read{margin-top:9px;font-size:11.5px;line-height:1.5;color:var(--text-3);
    border-top:1px solid var(--border);padding-top:8px} .corr-read b{color:var(--text-2)}
  /* outcome (Y) picker + variable list extras for the all-variable explorer */
  .corr-ybar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:12px}
  .corr-ybar .lab{font-size:11px;color:var(--text-4);letter-spacing:.02em;margin-right:2px}
  .corr-ychip{font:inherit;font-size:11px;cursor:pointer;background:var(--panel-2);
    border:1px solid var(--border);color:var(--text-3);border-radius:99px;padding:4px 11px;
    transition:background .14s,border-color .14s,color .14s}
  .corr-ychip:hover{border-color:var(--border-2);color:var(--text-2)}
  .corr-ychip.on{background:color-mix(in srgb,var(--gold) 14%,transparent);
    border-color:var(--gold);color:var(--gold);font-weight:600}
  .corr-list{max-height:392px;overflow-y:auto;padding-right:2px}
  .corr-row.weak{opacity:.62} .corr-row.weak:hover{opacity:1}
  .corr-row.thin{opacity:.5}
  .corr-n{font-family:var(--mono);font-size:9px;color:var(--text-4);margin-top:2px}
  .corr-rwrap{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .corr-note{font-size:10.5px;color:var(--text-4);line-height:1.5;margin-top:7px}

  /* ---- Sweet spot: what the winners share (consolidation of every lever) ---- */
  .sweet-legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px;font-size:11px;color:var(--text-4)}
  .sweet-legend span{display:inline-flex;align-items:center;gap:6px}
  .sweet-dotleg{display:inline-block;width:10px;height:10px;border-radius:99px}
  .sweet-rows{display:flex;flex-direction:column;gap:3px}
  .sweet-row{display:grid;grid-template-columns:122px 1fr 128px;gap:13px;align-items:center;
    padding:7px 10px;border-radius:9px;border:1px solid transparent;transition:background .15s,border-color .15s}
  .sweet-row:hover{background:var(--row-hover)}

  /* Open, pannable/zoomable canvas: a fixed viewport with a larger world inside */

      radial-gradient(60% 50% at 50% 45%,color-mix(in srgb,var(--gold) 4%,transparent),transparent 70%),

  .flow-zoom{position:absolute;right:12px;bottom:12px;z-index:6;display:flex;flex-direction:column;gap:6px}

    background:color-mix(in srgb,var(--panel) 84%,transparent);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);

  .flow-zoom .fz-fit{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

  .flow-node{position:absolute;transform:translate(-50%,-50%);width:142px;

  .flow-node.g-src .fn-ic{background:var(--blue)} .flow-node.g-cap .fn-ic{background:var(--gold)}

  /* ===== Lab-tab additions (new classes; reuse tracker tokens) ===== */
  .lab-ladder{border:1px solid var(--border);border-radius:12px;background:radial-gradient(120% 150% at 100% 0%,color-mix(in srgb,var(--gold) 6%,var(--panel)),var(--panel) 60%);padding:14px 18px 16px}
  .lab-ladder-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:12px}

  .lab-step.goal .lab-step-dot{background:var(--gold);box-shadow:0 0 8px color-mix(in srgb,var(--gold) 80%,transparent)}
  .lab-step.goal .lab-step-lbl{color:var(--gold);font-weight:600}
  .lab-step-arrow{color:var(--text-4);font-size:13px;padding:0 2px;flex:none}

  /* Setter capacity modal (gear) */
  .lab-cap-toggle{display:inline-flex;border:1px solid var(--border-2);border-radius:8px;background:var(--bg-1);padding:3px;align-self:flex-start}
  .lab-cap-seg{padding:6px 14px;font-size:12px;color:var(--text-3);border-radius:5px;font-weight:500;transition:background .14s,color .14s}
  .lab-cap-seg:hover{color:var(--text-2)}
  .lab-cap-seg.on{background:var(--panel-2);color:var(--text)}
  .lab-cap-grid{display:flex;flex-direction:column;gap:8px}
  .lab-cap-row{display:flex;align-items:center;gap:12px;padding:9px 13px;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
  .lab-cap-name{flex:1;font-size:12.5px;color:var(--text);font-weight:500}
  .lab-cap-input{width:88px;height:30px;padding:0 10px;border:1px solid var(--border-2);border-radius:6px;background:var(--bg-1);color:var(--text);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px;font-variant-numeric:tabular-nums;text-align:right}
  .lab-cap-input:focus{border-color:var(--gold-dim);background:var(--panel-2)}
  .lab-cap-unit{font-size:10.5px;color:var(--text-4);width:62px;flex:none}

  /* Constraint card (data-driven, bars vs threshold) */
  .lab-constraint{border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden}
  .lab-constraint-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border)}
  .lab-constraint-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3)}
  .lab-constraint-verdict{font-size:15px;font-weight:650;letter-spacing:-.01em;color:var(--text);margin-top:6px}
  .lab-constraint-verdict.clear{color:var(--green)}
  .lab-constraint-verdict.bound{color:var(--red)}
  .lab-constraint-verdict.unknown{color:var(--text-3)}
  .lab-constraint-meta{font-size:11px;color:var(--text-4);margin-top:5px;line-height:1.4}
  .lab-constraint-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:16px}
  .lab-bar-row{display:flex;flex-direction:column;gap:7px}
  .lab-bar-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .lab-bar-name{font-size:12.5px;color:var(--text-2);font-weight:500}
  .lab-bar-name .binding{margin-left:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red);border:1px solid rgba(232,154,148,.32);border-radius:999px;padding:1px 6px;vertical-align:middle}
  .lab-bar-util{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;font-variant-numeric:tabular-nums;color:var(--text-3)}
  .lab-bar-util.over{color:var(--red)} .lab-bar-util.under{color:var(--green)} .lab-bar-util.na{color:var(--text-4)}
  .lab-bar-track{position:relative;height:10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);overflow:hidden}
  .lab-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .35s cubic-bezier(.4,0,.2,1)}
  .lab-bar-fill.under{background:var(--green)} .lab-bar-fill.over{background:var(--red)}
  .lab-bar-threshold{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text-2);opacity:.85}
  .lab-bar-track.na{background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 6px,var(--bg-1) 6px,var(--bg-1) 12px)}
  .lab-bar-sub{font-size:10.5px;color:var(--text-4);line-height:1.4}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>


<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ------- Icons (minimal, stroke) — same style as the tracker
const Icon = ({ d, size=14, stroke=1.4 }) => (
  <svg className="i" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IcCheck = () => <Icon d={<path d="M20 6L9 17l-5-5"/>} />;
const IcLock = () => <Icon d={<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
/* IcCal + IcCaret — copied verbatim from ads-tracker-export.html (lines 1989–1992) */
const IcCal = () => <Icon d={<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>} />;
const IcCaret = () => (
  <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"><path d="M1 1l4 4 4-4"/></svg>
);

/* ====== date helpers + DateDropdown/MiniCalendar copied verbatim from ads-tracker-export.html
   (helpers ~lines 2171–2271, MiniCalendar ~2511–2546, DateDropdown ~2548–2632, SelectFilter ~2635–2662) ====== */
function isoDate(d){
  return d.toISOString().slice(0,10);
}
function todayEt(){
  return new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
  }).format(new Date());
}
function shiftIso(date, days){
  const d = new Date(date+"T00:00:00.000Z");
  d.setUTCDate(d.getUTCDate()+days);
  return isoDate(d);
}
function monthStartIso(date){
  return (date || todayEt()).slice(0,7)+"-01";
}
function shiftMonth(monthIso, delta){
  const d = new Date(monthIso+"T00:00:00");
  d.setMonth(d.getMonth()+delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}
function monthTitle(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return d.toLocaleDateString("en-US", {month:"long", year:"numeric"});
}
function daysInMonth(monthIso){
  const d = new Date(monthIso+"T00:00:00");
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function isoForMonthDay(monthIso, day){
  return `${monthIso.slice(0,7)}-${String(day).padStart(2,"0")}`;
}
const PRESETS = [
  {id:"today",label:"Today",days:0},
  {id:"yesterday",label:"Yesterday",days:-1},
  {id:"last3",label:"Last 3 days",days:3},
  {id:"last7",label:"Last 7 days",days:7},
  {id:"last14",label:"Last 14 days",days:14},
  {id:"last30",label:"Last 30 days",days:30},
  {id:"mtd",label:"This month"},
  {id:"lmtd",label:"Last month"},
  {id:"custom",label:"Custom"},
];
function rangeForPreset(id, anchor=todayEt()){
  if(id==="today") return {preset:id, dateFrom:anchor, dateTo:anchor};
  if(id==="yesterday"){
    const y = shiftIso(anchor, -1);
    return {preset:id, dateFrom:y, dateTo:y};
  }
  if(id==="last3") return {preset:id, dateFrom:shiftIso(anchor, -2), dateTo:anchor};
  if(id==="last7") return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
  if(id==="last14") return {preset:id, dateFrom:shiftIso(anchor, -13), dateTo:anchor};
  if(id==="last30") return {preset:id, dateFrom:shiftIso(anchor, -29), dateTo:anchor};
  if(id==="mtd") return {preset:id, dateFrom:anchor.slice(0,8)+"01", dateTo:anchor};
  if(id==="lmtd"){
    const start = shiftMonth(monthStartIso(anchor), -1);
    return {preset:id, dateFrom:start, dateTo:isoForMonthDay(start, daysInMonth(start))};
  }
  return {preset:id, dateFrom:shiftIso(anchor, -6), dateTo:anchor};
}
function dateLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}
function rangeLabel(range){
  const from = dateLabelFromIso(range.dateFrom);
  const to = dateLabelFromIso(range.dateTo);
  const year = (range.dateTo || "").slice(0,4);
  return from===to ? `${from}, ${year}` : `${from} – ${to}, ${year}`;
}
function labelForPreset(id){
  return PRESETS.find(p=>p.id===id)?.label || "Custom";
}

function MiniCalendar({monthIso, rangeStart, rangeEnd, onPick, onShift}){
  const days = [];
  const monthDate = new Date(monthIso+"T00:00:00");
  const startBlank = monthDate.getDay();
  for(let i=0;i<startBlank;i++) days.push({blank:true});
  for(let d=1; d<=daysInMonth(monthIso); d++) days.push({d, iso:isoForMonthDay(monthIso, d)});
  while(days.length % 7 !== 0) days.push({blank:true, trail:true});
  const dow = ["S","M","T","W","T","F","S"];
  const today = todayEt();
  return (
    <div>
      <div className="cal-head">
        <button className="cal-nav" onClick={()=>onShift(-1)}>‹</button>
        <span>{monthTitle(monthIso)}</span>
        <button className="cal-nav" onClick={()=>onShift(1)}>›</button>
      </div>
      <div className="cal-grid">
        {dow.map((d,i)=><div key={"h"+i} className="cal-dow">{d}</div>)}
        {days.map((x,i)=>{
          if(x.blank) return <div key={i} className={"cal-day muted "+(x.trail?"trail":"")}></div>;
          const inRange = x.iso>=rangeStart && x.iso<=rangeEnd;
          const endpoint = x.iso===rangeStart || x.iso===rangeEnd;
          return (
            <button
              key={i}
              className={"cal-day "+(endpoint?"endpoint":(inRange?"in-range":""))+(x.iso===today?" today":"")}
              onClick={()=>onPick(x.iso)}
            >
              {x.d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DateDropdown({value, onChange}){
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || rangeForPreset("last7"));
  const [monthIso, setMonthIso] = useState(monthStartIso((value || rangeForPreset("last7")).dateTo));
  const [selectingEnd, setSelectingEnd] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const current = value || rangeForPreset("last7");
  useEffect(()=>{
    if(open){
      setDraft(current);
      setMonthIso(monthStartIso(current.dateTo));
      setSelectingEnd(false);
    }
  },[open, current.dateFrom, current.dateTo, current.preset]);
  const label = labelForPreset(current.preset);
  const days = Math.max(1, Math.round((new Date(draft.dateTo) - new Date(draft.dateFrom))/(1000*60*60*24)) + 1);
  const pickDate = (iso) => {
    setDraft(prev => {
      if(!selectingEnd){
        setSelectingEnd(true);
        return {preset:"custom", dateFrom:iso, dateTo:iso};
      }
      setSelectingEnd(false);
      const dateFrom = iso < prev.dateFrom ? iso : prev.dateFrom;
      const dateTo = iso < prev.dateFrom ? prev.dateFrom : iso;
      return {preset:"custom", dateFrom, dateTo};
    });
  };
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span style={{color:'var(--text-3)',display:'inline-flex'}}><IcCal /></span>
        <span className="val">{label}</span>
        <span className="dim" style={{fontSize:11}}>· {rangeLabel(current)}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop date-pop" style={{minWidth:520}}>
          <div className="date-presets">
            {PRESETS.map(p=>(
              <div
                key={p.id}
                className={"pop-item "+(draft.preset===p.id?"selected":"")}
                onClick={()=>{
                  if(p.id!=="custom") {
                    onChange && onChange(rangeForPreset(p.id));
                    setOpen(false);
                  } else {
                    setDraft({...draft, preset:"custom"});
                    setSelectingEnd(false);
                  }
                }}
              >
                <span>{p.label}</span>
                <span className="check"><IcCheck/></span>
              </div>
            ))}
          </div>
          <div className="date-cal">
            <MiniCalendar
              monthIso={monthIso}
              rangeStart={draft.dateFrom}
              rangeEnd={draft.dateTo}
              onPick={pickDate}
              onShift={(delta)=>setMonthIso(m=>shiftMonth(m, delta))}
            />
          </div>
          <div className="date-foot">
            <span className="mono" style={{fontSize:11}}>
              {draft.dateFrom} → {draft.dateTo} · {days} day{days===1?"":"s"}{draft.preset==="custom" && selectingEnd ? " · pick end date" : ""}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="filter-btn" style={{padding:'4px 10px'}} onClick={()=>setOpen(false)}>Cancel</button>
              <button className="apply-btn" onClick={()=>{onChange && onChange(draft); setOpen(false);}}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ------- Account dropdown — copied verbatim from ads-tracker-export.html (SelectFilter, ~lines 2635–2662) */
function SelectFilter({label, options, value, onChange}){
  const [open,setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const h = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h);
  },[]);
  const cur = options.find(o=>o.id===value) || options[0];
  return (
    <div className="filter" ref={ref}>
      <button className={"filter-btn "+(open?"open":"")} onClick={()=>setOpen(!open)}>
        <span className="lbl">{label}</span>
        <span className="val">{cur.label}</span>
        <span className="caret"><IcCaret/></span>
      </button>
      {open && (
        <div className="pop">
          {options.map(o=>(
            <div key={o.id} className={"pop-item "+(value===o.id?"selected":"")} onClick={()=>{onChange(o.id);setOpen(false);}}>
              <span>{o.label}</span>
              <span className="check"><IcCheck/></span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---- formatters (mirror the tracker's helpers)
const fmtUsd = (v,dp=0)=>"$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmtNum = (v)=>Number(v).toLocaleString();
const fmtPct = (v,dp=1)=>Number(v).toFixed(dp)+"%";

/* ====== copied verbatim from ads-tracker-export.html (smoothPath + LineChart, ~lines 3143–3305) ====== */
function smoothPath(points){
  if(points.length < 2) return "";
  const p = points;
  let d = `M ${p[0].x} ${p[0].y}`;
  for(let i=0; i<p.length-1; i++){
    const p0 = p[i-1] || p[i];
    const p1 = p[i];
    const p2 = p[i+1];
    const p3 = p[i+2] || p2;
    const t = 0.18;
    const c1x = p1.x + (p2.x - p0.x) * t;
    const c1y = p1.y + (p2.y - p0.y) * t;
    const c2x = p2.x - (p3.x - p1.x) * t;
    const c2y = p2.y - (p3.y - p1.y) * t;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function LineChart({series, labels, height=200, width=640, fmt=(v)=>v, fmtRight, primaryColor="var(--gold)", yLabel=""}){
  // series: [{name, values[], color, dashed?, isPrimary?, fmt?, axis?: 'left'|'right'}]
  const [hoverIdx, setHoverIdx] = useState(null);
  const hasRight = series.some(s => s.axis === "right");
  const pad = {t: hasRight ? 30 : 22, r: hasRight ? 52 : 16, b: 28, l: 46};
  const innerW = width - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const n = labels.length;

  // Build scale per axis
  const buildScale = (vals) => {
    const minV = Math.min(...vals, 0);
    const maxV = Math.max(...vals);
    const range = Math.max(maxV - minV, 1);
    const yMax = maxV + range * 0.18;
    const yMin = Math.max(0, minV - range * 0.12);
    const yR = Math.max(yMax - yMin, 1);
    return {yMin, yMax, yR};
  };
  const leftVals = series.filter(s => s.axis !== "right").flatMap(s => s.values);
  const rightVals = series.filter(s => s.axis === "right").flatMap(s => s.values);
  const leftScale = buildScale(leftVals.length ? leftVals : [0,1]);
  const rightScale = hasRight ? buildScale(rightVals) : leftScale;
  const scaleFor = (s) => s.axis === "right" ? rightScale : leftScale;

  const xOf = (i) => pad.l + (n === 1 ? innerW/2 : (i/(n-1)) * innerW);
  const yOfScale = (v, sc) => pad.t + innerH - ((v - sc.yMin)/sc.yR) * innerH;
  const yOf = (v, s) => yOfScale(v, scaleFor(s));
  const pointsFor = (s) => s.values.map((v,i)=>({x: xOf(i), y: yOf(v, s)}));

  // y-axis ticks (4) for left scale; right scale gets same fractions but labeled with rightScale values
  const tickFractions = [0, 0.33, 0.66, 1];
  const leftTicks = tickFractions.map(t => leftScale.yMin + t*leftScale.yR);
  const rightTicks = tickFractions.map(t => rightScale.yMin + t*rightScale.yR);

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scale = width / rect.width;
    const x = (e.clientX - rect.left) * scale;
    if(x < pad.l - 8 || x > pad.l + innerW + 8){ setHoverIdx(null); return; }
    const rel = (x - pad.l) / innerW;
    const idx = Math.max(0, Math.min(n-1, Math.round(rel*(n-1))));
    setHoverIdx(idx);
  };

  return (
    <div className="lc-wrap">
      <svg className="lc-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none"
        onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
        <defs>
          {series.map((s,i)=> s.isPrimary && (
            <linearGradient key={"g"+i} id={`lc-fade-${i}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.35"/>
              <stop offset="60%" stopColor={s.color} stopOpacity="0.08"/>
              <stop offset="100%" stopColor={s.color} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        {/* grid (left axis) */}
        {leftTicks.map((t,i)=>{
          const y = yOfScale(t, leftScale);
          const leftColor = series.find(s => s.axis !== "right")?.color || "var(--text-4)";
          return (
            <g key={"lt"+i}>
              <line x1={pad.l} x2={pad.l+innerW} y1={y} y2={y} stroke="var(--panel-2)" strokeWidth="1"/>
              <text x={pad.l-8} y={y+3} textAnchor="end" fontSize="9.5" fill={hasRight?leftColor:"var(--text-4)"} fillOpacity={hasRight?0.7:1} fontFamily="'JetBrains Mono',monospace">{fmt(t)}</text>
            </g>
          );
        })}
        {/* right axis ticks */}
        {hasRight && rightTicks.map((t,i)=>{
          const y = yOfScale(t, rightScale);
          const rightColor = series.find(s => s.axis === "right")?.color || "var(--text-4)";
          return (
            <text key={"rt"+i} x={pad.l+innerW+8} y={y+3} textAnchor="start" fontSize="9.5" fill={rightColor} fillOpacity="0.7" fontFamily="'JetBrains Mono',monospace">{(fmtRight||fmt)(t)}</text>
          );
        })}
        {/* axis labels */}
        {hasRight && (
          <>
            <text x={pad.l-8} y={pad.t-8} textAnchor="end" fontSize="8.5" fill={series.find(s=>s.axis!=="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis!=="right")?.name || "").toUpperCase()}</text>
            <text x={pad.l+innerW+8} y={pad.t-8} textAnchor="start" fontSize="8.5" fill={series.find(s=>s.axis==="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis==="right")?.name || "").toUpperCase()}</text>
          </>
        )}
        {/* x labels */}
        {labels.map((l,i)=>{
          const step = n > 10 ? Math.ceil(n/8) : 1;
          if(i % step !== 0 && i !== n-1) return null;
          return (
            <text key={i} x={xOf(i)} y={height-10} textAnchor="middle" fontSize="9.5" fill="var(--text-4)" fontFamily="'JetBrains Mono',monospace">{l}</text>
          );
        })}
        {/* fade areas (primary only) */}
        {series.map((s,i)=>{
          if(!s.isPrimary) return null;
          const pts = pointsFor(s);
          const baseline = yOfScale(scaleFor(s).yMin, scaleFor(s));
          const d = smoothPath(pts) + ` L ${pts[pts.length-1].x} ${baseline} L ${pts[0].x} ${baseline} Z`;
          return <path key={"f"+i} d={d} fill={`url(#lc-fade-${i})`}/>;
        })}
        {/* lines */}
        {series.map((s,i)=>{
          const d = smoothPath(pointsFor(s));
          return <path key={"l"+i} d={d} fill="none" stroke={s.color}
            strokeWidth={s.isPrimary ? 2 : 1.5}
            strokeDasharray={s.dashed ? "4 4" : undefined}
            strokeOpacity={s.isPrimary ? 1 : 0.6}
            strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {/* hover guide */}
        {hoverIdx !== null && (
          <g>
            <line x1={xOf(hoverIdx)} x2={xOf(hoverIdx)} y1={pad.t} y2={pad.t+innerH} stroke="var(--border-2)" strokeWidth="1" strokeDasharray="3 3"/>
            {series.map((s,i)=>(
              <circle key={"d"+i} cx={xOf(hoverIdx)} cy={yOf(s.values[hoverIdx], s)} r={s.isPrimary?4:3}
                fill="var(--bg)" stroke={s.color} strokeWidth="2"/>
            ))}
          </g>
        )}
      </svg>
      {hoverIdx !== null && (() => {
        const pct = (xOf(hoverIdx)/width)*100;
        const transform = pct > 82
          ? "translate(-100%, -6px)"
          : (pct < 18 ? "translate(0, -6px)" : "translate(-50%, -6px)");
        return (
        <div className="lc-tooltip" style={{
          left: `${pct}%`,
          transform,
        }}>
          <div className="lc-tt-date">{labels[hoverIdx]}</div>
          {series.map((s,i)=>(
            <div key={i} className="lc-tt-row">
              <span className="lc-tt-sw" style={{background:s.color, opacity: s.isPrimary?1:0.6}}></span>
              <span className="lc-tt-name">{s.name}</span>
              <span className="lc-tt-val mono">{(s.fmt||fmt)(s.values[hoverIdx])}</span>
            </div>
          ))}
        </div>
        );
      })()}
    </div>
  );
}

// ---- A green-light gate = the funnel-scoreboard metric card (number + line graph + meaning)
// Modes:
//  - empty (or status "unknown"/loading): the dashed "awaiting input" look
//  - series present: number + line graph (Gate 1 — ad economics)
//  - value present, no series: single % reading, colored by state ("green"|"red")
function Gate({label, value, chip, chipClass, series, labels, fmt, note, empty, state, gear, onGear}){
  const isAwaiting = empty || state === "unknown";
  const valColor = state === "red" ? "var(--red)" : "var(--green)";
  return (
    <div className="fs-tile" style={{minHeight:178, position:"relative"}}>
      <div className="fs-top">
        <div className="fs-lbl">{label}</div>
        {chip && <span className={"fs-chip "+(chipClass||"neutral")}>{chip}</span>}
      </div>
      {gear && (
        <button
          onClick={onGear}
          title="Setter capacity settings"
          style={{position:"absolute",top:10,right:11,color:"var(--text-4)",display:"inline-flex",
            padding:"3px",borderRadius:"6px",lineHeight:0,transition:"color .14s"}}
          onMouseEnter={(e)=>{e.currentTarget.style.color="var(--gold)";}}
          onMouseLeave={(e)=>{e.currentTarget.style.color="var(--text-4)";}}
        >
          <IcGear/>
        </button>
      )}
      {isAwaiting ? (
        <>
          <div className="fs-val" style={{color:"var(--text-4)"}}>—</div>
          <div className="lc-wrap" style={{height:48,display:"flex",alignItems:"center",justifyContent:"center",
            border:"1px dashed var(--border)",borderRadius:8,background:"var(--bg-1)"}}>
            <span style={{fontSize:10.5,color:"var(--text-4)",letterSpacing:".04em"}}>awaiting input</span>
          </div>
        </>
      ) : series ? (
        <>
          <div className="fs-val" style={{color:valColor}}>{value}</div>
          <LineChart
            labels={labels}
            series={[{name:label, values:series, color:valColor, isPrimary:true, fmt:fmt}]}
            height={64} width={300} fmt={fmt}
          />
        </>
      ) : (
        <>
          <div className="fs-val" style={{color:valColor, fontSize:34, lineHeight:"1.1", marginTop:2}}>{value}</div>
          <div style={{flex:1}}></div>
        </>
      )}
      <div className="fs-explain">{note}</div>
    </div>
  );
}

function Gates({closer, setter, onGear}){
  const roasLabels = ["Jun 8","Jun 9","Jun 10","Jun 11","Jun 12","Jun 13","Jun 14"];
  const roasSeries = [3.1,3.6,4.2,2.9,3.4,3.9,3.8];
  const roasFmt = (v)=>v.toFixed(1)+"×";

  // ---- Gate 2 — Closer calendar (single % reading) ----
  const c = closer || {};
  const closerHasPct = typeof c.filledPct === "number";
  const closerState = c.status === "green" ? "green" : (c.status === "red" ? "red" : "unknown");
  const closerEmpty = !closerHasPct || closerState === "unknown";
  const closerValue = closerHasPct ? Math.round(c.filledPct*100)+"%" : "—";
  const closerNote = (typeof c.booked === "number" && typeof c.total === "number")
    ? `${c.booked} of ${c.total} slots booked · target ≤ 80%`
    : "awaiting closer capacity input · target ≤ 80% of prime slots";

  // ---- Gate 3 — Setter load (multi-day average % reading) ----
  const t = (setter && setter.team) || {};
  const w = (setter && setter.window) || {};
  const setterHasPct = typeof t.loadPct === "number";
  const setterState = t.status === "green" ? "green" : (t.status === "red" ? "red" : "unknown");
  const setterEmpty = !setterHasPct || setterState === "unknown";
  const setterValue = setterHasPct ? Math.round(t.loadPct*100)+"%" : "—";
  const setterNote = (typeof t.avgPerDayTotal === "number" && typeof t.capacityTotal === "number")
    ? `${t.avgPerDayTotal} avg leads/day vs ${t.capacityTotal} cap · ${w.days != null ? w.days : "—"}d`
    : "awaiting setter max-volume input · target ≤ 80%";

  return (
    <div>
      <div className="section-head">
        <span className="section-label">Green-light gates</span>
        <span className="section-meta">scale only when all 3 are green</span>
      </div>
      <div className="fs-grid" style={{gridTemplateColumns:"repeat(3,minmax(0,1fr))"}}>
        <Gate
          label="Ad economics"
          value="3.8×"
          chip="green" chipClass="good"
          series={roasSeries} labels={roasLabels} fmt={roasFmt}
          note="7-day collected ROAS · target ≥ 3×"
        />
        <Gate
          label="Closer calendar"
          value={closerValue}
          state={closerState}
          empty={closerEmpty}
          note={closerNote}
        />
        <Gate
          label="Setter load"
          value={setterValue}
          state={setterState}
          empty={setterEmpty}
          note={setterNote}
          gear onGear={onGear}
        />
      </div>
      <div className="lab-verdict">
        Hold. Scaling stays locked until all three gates read green.
      </div>
    </div>
  );
}

/* ---- Setter detail — the transparency panel under the gates row. Shows what's
   actually driving the Gate 3 reading: each setter's average load over the window
   (utilization bar, green < 0.8 / red over) + a leads/day history chart fed by the
   `daily` series (reuses LineChart exactly like Gate 1). Awaiting-safe: renders the
   dashed placeholder until the multi-day setter-load payload arrives. */
function SetterDetail({setter}){
  const team = (setter && setter.team) || null;
  const win = (setter && setter.window) || null;
  const perSetter = (setter && Array.isArray(setter.perSetter)) ? setter.perSetter : [];
  const daily = (setter && Array.isArray(setter.daily)) ? setter.daily : [];

  // Awaiting / nothing-yet: no payload, or no usable team reading.
  const hasTeam = team && typeof team.loadPct === "number" && team.status !== "unknown";
  const ready = !!setter && (perSetter.length > 0 || daily.length > 0 || hasTeam);

  const fmtPctSmall = (p)=> (typeof p === "number" ? Math.round(p*100)+"%" : "—");
  const barColor = (p)=> (typeof p === "number" && p > 0.8) ? "red" : "green";

  // History chart: x = date labels (Mon D), y = total leads that day.
  const chartLabels = daily.map(d => dateLabelFromIso(d && d.date));
  const chartValues = daily.map(d => (typeof (d && d.total) === "number" ? d.total : 0));

  const teamState = hasTeam ? (team.status === "red" ? "red" : "green") : "";
  const teamPct = hasTeam ? Math.round(team.loadPct*100)+"%" : "—";

  return (
    <div className="sd-panel">
      <div className="sd-head">
        <div className="sd-head-l">
          <div className="sd-title">Setter detail · what Gate 3 is reading</div>
          {win && (win.from || win.to)
            ? <div className="sd-cap">Last {win.days != null ? win.days : "—"} days · {win.from || "—"} → {win.to || "—"}</div>
            : <div className="sd-cap">Average load across the selected window</div>}
        </div>
        <div className="sd-team">
          <span className={"sd-team-val "+teamState}>{teamPct}</span>
          <span className="sd-team-lbl">team load</span>
        </div>
      </div>
      <div className="sd-body">
        {/* Per-setter utilization rows */}
        {ready && perSetter.length > 0 ? (
          <div className="sd-rows">
            {perSetter.map((s,i)=>{
              const pct = typeof s.loadPct === "number" ? Math.max(0, Math.min(1, s.loadPct)) : 0;
              const col = barColor(s.loadPct);
              return (
                <div className="sd-row" key={(s.name||"setter")+i}>
                  <div className="sd-name">{s.name || "—"}</div>
                  <div className="sd-bar">
                    <div className={"sd-fill "+col} style={{width: (pct*100).toFixed(0)+"%"}}></div>
                  </div>
                  <div className="sd-stat">
                    <b>{typeof s.avgPerDay === "number" ? s.avgPerDay : "—"}</b>/day · cap <b>{typeof s.capacity === "number" ? s.capacity : "—"}</b>
                    <span className={"pct "+col}>{fmtPctSmall(s.loadPct)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div className="sd-empty">{ready ? "No per-setter breakdown for this window yet." : "Awaiting setter load — pick an account and date range."}</div>
        )}

        {/* Leads/day history chart — reused LineChart, one primary series */}
        {ready && daily.length > 0 ? (
          <div>
            <div className="sd-chart-h">Leads/day · over the window</div>
            <div className="sd-chart-wrap">
              <LineChart
                labels={chartLabels}
                series={[{name:"Leads/day", values:chartValues, color:"var(--gold)", isPrimary:true, fmt:(v)=>Math.round(v)}]}
                height={140} width={640} fmt={(v)=>Math.round(v)}
              />
            </div>
          </div>
        ) : (
          <div className="sd-empty">{ready ? "No daily history for this window yet." : "Awaiting daily lead history."}</div>
        )}
      </div>
    </div>
  );
}

/* ====== Constraint card — data-driven binding-constraint detector ====== */

// Pure decision rule: returns the binding constraint purely from the numbers.
// Each constraint: {key, label, util (0..1 or null if not measured), limit (0..1)}.
// Binding = the measured constraint with the HIGHEST utilization that is at/over its limit.
// If none measured → "unknown — capacity not wired". If measured but none over → "none — clear to scale".
function pickConstraint(constraints){
  const measured = constraints.filter(c => typeof c.util === "number");
  if(measured.length === 0){
    return {verdict:"unknown — capacity not wired", state:"unknown", binding:null};
  }
  const over = measured.filter(c => c.util >= c.limit);
  if(over.length === 0){
    return {verdict:"none — clear to scale", state:"clear", binding:null};
  }
  const binding = over.reduce((a,b)=> b.util > a.util ? b : a);
  return {verdict:binding.label, state:"bound", binding:binding.key};
}

function ConstraintBar({c, isBinding}){
  const measured = typeof c.util === "number";
  const over = measured && c.util >= c.limit;
  const pct = measured ? Math.min(100, Math.round(c.util*100)) : 0;
  const limitPct = Math.round(c.limit*100);
  return (
    <div className="lab-bar-row">
      <div className="lab-bar-top">
        <span className="lab-bar-name">
          {c.label}
          {isBinding && <span className="binding">binding</span>}
        </span>
        <span className={"lab-bar-util "+(measured?(over?"over":"under"):"na")}>
          {measured ? pct+"% / "+limitPct+"%" : "not measured"}
        </span>
      </div>
      <div className={"lab-bar-track "+(measured?"":"na")}>
        {measured && <div className={"lab-bar-fill "+(over?"over":"under")} style={{width:pct+"%"}}></div>}
        {measured && <div className="lab-bar-threshold" style={{left:limitPct+"%"}}></div>}
      </div>
      <div className="lab-bar-sub">{c.sub}</div>
    </div>
  );
}

// Composite ROAS headroom modeled as utilization: floor(3×) / current(3.8×) = 0.79 → 79% of the floor used.
// Closer + setter utilizations are now fed live; ad-economics stays a placeholder.
function buildConstraints(closerUtil, setterUtil){
  return [
    {key:"ads", label:"Ad economics", util:3/3.8, limit:1.0,
     sub:"Composite ROAS 3.8× vs 3× floor — headroom to spend more."},
    {key:"closer", label:"Closer calendar", util:typeof closerUtil==="number"?closerUtil:null, limit:0.8,
     sub:typeof closerUtil==="number"
       ? Math.round(closerUtil*100)+"% of prime slots filled vs 80% ceiling."
       : "% of prime slots filled vs 80% — awaiting capacity data."},
    {key:"setter", label:"Setter bandwidth", util:typeof setterUtil==="number"?setterUtil:null, limit:0.8,
     sub:typeof setterUtil==="number"
       ? Math.round(setterUtil*100)+"% of max lead volume vs 80% ceiling."
       : "% of max convo volume vs 80% — awaiting capacity data."},
  ];
}

function ConstraintCard({closerUtil, setterUtil}){
  const CONSTRAINTS = buildConstraints(closerUtil, setterUtil);
  const result = pickConstraint(CONSTRAINTS);
  const headline = result.state === "bound"
    ? "Current constraint: "+result.verdict
    : (result.state === "clear" ? "Current constraint: none — clear to scale" : "Awaiting capacity data");
  const meta = result.state === "unknown"
    ? "Closer + setter capacity aren't wired yet — can't name the true binding constraint until they are."
    : (result.state === "clear"
        ? "Every measured constraint is under its limit. Nothing is pinning growth right now."
        : "This is the part of the machine running closest to its ceiling — fix it first to unlock more scale.");
  return (
    <div className="lab-constraint">
      <div className="lab-constraint-head">
        <div>
          <div className="lab-constraint-k">Constraint</div>
          <div className={"lab-constraint-verdict "+result.state}>{headline}</div>
          <div className="lab-constraint-meta">{meta}</div>
        </div>
      </div>
      <div className="lab-constraint-body">
        {CONSTRAINTS.map(c=>(
          <ConstraintBar key={c.key} c={c} isBinding={result.binding===c.key}/>
        ))}
      </div>
    </div>
  );
}

const ACCOUNTS = [
  {id:"tyson", label:"Tyson", dot:"tyson", campaign:"6/12 · Warm — Winner Variations", adSet:"Warm Stack — Success ICP"},
