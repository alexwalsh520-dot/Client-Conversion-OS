// ------- Shared line chart (curvy, 2 lines, fade, hover tooltip)
// Catmull-Rom → cubic bezier so the curve is smooth with sparse points
function smoothPath(points){
  if(points.length < 2) return "";
  const p = points;
  let d = `M ${p[0].x} ${p[0].y}`;
  for(let i=0; i<p.length-1; i++){
    const p0 = p[i-1] || p[i];
    const p1 = p[i];
    const p2 = p[i+1];
    const p3 = p[i+2] || p2;
    const t = 0.18;
    const c1x = p1.x + (p2.x - p0.x) * t;
    const c1y = p1.y + (p2.y - p0.y) * t;
    const c2x = p2.x - (p3.x - p1.x) * t;
    const c2y = p2.y - (p3.y - p1.y) * t;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function LineChart({series, labels, height=200, width=640, fmt=(v)=>v, fmtRight, primaryColor="var(--gold)", yLabel=""}){
  // series: [{name, values[], color, dashed?, isPrimary?, fmt?, axis?: 'left'|'right'}]
  const [hoverIdx, setHoverIdx] = useState(null);
  const hasRight = series.some(s => s.axis === "right");
  const pad = {t: hasRight ? 30 : 22, r: hasRight ? 52 : 16, b: 28, l: 46};
  const innerW = width - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const n = labels.length;

  // Build scale per axis
  const buildScale = (vals) => {
    const minV = Math.min(...vals, 0);
    const maxV = Math.max(...vals);
    const range = Math.max(maxV - minV, 1);
    const yMax = maxV + range * 0.18;
    const yMin = Math.max(0, minV - range * 0.12);
    const yR = Math.max(yMax - yMin, 1);
    return {yMin, yMax, yR};
  };
  const leftVals = series.filter(s => s.axis !== "right").flatMap(s => s.values);
  const rightVals = series.filter(s => s.axis === "right").flatMap(s => s.values);
  const leftScale = buildScale(leftVals.length ? leftVals : [0,1]);
  const rightScale = hasRight ? buildScale(rightVals) : leftScale;
  const scaleFor = (s) => s.axis === "right" ? rightScale : leftScale;

  const xOf = (i) => pad.l + (n === 1 ? innerW/2 : (i/(n-1)) * innerW);
  const yOfScale = (v, sc) => pad.t + innerH - ((v - sc.yMin)/sc.yR) * innerH;
  const yOf = (v, s) => yOfScale(v, scaleFor(s));
  const pointsFor = (s) => s.values.map((v,i)=>({x: xOf(i), y: yOf(v, s)}));

  // y-axis ticks (4) for left scale; right scale gets same fractions but labeled with rightScale values
  const tickFractions = [0, 0.33, 0.66, 1];
  const leftTicks = tickFractions.map(t => leftScale.yMin + t*leftScale.yR);
  const rightTicks = tickFractions.map(t => rightScale.yMin + t*rightScale.yR);

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scale = width / rect.width;
    const x = (e.clientX - rect.left) * scale;
    if(x < pad.l - 8 || x > pad.l + innerW + 8){ setHoverIdx(null); return; }
    const rel = (x - pad.l) / innerW;
    const idx = Math.max(0, Math.min(n-1, Math.round(rel*(n-1))));
    setHoverIdx(idx);
  };

  return (
    <div className="lc-wrap">
      <svg className="lc-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none"
        onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
        <defs>
          {series.map((s,i)=> s.isPrimary && (
            <linearGradient key={"g"+i} id={`lc-fade-${i}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.35"/>
              <stop offset="60%" stopColor={s.color} stopOpacity="0.08"/>
              <stop offset="100%" stopColor={s.color} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        {/* grid (left axis) */}
        {leftTicks.map((t,i)=>{
          const y = yOfScale(t, leftScale);
          const leftColor = series.find(s => s.axis !== "right")?.color || "var(--text-4)";
          return (
            <g key={"lt"+i}>
              <line x1={pad.l} x2={pad.l+innerW} y1={y} y2={y} stroke="#181818" strokeWidth="1"/>
              <text x={pad.l-8} y={y+3} textAnchor="end" fontSize="9.5" fill={hasRight?leftColor:"var(--text-4)"} fillOpacity={hasRight?0.7:1} fontFamily="'JetBrains Mono',monospace">{fmt(t)}</text>
            </g>
          );
        })}
        {/* right axis ticks */}
        {hasRight && rightTicks.map((t,i)=>{
          const y = yOfScale(t, rightScale);
          const rightColor = series.find(s => s.axis === "right")?.color || "var(--text-4)";
          return (
            <text key={"rt"+i} x={pad.l+innerW+8} y={y+3} textAnchor="start" fontSize="9.5" fill={rightColor} fillOpacity="0.7" fontFamily="'JetBrains Mono',monospace">{(fmtRight||fmt)(t)}</text>
          );
        })}
        {/* axis labels */}
        {hasRight && (
          <>
            <text x={pad.l-8} y={pad.t-8} textAnchor="end" fontSize="8.5" fill={series.find(s=>s.axis!=="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis!=="right")?.name || "").toUpperCase()}</text>
            <text x={pad.l+innerW+8} y={pad.t-8} textAnchor="start" fontSize="8.5" fill={series.find(s=>s.axis==="right")?.color} fillOpacity="0.8" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.05em">{(series.find(s=>s.axis==="right")?.name || "").toUpperCase()}</text>
          </>
        )}
        {/* x labels */}
        {labels.map((l,i)=>{
          const step = n > 10 ? Math.ceil(n/8) : 1;
          if(i % step !== 0 && i !== n-1) return null;
          return (
            <text key={i} x={xOf(i)} y={height-10} textAnchor="middle" fontSize="9.5" fill="var(--text-4)" fontFamily="'JetBrains Mono',monospace">{l}</text>
          );
        })}
        {/* fade areas (primary only) */}
        {series.map((s,i)=>{
          if(!s.isPrimary) return null;
          const pts = pointsFor(s);
          const baseline = yOfScale(scaleFor(s).yMin, scaleFor(s));
          const d = smoothPath(pts) + ` L ${pts[pts.length-1].x} ${baseline} L ${pts[0].x} ${baseline} Z`;
          return <path key={"f"+i} d={d} fill={`url(#lc-fade-${i})`}/>;
        })}
        {/* lines */}
        {series.map((s,i)=>{
          const d = smoothPath(pointsFor(s));
          return <path key={"l"+i} d={d} fill="none" stroke={s.color}
            strokeWidth={s.isPrimary ? 2 : 1.5}
            strokeDasharray={s.dashed ? "4 4" : undefined}
            strokeOpacity={s.isPrimary ? 1 : 0.6}
            strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {/* hover guide */}
        {hoverIdx !== null && (
          <g>
            <line x1={xOf(hoverIdx)} x2={xOf(hoverIdx)} y1={pad.t} y2={pad.t+innerH} stroke="#2a2a2a" strokeWidth="1" strokeDasharray="3 3"/>
            {series.map((s,i)=>(
              <circle key={"d"+i} cx={xOf(hoverIdx)} cy={yOf(s.values[hoverIdx], s)} r={s.isPrimary?4:3}
                fill="#0a0a0a" stroke={s.color} strokeWidth="2"/>
            ))}
          </g>
        )}
      </svg>
      {hoverIdx !== null && (() => {
        const pct = (xOf(hoverIdx)/width)*100;
        const transform = pct > 82
          ? "translate(-100%, -6px)"
          : (pct < 18 ? "translate(0, -6px)" : "translate(-50%, -6px)");
        return (
        <div className="lc-tooltip" style={{
          left: `${pct}%`,
          transform,
        }}>
          <div className="lc-tt-date">{labels[hoverIdx]}</div>
          {series.map((s,i)=>(
            <div key={i} className="lc-tt-row">
              <span className="lc-tt-sw" style={{background:s.color, opacity: s.isPrimary?1:0.6}}></span>
              <span className="lc-tt-name">{s.name}</span>
              <span className="lc-tt-val mono">{(s.fmt||fmt)(s.values[hoverIdx])}</span>
            </div>
          ))}
        </div>
        );
      })()}
    </div>
  );
}

const DAY_LABELS = ["Apr 16","Apr 17","Apr 18","Apr 19","Apr 20","Apr 21","Apr 22"];
// Build daily totals from CAMPAIGNS (already contains Apr 17-22). Synthesize Apr 16.
function seriesForCampaignKey(key, filterId="all", campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const camps = filterId === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===filterId);
  // Map date -> summed value
  const byDate = {};
  camps.forEach(c => c.rows.forEach(r => {
    byDate[r.date] = (byDate[r.date] || 0) + r[key];
  }));
  return labels.map(l => byDate[l] || 0);
}

// ------- Cost per DM chart
// Attribute cost per DM either overall (spend / msgs aggregated) or per keyword (spend of keyword / msgs count)
function seriesCpmOverall(client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const spend = seriesForCampaignKey("spend", client, campaigns, labels);
  const msgs = seriesForCampaignKey("msgs", client, campaigns, labels);
  return msgs.map((m,i)=> m ? spend[i]/m : 0);
}
function seriesCpmKeyword(kw, client, campaigns=CAMPAIGNS, labels=DAY_LABELS){
  const live = labels.map(label => {
    let spend = 0;
    let msgs = 0;
    const camps = client === "all" ? campaigns : campaigns.filter(c=>(c.clientKey || c.id)===client);
    camps.forEach(c => {
      const day = c.rows.find(r=>r.date===label);
      const ad = day?.adRows?.find(a=>a.adName===kw);
      if(ad){
        spend += ad.spend || 0;
        msgs += ad.msgs || 0;
      }
    });
    return msgs ? spend / msgs : 0;
  });
  if(live.some(Boolean)) return live;
  return labels.map(()=>0);
}

function firstLastRealDelta(vals){
  const real = vals.filter(v => Number.isFinite(v) && v > 0);
  if(real.length < 2) return 0;
  return real[real.length - 1] - real[0];
}

function CostPerDMChart({campaigns=CAMPAIGNS}){
  const [mode, setMode] = useState("overall"); // 'overall' | 'keyword'
  const labels = labelsFromCampaigns(campaigns);
  const liveKws = campaigns.flatMap(c => (c.ads||[]).map(ad => ({kw:ad.name, camp:c.clientKey || c.id})));
  const availableKws = liveKws;

  let series, avg, delta, subLabel;
  if(mode === "overall"){
    const vals = seriesCpmOverall("all", campaigns, labels);
    const totalSpend = seriesForCampaignKey("spend", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    const totalMsgs = seriesForCampaignKey("msgs", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    avg = totalMsgs ? totalSpend / totalMsgs : 0;
    delta = firstLastRealDelta(vals);
    subLabel = "selected period";
    series = [
      {name: "Cost / DM", values: vals, color: "var(--blue)", isPrimary:true, fmt: (v)=>"$"+v.toFixed(2)},
    ];
  } else {
    // One line per keyword
    const kwSeries = availableKws.map(k => ({
      name: k.kw,
      values: seriesCpmKeyword(k.kw, "all", campaigns, labels),
      color: k.camp === "tyson" ? "var(--gold)" : "var(--blue)",
      camp: k.camp,
      fmt: (v)=>"$"+v.toFixed(2),
    }));
    if(kwSeries.length === 0){
      const vals = labels.map(()=>0);
      avg = 0;
      delta = 0;
      subLabel = "No keyword data";
      series = [{name:"Cost / DM", values:vals, color:"var(--blue)", isPrimary:true, fmt:(v)=>"$"+v.toFixed(2)}];
    } else {
    // Pick the best-performing (lowest avg) as primary for the fade
    const withAvg = kwSeries.map(s => {
      const real = s.values.filter(v => v > 0);
      return {...s, _avg: real.length ? real.reduce((a,b)=>a+b,0)/real.length : Number.POSITIVE_INFINITY};
    });
    const best = withAvg.reduce((a,b) => a._avg < b._avg ? a : b);
    series = kwSeries.map(s => ({...s, isPrimary: s.name === best.name}));
    // Aggregate average = weighted average across all kw series
    const totalSpend = seriesForCampaignKey("spend", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    const totalMsgs = seriesForCampaignKey("msgs", "all", campaigns, labels).reduce((a,b)=>a+b,0);
    avg = totalMsgs ? totalSpend / totalMsgs : 0;
    // Delta: overall last-vs-first (mean across all lines)
    const firstMean = kwSeries.reduce((a,b)=>a+b.values[0],0) / kwSeries.length;
    const lastMean  = kwSeries.reduce((a,b)=>a+b.values[b.values.length-1],0) / kwSeries.length;
    delta = firstLastRealDelta([firstMean, lastMean]);
    subLabel = `Avg across ${kwSeries.length} keyword${kwSeries.length===1?"":"s"}`;
    }
  }

  return (
    <div className="panel chart-card">
      <div className="chart-head">
        <div>
          <div className="chart-title">Cost per DM</div>
          <div className="chart-subtitle">
            <span className="chart-big">${avg.toFixed(2)}</span>
            <span className={delta<=0?"chart-delta pos":"chart-delta neg"}>
              {delta<=0?"▼":"▲"} ${Math.abs(delta).toFixed(2)}
            </span>
            <span className="chart-sub-label">{subLabel}</span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(mode==="overall"?"active":"")} onClick={()=>setMode("overall")}>Overall</button>
            <button className={"kw-tab "+(mode==="keyword"?"active":"")} onClick={()=>setMode("keyword")}>By keyword</button>
          </div>
        </div>
      </div>
      <LineChart
        labels={labels}
        series={series}
        fmt={(v)=>"$"+v.toFixed(2)}
      />
      <div className="chart-legend cpm-legend">
        {mode === "overall" ? (
          <>
            <span className="chart-legend-item"><span className="chart-sw" style={{background:'var(--blue)'}}></span>Cost per DM</span>
          </>
        ) : (
          <>
            <div className="cpm-kw-legend">
              {series.map(s => (
                <span key={s.name} className="chart-legend-item">
                  <span className="chart-sw" style={{background:s.color}}></span>{s.name}
                </span>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ------- Ad ROAS chart (was Keyword ROI)
// Build aggregated per-ad metrics across the 6 known days
function allAdsAggregated(campaigns=CAMPAIGNS, authoritativeAdRoas=[]){
  const out = [];
  campaigns.forEach(c => {
    c.ads.forEach(a => {
      // sum across rows
      let spend=0, collected=0, clients=0;
      let previewImageUrl = a.previewImageUrl || a.previewThumbnailUrl || null;
      let previewThumbnailUrl = a.previewThumbnailUrl || null;
      c.rows.forEach(r0 => {
        const ads = buildAdRows(c.id, r0, c.ads);
        const mine = ads.find(x=>x.adId===a.id);
        if(mine){
          spend += mine.spend;
          collected += mine.collected;
          clients += mine.clients;
          previewImageUrl = previewImageUrl || mine.previewImageUrl || mine.previewThumbnailUrl || null;
          previewThumbnailUrl = previewThumbnailUrl || mine.previewThumbnailUrl || null;
        }
      });
      out.push({
        adId: a.id, adName: a.name, camp: c.clientKey || c.id,
        spend, collected, clients, previewImageUrl, previewThumbnailUrl,
      });
    });
  });

  if(Array.isArray(authoritativeAdRoas) && authoritativeAdRoas.length){
    const byAdId = new Map(out.map(ad => [String(ad.adId), ad]));
    const visibleAdIds = new Set(out.map(ad => String(ad.adId)));
    const visibleCampaignIds = new Set((campaigns || []).map(c => String(c.id || "")));
    return authoritativeAdRoas
      .map(row => {
        const adId = row.adId || row.id || row.label;
        const matched = byAdId.get(String(adId));
        const spend = Number(row.adSpend || 0);
        const collected = Number(row.collectedRevenue || 0);
        const roas = Number.isFinite(Number(row.collectedRoi))
          ? Number(row.collectedRoi)
          : (spend ? collected / spend : 0);
        return {
          adId,
          adName: row.adName || row.label || matched?.adName || "UNKNOWN",
          camp: row.clientKey || matched?.camp || "",
          campaignId: row.campaignId || null,
          spend,
          collected,
          clients: Number(row.newClients || 0),
          roas,
          previewImageUrl: row.previewImageUrl || row.previewThumbnailUrl || matched?.previewImageUrl || matched?.previewThumbnailUrl || null,
          previewThumbnailUrl: row.previewThumbnailUrl || matched?.previewThumbnailUrl || null,
        };
      })
      .filter(ad => {
        const campaignId = String(ad.campaignId || "");
        const isVisible = visibleAdIds.has(String(ad.adId)) || (campaignId && visibleCampaignIds.has(campaignId));
        return isVisible && (ad.spend > 0 || ad.collected > 0 || ad.clients > 0);
      });
  }

  return out;
}

function adPreviewPosition(event){
  const previewWidth = Math.min(340, Math.max(260, window.innerWidth - 28));
  const previewHeight = Math.min(560, window.innerHeight - 28);
  const pad = 14;
  let left = event.clientX + 18;
  let top = event.clientY - 42;

  if(left + previewWidth > window.innerWidth - pad) left = event.clientX - previewWidth - 18;
  if(top + previewHeight > window.innerHeight - pad) top = window.innerHeight - previewHeight - pad;
  if(left < pad) left = pad;
  if(top < pad) top = pad;
  return {left, top};
}

function AdROASChart({campaigns=CAMPAIGNS, dashboard=null}){
  const [view, setView] = useState("top"); // 'top' | 'all'
  const [preview, setPreview] = useState(null);
  const all = useMemo(()=>allAdsAggregated(campaigns, dashboard?.adRoas), [campaigns, dashboard?.adRoas]);
  const filtered = all
    .map(a => ({...a, roas: Number.isFinite(a.roas) ? a.roas : (a.spend ? a.collected/a.spend : 0)}))
    .sort((a,b) => b.collected - a.collected);
  const list = view === "top" ? filtered.slice(0,6) : filtered;
  const max = list[0]?.collected || 1;
  const showPreview = (event, ad) => {
    const url = ad.previewImageUrl || ad.previewThumbnailUrl;
    if(!url) return;
    setPreview({url, position: adPreviewPosition(event)});
  };
  const movePreview = (event, ad) => {
    const url = ad.previewImageUrl || ad.previewThumbnailUrl;
    if(!url) return;
    setPreview({url, position: adPreviewPosition(event)});
  };
  return (
    <div className="panel chart-card ads-roas">
      <div className="chart-head">
        <div>
          <div className="chart-title">Ad ROAS</div>
          <div className="chart-subtitle">
            <span className="chart-sub-label">{view==="top" ? "Top ads by revenue" : `All ads · ${list.length} running`}</span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(view==="top"?"active":"")} onClick={()=>setView("top")}>Top</button>
            <button className={"kw-tab "+(view==="all"?"active":"")} onClick={()=>setView("all")}>All ads</button>
          </div>
        </div>
      </div>
      <div className={"ar-chart-wrap "+(view==="all"?"scroll-x":"")}>
        <div className="ar-chart" style={{minWidth: Math.max(list.length * 64, 100) + "px"}}>
          {list.length === 0 && (
            <div style={{alignSelf:"center",width:"100%",textAlign:"center",color:"var(--text-4)",fontSize:12}}>
              No ads match these filters.
            </div>
          )}
          {list.map((a,i)=>{
            const h = (a.collected/max)*150;
            const color = a.camp==="tyson" ? "var(--gold)" : "var(--blue)";
            const hasPreview = Boolean(a.previewImageUrl || a.previewThumbnailUrl);
            return (
              <div key={a.adId} className="ar-col">
                <div className="ar-val">
                  <div className="ar-val-rev mono">${Math.round(a.collected/1000*10)/10}k</div>
                  <div className="ar-val-roas">{a.roas.toFixed(1)}× ROAS</div>
                </div>
                <div
                  className={"ar-bar-v-wrap "+(hasPreview?"has-preview":"")}
                  onMouseEnter={(event)=>showPreview(event, a)}
                  onMouseMove={(event)=>movePreview(event, a)}
                  onMouseLeave={()=>setPreview(null)}
                  aria-label={hasPreview ? `${a.adName} creative preview` : `${a.adName}`}
                >
                  <div className="ar-bar-v" style={{height:h+"px", background:color}}></div>
                </div>
                <div className="ar-col-label">
                  <div className="ar-col-kw">{a.adName}</div>
                  <div className="ar-col-camp" style={{color}}>{a.camp}</div>
                </div>
              </div>
            );
          })}
        </div>

function CACChart({campaigns=CAMPAIGNS}){
  const [mode, setMode] = useState("main"); // 'main' excludes exactly-$50 subscription wins
  const labels = labelsFromCampaigns(campaigns);
  const spend = seriesForCampaignKey("spend", "all", campaigns, labels);
  const clients = seriesForCampaignKey(mode === "main" ? "mainClients" : "clients", "all", campaigns, labels);
  const subscriptionClients = seriesForCampaignKey("subClients", "all", campaigns, labels)
    .reduce((a,b)=>a+b,0);
  const cac = spend.map((s,i)=> clients[i] ? s/clients[i] : 0);
  const totalSpend = spend.reduce((a,b)=>a+b,0);
  const totalClients = clients.reduce((a,b)=>a+b,0);
  const avg = totalClients ? totalSpend/totalClients : 0;
  const delta = firstLastRealDelta(cac);

  return (
    <div className="panel chart-card cac-card">
      <div className="chart-head">
        <div>

            <span className={delta<=0?"chart-delta pos":"chart-delta neg"}>
              {delta<=0?"▼":"▲"} ${Math.abs(delta).toFixed(0)}

            <span className="chart-sub-label">
              {mode === "main" ? "Excludes $50 subs" : "Includes $50 subs"}
            </span>
          </div>
        </div>
        <div className="chart-controls">
          <div className="kw-tabs">
            <button className={"kw-tab "+(mode==="main"?"active":"")} onClick={()=>setMode("main")}>Main offers</button>

          </div>
        </div>
      </div>
      <LineChart
        labels={labels}
        series={[
          {name:"CAC", values:cac, color:"var(--blue)", isPrimary:true, fmt:(v)=>v ? "$"+v.toFixed(0) : "—"},
          {name:"New clients", values:clients, color:"var(--green)", fmt:(v)=>fmtNum(v)},

function calendarEventsForCurrentWeek(dashboard){
  const events = Array.isArray(dashboard?.calendarEvents) ? dashboard.calendarEvents : [];
  const weekEnd = dashboard?.query?.dateTo || todayEt();
  const days = calendarSevenDays(weekEnd);
  const weekStart = days[0]?.iso || weekEnd;
  return events.filter(event => {
    const iso = isoFromAnyDate(event.eventAt);
    return iso && iso >= weekStart && iso <= weekEnd;
  });
}

function UpcomingCallsCard({dashboard}){
  const visibleEvents = calendarEventsForCurrentWeek(dashboard);
  const upcoming = visibleEvents.filter(event => {
    const status = event.status || "upcoming";
    return status !== "show" && status !== "no_show";
  });
  return (

  );

function safeRatio(num, den){
  return den ? num / den : 0;
}

function fmtCompactUsd(n){
  if(n==null || isNaN(n)) return "—";
  const sign = n < 0 ? "-" : "";
  const v = Math.abs(n);
  if(v >= 1000000) return sign+"$"+(v/1000000).toFixed(v>=10000000?0:1)+"M";
  if(v >= 1000) return sign+"$"+(v/1000).toFixed(v>=10000?0:1)+"k";
  return sign+"$"+Math.round(v).toLocaleString();
}

function fmtCompactNum(n){
  if(n==null || isNaN(n)) return "—";
  const sign = n < 0 ? "-" : "";
  const v = Math.abs(n);
  if(v >= 1000000) return sign+(v/1000000).toFixed(v>=10000000?0:1)+"M";
  if(v >= 1000) return sign+(v/1000).toFixed(v>=10000?0:1)+"k";
  return sign+Math.round(v).toLocaleString();
}

function aggregateRowsByLabel(campaigns, labels){
  return labels.map(label => {
    const row = {...emptyMetric(label)};
    campaigns.forEach(c => {
      const day = (c.rows || []).find(r => r.date === label);
      if(day) addMetric(row, day);
    });
    return row;
  });
}

function aggregateTotal(rows){
  const total = {...emptyMetric("Total")};
  rows.forEach(row => addMetric(total, row));
  return total;
}

    render:({campaigns})=><GenericMetricCard metricId={def.id} campaigns={campaigns}/>,
  })),

function metricDefFor(id){
  return METRIC_CARD_DEFS.find(def => def.id === id);
}

function sanitizeMetricLayout(ids, fallback=DEFAULT_METRIC_CARD_IDS){
  const valid = new Set(METRIC_CARD_DEFS.map(def => def.id));
  const seen = new Set();
  const clean = (Array.isArray(ids) ? ids : [])
    .filter(id => valid.has(id) && !seen.has(id) && seen.add(id));
  return clean.length ? clean : fallback;
}

function loadMetricLayout(){
  try{
    const raw = window.localStorage.getItem(METRIC_CARD_STORAGE_KEY);
    if(raw) return sanitizeMetricLayout(JSON.parse(raw), []);
  }catch(err){}
  return DEFAULT_METRIC_CARD_IDS;
}

function moveMetricCardToIndex(ids, fromId, toIndex){
  if(!fromId) return ids;
  const fromIndex = ids.indexOf(fromId);
  if(fromIndex === -1 || toIndex < 0 || toIndex >= ids.length || fromIndex === toIndex) return ids;
  const next = ids.filter(id => id !== fromId);
  next.splice(toIndex, 0, fromId);
  return next;
}

function MetricCardShell({id, editing, draggingId, dropTargetId, dragHeight, onDelete, onPointerDown, registerRef, children}){
  const isDragging = draggingId === id;
  const isDropTarget = dropTargetId === id && draggingId && draggingId !== id;
  return (
    <div
      ref={node=>registerRef(id, node)}
      data-metric-id={id}
      className={"metric-card-shell "+(editing?"editing ":"")+(isDragging?"dragging ":"")+(isDropTarget?"drop-target":"")}
      onPointerDown={e=>onPointerDown(e, id)}
      style={isDragging && dragHeight ? {height:dragHeight} : undefined}
    >
      {isDragging ? (
        <div className="metric-drag-placeholder"></div>
      ) : (
        <>
          {editing && <button className="metric-delete" title="Delete card" onClick={e=>{e.stopPropagation(); onDelete(id);}}>×</button>}
          {children}
        </>
      )}
    </div>
  );
}

function MetricAddModal({layout, onApply, onClose}){
  const [selected, setSelected] = useState(()=>new Set(layout));
  const toggle = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };
  const apply = () => {
    const kept = layout.filter(id => selected.has(id));
    const added = METRIC_CARD_DEFS
      .map(def => def.id)
      .filter(id => selected.has(id) && !kept.includes(id));
    onApply([...kept, ...added]);
  };
  return (
    <Modal
      title="Add cards"
      subtitle="Choose which campaign metrics are visible in this chart section."
      onClose={onClose}
      wide
      footer={<>
        <button className="btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn-primary" onClick={apply}>Apply</button>
      </>}
    >
      <div className="metric-add-grid">
        {METRIC_CARD_DEFS.map(def => {
          const isSelected = selected.has(def.id);
          return (
            <button key={def.id} className={"metric-pick-card "+(isSelected?"selected":"")} onClick={()=>toggle(def.id)}>
              <span>
                <div className="metric-pick-label">{def.label}</div>
                <div className="metric-pick-meta">{def.meta}</div>
              </span>
              <span className="metric-pick-icon">{isSelected ? <IcCheck/> : <IcPlus/>}</span>
            </button>
          );
        })}
      </div>
    </Modal>
  );
}

function MetricCardBoard({campaigns=CAMPAIGNS, dashboard=null}){
  const [layout, setLayout] = useState(loadMetricLayout);
  const [editing, setEditing] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [dragInfo, setDragInfo] = useState(null);
  const [dropTargetId, setDropTargetId] = useState(null);
  const visibleLayout = sanitizeMetricLayout(layout, []);
  const leftLayout = visibleLayout.filter((_, i) => i % 2 === 0);
  const rightLayout = visibleLayout.filter((_, i) => i % 2 === 1);
  const cardRefs = useRef({});
  const pendingRects = useRef(null);
  const visibleLayoutRef = useRef(visibleLayout);
  const dragInfoRef = useRef(null);
  const dragSlotRectsRef = useRef([]);
  const visibleLayoutKey = visibleLayout.join("|");
  const draggingId = dragInfo?.id || null;

  useLayoutEffect(()=>{
    visibleLayoutRef.current = visibleLayout;
  }, [visibleLayoutKey]);

  useEffect(()=>{
    dragInfoRef.current = dragInfo;
  }, [dragInfo]);

  useEffect(()=>{
    try{ window.localStorage.setItem(METRIC_CARD_STORAGE_KEY, JSON.stringify(visibleLayout)); }catch(err){}
  }, [visibleLayoutKey]);

  useEffect(()=>{
    document.body.classList.toggle("metric-dragging", Boolean(dragInfo));
    return ()=>document.body.classList.remove("metric-dragging");
  }, [Boolean(dragInfo)]);

  const measureCards = () => {
    const rects = {};
    visibleLayoutRef.current.forEach(id => {
      const node = cardRefs.current[id];
      if(node) {
        const rect = node.getBoundingClientRect();
        rects[id] = {left:rect.left, top:rect.top};
      }
    });
    return rects;
  };

  const setLayoutWithAnimation = (updater) => {
    pendingRects.current = measureCards();
    setLayout(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      visibleLayoutRef.current = sanitizeMetricLayout(next, []);
      return next;
    });
  };

  useLayoutEffect(()=>{
    const before = pendingRects.current;
    if(!before) return;
    pendingRects.current = null;
    visibleLayout.forEach(id => {
      if(id === draggingId) return;
      const node = cardRefs.current[id];
      const prev = before[id];
      if(!node || !prev) return;
      const rect = node.getBoundingClientRect();
      const dx = prev.left - rect.left;
      const dy = prev.top - rect.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      node.style.transition = "none";
      node.style.transform = `translate(${dx}px, ${dy}px)`;
      node.getBoundingClientRect();
      requestAnimationFrame(()=>{
        node.style.transition = "transform 320ms cubic-bezier(.22,.72,.2,1)";
        node.style.transform = "";
        window.setTimeout(()=>{
          node.style.transition = "";
        }, 370);
      });
    });
  }, [visibleLayoutKey, draggingId]);

  const deleteCard = (id) => {
    setLayout(prev => prev.filter(cardId => cardId !== id));
  };
  const applyPicker = (next) => {
    setLayout(sanitizeMetricLayout(next, []));
    setPickerOpen(false);
  };

  const registerRef = (id, node) => {
    if(node) cardRefs.current[id] = node;
    else delete cardRefs.current[id];
  };

  const beginPointerDrag = (event, id) => {
    if(!editing || event.button !== 0) return;
    if(event.target.closest("button,input,select,textarea")) return;
    const node = cardRefs.current[id];
    if(!node) return;
    const rect = node.getBoundingClientRect();
    event.preventDefault();
    setDropTargetId(null);
    dragSlotRectsRef.current = visibleLayoutRef.current
      .map((cardId, index) => {
        const slotNode = cardRefs.current[cardId];
        if(!slotNode) return null;
        const slotRect = slotNode.getBoundingClientRect();
        return {
          id:cardId,
          index,
          left:slotRect.left,
          right:slotRect.right,
          top:slotRect.top,
          bottom:slotRect.bottom,
          centerX:slotRect.left + slotRect.width / 2,
          centerY:slotRect.top + slotRect.height / 2,
        };
      })
      .filter(Boolean);
    const nextDrag = {
      id,
      pointerId:event.pointerId,
      x:event.clientX,
      y:event.clientY,
      offsetX:event.clientX - rect.left,
      offsetY:event.clientY - rect.top,
      width:rect.width,
      height:rect.height,
    };
    dragInfoRef.current = nextDrag;
    setDragInfo(nextDrag);
  };

  const reorderTowardPointer = (clientX, clientY) => {
    const activeDrag = dragInfoRef.current;
    if(!activeDrag) return;
    const candidates = dragSlotRectsRef.current
      .map(slot => {
        if(clientX < slot.left || clientX > slot.right || clientY < slot.top || clientY > slot.bottom) return null;
        const dx = clientX - slot.centerX;
        const dy = clientY - slot.centerY;
        return {...slot, distance: Math.hypot(dx, dy)};
      })
      .filter(Boolean)
      .sort((a,b)=>a.distance-b.distance);
    const targetSlot = candidates[0];
    if(!targetSlot) {
      setDropTargetId(null);
      return;
    }
    const currentLayout = visibleLayoutRef.current;
    if(currentLayout.indexOf(activeDrag.id) === targetSlot.index) return;
    const targetId = currentLayout[targetSlot.index];
    setDropTargetId(targetId);
    setLayoutWithAnimation(prev => moveMetricCardToIndex(prev, activeDrag.id, targetSlot.index));
  };

  useEffect(()=>{
    if(!dragInfo) return;
    const onMove = (event) => {
      const activeDrag = dragInfoRef.current;
      if(!activeDrag || event.pointerId !== activeDrag.pointerId) return;
      const nextDrag = {...activeDrag, x:event.clientX, y:event.clientY};
      dragInfoRef.current = nextDrag;
      setDragInfo(nextDrag);
      reorderTowardPointer(event.clientX, event.clientY);
    };
    const onUp = (event) => {
      const activeDrag = dragInfoRef.current;
      if(!activeDrag || event.pointerId !== activeDrag.pointerId) return;
      dragInfoRef.current = null;
      dragSlotRectsRef.current = [];
      setDragInfo(null);
      setDropTargetId(null);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      window.removeEventListener("pointercancel", onUp);
    };
  }, [Boolean(dragInfo)]);

  const floatingDef = dragInfo ? metricDefFor(dragInfo.id) : null;
  const floatingStyle = dragInfo ? {
    left:dragInfo.x - dragInfo.offsetX,
    top:dragInfo.y - dragInfo.offsetY,
    width:dragInfo.width,
  } : null;

  const renderCard = (id) => {
    const def = metricDefFor(id);
    if(!def) return null;
    return (
      <MetricCardShell
        key={id}
        id={id}
        editing={editing}
        draggingId={draggingId}
        dropTargetId={dropTargetId}
        dragHeight={dragInfo?.id === id ? dragInfo.height : null}
        onDelete={deleteCard}
        onPointerDown={beginPointerDrag}
        registerRef={registerRef}
      >
        {def.render({campaigns,dashboard})}
      </MetricCardShell>
    );
  };

  return (
    <>
      <div className="metric-board-head">
        <h2 className="metric-board-title">Metrics</h2>
        <div className="metric-board-actions">
          <button className="metric-board-btn" onClick={()=>setPickerOpen(true)}><IcPlus/> Add</button>
          <button className={"metric-board-btn "+(editing?"active":"")} onClick={()=>setEditing(v=>!v)}>
            <IcEdit/> {editing ? "Done" : "Edit"}
          </button>
        </div>
      </div>
      <div className={"grid-charts metric-grid "+(editing?"editing":"")}>
        <div className="chart-column">{leftLayout.map(renderCard)}</div>
        <div className="chart-column">{rightLayout.map(renderCard)}</div>
      </div>
      {floatingDef && (
        <div className="metric-floating-card" style={floatingStyle}>
          {floatingDef.render({campaigns,dashboard})}
        </div>
      )}
      {pickerOpen && <MetricAddModal layout={visibleLayout} onApply={applyPicker} onClose={()=>setPickerOpen(false)}/>}
    </>
  );
}

function calendarSevenDays(endIso){
  const end = endIso || todayEt();
  return Array.from({length:7}, (_, i) => ({iso:shiftIso(end, i - 6), muted:false}));
}

function weekdayLabelFromIso(value){
  if(!value) return "";
  const d = new Date(value+"T00:00:00");
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString("en-US", {weekday:"short"});
}

function calendarStatusLabel(status){
  if(status === "show") return "Showed";
  if(status === "no_show") return "No-show";
  if(status === "needs_review") return "Review";
  if(status === "missing_keyword") return "Missing keyword";
  return "Booked";
}

function CalendarSection({dashboard, dateRange, onOpenWorkspace}){
  const events = Array.isArray(dashboard?.calendarEvents) ? dashboard.calendarEvents : [];
  const [selectedCall, setSelectedCall] = useState(null);
  const weekEnd = dateRange?.dateTo || todayEt();
  const days = calendarSevenDays(weekEnd);
  const weekStart = days[0]?.iso || weekEnd;
  const visibleEvents = events.filter(event => {
    const iso = isoFromAnyDate(event.eventAt);
    return iso && iso >= weekStart && iso <= weekEnd;
  });
  const eventsByDay = events.reduce((map, event) => {
    const iso = isoFromAnyDate(event.eventAt);
    if(!iso) return map;
    if(!map[iso]) map[iso] = [];
    map[iso].push(event);
    return map;
  }, {});
  const today = todayEt();
  const reviewCount = visibleEvents.filter(event => event.status === "needs_review" || event.status === "missing_keyword").length;
  const weekLabel = `${dateLabelFromIso(weekStart)} - ${dateLabelFromIso(weekEnd)}`;
  return (
    <div className="section">
      <div className="section-head">
        <div className="section-label">Calendar</div>
        <div className="section-meta">{weekLabel} · {visibleEvents.length} booked call{visibleEvents.length===1?"":"s"}</div>
      </div>
      <div className="calendar-panel">
        <div className="calendar-summary">
          <div>
            <div className="calendar-summary-title">7-day booked call view</div>
            <div className="calendar-summary-meta">{visibleEvents.length === 0 ? "No booked calls visible" : reviewCount ? `${reviewCount} need attribution` : "All visible calls are attributed or pending"}</div>
          </div>
          <div className="calendar-summary-meta">{visibleEvents.length ? "Click any appointment" : weekLabel}</div>
        </div>
        <div className="calendar-board">
          {days.map(day=><div key={"dow-"+day.iso} className="calendar-dow">{weekdayLabelFromIso(day.iso)}</div>)}
          {days.map(day=>{
            const calls = (eventsByDay[day.iso] || []).slice().sort((a,b)=>String(a.eventAt).localeCompare(String(b.eventAt)));
            return (
              <div key={day.iso} className={"calendar-cell "+(day.muted?"muted ":"")+(day.iso===today?"today":"")}>
                <div className="calendar-day-head">
                  <div className="calendar-day-num">{Number(day.iso.slice(-2))}</div>
                  {calls.length > 0 && <div className="calendar-day-count">{calls.length}</div>}
                </div>
                {calls.map(call=>(
                  <button
                    key={call.id}
                    type="button"
                    className={"calendar-call status-"+(call.status || "upcoming")}
                    title={`${call.name || "Unknown"} · ${call.campaignName || "Needs attribution"}`}
                    onClick={()=>setSelectedCall(call)}
                  >
                    <div className="calendar-call-top">
                      <div className="calendar-call-name">{call.name || "Unknown"}</div>
                      <span className={"calendar-status-pill "+(call.status || "upcoming")}>{calendarStatusLabel(call.status)}</span>
                    </div>
                    <div className="calendar-call-time">{timeFromAnyDate(call.eventAt)}</div>
                    <div className="calendar-call-meta">
                      {call.campaignName || "Needs attribution"}{call.keyword ? ` · ${call.keyword}` : ""}
                    </div>
                  </button>
                ))}
              </div>
            );
          })}
        </div>
      </div>
      {selectedCall && (
        <CalendarAppointmentModal
          call={selectedCall}
          onClose={()=>setSelectedCall(null)}
          onOpenWorkspace={onOpenWorkspace}
        />
      )}
    </div>
  );
}

// ------- Keyword entry
const BUCKETS = [
  {id:"msgs", label:"Messages", unit:"messages"},
  {id:"calls", label:"45-min calls booked", unit:"calls"},
  {id:"taken", label:"45-min calls taken", unit:"calls"},
  {id:"clients", label:"New clients", unit:"clients"},
  {id:"collected", label:"Collected $", unit:"USD"},
];

const SETTERS = ["Amara"];

function emptyRow(){ return {id: Math.random().toString(36).slice(2,9), keyword:"", value:""}; }

function KeywordEntry({onSubmit}){
  const [campaign, setCampaign] = useState("tyson");
  const [setter, setSetter] = useState(SETTERS[0]);
  const [eventDate, setEventDate] = useState(todayEt());
  // bucket groups appear in order added. Each: {id (bucket), rows: [{id,keyword,value}]}
  const [groups, setGroups] = useState([
    {bucket:"msgs", rows:[emptyRow()]},
  ]);

  const addBucket = (bucketId) => {
    setGroups(g => {
      if(g.find(x=>x.bucket===bucketId)) return g;
      return [...g, {bucket:bucketId, rows:[emptyRow()]}];
    });
  };
  const removeBucket = (bucketId) => setGroups(g => g.filter(x=>x.bucket!==bucketId));
  const addRow = (bucketId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows:[...x.rows, emptyRow()]} : x));
  const removeRow = (bucketId, rowId) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.length>1 ? x.rows.filter(r=>r.id!==rowId) : x.rows} : x));
  const updateRow = (bucketId, rowId, patch) => setGroups(g => g.map(x => x.bucket===bucketId? {...x, rows: x.rows.map(r => r.id===rowId?{...r,...patch}:r)} : x));

  // Available buckets to add
  const availableBuckets = BUCKETS.filter(b => !groups.find(g => g.bucket === b.id));

  // Count valid rows
  const validRows = groups.flatMap(g => g.rows.filter(r => r.keyword && r.value).map(r => ({bucket:g.bucket, ...r})));
  const totalRows = groups.reduce((s,g)=>s+g.rows.length, 0);

  const submit = () => {
    if(validRows.length===0) return;
    validRows.forEach(r => {
      onSubmit({campaign, date:eventDate, bucket:r.bucket, setter, keyword: r.keyword.toUpperCase(), value: parseFloat(r.value)});
    });
    // Reset to clean state
    setGroups([{bucket:"msgs", rows:[emptyRow()]}]);
  };

  return (
    <div className="panel entry-panel">
      <div className="entry-head">Log keywords</div>

      <div className="entry-row">
        <select className="entry-select" value={campaign} onChange={e=>setCampaign(e.target.value)}>
          <option value="tyson">Tyson — Spring Shred</option>
          <option value="keith">Keith — Spring Shred</option>
        </select>
        <select className="entry-select" value={setter} onChange={e=>setSetter(e.target.value)} style={{maxWidth:140}}>
          {SETTERS.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <input
          className="entry-select"
          type="date"
          value={eventDate}
          onChange={e=>setEventDate(e.target.value || todayEt())}
          style={{maxWidth:150}}
        />
      </div>

      {groups.map(g => {
        const bucket = BUCKETS.find(b=>b.id===g.bucket);
        const unit = bucket?.unit || "";
        const isUsd = unit === "USD";
        const filled = g.rows.filter(r=>r.keyword && r.value).length;
        return (
          <div className="bucket-group" key={g.bucket}>
            <div className="bucket-group-head">
              <div className="bucket-group-label">
                {bucket.label}
                <span className="bucket-group-count">{filled}/{g.rows.length} filled</span>
              </div>
              <button className="bucket-group-rem" title="Remove section" onClick={()=>removeBucket(g.bucket)}>×</button>
            </div>
            {g.rows.map((r, i) => (
              <div className="br-row" key={r.id}>
                <span className="br-num">{String(i+1).padStart(2,"0")}</span>
                <input
                  className="br-input mono"
                  placeholder="KEYWORD"
                  value={r.keyword}
                  onChange={e=>updateRow(g.bucket, r.id, {keyword:e.target.value.toUpperCase()})}
                />
                <input
                  className="br-input val"
                  placeholder={isUsd?"$0":"0"}
                  value={r.value}
                  onChange={e=>updateRow(g.bucket, r.id, {value:e.target.value.replace(/[^\d.]/g,"")})}
                />
                <span style={{color:'var(--text-4)',fontSize:10,minWidth:60,textAlign:'right'}}>{unit}</span>
                <button className="br-remove" onClick={()=>removeRow(g.bucket, r.id)} title="Remove row">×</button>
              </div>
            ))}
            <button className="br-addrow" onClick={()=>addRow(g.bucket)}>
              <span style={{color:'var(--gold)',fontSize:13,lineHeight:1}}>+</span> Add row
            </button>
          </div>
        );
      })}

      {availableBuckets.length > 0 && (
        <div className="bucket-picker">
          <span className="bucket-picker-label">Add stage</span>
          {availableBuckets.map(b => (
            <button key={b.id} className="bp-chip" onClick={()=>addBucket(b.id)}>
              <span className="pl">+</span> {b.label}
            </button>
          ))}
        </div>
      )}

      <div className="entry-submit-row">
        <button className="entry-submit" onClick={submit} disabled={validRows.length===0}>
          Log {validRows.length>0 ? validRows.length+" "+(validRows.length===1?"entry":"entries") : "entry"}
        </button>
        <span className="entry-hint">
          {validRows.length>0 ? <span style={{color:'var(--text-3)'}}>{validRows.length} of {totalRows} rows ready</span> : ""}
        </span>
      </div>
    </div>
  );
}

function csvEscape(value){
  const text = String(value ?? "");
  return /[",\n]/.test(text) ? `"${text.replace(/"/g,'""')}"` : text;
}

function downloadCsv(filename, rows){
  const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function rowsForCsv(campaigns){
  const header = ["Level","Account","Date","Ad","Ad spend","Impressions","Link clicks","Messages","45-min calls booked","45-min calls taken","New clients","Collected revenue","CPM","CTR","CPC","Cost / message","Cost / 45-min booked","Cost / call taken","Cost / client","Collected ROI"];
  const rows = [header];
  campaigns.forEach(c => {
    const campaignAgg = aggregate(c.rows);
    rows.push([
      "campaign", c.short, "", "", campaignAgg.spend, campaignAgg.imp, campaignAgg.clicks, campaignAgg.msgs,
      campaignAgg.calls, campaignAgg.taken, campaignAgg.clients, campaignAgg.collected, campaignAgg.cpm,
      campaignAgg.ctr, campaignAgg.cpc, campaignAgg.cpMsg, campaignAgg.cpCall || "", campaignAgg.cpTaken || "", campaignAgg.cpClient || "",
      campaignAgg.collectedRoi,
    ]);
    c.rows.forEach(day => {
      const dayMetrics = deriveRow(day);
      rows.push([
        "day", c.short, day.date, "", dayMetrics.spend, dayMetrics.imp, dayMetrics.clicks, dayMetrics.msgs,
        dayMetrics.calls, dayMetrics.taken, dayMetrics.clients, dayMetrics.collected, dayMetrics.cpm,
        dayMetrics.ctr, dayMetrics.cpc, dayMetrics.cpMsg, dayMetrics.cpCall || "", dayMetrics.cpTaken || "", dayMetrics.cpClient || "",
        dayMetrics.collectedRoi,
      ]);
      buildAdRows(c.id, day, c.ads).forEach(ad => {
        const adMetrics = deriveRow({
          date: day.date,
          spend: ad.spend, imp: ad.imp, clicks: ad.clicks, msgs: ad.msgs,
          calls: ad.calls, taken: ad.taken, clients: ad.clients, collected: ad.collected,
        });
        rows.push([
          "ad", c.short, day.date, ad.adName, adMetrics.spend, adMetrics.imp, adMetrics.clicks, adMetrics.msgs,
          adMetrics.calls, adMetrics.taken, adMetrics.clients, adMetrics.collected, adMetrics.cpm,
          adMetrics.ctr, adMetrics.cpc, adMetrics.cpMsg, adMetrics.cpCall || "", adMetrics.cpTaken || "", adMetrics.cpClient || "",
          adMetrics.collectedRoi,
        ]);
      });
    });
  });
  return rows;
}
